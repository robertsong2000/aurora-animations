<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漩涡效果 | Vortex Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a15;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.1);
            font-size: 48px;
            font-weight: 100;
            letter-spacing: 20px;
            pointer-events: none;
            z-index: 10;
            text-transform: uppercase;
        }
        
        .fps {
            position: fixed;
            top: 10px;
            right: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-family: monospace;
            z-index: 10;
        }
        
        .stats {
            position: fixed;
            top: 10px;
            left: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-family: monospace;
            z-index: 10;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <canvas id="vortex"></canvas>
    <div class="title">Vortex</div>
    <div class="stats" id="stats">粒子: 0 | 漩涡: 0</div>
    <div class="info">移动鼠标改变漩涡方向 | 点击产生粒子爆炸</div>
    <div class="fps" id="fps"></div>
    
    <script>
        const canvas = document.getElementById('vortex');
        const ctx = canvas.getContext('2d');
        const fpsDisplay = document.getElementById('fps');
        const statsDisplay = document.getElementById('stats');
        
        let width, height, centerX, centerY;
        let particles = [];
        let vortexCenters = [];
        let mouseX = 0, mouseY = 0;
        let time = 0;
        
        // FPS 计算
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        // 配置
        const config = {
            particleCount: 800,
            maxSpeed: 5,
            trailLength: 8
        };
        
        // 粒子类
        class Particle {
            constructor(x, y) {
                this.x = x !== undefined ? x : Math.random() * width;
                this.y = y !== undefined ? y : Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.life = 1;
                this.decay = 0.001 + Math.random() * 0.002;
                this.size = Math.random() * 2 + 1;
                this.hue = Math.random() * 60 + 180; // 蓝紫色系
                this.trail = [];
            }
            
            update() {
                // 保存轨迹
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > config.trailLength) {
                    this.trail.shift();
                }
                
                // 应用漩涡力
                vortexCenters.forEach(vortex => {
                    const dx = vortex.x - this.x;
                    const dy = vortex.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < vortex.radius && distance > 10) {
                        // 漩涡旋转力
                        const angle = Math.atan2(dy, dx);
                        const tangentAngle = angle + Math.PI / 2 * vortex.direction;
                        
                        // 向心力
                        const pullForce = vortex.strength * (1 - distance / vortex.radius);
                        
                        // 切向力（旋转）
                        const rotateForce = pullForce * 0.8;
                        
                        this.vx += Math.cos(tangentAngle) * rotateForce;
                        this.vy += Math.sin(tangentAngle) * rotateForce;
                        
                        // 向中心的吸引力
                        this.vx += (dx / distance) * pullForce * 0.3;
                        this.vy += (dy / distance) * pullForce * 0.3;
                    }
                });
                
                // 鼠标影响
                const mouseDx = mouseX - this.x;
                const mouseDy = mouseY - this.y;
                const mouseDistance = Math.sqrt(mouseDx * mouseDx + mouseDy * mouseDy);
                
                if (mouseDistance < 150 && mouseDistance > 5) {
                    const mouseAngle = Math.atan2(mouseDy, mouseDx);
                    const mouseForce = (150 - mouseDistance) / 150 * 0.5;
                    
                    // 垂直于鼠标方向的力
                    this.vx += Math.cos(mouseAngle + Math.PI / 2) * mouseForce;
                    this.vy += Math.sin(mouseAngle + Math.PI / 2) * mouseForce;
                }
                
                // 限制速度
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > config.maxSpeed) {
                    this.vx = (this.vx / speed) * config.maxSpeed;
                    this.vy = (this.vy / speed) * config.maxSpeed;
                }
                
                // 摩擦力
                this.vx *= 0.99;
                this.vy *= 0.99;
                
                // 移动
                this.x += this.vx;
                this.y += this.vy;
                
                // 边界处理（环绕）
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
                
                // 衰减
                this.life -= this.decay;
                
                return this.life > 0;
            }
            
            draw() {
                // 绘制轨迹
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = (i / this.trail.length) * this.life * 0.5;
                    const size = this.size * (i / this.trail.length);
                    
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x, this.trail[i].y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${alpha})`;
                    ctx.fill();
                }
                
                // 绘制粒子
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${this.life})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsl(${this.hue}, 80%, 60%)`;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        // 漩涡中心类
        class VortexCenter {
            constructor(x, y, direction = 1) {
                this.x = x;
                this.y = y;
                this.radius = 200 + Math.random() * 100;
                this.strength = 0.3;
                this.direction = direction; // 1: 顺时针, -1: 逆时针
                this.life = 1;
                this.decay = 0.003;
                this.rotation = 0;
            }
            
            update() {
                this.life -= this.decay;
                this.rotation += 0.02 * this.direction;
                
                return this.life > 0;
            }
            
            draw() {
                // 绘制漩涡中心
                const alpha = this.life * 0.3;
                
                // 多层圆环
                for (let i = 0; i < 5; i++) {
                    const radius = this.radius * (0.2 + i * 0.2);
                    const ringAlpha = alpha * (1 - i * 0.15);
                    
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(100, 150, 255, ${ringAlpha})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                
                // 旋转的螺旋线
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                ctx.beginPath();
                for (let i = 0; i < 100; i++) {
                    const angle = (i / 100) * Math.PI * 4;
                    const radius = (i / 100) * this.radius * 0.8;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                
                ctx.strokeStyle = `rgba(150, 200, 255, ${alpha})`;
                ctx.lineWidth = 1;
                ctx.stroke();
                
                ctx.restore();
            }
        }
        
        // 初始化粒子
        function initParticles() {
            particles = [];
            for (let i = 0; i < config.particleCount; i++) {
                particles.push(new Particle());
            }
        }
        
        // 绘制背景
        function drawBackground() {
            // 渐变背景
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, Math.max(width, height)
            );
            gradient.addColorStop(0, '#0f0f20');
            gradient.addColorStop(0.5, '#0a0a15');
            gradient.addColorStop(1, '#050510');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // 网格
            ctx.strokeStyle = 'rgba(100, 150, 255, 0.03)';
            ctx.lineWidth = 1;
            
            const gridSize = 50;
            for (let x = 0; x < width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            
            for (let y = 0; y < height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
        }
        
        // 创建爆炸
        function createExplosion(x, y) {
            // 添加大量粒子
            for (let i = 0; i < 50; i++) {
                const angle = (i / 50) * Math.PI * 2;
                const speed = 3 + Math.random() * 5;
                const particle = new Particle(x, y);
                particle.vx = Math.cos(angle) * speed;
                particle.vy = Math.sin(angle) * speed;
                particle.life = 0.8;
                particles.push(particle);
            }
            
            // 添加漩涡
            vortexCenters.push(new VortexCenter(x, y, Math.random() > 0.5 ? 1 : -1));
            
            // 限制粒子数量
            while (particles.length > config.particleCount * 2) {
                particles.shift();
            }
        }
        
        // 主渲染循环
        function render() {
            // 绘制背景
            drawBackground();
            
            // 更新和绘制漩涡中心
            vortexCenters = vortexCenters.filter(vortex => {
                const alive = vortex.update();
                if (alive) vortex.draw();
                return alive;
            });
            
            // 如果没有漩涡，创建一个主漩涡
            if (vortexCenters.length === 0) {
                vortexCenters.push(new VortexCenter(centerX, centerY, 1));
            }
            
            // 更新和绘制粒子
            particles = particles.filter(particle => {
                const alive = particle.update();
                if (alive) particle.draw();
                return alive;
            });
            
            // 补充粒子
            while (particles.length < config.particleCount) {
                particles.push(new Particle());
            }
            
            // 更新统计
            statsDisplay.textContent = `粒子: ${particles.length} | 漩涡: ${vortexCenters.length}`;
            
            time++;
            
            // FPS 计算
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                fpsDisplay.textContent = `FPS: ${fps}`;
            }
            
            requestAnimationFrame(render);
        }
        
        // 调整画布大小
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            canvas.width = width;
            canvas.height = height;
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        });
        
        canvas.addEventListener('click', (e) => {
            createExplosion(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                createExplosion(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
        
        // 初始化
        resize();
        initParticles();
        mouseX = centerX;
        mouseY = centerY;
        render();
    </script>
</body>
</html>
