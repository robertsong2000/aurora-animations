<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火焰效果 | Fire Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Georgia', serif;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            animation: flicker 0.5s ease-in-out infinite alternate;
        }

        .title h1 {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 700;
            color: rgba(255, 200, 100, 0.9);
            text-shadow: 
                0 0 10px rgba(255, 100, 0, 0.8),
                0 0 20px rgba(255, 50, 0, 0.6),
                0 0 30px rgba(255, 0, 0, 0.4),
                0 0 40px rgba(200, 0, 0, 0.2);
            letter-spacing: 0.3em;
            margin-bottom: 20px;
        }

        @keyframes flicker {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }

        .subtitle {
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            color: rgba(255, 150, 50, 0.7);
            letter-spacing: 0.2em;
        }

        .instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 150, 0.7);
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 150, 50, 0.8);
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 100, 0, 0.3);
        }

        .stats div {
            margin: 5px 0;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 100, 0, 0.3);
            color: rgba(255, 150, 50, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 100, 0, 0.2);
            border-color: rgba(255, 100, 0, 0.6);
        }

        .control-btn.active {
            background: rgba(255, 100, 0, 0.3);
            border-color: rgba(255, 100, 0, 0.8);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="controls">
        <button class="control-btn" id="modeBtn">切换模式</button>
        <button class="control-btn" id="colorBtn">切换颜色</button>
    </div>
    
    <div class="title">
        <h1>烈焰</h1>
        <div class="subtitle">燃烧的激情</div>
    </div>
    
    <div class="instructions">
        移动鼠标控制火焰方向 · 点击创建火焰爆发 · 滚轮调整火焰强度
    </div>
    
    <div class="stats">
        <div>FPS: <span id="fps">60</span></div>
        <div>粒子数: <span id="particles">0</span></div>
        <div>强度: <span id="intensity">100</span>%</div>
    </div>

    <script>
        // 性能监控
        const fpsCounter = document.getElementById('fps');
        const particlesCounter = document.getElementById('particles');
        const intensityDisplay = document.getElementById('intensity');
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        let intensity = 1.0;
        let currentMode = 0;
        let currentColorScheme = 0;

        // Canvas 设置
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        // 火焰系统
        const particles = [];
        const maxParticles = 1000;
        let mouseX = 0;
        let mouseY = 0;
        let windX = 0;
        let windY = -1;

        // 颜色方案
        const colorSchemes = [
            // 经典火焰
            [
                { r: 255, g: 255, b: 200 },
                { r: 255, g: 200, b: 50 },
                { r: 255, g: 100, b: 0 },
                { r: 200, g: 50, b: 0 },
                { r: 100, g: 20, b: 0 }
            ],
            // 蓝焰
            [
                { r: 200, g: 255, b: 255 },
                { r: 100, g: 200, b: 255 },
                { r: 50, g: 150, b: 255 },
                { r: 0, g: 100, b: 200 },
                { r: 0, g: 50, b: 100 }
            ],
            // 绿焰
            [
                { r: 200, g: 255, b: 200 },
                { r: 100, g: 255, b: 100 },
                { r: 0, g: 200, b: 50 },
                { r: 0, g: 150, b: 0 },
                { r: 0, g: 80, b: 0 }
            ],
            // 紫焰
            [
                { r: 255, g: 200, b: 255 },
                { r: 200, g: 100, b: 255 },
                { r: 150, g: 50, b: 200 },
                { r: 100, g: 0, b: 150 },
                { r: 50, g: 0, b: 80 }
            ]
        ];

        // 响应式调整
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            mouseX = width / 2;
            mouseY = height;
        }

        // 火焰粒子类
        class FireParticle {
            constructor(x, y, isBurst = false) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = -Math.random() * 3 - 2;
                this.life = 1.0;
                this.maxLife = 1.0;
                this.decay = 0.01 + Math.random() * 0.02;
                this.size = 3 + Math.random() * 5;
                this.isBurst = isBurst;
                
                if (isBurst) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 5 + 3;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.size *= 1.5;
                    this.decay *= 1.5;
                }
                
                this.turbulence = Math.random() * 0.5;
            }

            update() {
                // 添加风力影响
                this.vx += windX * 0.1;
                this.vy += windY * 0.1;
                
                // 添加湍流
                this.vx += (Math.random() - 0.5) * this.turbulence;
                
                // 物理更新
                this.x += this.vx * intensity;
                this.y += this.vy * intensity;
                
                // 生命周期衰减
                this.life -= this.decay * intensity;
                
                // 粒子随生命周期变小
                this.size *= 0.99;
                
                return this.life > 0 && this.size > 0.5;
            }

            getColor() {
                const scheme = colorSchemes[currentColorScheme];
                const lifeRatio = this.life / this.maxLife;
                
                // 根据生命周期选择颜色
                let colorIndex;
                if (lifeRatio > 0.8) {
                    colorIndex = 0;
                } else if (lifeRatio > 0.6) {
                    colorIndex = 1;
                } else if (lifeRatio > 0.4) {
                    colorIndex = 2;
                } else if (lifeRatio > 0.2) {
                    colorIndex = 3;
                } else {
                    colorIndex = 4;
                }
                
                const color = scheme[colorIndex];
                const alpha = this.life * 0.8;
                
                return `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha})`;
            }

            draw() {
                const color = this.getColor();
                
                ctx.save();
                
                // 创建径向渐变
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                gradient.addColorStop(0, color);
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.shadowBlur = this.size * 2;
                ctx.shadowColor = color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        // 创建火焰粒子
        function createFireParticles() {
            if (particles.length >= maxParticles) return;
            
            // 根据模式创建粒子
            if (currentMode === 0) {
                // 底部火焰
                for (let i = 0; i < 3; i++) {
                    const x = width / 2 + (Math.random() - 0.5) * 100;
                    const y = height;
                    particles.push(new FireParticle(x, y));
                }
            } else if (currentMode === 1) {
                // 跟随鼠标
                for (let i = 0; i < 2; i++) {
                    const x = mouseX + (Math.random() - 0.5) * 30;
                    const y = mouseY + (Math.random() - 0.5) * 30;
                    particles.push(new FireParticle(x, y));
                }
            } else {
                // 四角火焰
                const corners = [
                    { x: width * 0.2, y: height },
                    { x: width * 0.4, y: height },
                    { x: width * 0.6, y: height },
                    { x: width * 0.8, y: height }
                ];
                
                corners.forEach(corner => {
                    if (Math.random() < 0.3) {
                        const x = corner.x + (Math.random() - 0.5) * 50;
                        particles.push(new FireParticle(x, corner.y));
                    }
                });
            }
        }

        // 创建火焰爆发
        function createFireBurst(x, y) {
            for (let i = 0; i < 50; i++) {
                if (particles.length >= maxParticles) break;
                particles.push(new FireParticle(x, y, true));
            }
        }

        // 绘制背景光晕
        function drawBackgroundGlow() {
            const gradient = ctx.createRadialGradient(
                width / 2, height, 0,
                width / 2, height, height
            );
            
            const scheme = colorSchemes[currentColorScheme];
            const baseColor = scheme[2];
            
            gradient.addColorStop(0, `rgba(${baseColor.r}, ${baseColor.g}, ${baseColor.b}, 0.1)`);
            gradient.addColorStop(0.5, `rgba(${baseColor.r / 2}, ${baseColor.g / 2}, ${baseColor.b / 2}, 0.05)`);
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        // 动画循环
        function animate(currentTime) {
            // FPS 计算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                fpsCounter.textContent = fps;
            }

            // 半透明覆盖（创建拖尾效果）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);

            // 绘制背景光晕
            drawBackgroundGlow();

            // 创建新粒子
            createFireParticles();

            // 更新风向（基于鼠标位置）
            windX = (mouseX - width / 2) / width * 2;

            // 更新和绘制粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                const alive = particles[i].update();
                if (!alive) {
                    particles.splice(i, 1);
                } else {
                    particles[i].draw();
                }
            }

            particlesCounter.textContent = particles.length;

            requestAnimationFrame(animate);
        }

        // 事件监听
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('click', (e) => {
            createFireBurst(e.clientX, e.clientY);
        });

        // 滚轮调整强度
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            intensity = Math.max(0.3, Math.min(2.0, intensity - e.deltaY * 0.001));
            intensityDisplay.textContent = Math.round(intensity * 100);
        });

        // 按钮控制
        document.getElementById('modeBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            currentMode = (currentMode + 1) % 3;
            const modes = ['底部火焰', '跟随鼠标', '多源火焰'];
            e.target.textContent = modes[currentMode];
        });

        document.getElementById('colorBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            currentColorScheme = (currentColorScheme + 1) % colorSchemes.length;
            const colors = ['经典火焰', '蓝色火焰', '绿色火焰', '紫色火焰'];
            e.target.textContent = colors[currentColorScheme];
        });

        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            createFireBurst(mouseX, mouseY);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                // 空格键：创建多个爆发
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        createFireBurst(
                            Math.random() * width,
                            Math.random() * height
                        );
                    }, i * 100);
                }
            } else if (e.code === 'KeyM') {
                // M键：切换模式
                currentMode = (currentMode + 1) % 3;
                const modes = ['底部火焰', '跟随鼠标', '多源火焰'];
                document.getElementById('modeBtn').textContent = modes[currentMode];
            } else if (e.code === 'KeyC') {
                // C键：切换颜色
                currentColorScheme = (currentColorScheme + 1) % colorSchemes.length;
                const colors = ['经典火焰', '蓝色火焰', '绿色火焰', '紫色火焰'];
                document.getElementById('colorBtn').textContent = colors[currentColorScheme];
            }
        });

        // 初始化
        resize();
        
        // 开始动画
        requestAnimationFrame(animate);

        // 初始火焰爆发
        setTimeout(() => {
            createFireBurst(width / 2, height / 2);
        }, 500);
    </script>
</body>
</html>
