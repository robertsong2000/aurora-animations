<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火焰效果 - Fire Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 200, 100, 0.8);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255, 100, 0, 0.5);
        }
        
        .info span {
            display: block;
            margin: 5px 0;
        }
        
        .fps-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 200, 100, 0.6);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="fire"></canvas>
    <div class="info">
        <span>🔥 火焰效果</span>
        <span>🖱️ 移动鼠标 - 火焰跟随</span>
        <span>👆 点击 - 火焰爆发</span>
    </div>
    <div class="fps-counter" id="fps">FPS: 60</div>

    <script>
        // ============ 配置 ============
        const CONFIG = {
            maxParticles: 500,
            spawnRate: 3,
            gravity: -0.05,
            colors: {
                fire: [
                    { pos: 0, color: { r: 255, g: 255, b: 200 } },   // 白黄（核心）
                    { pos: 0.2, color: { r: 255, g: 200, b: 50 } },  // 黄色
                    { pos: 0.4, color: { r: 255, g: 120, b: 0 } },   // 橙色
                    { pos: 0.7, color: { r: 255, g: 50, b: 0 } },    // 红橙
                    { pos: 1, color: { r: 100, g: 20, b: 0 } }       // 暗红
                ],
                smoke: [
                    { pos: 0, color: { r: 80, g: 80, b: 80 } },
                    { pos: 1, color: { r: 30, g: 30, b: 30 } }
                ]
            }
        };

        // ============ Canvas 设置 ============
        const canvas = document.getElementById('fire');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        resize();
        window.addEventListener('resize', resize);

        // ============ 工具函数 ============
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        function lerpColor(color1, color2, t) {
            return {
                r: Math.floor(lerp(color1.r, color2.r, t)),
                g: Math.floor(lerp(color1.g, color2.g, t)),
                b: Math.floor(lerp(color1.b, color2.b, t))
            };
        }

        function getGradientColor(colors, t) {
            t = Math.max(0, Math.min(1, t));
            
            for (let i = 0; i < colors.length - 1; i++) {
                if (t >= colors[i].pos && t <= colors[i + 1].pos) {
                    const localT = (t - colors[i].pos) / (colors[i + 1].pos - colors[i].pos);
                    return lerpColor(colors[i].color, colors[i + 1].color, localT);
                }
            }
            return colors[colors.length - 1].color;
        }

        function toRgba(color, alpha) {
            return `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha})`;
        }

        // ============ 火焰粒子类 ============
        class FireParticle {
            constructor(x, y, isBurst = false) {
                this.x = x;
                this.y = y;
                this.vx = random(-1.5, 1.5);
                this.vy = random(-4, -1);
                this.size = random(15, 40);
                this.life = 1;
                this.maxLife = random(0.5, 1);
                this.decay = 1 / (60 * this.maxLife);
                this.turbulence = random(0.5, 1.5);
                this.turbulenceOffset = random(0, 1000);
                this.isBurst = isBurst;
                
                if (isBurst) {
                    const angle = random(0, Math.PI * 2);
                    const speed = random(3, 8);
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed - 2;
                    this.size = random(20, 50);
                }
            }

            update(time) {
                // 湍流效果
                const turbulenceX = Math.sin((time + this.turbulenceOffset) * 0.01) * this.turbulence;
                
                this.vx += turbulenceX * 0.1;
                this.vy += CONFIG.gravity;
                
                this.x += this.vx;
                this.y += this.vy;
                
                this.life -= this.decay;
                this.size *= 0.98;
            }

            draw() {
                if (this.life <= 0 || this.size < 1) return;

                const lifeRatio = 1 - this.life;
                const color = getGradientColor(CONFIG.colors.fire, lifeRatio);
                const alpha = this.life * 0.8;

                // 发光效果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                
                gradient.addColorStop(0, toRgba({ r: 255, g: 255, b: 200 }, alpha * 0.8));
                gradient.addColorStop(0.3, toRgba(color, alpha * 0.6));
                gradient.addColorStop(0.7, toRgba(color, alpha * 0.3));
                gradient.addColorStop(1, 'transparent');

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }

            isDead() {
                return this.life <= 0 || this.size < 1;
            }
        }

        // ============ 烟雾粒子类 ============
        class SmokeParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = random(-0.3, 0.3);
                this.vy = random(-0.8, -0.3);
                this.size = random(30, 60);
                this.life = 1;
                this.decay = random(0.003, 0.008);
                this.rotation = random(0, Math.PI * 2);
                this.rotationSpeed = random(-0.02, 0.02);
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx += random(-0.05, 0.05);
                this.life -= this.decay;
                this.size *= 1.01;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                if (this.life <= 0) return;

                const alpha = this.life * 0.15;
                const color = getGradientColor(CONFIG.colors.smoke, 1 - this.life);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = toRgba(color, alpha);
                ctx.fill();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        // ============ 火星类 ============
        class Spark {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = random(-Math.PI * 0.8, -Math.PI * 0.2);
                const speed = random(2, 6);
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.size = random(1, 3);
                this.life = 1;
                this.decay = random(0.02, 0.05);
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1; // 重力
                this.life -= this.decay;
            }

            draw() {
                if (this.life <= 0) return;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 200, 100, ${this.life})`;
                ctx.fill();
                
                // 发光
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 150, 50, ${this.life * 0.3})`;
                ctx.fill();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        // ============ 初始化 ============
        const fireParticles = [];
        const smokeParticles = [];
        const sparks = [];

        // 火焰源位置
        let fireX = width / 2;
        let fireY = height * 0.8;
        let targetFireX = fireX;
        let targetFireY = fireY;

        // ============ 鼠标交互 ============
        let mouseActive = false;

        canvas.addEventListener('mousemove', (e) => {
            targetFireX = e.clientX;
            targetFireY = Math.max(height * 0.5, e.clientY);
            mouseActive = true;
        });

        canvas.addEventListener('mouseleave', () => {
            mouseActive = false;
            targetFireX = width / 2;
            targetFireY = height * 0.8;
        });

        canvas.addEventListener('click', (e) => {
            // 火焰爆发
            for (let i = 0; i < 50; i++) {
                fireParticles.push(new FireParticle(e.clientX, e.clientY, true));
            }
            for (let i = 0; i < 20; i++) {
                sparks.push(new Spark(e.clientX, e.clientY));
            }
        });

        // ============ FPS 计算 ============
        let frameCount = 0;
        let lastFpsTime = performance.now();
        let fps = 60;

        function updateFPS() {
            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFpsTime = now;
                document.getElementById('fps').textContent = `FPS: ${fps}`;
            }
        }

        // ============ 绘制木柴/底座 ============
        function drawFireBase() {
            const baseY = height * 0.85;
            
            // 发光底座
            const gradient = ctx.createRadialGradient(
                fireX, baseY, 0,
                fireX, baseY, 150
            );
            gradient.addColorStop(0, 'rgba(255, 100, 0, 0.3)');
            gradient.addColorStop(0.5, 'rgba(255, 50, 0, 0.1)');
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.ellipse(fireX, baseY, 150, 50, 0, 0, Math.PI * 2);
            ctx.fill();

            // 木柴
            ctx.strokeStyle = 'rgba(60, 30, 10, 0.8)';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            
            for (let i = 0; i < 5; i++) {
                const angle = (i / 5) * Math.PI - Math.PI / 2;
                const length = 60 + random(-10, 10);
                ctx.beginPath();
                ctx.moveTo(fireX, baseY);
                ctx.lineTo(
                    fireX + Math.cos(angle) * length,
                    baseY + Math.sin(angle) * 20
                );
                ctx.stroke();
            }
        }

        // ============ 主动画循环 ============
        function animate(time) {
            // 清除画布（带拖尾）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);

            // 平滑移动火焰源
            fireX = lerp(fireX, targetFireX, 0.05);
            fireY = lerp(fireY, targetFireY, 0.05);

            // 绘制底座
            drawFireBase();

            // 生成新粒子
            if (fireParticles.length < CONFIG.maxParticles) {
                for (let i = 0; i < CONFIG.spawnRate; i++) {
                    const offsetX = random(-30, 30);
                    fireParticles.push(new FireParticle(fireX + offsetX, fireY));
                }
            }

            // 生成烟雾
            if (Math.random() < 0.1) {
                smokeParticles.push(new SmokeParticle(
                    fireX + random(-20, 20),
                    fireY - 50
                ));
            }

            // 生成火星
            if (Math.random() < 0.05) {
                sparks.push(new Spark(fireX + random(-20, 20), fireY - 30));
            }

            // 更新和绘制烟雾（最底层）
            for (let i = smokeParticles.length - 1; i >= 0; i--) {
                smokeParticles[i].update();
                smokeParticles[i].draw();
                if (smokeParticles[i].isDead()) {
                    smokeParticles.splice(i, 1);
                }
            }

            // 更新和绘制火焰粒子
            for (let i = fireParticles.length - 1; i >= 0; i--) {
                fireParticles[i].update(time);
                fireParticles[i].draw();
                if (fireParticles[i].isDead()) {
                    fireParticles.splice(i, 1);
                }
            }

            // 更新和绘制火星
            for (let i = sparks.length - 1; i >= 0; i--) {
                sparks[i].update();
                sparks[i].draw();
                if (sparks[i].isDead()) {
                    sparks.splice(i, 1);
                }
            }

            // 限制粒子数量
            if (fireParticles.length > CONFIG.maxParticles) {
                fireParticles.splice(0, fireParticles.length - CONFIG.maxParticles);
            }
            if (smokeParticles.length > 100) {
                smokeParticles.splice(0, smokeParticles.length - 100);
            }

            updateFPS();
            requestAnimationFrame(animate);
        }

        // 启动动画
        animate(0);

        // ============ 性能优化 ============
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // 页面隐藏时可以暂停
            }
        });
    </script>
</body>
</html>
