<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子纠缠 | Quantum Entanglement</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: radial-gradient(circle at center, #0a0a2a 0%, #1a0a3a 50%, #0a1a2a 100%);
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: rgba(200, 180, 255, 0.9);
            font-size: 12px;
            background: rgba(20, 10, 40, 0.85);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(150, 100, 255, 0.3);
            backdrop-filter: blur(5px);
            max-width: 220px;
        }

        .control-group {
            margin: 10px 0;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: #bb99ff;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: #9966ff;
        }

        .btn {
            padding: 8px 16px;
            margin-top: 8px;
            background: linear-gradient(135deg, #8855ff, #ff55aa);
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 11px;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(150, 100, 255, 0.5);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 180, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(200, 180, 255, 0.7);
            font-size: 12px;
            background: rgba(20, 10, 40, 0.8);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(150, 100, 255, 0.3);
            z-index: 10;
        }

        @media (max-width: 600px) {
            .controls {
                font-size: 10px;
                padding: 10px;
                max-width: 180px;
            }
            .info {
                font-size: 12px;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="quantum"></canvas>
    
    <div class="controls">
        <div class="control-group">
            <label>粒子对数量: <span id="pairsValue">20</span></label>
            <input type="range" id="pairsSlider" min="5" max="50" step="5" value="20">
        </div>
        <div class="control-group">
            <label>纠缠强度: <span id="strengthValue">1.0x</span></label>
            <input type="range" id="strengthSlider" min="0.2" max="2" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label>波函数频率: <span id="frequencyValue">1.0x</span></label>
            <input type="range" id="frequencySlider" min="0.5" max="3" step="0.1" value="1">
        </div>
        <button class="btn" id="collapseBtn">⚛️ 波函数塌缩</button>
    </div>

    <div class="stats">
        <div id="fpsCounter">FPS: 60</div>
        <div id="pairCount">粒子对: 0</div>
    </div>

    <div class="info">
        <span>⚛️ 量子纠缠 | Quantum Entanglement ⚛️</span>
        <span>移动鼠标观察纠缠效应 · 点击创建新粒子对 · 双击触发塌缩</span>
    </div>

    <script>
        (function() {
            'use strict';

            // ========== 配置 ==========
            const CONFIG = {
                maxPairs: 50,
                connectionDistance: 300
            };

            // ========== Canvas 初始化 ==========
            const canvas = document.getElementById('quantum');
            const ctx = canvas.getContext('2d');
            let width, height, centerX, centerY;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                centerX = width / 2;
                centerY = height / 2;
            }

            resize();
            window.addEventListener('resize', resize);

            // ========== 状态管理 ==========
            let pairCount = 20;
            let entanglementStrength = 1;
            let waveFrequency = 1;
            let mouseX = centerX;
            let mouseY = centerY;
            let particlePairs = [];
            let time = 0;

            // ========== 粒子类 ==========
            class Particle {
                constructor(x, y, spin) {
                    this.x = x;
                    this.y = y;
                    this.spin = spin; // 自旋方向（+1 或 -1）
                    this.vx = (Math.random() - 0.5) * 2;
                    this.vy = (Math.random() - 0.5) * 2;
                    this.phase = Math.random() * Math.PI * 2;
                    this.uncertainty = 20 + Math.random() * 20; // 不确定性
                    this.collapsed = false;
                    this.collapseTarget = null;
                    this.size = 3 + Math.random() * 3;
                }

                update(partner, time) {
                    if (this.collapsed && this.collapseTarget) {
                        // 塌缩到目标位置
                        const dx = this.collapseTarget.x - this.x;
                        const dy = this.collapseTarget.y - this.y;
                        this.x += dx * 0.1;
                        this.y += dy * 0.1;
                        
                        if (Math.abs(dx) < 1 && Math.abs(dy) < 1) {
                            this.collapsed = false;
                            this.collapseTarget = null;
                        }
                    } else {
                        // 量子涨落
                        this.phase += 0.05 * waveFrequency;
                        
                        const fluctuation = Math.sin(this.phase + time) * this.uncertainty * 0.1;
                        this.x += this.vx + fluctuation * (Math.random() - 0.5);
                        this.y += this.vy + fluctuation * (Math.random() - 0.5);
                        
                        // 速度衰减
                        this.vx *= 0.99;
                        this.vy *= 0.99;
                        
                        // 边界反弹
                        if (this.x < 50 || this.x > width - 50) this.vx *= -1;
                        if (this.y < 50 || this.y > height - 50) this.vy *= -1;
                        
                        this.x = Math.max(50, Math.min(width - 50, this.x));
                        this.y = Math.max(50, Math.min(height - 50, this.y));
                        
                        // 纠缠效应：与配对粒子保持关联
                        if (partner) {
                            const dx = partner.x - this.x;
                            const dy = partner.y - this.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            
                            if (dist > CONFIG.connectionDistance) {
                                // 如果距离太远，产生引力
                                const force = (dist - CONFIG.connectionDistance) * 0.0001 * entanglementStrength;
                                this.vx += dx / dist * force;
                                this.vy += dy / dist * force;
                            }
                            
                            // 反向自旋影响
                            this.vx += partner.spin * Math.sin(time * 0.5) * 0.01 * entanglementStrength;
                            this.vy += partner.spin * Math.cos(time * 0.5) * 0.01 * entanglementStrength;
                        }
                        
                        // 鼠标影响
                        const mouseDx = mouseX - this.x;
                        const mouseDy = mouseY - this.y;
                        const mouseDist = Math.sqrt(mouseDx * mouseDx + mouseDy * mouseDy);
                        
                        if (mouseDist < 150) {
                            const influence = (1 - mouseDist / 150) * 0.5;
                            this.vx += mouseDx * 0.0001 * influence;
                            this.vy += mouseDy * 0.0001 * influence;
                        }
                    }
                }

                draw() {
                    const alpha = this.collapsed ? 1 : 0.6 + Math.sin(this.phase + time * 2) * 0.2;
                    
                    // 概率云（不确定性）
                    if (!this.collapsed) {
                        const cloudGradient = ctx.createRadialGradient(
                            this.x, this.y, 0,
                            this.x, this.y, this.uncertainty
                        );
                        cloudGradient.addColorStop(0, `rgba(150, 100, 255, ${alpha * 0.2})`);
                        cloudGradient.addColorStop(0.5, `rgba(150, 100, 255, ${alpha * 0.1})`);
                        cloudGradient.addColorStop(1, 'transparent');
                        
                        ctx.fillStyle = cloudGradient;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.uncertainty, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    
                    // 粒子核心
                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, this.size * 3
                    );
                    
                    const color = this.spin > 0 ? 
                        `rgba(100, 150, 255, ${alpha})` : 
                        `rgba(255, 100, 150, ${alpha})`;
                    
                    gradient.addColorStop(0, color);
                    gradient.addColorStop(0.5, color.replace(alpha.toString(), (alpha * 0.5).toString()));
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 核心亮点
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.fill();
                }

                collapse(targetX, targetY) {
                    this.collapsed = true;
                    this.collapseTarget = { x: targetX, y: targetY };
                }
            }

            // ========== 粒子对类 ==========
            class ParticlePair {
                constructor() {
                    // 创建纠缠粒子对（自旋相反）
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 100 + Math.random() * 150;
                    
                    const x1 = centerX + Math.cos(angle) * distance;
                    const y1 = centerY + Math.sin(angle) * distance;
                    const x2 = centerX - Math.cos(angle) * distance;
                    const y2 = centerY - Math.sin(angle) * distance;
                    
                    this.particle1 = new Particle(x1, y1, 1);
                    this.particle2 = new Particle(x2, y2, -1);
                    
                    this.entanglementStrength = 1;
                }

                update(time) {
                    this.particle1.update(this.particle2, time);
                    this.particle2.update(this.particle1, time);
                }

                draw(time) {
                    // 绘制纠缠连线
                    const dx = this.particle2.x - this.particle1.x;
                    const dy = this.particle2.y - this.particle1.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < CONFIG.connectionDistance * 1.5) {
                        const alpha = (1 - dist / (CONFIG.connectionDistance * 1.5)) * 0.5;
                        
                        // 波动连线
                        ctx.beginPath();
                        const segments = 20;
                        for (let i = 0; i <= segments; i++) {
                            const t = i / segments;
                            const x = this.particle1.x + dx * t;
                            const y = this.particle1.y + dy * t;
                            
                            // 添加波动
                            const wave = Math.sin(t * Math.PI * 4 + time * 3) * 10 * (1 - Math.abs(t - 0.5) * 2);
                            const perpX = -dy / dist * wave;
                            const perpY = dx / dist * wave;
                            
                            if (i === 0) {
                                ctx.moveTo(x + perpX, y + perpY);
                            } else {
                                ctx.lineTo(x + perpX, y + perpY);
                            }
                        }
                        
                        ctx.strokeStyle = `rgba(180, 130, 255, ${alpha * entanglementStrength})`;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                    
                    // 绘制粒子
                    this.particle1.draw();
                    this.particle2.draw();
                }

                collapse() {
                    // 波函数塌缩：粒子移动到特定位置
                    const midX = (this.particle1.x + this.particle2.x) / 2;
                    const midY = (this.particle1.y + this.particle2.y) / 2;
                    
                    this.particle1.collapse(midX - 30, midY);
                    this.particle2.collapse(midX + 30, midY);
                }
            }

            // ========== 初始化粒子对 ==========
            function initPairs() {
                particlePairs = [];
                for (let i = 0; i < pairCount; i++) {
                    particlePairs.push(new ParticlePair());
                }
            }

            initPairs();

            // ========== 波函数塌缩 ==========
            function triggerCollapse() {
                particlePairs.forEach(pair => pair.collapse());
            }

            // ========== 鼠标交互 ==========
            canvas.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            canvas.addEventListener('click', (e) => {
                // 创建新的粒子对
                if (particlePairs.length < CONFIG.maxPairs) {
                    const pair = new ParticlePair();
                    pair.particle1.x = e.clientX;
                    pair.particle1.y = e.clientY;
                    pair.particle2.x = e.clientX + (Math.random() - 0.5) * 200;
                    pair.particle2.y = e.clientY + (Math.random() - 0.5) * 200;
                    particlePairs.push(pair);
                }
            });

            canvas.addEventListener('dblclick', (e) => {
                e.preventDefault();
                triggerCollapse();
            });

            // 触摸支持
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                mouseX = touch.clientX;
                mouseY = touch.clientY;
            });

            canvas.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                if (particlePairs.length < CONFIG.maxPairs) {
                    const pair = new ParticlePair();
                    pair.particle1.x = touch.clientX;
                    pair.particle1.y = touch.clientY;
                    pair.particle2.x = touch.clientX + (Math.random() - 0.5) * 200;
                    pair.particle2.y = touch.clientY + (Math.random() - 0.5) * 200;
                    particlePairs.push(pair);
                }
            });

            // ========== 控制器 ==========
            document.getElementById('pairsSlider').addEventListener('input', (e) => {
                pairCount = parseInt(e.target.value);
                document.getElementById('pairsValue').textContent = pairCount;
                
                // 调整粒子对数量
                while (particlePairs.length < pairCount) {
                    particlePairs.push(new ParticlePair());
                }
                while (particlePairs.length > pairCount) {
                    particlePairs.pop();
                }
            });

            document.getElementById('strengthSlider').addEventListener('input', (e) => {
                entanglementStrength = parseFloat(e.target.value);
                document.getElementById('strengthValue').textContent = entanglementStrength.toFixed(1) + 'x';
            });

            document.getElementById('frequencySlider').addEventListener('input', (e) => {
                waveFrequency = parseFloat(e.target.value);
                document.getElementById('frequencyValue').textContent = waveFrequency.toFixed(1) + 'x';
            });

            document.getElementById('collapseBtn').addEventListener('click', triggerCollapse);

            // ========== 性能监控 ==========
            let fps = 0;
            let frameCount = 0;
            let lastFpsUpdate = 0;

            function updateStats(currentTime) {
                frameCount++;
                if (currentTime - lastFpsUpdate >= 1000) {
                    fps = frameCount;
                    frameCount = 0;
                    lastFpsUpdate = currentTime;
                    document.getElementById('fpsCounter').textContent = `FPS: ${fps}`;
                }
                document.getElementById('pairCount').textContent = `粒子对: ${particlePairs.length}`;
            }

            // ========== 绘制背景网格 ==========
            function drawGrid() {
                ctx.strokeStyle = 'rgba(100, 80, 150, 0.1)';
                ctx.lineWidth = 1;
                
                const gridSize = 50;
                
                for (let x = 0; x < width; x += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, height);
                    ctx.stroke();
                }
                
                for (let y = 0; y < height; y += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(width, y);
                    ctx.stroke();
                }
            }

            // ========== 动画循环 ==========
            let lastTime = 0;

            function animate(currentTime) {
                const deltaTime = lastTime ? currentTime - lastTime : 16;
                lastTime = currentTime;

                // 更新时间
                time += deltaTime * 0.001 * waveFrequency;

                // 清除画布
                ctx.fillStyle = 'rgba(10, 10, 42, 0.2)';
                ctx.fillRect(0, 0, width, height);

                // 绘制网格
                drawGrid();

                // 更新和绘制粒子对
                particlePairs.forEach(pair => {
                    pair.update(time);
                    pair.draw(time);
                });

                // 鼠标光标效果
                const gradient = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 100);
                gradient.addColorStop(0, 'rgba(150, 100, 255, 0.1)');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fillRect(mouseX - 100, mouseY - 100, 200, 200);

                updateStats(currentTime);
                requestAnimationFrame(animate);
            }

            // 启动动画
            requestAnimationFrame(animate);

        })();
    </script>
</body>
</html>
