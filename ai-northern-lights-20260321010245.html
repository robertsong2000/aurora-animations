<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北极光 | Northern Lights</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(100, 255, 200, 0.7);
            font-size: 13px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(100, 255, 200, 0.15);
            font-size: 42px;
            font-weight: 100;
            letter-spacing: 15px;
            pointer-events: none;
            z-index: 10;
            text-transform: uppercase;
        }
        
        .fps {
            position: fixed;
            top: 10px;
            right: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-family: monospace;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="aurora"></canvas>
    <div class="title">Aurora</div>
    <div class="info">移动鼠标改变光带形状 | 点击产生光爆发</div>
    <div class="fps" id="fps"></div>
    
    <script>
        const canvas = document.getElementById('aurora');
        const ctx = canvas.getContext('2d');
        const fpsDisplay = document.getElementById('fps');
        
        let width, height;
        let auroras = [];
        let stars = [];
        let particles = [];
        let mouseX = 0, mouseY = 0;
        let time = 0;
        
        // FPS 计算
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        // 极光类
        class Aurora {
            constructor(y, color) {
                this.y = y;
                this.baseY = y;
                this.color = color;
                this.points = [];
                this.amplitude = 30 + Math.random() * 40;
                this.frequency = 0.002 + Math.random() * 0.002;
                this.speed = 0.01 + Math.random() * 0.02;
                this.phase = Math.random() * Math.PI * 2;
                this.alpha = 0.15 + Math.random() * 0.15;
                this.thickness = 80 + Math.random() * 60;
            }
            
            update() {
                this.phase += this.speed;
                
                // 鼠标影响
                const mouseInfluence = (mouseY / height - 0.5) * 50;
                this.y = this.baseY + mouseInfluence;
                
                // 生成点
                this.points = [];
                for (let x = 0; x <= width; x += 5) {
                    const y = this.y 
                        + Math.sin(x * this.frequency + this.phase) * this.amplitude
                        + Math.sin(x * this.frequency * 2.3 + this.phase * 1.5) * this.amplitude * 0.5
                        + Math.sin(x * this.frequency * 0.7 + this.phase * 0.8) * this.amplitude * 0.3;
                    
                    this.points.push({ x, y });
                }
            }
            
            draw() {
                // 绘制极光
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                
                for (let i = 1; i < this.points.length; i++) {
                    ctx.lineTo(this.points[i].x, this.points[i].y);
                }
                
                // 闭合路径
                ctx.lineTo(width, height);
                ctx.lineTo(0, height);
                ctx.closePath();
                
                // 渐变填充
                const gradient = ctx.createLinearGradient(0, this.y - this.thickness, 0, this.y + this.thickness);
                gradient.addColorStop(0, 'transparent');
                gradient.addColorStop(0.3, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha * 0.3})`);
                gradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha})`);
                gradient.addColorStop(0.7, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha * 0.3})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 发光边缘
                ctx.strokeStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha * 0.5})`;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 20;
                ctx.shadowColor = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.5)`;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }
        
        // 星星类
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.6;
                this.size = Math.random() * 2 + 0.5;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.twinkleSpeed = Math.random() * 0.05 + 0.02;
            }
            
            draw() {
                const twinkle = Math.sin(this.twinklePhase) * 0.3 + 0.7;
                this.twinklePhase += this.twinkleSpeed;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * twinkle, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${twinkle * 0.8})`;
                ctx.fill();
            }
        }
        
        // 粒子类（光点）
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = -Math.random() * 2 - 1;
                this.life = 1;
                this.decay = 0.02;
                this.size = Math.random() * 3 + 2;
                this.color = {
                    r: 100 + Math.random() * 100,
                    g: 200 + Math.random() * 55,
                    b: 150 + Math.random() * 100
                };
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                
                return this.life > 0;
            }
            
            draw() {
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 2
                );
                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.life})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        // 绘制地平线
        function drawHorizon() {
            // 山脉轮廓
            ctx.fillStyle = '#0a0a15';
            ctx.beginPath();
            ctx.moveTo(0, height);
            
            // 生成山脉
            let x = 0;
            while (x < width) {
                const peakHeight = 50 + Math.random() * 100;
                const peakWidth = 50 + Math.random() * 100;
                
                ctx.lineTo(x, height - peakHeight);
                x += peakWidth;
            }
            
            ctx.lineTo(width, height);
            ctx.closePath();
            ctx.fill();
        }
        
        // 绘制天空
        function drawSky() {
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#050510');
            gradient.addColorStop(0.3, '#0a0a20');
            gradient.addColorStop(0.7, '#0f0f25');
            gradient.addColorStop(1, '#15152a');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        // 创建光爆发
        function createBurst(x, y) {
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(x, y));
            }
        }
        
        // 初始化极光
        function initAuroras() {
            auroras = [];
            const colors = [
                { r: 100, g: 255, b: 200 },  // 青色
                { r: 150, g: 255, b: 150 },  // 绿色
                { r: 100, g: 200, b: 255 },  // 蓝色
                { r: 200, g: 100, b: 255 },  // 紫色
                { r: 255, g: 200, b: 100 }   // 黄色
            ];
            
            for (let i = 0; i < 5; i++) {
                auroras.push(new Aurora(
                    height * 0.2 + i * 40,
                    colors[i]
                ));
            }
        }
        
        // 初始化星星
        function initStars() {
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push(new Star());
            }
        }
        
        // 主渲染循环
        function render() {
            // 绘制天空
            drawSky();
            
            // 绘制星星
            stars.forEach(star => star.draw());
            
            // 更新和绘制极光
            auroras.forEach(aurora => {
                aurora.update();
                aurora.draw();
            });
            
            // 更新和绘制粒子
            particles = particles.filter(particle => {
                const alive = particle.update();
                if (alive) particle.draw();
                return alive;
            });
            
            // 绘制地平线
            drawHorizon();
            
            time++;
            
            // FPS 计算
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                fpsDisplay.textContent = `FPS: ${fps}`;
            }
            
            requestAnimationFrame(render);
        }
        
        // 调整画布大小
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initAuroras();
            initStars();
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        });
        
        canvas.addEventListener('click', (e) => {
            createBurst(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                createBurst(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
        
        // 初始化
        resize();
        mouseX = width / 2;
        mouseY = height / 2;
        render();
    </script>
</body>
</html>
