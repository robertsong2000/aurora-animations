<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水波纹 | Water Ripples</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.95);
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 8px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }
        
        .controls {
            position: fixed;
            top: 100px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        
        .control-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: rgba(255, 255, 255, 0.95);
            font-size: 12px;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
        }
        
        .control-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            transform: translateX(-5px);
        }
        
        .control-btn.active {
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
        }
        
        .stats {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
            line-height: 1.6;
            backdrop-filter: blur(5px);
            padding: 10px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.85);
            font-size: 12px;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="title">WATER RIPPLES</div>
    
    <div class="controls">
        <button class="control-btn active" id="singleBtn">单点</button>
        <button class="control-btn" id="multiBtn">多点</button>
        <button class="control-btn" id="rainBtn">雨滴</button>
        <button class="control-btn" id="waveBtn">波浪</button>
    </div>
    
    <div class="stats" id="stats"></div>
    <canvas id="water"></canvas>
    <div class="info">点击创建涟漪 · 移动鼠标影响波动 · 滚轮调整波幅</div>
    
    <script>
        const canvas = document.getElementById('water');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        // Performance constants
        const TWO_PI = Math.PI * 2;
        
        // Water parameters
        let ripples = [];
        let raindrops = [];
        let mouseX = width / 2;
        let mouseY = height / 2;
        let mode = 'single';
        let amplitude = 50;
        
        // Color palettes
        const palettes = {
            single: ['#4FC3F7', '#29B6F6', '#03A9F4', '#039BE5', '#0288D1'],
            multi: ['#E1F5FE', '#B3E5FC', '#81D4FA', '#4FC3F7', '#29B6F6'],
            rain: ['#80DEEA', '#4DD0E1', '#26C6DA', '#00BCD4', '#00ACC1'],
            wave: ['#00BCD4', '#00ACC1', '#0097A7', '#00838F', '#006064']
        };
        
        // Ripple class
        class Ripple {
            constructor(x, y, maxRadius = 200) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = maxRadius + Math.random() * 100;
                this.speed = 3 + Math.random() * 2;
                this.amplitude = amplitude;
                this.waveCount = 5;
                this.life = 1;
                this.decay = 0.008;
            }
            
            update() {
                this.radius += this.speed;
                this.life = Math.max(0, 1 - this.radius / this.maxRadius);
                return this.life > 0;
            }
            
            draw(ctx, palette) {
                const color = palette[Math.floor(this.radius / 10) % palette.length];
                
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Draw multiple concentric waves
                for (let i = 0; i < this.waveCount; i++) {
                    const waveRadius = this.radius - i * 15;
                    
                    if (waveRadius > 0) {
                        const opacity = this.life * (1 - i / this.waveCount);
                        
                        ctx.beginPath();
                        ctx.arc(0, 0, waveRadius, 0, TWO_PI);
                        ctx.strokeStyle = this.hexToRgba(color, opacity * 0.8);
                        ctx.lineWidth = 3 - i * 0.5;
                        ctx.stroke();
                        
                        // Glow effect
                        if (i === 0) {
                            ctx.beginPath();
                            ctx.arc(0, 0, waveRadius, 0, TWO_PI);
                            ctx.strokeStyle = this.hexToRgba(color, opacity * 0.3);
                            ctx.lineWidth = 10;
                            ctx.stroke();
                        }
                    }
                }
                
                // Draw refraction effect
                if (this.radius < this.maxRadius * 0.3) {
                    const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius * 0.5);
                    gradient.addColorStop(0, this.hexToRgba('#FFFFFF', this.life * 0.3));
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius * 0.5, 0, TWO_PI);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
                
                ctx.restore();
            }
            
            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
        }
        
        // Raindrop class
        class Raindrop {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = -10;
                this.speed = 8 + Math.random() * 4;
                this.length = 10 + Math.random() * 10;
            }
            
            update() {
                this.y += this.speed;
                
                if (this.y > height + this.length) {
                    if (mode === 'rain') {
                        ripples.push(new Ripple(this.x, height, 100));
                        this.reset();
                    }
                    return false;
                }
                
                return true;
            }
            
            draw(ctx) {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x, this.y - this.length);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
        
        // Initialize raindrops
        function initRain() {
            raindrops = [];
            for (let i = 0; i < 100; i++) {
                raindrops.push(new Raindrop());
            }
        }
        
        // Draw water surface
        function drawWaterSurface(time) {
            // Animated water gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(0.5, '#764ba2');
            gradient.addColorStop(1, '#667eea');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // Draw caustic light effect
            if (mode === 'wave') {
                ctx.save();
                ctx.globalAlpha = 0.1;
                
                for (let i = 0; i < 10; i++) {
                    const x = (Math.sin(time * 0.001 + i) * 0.5 + 0.5) * width;
                    const y = (Math.cos(time * 0.0015 + i * 1.5) * 0.5 + 0.5) * height;
                    const size = 100 + Math.sin(time * 0.002 + i) * 50;
                    
                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, size);
                    gradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, width, height);
                }
                
                ctx.restore();
            }
        }
        
        // Draw wave pattern
        function drawWaves(time) {
            if (mode !== 'wave') return;
            
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 2;
            
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                
                for (let x = 0; x < width; x += 5) {
                    const y = height * (0.3 + i * 0.1) + 
                        Math.sin(x * 0.01 + time * 0.002 + i) * 20 +
                        Math.sin(x * 0.02 + time * 0.001) * 10;
                    
                    if (x === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                
                ctx.stroke();
            }
            
            ctx.restore();
        }
        
        // Event listeners
        canvas.addEventListener('mousedown', (e) => {
            createRipple(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            if (mode === 'multi' && Math.random() > 0.7) {
                ripples.push(new Ripple(mouseX, mouseY, 150));
            }
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            amplitude = Math.max(10, Math.min(100, amplitude + e.deltaY * 0.1));
        }, { passive: false });
        
        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createRipple(touch.clientX, touch.clientY);
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (mode === 'multi') {
                const touch = e.touches[0];
                if (Math.random() > 0.5) {
                    ripples.push(new Ripple(touch.clientX, touch.clientY, 150));
                }
            }
        }, { passive: false });
        
        function createRipple(x, y) {
            const maxRadius = mode === 'single' ? 200 : 150;
            ripples.push(new Ripple(x, y, maxRadius));
            
            if (mode === 'multi') {
                // Create additional ripples
                setTimeout(() => ripples.push(new Ripple(x + 30, y + 30, maxRadius * 0.8)), 100);
                setTimeout(() => ripples.push(new Ripple(x - 30, y - 30, maxRadius * 0.6)), 200);
            }
        }
        
        // Mode buttons
        const singleBtn = document.getElementById('singleBtn');
        const multiBtn = document.getElementById('multiBtn');
        const rainBtn = document.getElementById('rainBtn');
        const waveBtn = document.getElementById('waveBtn');
        
        function setMode(newMode) {
            mode = newMode;
            singleBtn.classList.toggle('active', newMode === 'single');
            multiBtn.classList.toggle('active', newMode === 'multi');
            rainBtn.classList.toggle('active', newMode === 'rain');
            waveBtn.classList.toggle('active', newMode === 'wave');
            
            if (newMode === 'rain') {
                initRain();
            }
        }
        
        singleBtn.addEventListener('click', () => setMode('single'));
        multiBtn.addEventListener('click', () => setMode('multi'));
        rainBtn.addEventListener('click', () => setMode('rain'));
        waveBtn.addEventListener('click', () => setMode('wave'));
        
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        
        // Main animation loop
        let time = 0;
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        function animate(currentTime) {
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            
            frameCount++;
            if (frameCount % 30 === 0) {
                fps = Math.round(1000 / deltaTime);
            }
            
            // Draw background
            drawWaterSurface(time);
            
            // Draw waves
            drawWaves(time);
            
            // Update and draw raindrops
            if (mode === 'rain') {
                raindrops = raindrops.filter(drop => {
                    drop.draw(ctx);
                    return drop.update();
                });
            }
            
            // Update and draw ripples
            const palette = palettes[mode];
            ripples = ripples.filter(ripple => {
                ripple.draw(ctx, palette);
                return ripple.update();
            });
            
            // Limit ripples for performance
            if (ripples.length > 50) {
                ripples = ripples.slice(-50);
            }
            
            // Update stats
            statsEl.innerHTML = `
                FPS: ${fps}<br>
                Ripples: ${ripples.length}<br>
                Amplitude: ${amplitude.toFixed(0)}<br>
                Mode: ${mode.toUpperCase()}
            `;
            
            time += deltaTime;
            requestAnimationFrame(animate);
        }
        
        // Start animation
        requestAnimationFrame(animate);
    </script>
</body>
</html>
