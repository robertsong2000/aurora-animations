<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>矩阵雨 - Matrix Rain</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(0, 255, 65, 0.8);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
            font-family: 'Courier New', monospace;
        }
        
        .info span {
            display: block;
            margin: 5px 0;
        }
        
        .fps-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(0, 255, 65, 0.6);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }

        .glitch-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(0, 255, 65, 0.12);
            font-size: 72px;
            font-weight: bold;
            letter-spacing: 8px;
            pointer-events: none;
            z-index: 1;
            text-shadow: 
                2px 2px rgba(255, 0, 0, 0.25),
                -2px -2px rgba(0, 255, 255, 0.25);
            animation: glitch 2.5s infinite;
        }

        @keyframes glitch {
            0%, 88%, 100% { opacity: 0.12; }
            90% { opacity: 0.25; transform: translate(-50%, -50%) translateX(4px); }
            92% { opacity: 0.18; transform: translate(-50%, -50%) translateX(-4px); }
            94% { opacity: 0.25; transform: translate(-50%, -50%); }
        }
    </style>
</head>
<body>
    <div class="glitch-text">MATRIX</div>
    <canvas id="matrix"></canvas>
    <div class="info">
        <span>💚 矩阵雨</span>
        <span>🖱️ 移动鼠标 - 吸引字符</span>
        <span>👆 点击 - 字符爆发</span>
    </div>
    <div class="fps-counter" id="fps">FPS: 60</div>

    <script>
        // ============ 配置 ============
        const CONFIG = {
            fontSize: 15,
            fontFamily: 'Courier New, monospace',
            baseSpeed: 0.45,
            color: {
                primary: '#0F0',
                glow: 'rgba(0, 255, 0, 0.75)'
            },
            characters: 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            mouseRadius: 130
        };

        // ============ Canvas 设置 ============
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        let width, height, columns, rows;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / CONFIG.fontSize);
            rows = Math.floor(height / CONFIG.fontSize);
            initColumns();
        }
        
        resize();
        window.addEventListener('resize', resize);

        // ============ 工具函数 ============
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        function randomChar() {
            return CONFIG.characters[Math.floor(Math.random() * CONFIG.characters.length)];
        }

        function distance(x1, y1, x2, y2) {
            return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
        }

        // ============ 列类 ============
        class Column {
            constructor(x) {
                this.x = x;
                this.chars = [];
                this.speed = random(CONFIG.baseSpeed * 0.5, CONFIG.baseSpeed * 1.8);
                this.baseSpeed = this.speed;
                this.maxChars = Math.floor(random(4, 22));
                this.spawnTimer = 0;
                this.spawnDelay = random(0, 80);
                this.active = Math.random() > 0.25;
            }

            update(mouseX, mouseY, mouseActive) {
                if (!this.active) {
                    this.spawnTimer++;
                    if (this.spawnTimer > this.spawnDelay + random(40, 160)) {
                        this.active = true;
                        this.spawnTimer = 0;
                        this.chars = [];
                    }
                    return;
                }

                const colX = this.x * CONFIG.fontSize;
                let speedMod = 1;
                
                if (mouseActive) {
                    const dist = distance(colX, height / 2, mouseX, mouseY);
                    if (dist < CONFIG.mouseRadius) {
                        speedMod = 0.25;
                    }
                }
                
                this.speed = this.baseSpeed * speedMod;

                this.spawnTimer++;
                if (this.spawnTimer > 4 / this.speed && this.chars.length < this.maxChars) {
                    this.chars.push(new MatrixChar(this.x, -1));
                    this.spawnTimer = 0;
                }

                for (let i = this.chars.length - 1; i >= 0; i--) {
                    const char = this.chars[i];
                    char.update(this.speed, mouseX, mouseY, mouseActive);
                    
                    if (char.y > rows + 4) {
                        this.chars.splice(i, 1);
                    }
                }

                if (this.chars.length === 0 && Math.random() < 0.008) {
                    this.active = false;
                    this.spawnTimer = 0;
                    this.spawnDelay = random(0, 80);
                }
            }

            draw() {
                this.chars.forEach((char, index) => {
                    const isHead = index === this.chars.length - 1;
                    const alpha = isHead ? 1 : 0.25 + (index / this.chars.length) * 0.45;
                    char.draw(isHead, alpha);
                });
            }
        }

        // ============ 矩阵字符类 ============
        class MatrixChar {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.char = randomChar();
                this.changeTimer = 0;
                this.changeInterval = random(4, 16);
                this.offsetX = 0;
                this.offsetY = 0;
            }

            update(speed, mouseX, mouseY, mouseActive) {
                this.y += speed;
                this.changeTimer++;
                
                if (this.changeTimer > this.changeInterval) {
                    if (Math.random() < 0.08) {
                        this.char = randomChar();
                    }
                    this.changeTimer = 0;
                }

                if (mouseActive) {
                    const charX = this.x * CONFIG.fontSize;
                    const charY = this.y * CONFIG.fontSize;
                    const dist = distance(charX, charY, mouseX, mouseY);
                    
                    if (dist < CONFIG.mouseRadius && dist > 0) {
                        const force = (CONFIG.mouseRadius - dist) / CONFIG.mouseRadius;
                        const angle = Math.atan2(mouseY - charY, mouseX - charX);
                        this.offsetX += Math.cos(angle) * force * 1.8;
                        this.offsetY += Math.sin(angle) * force * 1.8;
                    }
                }
                
                this.offsetX *= 0.94;
                this.offsetY *= 0.94;
            }

            draw(isHead, alpha) {
                const x = this.x * CONFIG.fontSize + this.offsetX;
                const y = this.y * CONFIG.fontSize + this.offsetY;

                if (isHead) {
                    ctx.shadowColor = CONFIG.color.glow;
                    ctx.shadowBlur = 18;
                    ctx.fillStyle = '#FFF';
                    ctx.font = `bold ${CONFIG.fontSize}px ${CONFIG.fontFamily}`;
                } else {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = `rgba(0, 255, 65, ${alpha})`;
                    ctx.font = `${CONFIG.fontSize}px ${CONFIG.fontFamily}`;
                }

                ctx.fillText(this.char, x, y);
                ctx.shadowBlur = 0;
            }
        }

        // ============ 爆发粒子 ============
        class BurstParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = random(0, Math.PI * 2);
                const speed = random(2.5, 12);
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.char = randomChar();
                this.life = 1;
                this.decay = random(0.008, 0.025);
                this.size = random(11, 22);
                this.rotation = random(0, Math.PI * 2);
                this.rotationSpeed = random(-0.08, 0.08);
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.975;
                this.vy *= 0.975;
                this.vy += 0.08;
                this.life -= this.decay;
                this.rotation += this.rotationSpeed;
                
                if (Math.random() < 0.08) {
                    this.char = randomChar();
                }
            }

            draw() {
                if (this.life <= 0) return;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                ctx.shadowColor = CONFIG.color.glow;
                ctx.shadowBlur = 8 * this.life;
                ctx.fillStyle = `rgba(0, 255, 65, ${this.life})`;
                ctx.font = `bold ${this.size}px ${CONFIG.fontFamily}`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.char, 0, 0);
                
                ctx.restore();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        // ============ 初始化列 ============
        let columns_arr = [];
        
        function initColumns() {
            columns_arr = [];
            for (let i = 0; i < columns; i++) {
                columns_arr.push(new Column(i));
            }
        }
        
        initColumns();

        const burstParticles = [];

        // ============ 鼠标交互 ============
        let mouseX = width / 2;
        let mouseY = height / 2;
        let mouseActive = false;

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            mouseActive = true;
        });

        canvas.addEventListener('mouseleave', () => {
            mouseActive = false;
        });

        canvas.addEventListener('click', (e) => {
            for (let i = 0; i < 45; i++) {
                burstParticles.push(new BurstParticle(e.clientX, e.clientY));
            }
        });

        // ============ FPS 计算 ============
        let frameCount = 0;
        let lastFpsTime = performance.now();
        let fps = 60;

        function updateFPS() {
            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFpsTime = now;
                document.getElementById('fps').textContent = `FPS: ${fps}`;
            }
        }

        // ============ 绘制扫描线效果 ============
        function drawScanlines() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.025)';
            for (let i = 0; i < height; i += 4) {
                ctx.fillRect(0, i, width, 2);
            }
        }

        // ============ 绘制边缘渐变 ============
        function drawVignette() {
            const gradient = ctx.createRadialGradient(
                width / 2, height / 2, Math.min(width, height) * 0.28,
                width / 2, height / 2, Math.max(width, height) * 0.75
            );
            gradient.addColorStop(0, 'transparent');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.45)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        // ============ 主动画循环 ============
        function animate(time) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.045)';
            ctx.fillRect(0, 0, width, height);

            columns_arr.forEach(col => {
                col.update(mouseX, mouseY, mouseActive);
                col.draw();
            });

            for (let i = burstParticles.length - 1; i >= 0; i--) {
                burstParticles[i].update();
                burstParticles[i].draw();
                if (burstParticles[i].isDead()) {
                    burstParticles.splice(i, 1);
                }
            }

            if (burstParticles.length > 180) {
                burstParticles.splice(0, burstParticles.length - 180);
            }

            drawScanlines();
            drawVignette();

            updateFPS();
            requestAnimationFrame(animate);
        }

        animate(0);
    </script>
</body>
</html>
