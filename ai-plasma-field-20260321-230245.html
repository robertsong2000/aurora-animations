<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>等离子场 - Plasma Field</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(150, 50, 255, 0.5);
        }
        
        .info span {
            display: block;
            margin: 5px 0;
        }
        
        .fps-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="plasma"></canvas>
    <div class="info">
        <span>⚡ 等离子场</span>
        <span>🖱️ 移动鼠标 - 扭曲能量场</span>
        <span>👆 点击 - 能量爆发</span>
    </div>
    <div class="fps-counter" id="fps">FPS: 60</div>

    <script>
        // ============ 配置 ============
        const CONFIG = {
            resolution: 4,
            colorSchemes: [
                { a: 0, b: 0.2, c: 0.3, d: 0.4 },
                { a: 0.5, b: 0.1, c: 0.3, d: 0.2 },
                { a: 0.1, b: 0.4, c: 0.1, d: 0.5 }
            ],
            colors: [
                (v) => `rgb(${Math.floor(Math.sin(v * Math.PI) * 127 + 128)}, ${Math.floor(Math.cos(v * Math.PI * 0.5) * 127 + 128)}, ${Math.floor(Math.sin(v * Math.PI * 2) * 127 + 128)})`,
                (v) => `rgb(${Math.floor(Math.sin(v * Math.PI * 0.5) * 127 + 128)}, ${Math.floor(Math.sin(v * Math.PI) * 127 + 128)}, ${Math.floor(Math.cos(v * Math.PI) * 127 + 128)})`,
                (v) => `rgb(${Math.floor(Math.cos(v * Math.PI * 2) * 127 + 128)}, ${Math.floor(Math.sin(v * Math.PI) * 127 + 128)}, ${Math.floor(Math.sin(v * Math.PI * 0.5) * 127 + 128)})`
            ]
        };

        // ============ Canvas 设置 ============
        const canvas = document.getElementById('plasma');
        const ctx = canvas.getContext('2d');
        let width, height, imageData, pixels;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            imageData = ctx.createImageData(width, height);
            pixels = imageData.data;
        }
        
        resize();
        window.addEventListener('resize', resize);

        // ============ 工具函数 ============
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        // ============ 等离子场类 ============
        class PlasmaField {
            constructor() {
                this.time = 0;
                this.schemeIndex = 0;
                this.mouseX = width / 2;
                this.mouseY = height / 2;
                this.mouseInfluence = 0;
            }

            setMouse(x, y, active) {
                this.mouseX = x;
                this.mouseY = y;
                this.mouseInfluence = active ? 1 : this.mouseInfluence * 0.95;
            }

            nextScheme() {
                this.schemeIndex = (this.schemeIndex + 1) % CONFIG.colorSchemes.length;
            }

            render() {
                const scheme = CONFIG.colorSchemes[this.schemeIndex];
                const colorFn = CONFIG.colors[this.schemeIndex];
                const res = CONFIG.resolution;
                
                for (let y = 0; y < height; y += res) {
                    for (let x = 0; x < width; x += res) {
                        // 等离子场计算
                        let value = 0;
                        
                        // 基础等离子效果
                        value += Math.sin(x * 0.01 + this.time * 0.01);
                        value += Math.sin((y * 0.01 + this.time * 0.02));
                        value += Math.sin((x * 0.01 + y * 0.01 + this.time * 0.01) * 0.5);
                        
                        const cx = x - width / 2;
                        const cy = y - height / 2;
                        value += Math.sin(Math.sqrt(cx * cx + cy * cy) * 0.01 - this.time * 0.03);
                        
                        // 鼠标影响
                        if (this.mouseInfluence > 0.01) {
                            const dx = x - this.mouseX;
                            const dy = y - this.mouseY;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            value += Math.sin(dist * 0.02 - this.time * 0.05) * this.mouseInfluence;
                        }
                        
                        value = (value + 4) / 8; // 归一化到 0-1
                        
                        // 获取颜色
                        const color = colorFn(value);
                        const rgb = this.parseColor(color);
                        
                        // 填充像素块
                        for (let py = 0; py < res && y + py < height; py++) {
                            for (let px = 0; px < res && x + px < width; px++) {
                                const idx = ((y + py) * width + (x + px)) * 4;
                                pixels[idx] = rgb.r;
                                pixels[idx + 1] = rgb.g;
                                pixels[idx + 2] = rgb.b;
                                pixels[idx + 3] = 255;
                            }
                        }
                    }
                }
                
                ctx.putImageData(imageData, 0, 0);
                this.time++;
            }

            parseColor(color) {
                const match = color.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
                if (match) {
                    return { r: parseInt(match[1]), g: parseInt(match[2]), b: parseInt(match[3]) };
                }
                return { r: 128, g: 128, b: 128 };
            }
        }

        // ============ 能量粒子类 ============
        class EnergyParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = random(0, Math.PI * 2);
                const speed = random(2, 8);
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.size = random(3, 8);
                this.life = 1;
                this.decay = random(0.01, 0.03);
                this.hue = random(0, 360);
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= this.decay;
            }

            draw(ctx) {
                if (this.life <= 0) return;
                
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 70%, ${this.life})`);
                gradient.addColorStop(1, 'transparent');

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        // ============ 初始化 ============
        const plasma = new PlasmaField();
        const particles = [];

        // ============ 鼠标交互 ============
        let mouseActive = false;

        canvas.addEventListener('mousemove', (e) => {
            plasma.setMouse(e.clientX, e.clientY, true);
            mouseActive = true;
        });

        canvas.addEventListener('mouseleave', () => {
            plasma.setMouse(plasma.mouseX, plasma.mouseY, false);
            mouseActive = false;
        });

        canvas.addEventListener('click', (e) => {
            // 切换配色
            plasma.nextScheme();
            
            // 粒子爆发
            for (let i = 0; i < 50; i++) {
                particles.push(new EnergyParticle(e.clientX, e.clientY));
            }
        });

        // ============ FPS 计算 ============
        let frameCount = 0;
        let lastFpsTime = performance.now();
        let fps = 60;

        function updateFPS() {
            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFpsTime = now;
                document.getElementById('fps').textContent = `FPS: ${fps}`;
            }
        }

        // ============ 主动画循环 ============
        function animate() {
            // 渲染等离子场
            plasma.render();

            // 更新和绘制粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw(ctx);
                if (particles[i].isDead()) {
                    particles.splice(i, 1);
                }
            }

            // 限制粒子数量
            if (particles.length > 200) {
                particles.splice(0, particles.length - 200);
            }

            // 绘制覆盖层（可选，增加深度感）
            const gradient = ctx.createRadialGradient(width / 2, height / 2, 0, width / 2, height / 2, Math.max(width, height) * 0.7);
            gradient.addColorStop(0, 'transparent');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.3)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 绘制配色指示
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.font = '12px monospace';
            ctx.fillText(`Scheme: ${plasma.schemeIndex + 1}/${CONFIG.colorSchemes.length}`, 10, 30);

            updateFPS();
            requestAnimationFrame(animate);
        }

        // 启动动画
        animate(0);

        // ============ 性能优化 ============
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // 页面隐藏时可以暂停
            }
        });
    </script>
</body>
</html>
