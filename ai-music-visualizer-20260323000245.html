<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐可视化 | Music Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #1a0a2a 0%, #2d1f4d 50%, #1a1a3d 100%);
            font-family: 'Arial', sans-serif;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .title {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .title h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 700;
            color: #fff;
            text-shadow: 
                0 0 10px #ff00ff,
                0 0 20px #00ffff,
                0 0 30px #ffff00;
            letter-spacing: 0.2em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.15em;
        }

        .instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .stats div {
            margin: 5px 0;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-btn {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .control-btn.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="controls">
        <button class="control-btn" id="modeBtn">条形模式</button>
        <button class="control-btn" id="colorBtn">彩虹色</button>
        <button class="control-btn" id="playBtn">播放节拍</button>
    </div>
    
    <div class="title">
        <h1>音乐可视化</h1>
        <div class="subtitle">感受节奏的律动</div>
    </div>
    
    <div class="instructions">
        移动鼠标影响频率 · 点击触发节拍 · 滚轮调整敏感度
    </div>
    
    <div class="stats">
        <div>FPS: <span id="fps">60</span></div>
        <div>频段数: <span id="bands">32</span></div>
        <div>敏感度: <span id="sensitivity">100</span>%</div>
    </div>

    <script>
        // 性能监控
        const fpsCounter = document.getElementById('fps');
        const bandsCounter = document.getElementById('bands');
        const sensitivityDisplay = document.getElementById('sensitivity');
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        let sensitivity = 1.0;
        let currentMode = 0;
        let currentColorScheme = 0;
        let isPlaying = false;
        let beatTime = 0;

        // Canvas 设置
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        // 音频数据
        const numBands = 32;
        const frequencyData = [];
        let mouseX = 0;
        let mouseY = 0;
        let time = 0;

        // 颜色方案
        const colorSchemes = [
            { name: '彩虹色', colors: ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#00ffff', '#0088ff', '#8800ff'] },
            { name: '火焰色', colors: ['#ff4400', '#ff6600', '#ff8800', '#ffaa00', '#ffcc00', '#ffee00', '#ffff00'] },
            { name: '海洋色', colors: ['#004488', '#0066aa', '#0088cc', '#00aaff', '#00ccff', '#00eeff', '#00ffff'] }
            { name: '极光色', colors: ['#00ff88', '#00ffaa', '#00ffcc', '#00ffee', '#88ffcc', '#aaffee', '#ccffff'] }
        ];

        // 响应式调整
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        // 初始化频率数据
        function initFrequencyData() {
            frequencyData.length = 0;
            for (let i = 0; i < numBands; i++) {
                frequencyData.push({
                    value: 0,
                    targetValue: 0,
                    velocity: 0,
                    decay: 0.95
                });
            }
        }

        // 生成音频数据（模拟）
        function generateAudioData() {
            const bassIntensity = isPlaying ? 0.8 : 0.3;
            
            for (let i = 0; i < numBands; i++) {
                // 基于时间的波形
                const timeFactor = Math.sin(time * 0.02 + i * 0.3) * 0.5 + 0.5;
                
                // 鼠标影响
                const mouseInfluence = Math.max(0, 1 - Math.abs(i - (mouseX / width * numBands)) / 5);
                
                // 随机波动
                const noise = Math.random() * 0.3;
                
                // 低频更强
                const freqWeight = 1 - (i / numBands) * 0.5;
                
                // 组合所有因素
                frequencyData[i].targetValue = 
                    (timeFactor + mouseInfluence * sensitivity + noise) * freqWeight * bassIntensity;
                
                // 平滑过渡
                frequencyData[i].value += (frequencyData[i].targetValue - frequencyData[i].value) * 0.1;
            }
        }

        // 绘制条形可视化
        function drawBars() {
            const barWidth = width / numBands;
            const scheme = colorSchemes[currentColorScheme].colors;
            
            for (let i = 0; i < numBands; i++) {
                const barHeight = frequencyData[i].value * height * 0.8;
                const x = i * barWidth;
                const y = height - barHeight;
                
                const colorIndex = Math.floor((i / numBands) * scheme.length);
                const color = scheme[colorIndex];
                
                // 渐变填充
                const gradient = ctx.createLinearGradient(x, height, x, y);
                gradient.addColorStop(0, 'rgba(0, 0, 0, 0.3)');
                gradient.addColorStop(1, color);
                
                ctx.fillStyle = gradient;
                ctx.fillRect(x, y, barWidth - 2, barHeight);
                
                // 发光效果
                ctx.shadowBlur = 20;
                ctx.shadowColor = color;
                ctx.fillRect(x, y, barWidth - 2, barHeight);
            }
        }
        
        // 绘制圆形可视化
        function drawCircle() {
            const centerX = width / 2;
            const centerY = height / 2;
            const scheme = colorSchemes[currentColorScheme].colors;
            
            for (let i = 0; i < numBands; i++) {
                const angle = (i / numBands) * Math.PI * 2;
                const radius = frequencyData[i].value * Math.min(width, height) * 0.3;
                
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                
                const colorIndex = Math.floor((i / numBands) * scheme.length);
                const color = scheme[colorIndex];
                
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, angle, angle + (Math.PI * 2 / numBands));
                ctx.lineTo(centerX, centerY);
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.8;
                ctx.shadowBlur = 15;
                ctx.shadowColor = color;
                ctx.fill();
            }
        }
        
        // 绘制波形可视化
        function drawWave() {
            const scheme = colorSchemes[currentColorScheme].colors;
            
            ctx.beginPath();
            ctx.moveTo(0, height / 2);
            
            for (let i = 0; i < numBands; i++) {
                const x = (i / numBands) * width;
                const y = height / 2 + frequencyData[i].value * height * 0.4;
                
                const colorIndex = Math.floor((i / numBands) * scheme.length);
                const color = scheme[colorIndex];
                
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 10;
                ctx.shadowColor = color;
                ctx.lineTo(x, y);
            }
            
            ctx.stroke();
        }
        
        // 触发节拍
        function triggerBeat() {
            isPlaying = true;
            setTimeout(() => {
                isPlaying = false;
            }, 500);
        }
        
        // 动画循环
        function animate(currentTime) {
            // FPS 计算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                fpsCounter.textContent = fps;
            }
            
            time++;
            
            // 清空画布
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 生成音频数据
            generateAudioData();
            
            // 根据模式绘制
            switch (currentMode) {
                case 0:
                    drawBars();
                    break;
                case 1:
                    drawCircle();
                    break;
                case 2:
                    drawWave();
                    break;
            }
            
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            triggerBeat();
        });
        
        // 滚轮调整敏感度
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            sensitivity = Math.max(0.2, Math.min(2.0, sensitivity - e.deltaY * 0.001));
            sensitivityDisplay.textContent = Math.round(sensitivity * 100);
        });
        
        // 按钮控制
        document.getElementById('modeBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            currentMode = (currentMode + 1) % 3;
            const modes = ['条形模式', '圆形模式', '波形模式'];
            e.target.textContent = modes[currentMode];
        });
        
        document.getElementById('colorBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            currentColorScheme = (currentColorScheme + 1) % colorSchemes.length;
            e.target.textContent = colorSchemes[currentColorScheme].name;
        });
        
        document.getElementById('playBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            triggerBeat();
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            triggerBeat();
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                triggerBeat();
            } else if (e.code === 'KeyM') {
                // 切换模式
                currentMode = (currentMode + 1) % 3;
                const modes = ['条形模式', '圆形模式', '波形模式'];
                document.getElementById('modeBtn').textContent = modes[currentMode];
            }
        });
        
        // 初始化
        resize();
        initFrequencyData();
        
        // 开始动画
        requestAnimationFrame(animate);
    </script>
</body>
</html>
