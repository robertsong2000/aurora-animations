<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雨滴效果 - Rain Drop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(180deg, #1a1a2e 0%, #2a2a3e 50%, #3a3a4e 100%);
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(150, 180, 220, 0.8);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 15px rgba(100, 150, 200, 0.6);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(180, 200, 230, 0.9);
            font-size: 36px;
            font-weight: bold;
            z-index: 100;
            text-shadow: 0 0 30px rgba(100, 150, 200, 0.8);
            letter-spacing: 8px;
        }
        
        .fps {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(150, 180, 220, 0.6);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
        
        @media (max-width: 768px) {
            .info {
                font-size: 11px;
                bottom: 10px;
                left: 10px;
            }
            .title {
                font-size: 24px;
                top: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="title">🌧️ 雨滴</div>
    <canvas id="rain"></canvas>
    <div class="info">
        <div>🖱️ 移动鼠标 - 改变风向</div>
        <div>👆 点击 - 闪电</div>
    </div>
    <div class="fps" id="fps">FPS: 60</div>
    
    <script>
        // 性能监控
        const fpsElement = document.getElementById('fps');
        let lastTime = performance.now();
        let frameCount = 0;
        
        // Canvas 设置
        const canvas = document.getElementById('rain');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        
        // 雨滴系统
        let raindrops = [];
        const RAINDROP_COUNT = 200;
        
        // 涟漪系统
        let ripples = [];
        const MAX_RIPPLES = 30;
        
        // 闪电系统
        let lightning = null;
        let lightningFlash = 0;
        
        // 云朵
        let clouds = [];
        const CLOUD_COUNT = 8;
        
        // 风向
        let windX = 0;
        
        // 响应式调整
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initRaindrops();
            initClouds();
        }
        
        // 初始化雨滴
        function initRaindrops() {
            raindrops = [];
            for (let i = 0; i < RAINDROP_COUNT; i++) {
                raindrops.push(createRaindrop());
            }
        }
        
        // 创建单个雨滴
        function createRaindrop() {
            return {
                x: Math.random() * width,
                y: Math.random() * -height,
                length: 10 + Math.random() * 20,
                speed: 8 + Math.random() * 7,
                alpha: 0.3 + Math.random() * 0.5,
                thickness: 1 + Math.random() * 1,
            };
        }
        
        // 初始化云朵
        function initClouds() {
            clouds = [];
            for (let i = 0; i < CLOUD_COUNT; i++) {
                clouds.push({
                    x: Math.random() * width,
                    y: 30 + Math.random() * 100,
                    width: 150 + Math.random() * 200,
                    height: 60 + Math.random() * 40,
                    speed: 0.2 + Math.random() * 0.3,
                    alpha: 0.3 + Math.random() * 0.3,
                });
            }
        }
        
        // 创建涟漪
        function createRipple(x, y) {
            if (ripples.length >= MAX_RIPPLES) {
                ripples.shift();
            }
            
            ripples.push({
                x: x,
                y: y,
                radius: 0,
                maxRadius: 30,
                speed: 1.5,
                alpha: 0.6,
                decay: 0.02,
            });
        }
        
        // 创建闪电
        function createLightning(x) {
            const segments = [];
            let currentX = x;
            let currentY = 0;
            
            while (currentY < height) {
                const nextY = currentY + 20 + Math.random() * 30;
                const nextX = currentX + (Math.random() - 0.5) * 50;
                
                segments.push({
                    x1: currentX,
                    y1: currentY,
                    x2: nextX,
                    y2: nextY,
                });
                
                // 分支
                if (Math.random() < 0.3 && currentY > height * 0.3) {
                    const branchLength = 30 + Math.random() * 50;
                    const branchAngle = (Math.random() - 0.5) * Math.PI / 2;
                    
                    segments.push({
                        x1: nextX,
                        y1: nextY,
                        x2: nextX + Math.cos(branchAngle) * branchLength,
                        y2: nextY + Math.sin(branchAngle) * branchLength,
                    });
                }
                
                currentX = nextX;
                currentY = nextY;
            }
            
            lightning = {
                segments: segments,
                alpha: 1,
                decay: 0.05,
            };
            
            lightningFlash = 1;
        }
        
        // 更新雨滴
        function updateRaindrops() {
            // 风向影响（基于鼠标X位置）
            windX = (mouseX - width / 2) / width * 3;
            
            raindrops.forEach(drop => {
                drop.y += drop.speed;
                drop.x += windX;
                
                // 雨滴落地
                if (drop.y > height) {
                    createRipple(drop.x, height);
                    drop.y = -drop.length;
                    drop.x = Math.random() * width;
                }
                
                // 雨滴出屏幕
                if (drop.x < -50) drop.x = width + 50;
                if (drop.x > width + 50) drop.x = -50;
            });
        }
        
        // 更新涟漪
        function updateRipples() {
            ripples = ripples.filter(ripple => {
                ripple.radius += ripple.speed;
                ripple.alpha -= ripple.decay;
                return ripple.alpha > 0;
            });
        }
        
        // 更新云朵
        function updateClouds() {
            clouds.forEach(cloud => {
                cloud.x += cloud.speed + windX * 0.5;
                
                if (cloud.x > width + cloud.width) {
                    cloud.x = -cloud.width;
                }
                if (cloud.x < -cloud.width * 2) {
                    cloud.x = width;
                }
            });
        }
        
        // 更新闪电
        function updateLightning() {
            if (lightning) {
                lightning.alpha -= lightning.decay;
                lightningFlash -= 0.05;
                
                if (lightning.alpha <= 0) {
                    lightning = null;
                    lightningFlash = 0;
                }
            }
        }
        
        // 绘制云朵
        function drawClouds() {
            clouds.forEach(cloud => {
                ctx.save();
                ctx.fillStyle = `rgba(50, 50, 70, ${cloud.alpha})`;
                ctx.beginPath();
                ctx.ellipse(cloud.x, cloud.y, cloud.width / 2, cloud.height / 2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }
        
        // 绘制雨滴
        function drawRaindrops() {
            ctx.save();
            ctx.strokeStyle = 'rgba(150, 180, 220, 0.6)';
            ctx.lineCap = 'round';
            
            raindrops.forEach(drop => {
                ctx.globalAlpha = drop.alpha;
                ctx.lineWidth = drop.thickness;
                
                const angle = Math.atan2(drop.speed, windX);
                const endX = drop.x + Math.cos(angle + Math.PI / 2) * drop.length;
                const endY = drop.y + Math.sin(angle + Math.PI / 2) * drop.length;
                
                ctx.beginPath();
                ctx.moveTo(drop.x, drop.y);
                ctx.lineTo(endX, endY);
                ctx.stroke();
            });
            
            ctx.restore();
        }
        
        // 绘制涟漪
        function drawRipples() {
            ctx.save();
            
            ripples.forEach(ripple => {
                ctx.strokeStyle = `rgba(150, 180, 220, ${ripple.alpha})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.ellipse(ripple.x, ripple.y, ripple.radius, ripple.radius * 0.3, 0, 0, Math.PI * 2);
                ctx.stroke();
            });
            
            ctx.restore();
        }
        
        // 绘制闪电
        function drawLightning() {
            if (!lightning) return;
            
            ctx.save();
            ctx.strokeStyle = `rgba(255, 255, 255, ${lightning.alpha})`;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
            
            lightning.segments.forEach(segment => {
                ctx.beginPath();
                ctx.moveTo(segment.x1, segment.y1);
                ctx.lineTo(segment.x2, segment.y2);
                ctx.stroke();
            });
            
            ctx.restore();
        }
        
        // 绘制闪电闪光
        function drawFlash() {
            if (lightningFlash > 0) {
                ctx.save();
                ctx.fillStyle = `rgba(255, 255, 255, ${lightningFlash * 0.3})`;
                ctx.fillRect(0, 0, width, height);
                ctx.restore();
            }
        }
        
        // 主动画循环
        function animate(currentTime) {
            // 清除画布
            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, width, height);
            
            // 更新
            updateClouds();
            updateRaindrops();
            updateRipples();
            updateLightning();
            
            // 绘制
            drawClouds();
            drawRaindrops();
            drawRipples();
            drawLightning();
            drawFlash();
            
            // FPS 计算
            frameCount++;
            if (frameCount >= 30) {
                const fps = Math.round(30 / ((currentTime - lastTime) / 1000 * 30));
                fpsElement.textContent = `FPS: ${Math.min(fps, 60)}`;
                frameCount = 0;
            }
            
            lastTime = currentTime;
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            createLightning(e.clientX);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            createLightning(e.touches[0].clientX);
        });
        
        // 初始化
        resize();
        mouseX = width / 2;
        mouseY = height / 2;
        requestAnimationFrame(animate);
    </script>
</body>
</html>
