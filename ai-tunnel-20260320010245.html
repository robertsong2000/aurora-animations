<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时空隧道 | Time Tunnel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: rgba(100, 200, 255, 0.9);
            font-size: 12px;
            background: rgba(0, 20, 40, 0.85);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            backdrop-filter: blur(5px);
            max-width: 220px;
        }

        .control-group {
            margin: 10px 0;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: #66ccff;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: #00aaff;
        }

        .control-group select {
            width: 100%;
            padding: 5px;
            background: rgba(0, 30, 60, 0.8);
            color: #66ccff;
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 4px;
        }

        .btn {
            padding: 8px 16px;
            margin-top: 8px;
            background: linear-gradient(135deg, #0066ff, #00aaff);
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 11px;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 150, 255, 0.5);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(100, 200, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(100, 200, 255, 0.7);
            font-size: 12px;
            background: rgba(0, 20, 40, 0.8);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            z-index: 10;
        }

        @media (max-width: 600px) {
            .controls {
                font-size: 10px;
                padding: 10px;
                max-width: 180px;
            }
            .info {
                font-size: 12px;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="tunnel"></canvas>
    
    <div class="controls">
        <div class="control-group">
            <label>隧道模式</label>
            <select id="tunnelMode">
                <option value="classic">经典隧道</option>
                <option value="spiral">螺旋隧道</option>
                <option value="quantum">量子隧道</option>
                <option value="hyperspace">超空间</option>
            </select>
        </div>
        <div class="control-group">
            <label>穿越速度: <span id="speedValue">1.0x</span></label>
            <input type="range" id="speedSlider" min="0.5" max="3" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label>环数量: <span id="ringsValue">30</span></label>
            <input type="range" id="ringsSlider" min="10" max="50" step="5" value="30">
        </div>
        <button class="btn" id="warpBtn">🚀 曲速跳跃</button>
    </div>

    <div class="stats">
        <div id="fpsCounter">FPS: 60</div>
        <div id="modeDisplay">模式: 经典隧道</div>
    </div>

    <div class="info">
        <span>🌀 时空隧道 | Time Tunnel 🌀</span>
        <span>移动鼠标控制方向 · 点击加速 · 双击切换模式</span>
    </div>

    <script>
        (function() {
            'use strict';

            // ========== Canvas 初始化 ==========
            const canvas = document.getElementById('tunnel');
            const ctx = canvas.getContext('2d');
            let width, height, centerX, centerY;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                centerX = width / 2;
                centerY = height / 2;
            }

            resize();
            window.addEventListener('resize', resize);

            // ========== 状态管理 ==========
            let tunnelMode = 'classic';
            let speed = 1;
            let ringCount = 30;
            let mouseX = centerX;
            let mouseY = centerY;
            let time = 0;
            let warpMode = false;
            let warpTimer = 0;

            // ========== 绘制隧道环 ==========
            function drawTunnelRings() {
                const maxRadius = Math.sqrt(centerX * centerX + centerY * centerY) * 1.5;
                
                for (let i = 0; i < ringCount; i++) {
                    const t = (i / ringCount + time * 0.001 * speed) % 1;
                    const radius = maxRadius * (1 - t);
                    
                    if (radius < 10) continue;
                    
                    const alpha = t * 0.8;
                    
                    // 根据模式调整
                    let offsetX = 0;
                    let offsetY = 0;
                    let rotation = 0;
                    let scale = 1;
                    
                    switch (tunnelMode) {
                        case 'classic':
                            // 经典隧道：直线前进
                            offsetX = (mouseX - centerX) * t * 0.3;
                            offsetY = (mouseY - centerY) * t * 0.3;
                            break;
                            
                        case 'spiral':
                            // 螺旋隧道：旋转前进
                            rotation = time * 0.002 * speed + i * 0.1;
                            offsetX = Math.cos(rotation) * t * 50;
                            offsetY = Math.sin(rotation) * t * 50;
                            break;
                            
                        case 'quantum':
                            // 量子隧道：随机跳跃
                            offsetX = Math.sin(time * 0.01 + i * 0.5) * t * 80;
                            offsetY = Math.cos(time * 0.01 + i * 0.7) * t * 80;
                            rotation = Math.sin(time * 0.005 + i) * 0.3;
                            break;
                            
                        case 'hyperspace':
                            // 超空间：拉伸效果
                            scale = 1 + t * 0.5;
                            offsetX = (mouseX - centerX) * t * 0.5;
                            offsetY = (mouseY - centerY) * t * 0.5;
                            break;
                    }
                    
                    // 曲速模式
                    if (warpMode) {
                        scale *= 1 + warpTimer * 0.5;
                        alpha *= 1 + warpTimer;
                    }
                    
                    ctx.save();
                    ctx.translate(centerX + offsetX, centerY + offsetY);
                    ctx.rotate(rotation);
                    ctx.scale(scale, scale);
                    
                    // 绘制环
                    ctx.beginPath();
                    
                    switch (tunnelMode) {
                        case 'classic':
                        case 'spiral':
                            ctx.arc(0, 0, radius, 0, Math.PI * 2);
                            break;
                            
                        case 'quantum':
                            // 多边形
                            const sides = 6;
                            for (let j = 0; j <= sides; j++) {
                                const angle = (j / sides) * Math.PI * 2;
                                const x = Math.cos(angle) * radius;
                                const y = Math.sin(angle) * radius;
                                if (j === 0) ctx.moveTo(x, y);
                                else ctx.lineTo(x, y);
                            }
                            break;
                            
                        case 'hyperspace':
                            // 椭圆（拉伸效果）
                            ctx.ellipse(0, 0, radius, radius * 0.6, 0, 0, Math.PI * 2);
                            break;
                    }
                    
                    // 颜色渐变
                    const hue = (t * 360 + time * 0.05) % 360;
                    ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${alpha})`;
                    ctx.lineWidth = 2 + t * 3;
                    ctx.stroke();
                    
                    // 发光效果
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = `hsla(${hue}, 80%, 60%, ${alpha * 0.5})`;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    
                    ctx.restore();
                }
            }

            // ========== 绘制粒子 ==========
            const particles = [];

            class Particle {
                constructor() {
                    this.reset();
                }

                reset() {
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 50 + 20;
                    
                    this.x = centerX + Math.cos(angle) * distance;
                    this.y = centerY + Math.sin(angle) * distance;
                    this.vx = Math.cos(angle) * (2 + Math.random() * 3);
                    this.vy = Math.sin(angle) * (2 + Math.random() * 3);
                    this.life = 100 + Math.random() * 100;
                    this.maxLife = this.life;
                    this.size = 1 + Math.random() * 2;
                    this.hue = Math.random() * 60 + 180;
                }

                update() {
                    this.x += this.vx * speed;
                    this.y += this.vy * speed;
                    this.life--;
                    
                    // 加速（远离中心）
                    const dx = this.x - centerX;
                    const dy = this.y - centerY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 0) {
                        const acceleration = 0.05 * speed;
                        this.vx += (dx / dist) * acceleration;
                        this.vy += (dy / dist) * acceleration;
                    }
                }

                draw() {
                    if (this.life <= 0) return;
                    
                    const alpha = this.life / this.maxLife;
                    
                    // 拖尾效果
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x - this.vx * 3, this.y - this.vy * 3);
                    ctx.strokeStyle = `hsla(${this.hue}, 80%, 70%, ${alpha * 0.5})`;
                    ctx.lineWidth = this.size;
                    ctx.stroke();
                    
                    // 粒子
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 80%, 80%, ${alpha})`;
                    ctx.fill();
                }

                isDead() {
                    return this.life <= 0 || 
                           this.x < 0 || this.x > width || 
                           this.y < 0 || this.y > height;
                }
            }

            // ========== 绘制中心光点 ==========
            function drawCenter() {
                const gradient = ctx.createRadialGradient(
                    centerX, centerY, 0,
                    centerX, centerY, 100
                );
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                gradient.addColorStop(0.3, 'rgba(100, 200, 255, 0.4)');
                gradient.addColorStop(0.6, 'rgba(100, 150, 255, 0.2)');
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(centerX, centerY, 100, 0, Math.PI * 2);
                ctx.fill();
                
                // 脉动核心
                const pulseSize = 10 + Math.sin(time * 0.01) * 5;
                ctx.beginPath();
                ctx.arc(centerX, centerY, pulseSize, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#00aaff';
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // ========== 鼠标交互 ==========
            canvas.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            canvas.addEventListener('click', () => {
                // 点击加速
                speed = Math.min(3, speed + 0.5);
                document.getElementById('speedSlider').value = speed;
                document.getElementById('speedValue').textContent = speed.toFixed(1) + 'x';
                
                // 添加粒子
                for (let i = 0; i < 20; i++) {
                    if (particles.length < 200) {
                        particles.push(new Particle());
                    }
                }
            });

            canvas.addEventListener('dblclick', (e) => {
                e.preventDefault();
                // 双击切换模式
                const modes = ['classic', 'spiral', 'quantum', 'hyperspace'];
                const currentIndex = modes.indexOf(tunnelMode);
                tunnelMode = modes[(currentIndex + 1) % modes.length];
                
                document.getElementById('tunnelMode').value = tunnelMode;
                updateModeDisplay();
            });

            // 触摸支持
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                mouseX = touch.clientX;
                mouseY = touch.clientY;
            });

            canvas.addEventListener('touchstart', (e) => {
                for (let i = 0; i < 20; i++) {
                    if (particles.length < 200) {
                        particles.push(new Particle());
                    }
                }
            });

            // ========== 控制器 ==========
            document.getElementById('tunnelMode').addEventListener('change', (e) => {
                tunnelMode = e.target.value;
                updateModeDisplay();
            });

            document.getElementById('speedSlider').addEventListener('input', (e) => {
                speed = parseFloat(e.target.value);
                document.getElementById('speedValue').textContent = speed.toFixed(1) + 'x';
            });

            document.getElementById('ringsSlider').addEventListener('input', (e) => {
                ringCount = parseInt(e.target.value);
                document.getElementById('ringsValue').textContent = ringCount;
            });

            document.getElementById('warpBtn').addEventListener('click', () => {
                warpMode = true;
                warpTimer = 2;
                speed = 3;
                
                document.getElementById('speedSlider').value = speed;
                document.getElementById('speedValue').textContent = speed.toFixed(1) + 'x';
                
                // 添加大量粒子
                for (let i = 0; i < 50; i++) {
                    if (particles.length < 300) {
                        particles.push(new Particle());
                    }
                }
            });

            function updateModeDisplay() {
                const modeNames = {
                    classic: '经典隧道',
                    spiral: '螺旋隧道',
                    quantum: '量子隧道',
                    hyperspace: '超空间'
                };
                document.getElementById('modeDisplay').textContent = `模式: ${modeNames[tunnelMode]}`;
            }

            // ========== 性能监控 ==========
            let fps = 0;
            let frameCount = 0;
            let lastFpsUpdate = 0;

            function updateStats(currentTime) {
                frameCount++;
                if (currentTime - lastFpsUpdate >= 1000) {
                    fps = frameCount;
                    frameCount = 0;
                    lastFpsUpdate = currentTime;
                    document.getElementById('fpsCounter').textContent = `FPS: ${fps}`;
                }
            }

            // ========== 动画循环 ==========
            let lastTime = 0;

            function animate(currentTime) {
                const deltaTime = lastTime ? currentTime - lastTime : 16;
                lastTime = currentTime;

                // 更新时间
                time += deltaTime;

                // 曲速模式计时器
                if (warpMode) {
                    warpTimer -= deltaTime * 0.001;
                    if (warpTimer <= 0) {
                        warpMode = false;
                        warpTimer = 0;
                        speed = 1;
                        document.getElementById('speedSlider').value = speed;
                        document.getElementById('speedValue').textContent = speed.toFixed(1) + 'x';
                    }
                }

                // 清除画布
                ctx.fillStyle = 'rgba(0, 0, 10, 0.15)';
                ctx.fillRect(0, 0, width, height);

                // 绘制隧道环
                drawTunnelRings();

                // 更新和绘制粒子
                for (let i = particles.length - 1; i >= 0; i--) {
                    particles[i].update();
                    particles[i].draw();
                    
                    if (particles[i].isDead()) {
                        particles.splice(i, 1);
                    }
                }

                // 绘制中心
                drawCenter();

                updateStats(currentTime);
                requestAnimationFrame(animate);
            }

            // 启动动画
            requestAnimationFrame(animate);

        })();
    </script>
</body>
</html>
