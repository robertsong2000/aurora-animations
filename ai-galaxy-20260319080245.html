<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银河系 | Galaxy Simulation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(100, 150, 255, 0.3);
        }

        .control-group {
            margin: 10px 0;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: #88aaff;
        }

        .control-group input[type="range"] {
            width: 150px;
            accent-color: #4488ff;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            text-align: right;
            pointer-events: none;
            z-index: 10;
        }

        @media (max-width: 600px) {
            .controls {
                font-size: 11px;
                padding: 10px;
            }
            .control-group input[type="range"] {
                width: 100px;
            }
            .info {
                font-size: 12px;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="galaxy"></canvas>
    
    <div class="controls">
        <div class="control-group">
            <label>旋转速度: <span id="speedValue">1.0x</span></label>
            <input type="range" id="speedSlider" min="0" max="3" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label>旋臂密度: <span id="densityValue">1.0x</span></label>
            <input type="range" id="densitySlider" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label>星系中心质量: <span id="massValue">1.0x</span></label>
            <input type="range" id="massSlider" min="0.5" max="2" step="0.1" value="1">
        </div>
    </div>

    <div class="stats">
        <div id="starCount">恒星: 0</div>
        <div id="fpsCounter">FPS: 60</div>
    </div>

    <div class="info">
        <span>🌌 银河系 | Galaxy Simulation 🌌</span>
        <span>移动鼠标扭曲时空 · 点击添加恒星 · 拖拽旋转星系</span>
    </div>

    <script>
        (function() {
            'use strict';

            // ========== 配置 ==========
            const CONFIG = {
                starCount: 3000,
                coreStars: 500,
                arms: 4,
                armSpread: 0.5,
                baseSpeed: 0.0005,
                maxStars: 5000
            };

            // ========== Canvas 初始化 ==========
            const canvas = document.getElementById('galaxy');
            const ctx = canvas.getContext('2d');
            let width, height, centerX, centerY;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                centerX = width / 2;
                centerY = height / 2;
            }

            resize();
            window.addEventListener('resize', resize);

            // ========== 状态管理 ==========
            let speedMultiplier = 1;
            let densityMultiplier = 1;
            let massMultiplier = 1;
            let mouseX = centerX;
            let mouseY = centerY;
            let isDragging = false;
            let dragStartX = 0;
            let dragStartY = 0;
            let rotationOffset = 0;
            let time = 0;

            // ========== 恒星类 ==========
            class Star {
                constructor(armIndex = -1) {
                    this.reset(armIndex);
                }

                reset(armIndex = -1) {
                    // 银河系旋臂结构
                    if (armIndex >= 0) {
                        const armAngle = (armIndex / CONFIG.arms) * Math.PI * 2;
                        const distance = 50 + Math.random() * Math.min(width, height) * 0.4;
                        const armOffset = (Math.random() - 0.5) * CONFIG.armSpread * distance;
                        
                        this.angle = armAngle + armOffset / distance;
                        this.distance = distance + Math.abs(armOffset);
                        this.brightness = 1 - (distance / (Math.min(width, height) * 0.45));
                    } else {
                        // 核心恒星
                        this.angle = Math.random() * Math.PI * 2;
                        this.distance = Math.random() * 80;
                        this.brightness = 0.8 + Math.random() * 0.2;
                    }

                    // 恒星属性
                    this.size = 0.5 + Math.random() * 2;
                    this.twinkleSpeed = 0.02 + Math.random() * 0.03;
                    this.twinklePhase = Math.random() * Math.PI * 2;
                    
                    // 颜色（根据温度）
                    const temp = Math.random();
                    if (temp < 0.3) {
                        // 蓝色恒星（高温）
                        this.color = { r: 150, g: 180, b: 255 };
                    } else if (temp < 0.6) {
                        // 白色恒星
                        this.color = { r: 255, g: 255, b: 255 };
                    } else if (temp < 0.85) {
                        // 黄色恒星
                        this.color = { r: 255, g: 240, b: 200 };
                    } else {
                        // 红色恒星（低温）
                        this.color = { r: 255, g: 200, b: 150 };
                    }

                    // 轨道速度（开普勒定律）
                    this.orbitSpeed = CONFIG.baseSpeed * Math.pow(100 / Math.max(this.distance, 10), 0.5);
                }

                update(deltaTime, mouseInfluence) {
                    // 轨道运动
                    this.angle += this.orbitSpeed * speedMultiplier * deltaTime * massMultiplier;
                    
                    // 闪烁效果
                    this.twinklePhase += this.twinkleSpeed * deltaTime;
                    
                    // 鼠标引力影响
                    if (mouseInfluence.active) {
                        const dx = mouseInfluence.x - (centerX + Math.cos(this.angle + rotationOffset) * this.distance);
                        const dy = mouseInfluence.y - (centerY + Math.sin(this.angle + rotationOffset) * this.distance);
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist < 150 && dist > 10) {
                            const force = 0.001 * (150 - dist) / 150;
                            this.angle += force * Math.atan2(dy, dx);
                        }
                    }
                }

                draw() {
                    // 计算位置
                    const x = centerX + Math.cos(this.angle + rotationOffset) * this.distance;
                    const y = centerY + Math.sin(this.angle + rotationOffset) * this.distance;
                    
                    // 闪烁亮度
                    const twinkle = 0.7 + 0.3 * Math.sin(this.twinklePhase);
                    const alpha = this.brightness * twinkle;
                    
                    // 绘制恒星
                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, this.size * 2);
                    gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`);
                    gradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.3})`);
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(x, y, this.size * 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // ========== 背景星云 ==========
            class Nebula {
                constructor() {
                    this.reset();
                }

                reset() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.size = 100 + Math.random() * 200;
                    this.alpha = 0.02 + Math.random() * 0.03;
                    
                    const colors = [
                        { r: 100, g: 150, b: 255 },  // 蓝色
                        { r: 150, g: 100, b: 255 },  // 紫色
                        { r: 255, g: 150, b: 100 },  // 橙色
                        { r: 255, g: 100, b: 150 },  // 粉色
                    ];
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                }

                draw() {
                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, this.size
                    );
                    gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha})`);
                    gradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha * 0.5})`);
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(this.x - this.size, this.y - this.size, this.size * 2, this.size * 2);
                }
            }

            // ========== 初始化恒星 ==========
            const stars = [];
            const nebulae = [];

            // 创建背景星云
            for (let i = 0; i < 5; i++) {
                nebulae.push(new Nebula());
            }

            // 创建核心恒星
            for (let i = 0; i < CONFIG.coreStars; i++) {
                stars.push(new Star(-1));
            }

            // 创建旋臂恒星
            for (let arm = 0; arm < CONFIG.arms; arm++) {
                const starsPerArm = Math.floor(CONFIG.starCount / CONFIG.arms);
                for (let i = 0; i < starsPerArm; i++) {
                    stars.push(new Star(arm));
                }
            }

            // ========== 鼠标交互 ==========
            const mouseInfluence = { active: false, x: centerX, y: centerY };

            canvas.addEventListener('mousemove', (e) => {
                mouseInfluence.active = true;
                mouseInfluence.x = e.clientX;
                mouseInfluence.y = e.clientY;

                if (isDragging) {
                    const dx = e.clientX - dragStartX;
                    rotationOffset += dx * 0.002;
                    dragStartX = e.clientX;
                    dragStartY = e.clientY;
                }
            });

            canvas.addEventListener('mouseleave', () => {
                mouseInfluence.active = false;
                isDragging = false;
            });

            canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
            });

            canvas.addEventListener('mouseup', () => {
                isDragging = false;
            });

            // 点击添加恒星
            canvas.addEventListener('click', (e) => {
                if (stars.length < CONFIG.maxStars) {
                    const dx = e.clientX - centerX;
                    const dy = e.clientY - centerY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx);
                    
                    // 添加一群恒星
                    for (let i = 0; i < 20; i++) {
                        const star = new Star();
                        star.angle = angle + (Math.random() - 0.5) * 0.5;
                        star.distance = distance + (Math.random() - 0.5) * 50;
                        star.brightness = 0.8 + Math.random() * 0.2;
                        star.size = 1 + Math.random() * 2;
                        stars.push(star);
                    }
                }
            });

            // 触摸支持
            canvas.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                isDragging = true;
                dragStartX = touch.clientX;
                dragStartY = touch.clientY;
                mouseInfluence.active = true;
                mouseInfluence.x = touch.clientX;
                mouseInfluence.y = touch.clientY;
            });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                mouseInfluence.x = touch.clientX;
                mouseInfluence.y = touch.clientY;

                if (isDragging) {
                    const dx = touch.clientX - dragStartX;
                    rotationOffset += dx * 0.002;
                    dragStartX = touch.clientX;
                    dragStartY = touch.clientY;
                }
            });

            canvas.addEventListener('touchend', () => {
                isDragging = false;
                mouseInfluence.active = false;
            });

            // ========== 控制器 ==========
            const speedSlider = document.getElementById('speedSlider');
            const densitySlider = document.getElementById('densitySlider');
            const massSlider = document.getElementById('massSlider');
            const speedValue = document.getElementById('speedValue');
            const densityValue = document.getElementById('densityValue');
            const massValue = document.getElementById('massValue');

            speedSlider.addEventListener('input', (e) => {
                speedMultiplier = parseFloat(e.target.value);
                speedValue.textContent = speedMultiplier.toFixed(1) + 'x';
            });

            densitySlider.addEventListener('input', (e) => {
                densityMultiplier = parseFloat(e.target.value);
                densityValue.textContent = densityMultiplier.toFixed(1) + 'x';
            });

            massSlider.addEventListener('input', (e) => {
                massMultiplier = parseFloat(e.target.value);
                massValue.textContent = massMultiplier.toFixed(1) + 'x';
            });

            // ========== 性能监控 ==========
            let fps = 0;
            let frameCount = 0;
            let lastFpsUpdate = 0;
            let lastTime = 0;
            const starCountEl = document.getElementById('starCount');
            const fpsCounterEl = document.getElementById('fpsCounter');

            function updateStats(currentTime) {
                frameCount++;
                if (currentTime - lastFpsUpdate >= 1000) {
                    fps = frameCount;
                    frameCount = 0;
                    lastFpsUpdate = currentTime;
                    fpsCounterEl.textContent = `FPS: ${fps}`;
                }
                starCountEl.textContent = `恒星: ${stars.length}`;
            }

            // ========== 动画循环 ==========
            function animate(currentTime) {
                const deltaTime = lastTime ? currentTime - lastTime : 16;
                lastTime = currentTime;
                time += deltaTime;

                // 清除画布
                ctx.fillStyle = 'rgba(0, 0, 10, 1)';
                ctx.fillRect(0, 0, width, height);

                // 绘制星云
                nebulae.forEach(n => n.draw());

                // 绘制银河中心发光
                const coreGradient = ctx.createRadialGradient(
                    centerX, centerY, 0,
                    centerX, centerY, 150
                );
                coreGradient.addColorStop(0, 'rgba(255, 240, 200, 0.3)');
                coreGradient.addColorStop(0.3, 'rgba(255, 200, 150, 0.15)');
                coreGradient.addColorStop(0.6, 'rgba(200, 150, 255, 0.05)');
                coreGradient.addColorStop(1, 'transparent');
                ctx.fillStyle = coreGradient;
                ctx.fillRect(0, 0, width, height);

                // 更新和绘制恒星
                stars.forEach(star => {
                    star.update(deltaTime, mouseInfluence);
                    star.draw();
                });

                // 鼠标光标效果
                if (mouseInfluence.active) {
                    const cursorGradient = ctx.createRadialGradient(
                        mouseInfluence.x, mouseInfluence.y, 0,
                        mouseInfluence.x, mouseInfluence.y, 100
                    );
                    cursorGradient.addColorStop(0, 'rgba(100, 150, 255, 0.1)');
                    cursorGradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = cursorGradient;
                    ctx.fillRect(
                        mouseInfluence.x - 100,
                        mouseInfluence.y - 100,
                        200, 200
                    );
                }

                updateStats(currentTime);
                requestAnimationFrame(animate);
            }

            // 启动动画
            requestAnimationFrame(animate);

        })();
    </script>
</body>
</html>
