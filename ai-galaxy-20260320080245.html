<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银河系 | Galaxy Simulation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
            cursor: grab;
        }
        
        body:active {
            cursor: grabbing;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.2);
            font-size: 28px;
            font-weight: 100;
            letter-spacing: 20px;
            pointer-events: none;
            z-index: 10;
            text-transform: uppercase;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        
        .stats {
            position: fixed;
            top: 10px;
            left: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            font-family: monospace;
            z-index: 10;
            line-height: 1.6;
        }
        
        .fps {
            position: fixed;
            top: 10px;
            right: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-family: monospace;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="galaxy"></canvas>
    <div class="title">Galaxy</div>
    <div class="stats" id="stats">恒星: 0<br>旋转: 0°</div>
    <div class="info">拖动旋转视角 | 滚轮缩放 | 双击重置</div>
    <div class="fps" id="fps"></div>
    
    <script>
        const canvas = document.getElementById('galaxy');
        const ctx = canvas.getContext('2d');
        const fpsDisplay = document.getElementById('fps');
        const statsDisplay = document.getElementById('stats');
        
        let width, height;
        let stars = [];
        let dustClouds = [];
        let rotationX = 0.3;
        let rotationY = 0;
        let rotationZ = 0;
        let autoRotate = true;
        let scale = 1;
        let isDragging = false;
        let lastMouseX = 0, lastMouseY = 0;
        let time = 0;
        
        // FPS 计算
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        // 银河系参数
        const config = {
            starCount: 3000,
            armCount: 4,
            armSpread: 0.5,
            coreSize: 50,
            diskRadius: 400,
            rotationSpeed: 0.0005
        };
        
        // 恒星类
        class Star {
            constructor() {
                // 螺旋臂分布
                const arm = Math.floor(Math.random() * config.armCount);
                const armAngle = (arm / config.armCount) * Math.PI * 2;
                
                // 距离中心的距离（指数分布，中心更密集）
                const distance = Math.pow(Math.random(), 0.5) * config.diskRadius;
                
                // 螺旋角度
                const spiralAngle = armAngle + (distance / config.diskRadius) * Math.PI * 2;
                
                // 添加随机偏移
                const spread = config.armSpread * distance * (Math.random() - 0.5);
                const angleOffset = spread / distance;
                
                // 3D位置（扁平的盘状）
                this.x = Math.cos(spiralAngle + angleOffset) * distance;
                this.z = Math.sin(spiralAngle + angleOffset) * distance;
                this.y = (Math.random() - 0.5) * 30 * Math.exp(-distance / 100); // 银盘厚度随距离衰减
                
                // 轨道速度（内侧转得快）
                this.orbitSpeed = config.rotationSpeed * (1 + (config.diskRadius - distance) / config.diskRadius);
                
                // 恒星属性
                this.baseSize = Math.random() * 1.5 + 0.5;
                this.brightness = Math.random() * 0.5 + 0.5;
                this.twinkleSpeed = Math.random() * 0.02 + 0.01;
                this.twinklePhase = Math.random() * Math.PI * 2;
                
                // 颜色（根据距离中心的距离）
                this.color = this.getStarColor(distance);
            }
            
            getStarColor(distance) {
                // 核心偏黄，外围偏蓝
                const ratio = distance / config.diskRadius;
                
                if (ratio < 0.3) {
                    // 核心：黄色/橙色
                    return {
                        r: 255,
                        g: 200 + Math.random() * 55,
                        b: 100 + Math.random() * 100
                    };
                } else if (ratio < 0.6) {
                    // 中间：白色
                    return {
                        r: 255,
                        g: 255,
                        b: 255
                    };
                } else {
                    // 外围：蓝色
                    return {
                        r: 150 + Math.random() * 100,
                        g: 180 + Math.random() * 75,
                        b: 255
                    };
                }
            }
            
            update() {
                // 轨道旋转
                const angle = this.orbitSpeed;
                const cos = Math.cos(angle);
                const sin = Math.sin(angle);
                
                const newX = this.x * cos - this.z * sin;
                const newZ = this.x * sin + this.z * cos;
                
                this.x = newX;
                this.z = newZ;
                
                // 闪烁
                this.twinklePhase += this.twinkleSpeed;
            }
            
            project(rotX, rotY, rotZ, scale) {
                // 应用旋转
                let x = this.x, y = this.y, z = this.z;
                
                // 绕X轴旋转
                let cosX = Math.cos(rotX);
                let sinX = Math.sin(rotX);
                let y1 = y * cosX - z * sinX;
                let z1 = y * sinX + z * cosX;
                
                // 绕Y轴旋转
                let cosY = Math.cos(rotY);
                let sinY = Math.sin(rotY);
                let x2 = x * cosY + z1 * sinY;
                let z2 = -x * sinY + z1 * cosY;
                
                // 绕Z轴旋转
                let cosZ = Math.cos(rotZ);
                let sinZ = Math.sin(rotZ);
                let x3 = x2 * cosZ - y1 * sinZ;
                let y3 = x2 * sinZ + y1 * cosZ;
                
                // 透视投影
                const perspective = 800;
                const scale3D = perspective / (perspective + z2);
                
                return {
                    x: width / 2 + x3 * scale3D * scale,
                    y: height / 2 + y3 * scale3D * scale,
                    scale: scale3D * scale,
                    z: z2
                };
            }
            
            draw(proj) {
                const twinkle = Math.sin(this.twinklePhase) * 0.3 + 0.7;
                const alpha = this.brightness * twinkle * proj.scale;
                const size = this.baseSize * proj.scale;
                
                // 发光效果
                const gradient = ctx.createRadialGradient(
                    proj.x, proj.y, 0,
                    proj.x, proj.y, size * 3
                );
                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`);
                gradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.3})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(proj.x, proj.y, size * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 核心
                ctx.beginPath();
                ctx.arc(proj.x, proj.y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                ctx.fill();
            }
        }
        
        // 星云/尘埃
        class DustCloud {
            constructor() {
                const distance = Math.random() * config.diskRadius * 0.8;
                const angle = Math.random() * Math.PI * 2;
                
                this.x = Math.cos(angle) * distance;
                this.z = Math.sin(angle) * distance;
                this.y = (Math.random() - 0.5) * 20;
                
                this.size = 30 + Math.random() * 50;
                this.alpha = 0.02 + Math.random() * 0.03;
                this.color = Math.random() > 0.5 ? 
                    { r: 150, g: 100, b: 200 } : // 紫色
                    { r: 200, g: 150, b: 100 };  // 棕色
            }
            
            project(rotX, rotY, rotZ, scale) {
                let x = this.x, y = this.y, z = this.z;
                
                let cosX = Math.cos(rotX), sinX = Math.sin(rotX);
                let y1 = y * cosX - z * sinX;
                let z1 = y * sinX + z * cosX;
                
                let cosY = Math.cos(rotY), sinY = Math.sin(rotY);
                let x2 = x * cosY + z1 * sinY;
                let z2 = -x * sinY + z1 * cosY;
                
                let cosZ = Math.cos(rotZ), sinZ = Math.sin(rotZ);
                let x3 = x2 * cosZ - y1 * sinZ;
                let y3 = x2 * sinZ + y1 * cosZ;
                
                const perspective = 800;
                const scale3D = perspective / (perspective + z2);
                
                return {
                    x: width / 2 + x3 * scale3D * scale,
                    y: height / 2 + y3 * scale3D * scale,
                    scale: scale3D * scale,
                    z: z2
                };
            }
            
            draw(proj) {
                const gradient = ctx.createRadialGradient(
                    proj.x, proj.y, 0,
                    proj.x, proj.y, this.size * proj.scale
                );
                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha * proj.scale})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(proj.x, proj.y, this.size * proj.scale, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        // 初始化恒星
        function initStars() {
            stars = [];
            for (let i = 0; i < config.starCount; i++) {
                stars.push(new Star());
            }
        }
        
        // 初始化星云
        function initDustClouds() {
            dustClouds = [];
            for (let i = 0; i < 50; i++) {
                dustClouds.push(new DustCloud());
            }
        }
        
        // 绘制核心
        function drawCore(rotX, rotY, rotZ, scale) {
            const perspective = 800;
            const scale3D = perspective / (perspective + 0);
            
            const x = width / 2;
            const y = height / 2;
            const coreScale = scale3D * scale;
            
            // 多层发光
            for (let i = 5; i >= 0; i--) {
                const radius = (config.coreSize + i * 20) * coreScale;
                const alpha = 0.15 - i * 0.02;
                
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
                gradient.addColorStop(0, `rgba(255, 220, 150, ${alpha})`);
                gradient.addColorStop(0.5, `rgba(255, 180, 100, ${alpha * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        // 主渲染循环
        function render() {
            // 清空画布
            ctx.fillStyle = 'rgba(0, 0, 5, 1)';
            ctx.fillRect(0, 0, width, height);
            
            // 自动旋转
            if (autoRotate && !isDragging) {
                rotationY += 0.003;
            }
            
            time++;
            
            // 更新恒星
            stars.forEach(star => star.update());
            
            // 收集所有需要绘制的对象
            const renderObjects = [];
            
            // 添加星云
            dustClouds.forEach(dust => {
                const proj = dust.project(rotationX, rotationY, rotationZ, scale);
                renderObjects.push({ type: 'dust', obj: dust, proj, z: proj.z });
            });
            
            // 添加恒星
            stars.forEach(star => {
                const proj = star.project(rotationX, rotationY, rotationZ, scale);
                renderObjects.push({ type: 'star', obj: star, proj, z: proj.z });
            });
            
            // 按Z轴排序（远的先画）
            renderObjects.sort((a, b) => b.z - a.z);
            
            // 绘制核心（最亮）
            drawCore(rotationX, rotationY, rotationZ, scale);
            
            // 绘制所有对象
            renderObjects.forEach(item => {
                if (item.type === 'star') {
                    item.obj.draw(item.proj);
                } else {
                    item.obj.draw(item.proj);
                }
            });
            
            // 更新统计
            const rotationDeg = ((rotationY * 180 / Math.PI) % 360).toFixed(1);
            statsDisplay.innerHTML = `恒星: ${config.starCount}<br>旋转: ${rotationDeg}°`;
            
            // FPS 计算
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                fpsDisplay.textContent = `FPS: ${fps}`;
            }
            
            requestAnimationFrame(render);
        }
        
        // 调整画布大小
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const deltaX = e.clientX - lastMouseX;
            const deltaY = e.clientY - lastMouseY;
            
            rotationY += deltaX * 0.005;
            rotationX += deltaY * 0.005;
            
            // 限制X轴旋转范围
            rotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, rotationX));
            
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });
        
        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });
        
        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
        });
        
        // 触摸事件
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                lastMouseX = e.touches[0].clientX;
                lastMouseY = e.touches[0].clientY;
            }
        });
        
        canvas.addEventListener('touchmove', (e) => {
            if (!isDragging || e.touches.length !== 1) return;
            e.preventDefault();
            
            const deltaX = e.touches[0].clientX - lastMouseX;
            const deltaY = e.touches[0].clientY - lastMouseY;
            
            rotationY += deltaX * 0.005;
            rotationX += deltaY * 0.005;
            rotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, rotationX));
            
            lastMouseX = e.touches[0].clientX;
            lastMouseY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });
        
        // 滚轮缩放
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomSpeed = 0.001;
            scale *= (1 - e.deltaY * zoomSpeed);
            scale = Math.max(0.3, Math.min(3, scale));
        });
        
        // 双击重置
        canvas.addEventListener('dblclick', () => {
            rotationX = 0.3;
            rotationY = 0;
            rotationZ = 0;
            scale = 1;
        });
        
        // 初始化
        resize();
        initStars();
        initDustClouds();
        render();
    </script>
</body>
</html>
