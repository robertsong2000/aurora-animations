<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波浪动画 | Wave Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0a1628 0%, #1a3a5a 50%, #0a2a4a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            background: rgba(10, 30, 50, 0.85);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(100, 180, 255, 0.3);
            backdrop-filter: blur(5px);
            max-width: 220px;
        }

        .control-group {
            margin: 10px 0;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: #88ccff;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: #44aaff;
        }

        .control-group select {
            width: 100%;
            padding: 5px;
            background: rgba(20, 40, 70, 0.8);
            color: #88ccff;
            border: 1px solid rgba(100, 180, 255, 0.3);
            border-radius: 4px;
        }

        .btn {
            padding: 8px 16px;
            margin-top: 8px;
            background: linear-gradient(135deg, #4488cc, #44aaff);
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 11px;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(100, 180, 255, 0.5);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            background: rgba(10, 30, 50, 0.8);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(100, 180, 255, 0.3);
            z-index: 10;
        }

        @media (max-width: 600px) {
            .controls {
                font-size: 10px;
                padding: 10px;
                max-width: 180px;
            }
            .info {
                font-size: 12px;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="waves"></canvas>
    
    <div class="controls">
        <div class="control-group">
            <label>波浪模式</label>
            <select id="waveMode">
                <option value="ocean">海洋波浪</option>
                <option value="sine">正弦波</option>
                <option value="interference">干涉波</option>
                <option value="heartbeat">心跳波</option>
            </select>
        </div>
        <div class="control-group">
            <label>波浪数量: <span id="waveCountValue">5</span></label>
            <input type="range" id="waveCountSlider" min="1" max="10" step="1" value="5">
        </div>
        <div class="control-group">
            <label>波浪高度: <span id="amplitudeValue">50</span></label>
            <input type="range" id="amplitudeSlider" min="20" max="150" step="10" value="50">
        </div>
        <div class="control-group">
            <label>波浪速度: <span id="speedValue">1.0x</span></label>
            <input type="range" id="speedSlider" min="0.1" max="3" step="0.1" value="1">
        </div>
        <button class="btn" id="stormBtn">🌊 颶风效果</button>
    </div>

    <div class="stats">
        <div id="modeDisplay">模式: 海洋波浪</div>
        <div id="fpsCounter">FPS: 60</div>
    </div>

    <div class="info">
        <span>🌊 波浪动画 | Wave Animation 🌊</span>
        <span>移动鼠标产生涟漪 · 点击创造波浪 · 双击触发风暴</span>
    </div>

    <script>
        (function() {
            'use strict';

            // ========== Canvas 初始化 ==========
            const canvas = document.getElementById('waves');
            const ctx = canvas.getContext('2d');
            let width, height;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }

            resize();
            window.addEventListener('resize', resize);

            // ========== 状态管理 ==========
            let waveMode = 'ocean';
            let waveCount = 5;
            let amplitude = 50;
            let waveSpeed = 1;
            let mouseX = width / 2;
            let mouseY = height / 2;
            let isStorm = false;
            let stormTimer = 0;
            let time = 0;

            // ========== 涟漪类 ==========
            class Ripple {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.radius = 0;
                    this.maxRadius = 100 + Math.random() * 50;
                    this.alpha = 1;
                    this.speed = 2;
                }

                update() {
                    this.radius += this.speed;
                    this.alpha = 1 - (this.radius / this.maxRadius);
                }

                draw() {
                    if (this.alpha <= 0) return;
                    
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(100, 180, 255, ${this.alpha * 0.5})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                isDead() {
                    return this.radius >= this.maxRadius;
                }
            }

            const ripples = [];

            // ========== 绘制背景 ==========
            function drawBackground() {
                const gradient = ctx.createLinearGradient(0, 0, 0, height);
                gradient.addColorStop(0, '#0a1628');
                gradient.addColorStop(0.3, '#1a2a4a');
                gradient.addColorStop(0.6, '#2a4a6a');
                gradient.addColorStop(1, '#1a3a5a');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);
            }

            // ========== 绘制波浪 ==========
            function drawWaves() {
                for (let w = 0; w < waveCount; w++) {
                    const baseY = height * 0.5 + w * 40;
                    const waveAmplitude = amplitude * (1 - w * 0.1);
                    const frequency = 0.01 + w * 0.005;
                    const phaseOffset = w * 0.5;
                    const alpha = 0.6 - w * 0.1;
                    
                    // 波浪渐变
                    const gradient = ctx.createLinearGradient(0, baseY - waveAmplitude, 0, baseY + waveAmplitude);
                    gradient.addColorStop(0, `rgba(50, 150, 255, ${alpha * 0.5})`);
                    gradient.addColorStop(0.5, `rgba(100, 180, 255, ${alpha})`);
                    gradient.addColorStop(1, `rgba(50, 120, 200, ${alpha * 0.3})`);
                    
                    ctx.beginPath();
                    ctx.moveTo(0, height);
                    
                    // 绘制波浪路径
                    for (let x = 0; x <= width; x += 2) {
                        let y = baseY;
                        
                        switch (waveMode) {
                            case 'ocean':
                                // 海洋波浪：多层叠加
                                y += Math.sin(x * frequency + time + phaseOffset) * waveAmplitude;
                                y += Math.sin(x * frequency * 1.5 + time * 1.2 + phaseOffset) * waveAmplitude * 0.5;
                                y += Math.sin(x * frequency * 0.5 + time * 0.8 + phaseOffset) * waveAmplitude * 0.3;
                                break;
                            case 'sine':
                                // 正弦波
                                y += Math.sin(x * frequency + time + phaseOffset) * waveAmplitude;
                                break;
                            case 'interference':
                                // 干涉波
                                y += Math.sin(x * frequency + time + phaseOffset) * waveAmplitude;
                                y += Math.sin(x * frequency * 2 + time) * waveAmplitude * 0.5;
                                y += Math.cos(x * frequency + time) * waveAmplitude * 0.3;
                                break;
                            case 'heartbeat':
                                // 心跳波
                                const t = (x * frequency + time + phaseOffset) % (Math.PI * 2);
                                y += Math.sin(t) * waveAmplitude;
                                y += Math.sin(t * 3) * waveAmplitude * 0.3;
                                break;
                        }
                        
                        if (x === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    
                    ctx.lineTo(width, height);
                    ctx.closePath();
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    
                    // 波浪高光
                    ctx.beginPath();
                    for (let x = 0; x <= width; x += 5) {
                        let y = baseY;
                        
                        switch (waveMode) {
                            case 'ocean':
                                y += Math.sin(x * frequency + time + phaseOffset) * waveAmplitude;
                                y += Math.sin(x * frequency * 1.5 + time * 1.2 + phaseOffset) * waveAmplitude * 0.5;
                                break;
                            case 'sine':
                                y += Math.sin(x * frequency + time + phaseOffset) * waveAmplitude;
                                break;
                            case 'interference':
                                y += Math.sin(x * frequency + time + phaseOffset) * waveAmplitude;
                                y += Math.sin(x * frequency * 2 + time) * waveAmplitude * 0.5;
                                break;
                            case 'heartbeat':
                                const t = (x * frequency + time + phaseOffset) % (Math.PI * 2);
                                y += Math.sin(t) * waveAmplitude;
                                break;
                        }
                        
                        if (x === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 0.3})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }

        // ========== 鼠标交互 ==========
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // 鼠标移动产生涟漪
            if (Math.random() < 0.05 && ripples.length < 20) {
                ripples.push(new Ripple(mouseX, mouseY));
            }
        });

        canvas.addEventListener('click', (e) => {
            // 点击创造波浪涟漪
            for (let i = 0; i < 3; i++) {
                const ripple = new Ripple(e.clientX + (Math.random() - 0.5) * 50, e.clientY);
                ripples.push(ripple);
            }
        });

        canvas.addEventListener('dblclick', (e) => {
            e.preventDefault();
            // 双击触发风暴
            isStorm = true;
            stormTimer = 3000; // 3秒风暴
            amplitude = 100;
            waveSpeed = 2;
            
            document.getElementById('amplitudeSlider').value = amplitude;
            document.getElementById('amplitudeValue').textContent = amplitude;
            document.getElementById('speedSlider').value = waveSpeed;
            document.getElementById('speedValue').textContent = waveSpeed.toFixed(1) + 'x';
        });

        // 触摸支持
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });

        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            for (let i = 0; i < 3; i++) {
                const ripple = new Ripple(touch.clientX + (Math.random() - 0.5) * 50, touch.clientY);
                ripples.push(ripple);
            }
        });

        // ========== 控制器 ==========
        document.getElementById('waveMode').addEventListener('change', (e) => {
            waveMode = e.target.value;
            updateModeDisplay();
        });

        document.getElementById('waveCountSlider').addEventListener('input', (e) => {
            waveCount = parseInt(e.target.value);
            document.getElementById('waveCountValue').textContent = waveCount;
        });

        document.getElementById('amplitudeSlider').addEventListener('input', (e) => {
                amplitude = parseInt(e.target.value);
                document.getElementById('amplitudeValue').textContent = amplitude;
            });
            
            document.getElementById('speedSlider').addEventListener('input', (e) => {
                waveSpeed = parseFloat(e.target.value);
                document.getElementById('speedValue').textContent = waveSpeed.toFixed(1) + 'x';
            });
            
            document.getElementById('stormBtn').addEventListener('click', () => {
                isStorm = true;
                stormTimer = 3000;
                amplitude = 100;
                waveSpeed = 2;
                
                document.getElementById('amplitudeSlider').value = amplitude;
                document.getElementById('amplitudeValue').textContent = amplitude;
                document.getElementById('speedSlider').value = waveSpeed;
                document.getElementById('speedValue').textContent = waveSpeed.toFixed(1) + 'x';
            });

            function updateModeDisplay() {
                const modeNames = {
                    ocean: '海洋波浪',
                    sine: '正弦波',
                    interference: '干涉波',
                    heartbeat: '心跳波'
                };
                document.getElementById('modeDisplay').textContent = `模式: ${modeNames[waveMode]}`;
            }

            // ========== 性能监控 ==========
            let fps = 0;
            let frameCount = 0;
            let lastFpsUpdate = 0;

            function updateStats(currentTime) {
                frameCount++;
                if (currentTime - lastFpsUpdate >= 1000) {
                    fps = frameCount;
                    frameCount = 0;
                    lastFpsUpdate = currentTime;
                    document.getElementById('fpsCounter').textContent = `FPS: ${fps}`;
                }
            }

            // ========== 动画循环 ==========
            let lastTime = 0;

            function animate(currentTime) {
                const deltaTime = lastTime ? currentTime - lastTime : 16;
                lastTime = currentTime;

                // 更新时间
                time += deltaTime * 0.001 * waveSpeed;

                // 风暴计时器
                if (isStorm) {
                    stormTimer -= deltaTime;
                    if (stormTimer <= 0) {
                        isStorm = false;
                        amplitude = 50;
                        waveSpeed = 1;
                        
                        document.getElementById('amplitudeSlider').value = amplitude;
                        document.getElementById('amplitudeValue').textContent = amplitude;
                        document.getElementById('speedSlider').value = waveSpeed;
                        document.getElementById('speedValue').textContent = waveSpeed.toFixed(1) + 'x';
                    }
                }

                // 清除画布
                ctx.clearRect(0, 0, width, height);

                // 绘制背景
                drawBackground();

                // 绘制波浪
                drawWaves();

                // 更新和绘制涟漪
                for (let i = ripples.length - 1; i >= 0; i--) {
                    ripples[i].update();
                    ripples[i].draw();
                    
                    if (ripples[i].isDead()) {
                        ripples.splice(i, 1);
                    }
                }

                updateStats(currentTime);
                requestAnimationFrame(animate);
            }

            
            // 启动动画
            requestAnimationFrame(animate);
        })();
    </script>
</body>
</html>
