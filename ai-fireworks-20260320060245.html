<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烟花盛宴 | Fireworks Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 200, 100, 0.5);
        }
        
        .fps {
            position: fixed;
            top: 10px;
            right: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-family: monospace;
            z-index: 10;
        }
        
        .counter {
            position: fixed;
            top: 10px;
            left: 10px;
            color: rgba(255, 200, 100, 0.8);
            font-size: 14px;
            font-family: monospace;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="fireworks"></canvas>
    <div class="info">点击发射烟花 | 移动鼠标产生粒子轨迹</div>
    <div class="fps" id="fps"></div>
    <div class="counter" id="counter">烟花数: 0</div>
    
    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        const fpsDisplay = document.getElementById('fps');
        const counterDisplay = document.getElementById('counter');
        
        let width, height;
        let fireworks = [];
        let particles = [];
        let trails = [];
        let mouseX = 0, mouseY = 0;
        let fireworkCount = 0;
        
        // FPS 计算
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        // 烟花颜色主题
        const colorThemes = [
            ['#ff6b6b', '#ee5a6f', '#c44569'],  // 红色系
            ['#4ecdc4', '#45b7aa', '#26de81'],  // 青绿系
            ['#f9ca24', '#f0932b', '#ff9f43'],  // 金色系
            ['#a55eea', '#8854d0', '#6c5ce7'],  // 紫色系
            ['#00d2d3', '#01a3a4', '#54a0ff'],  // 蓝色系
            ['#ff9ff3', '#f368e0', '#ff6b81'],  // 粉色系
            ['#ffffff', '#dfe6e9', '#b2bec3'],  // 白色系
            ['#ffeaa7', '#fdcb6e', '#f39c12'],  // 黄色系
        ];
        
        // 烟花类型
        const FIREWORK_TYPES = {
            SPHERE: 'sphere',      // 球形
            RING: 'ring',          // 环形
            HEART: 'heart',        // 心形
            SPIRAL: 'spiral',      // 螺旋
            DOUBLE: 'double',      // 双层
            WILLOW: 'willow'       // 垂柳
        };
        
        // 烟花类
        class Firework {
            constructor(startX, startY, targetX, targetY) {
                this.x = startX;
                this.y = startY;
                this.startX = startX;
                this.startY = startY;
                this.targetX = targetX;
                this.targetY = targetY;
                
                const angle = Math.atan2(targetY - startY, targetX - startX);
                const speed = 12 + Math.random() * 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                this.trail = [];
                this.trailLength = 8;
                this.alpha = 1;
                this.exploded = false;
                
                // 随机选择颜色和类型
                this.colors = colorThemes[Math.floor(Math.random() * colorThemes.length)];
                this.type = this.getRandomType();
                this.particleCount = 80 + Math.floor(Math.random() * 60);
            }
            
            getRandomType() {
                const types = Object.values(FIREWORK_TYPES);
                return types[Math.floor(Math.random() * types.length)];
            }
            
            update() {
                // 保存轨迹
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.trailLength) {
                    this.trail.shift();
                }
                
                // 移动
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.15; // 重力
                
                // 检测是否到达目标
                const distanceToTarget = Math.sqrt(
                    Math.pow(this.targetX - this.x, 2) + 
                    Math.pow(this.targetY - this.y, 2)
                );
                
                // 检测是否应该爆炸
                if (this.vy >= 0 || distanceToTarget < 10) {
                    this.explode();
                    return false;
                }
                
                return true;
            }
            
            explode() {
                this.exploded = true;
                fireworkCount++;
                counterDisplay.textContent = `烟花数: ${fireworkCount}`;
                
                // 根据类型生成粒子
                switch(this.type) {
                    case FIREWORK_TYPES.SPHERE:
                        this.createSphereExplosion();
                        break;
                    case FIREWORK_TYPES.RING:
                        this.createRingExplosion();
                        break;
                    case FIREWORK_TYPES.HEART:
                        this.createHeartExplosion();
                        break;
                    case FIREWORK_TYPES.SPIRAL:
                        this.createSpiralExplosion();
                        break;
                    case FIREWORK_TYPES.DOUBLE:
                        this.createDoubleExplosion();
                        break;
                    case FIREWORK_TYPES.WILLOW:
                        this.createWillowExplosion();
                        break;
                }
            }
            
            createSphereExplosion() {
                for (let i = 0; i < this.particleCount; i++) {
                    const angle = (Math.PI * 2 / this.particleCount) * i;
                    const speed = 2 + Math.random() * 4;
                    particles.push(new Particle(
                        this.x, this.y,
                        Math.cos(angle) * speed,
                        Math.sin(angle) * speed,
                        this.colors[Math.floor(Math.random() * this.colors.length)],
                        'sphere'
                    ));
                }
            }
            
            createRingExplosion() {
                for (let ring = 0; ring < 3; ring++) {
                    const ringParticles = 30 + ring * 10;
                    const speed = 3 + ring * 2;
                    
                    for (let i = 0; i < ringParticles; i++) {
                        const angle = (Math.PI * 2 / ringParticles) * i;
                        particles.push(new Particle(
                            this.x, this.y,
                            Math.cos(angle) * speed,
                            Math.sin(angle) * speed,
                            this.colors[ring % this.colors.length],
                            'ring'
                        ));
                    }
                }
            }
            
            createHeartExplosion() {
                for (let i = 0; i < this.particleCount; i++) {
                    const t = (i / this.particleCount) * Math.PI * 2;
                    const heartX = 16 * Math.pow(Math.sin(t), 3);
                    const heartY = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    
                    const speed = 0.15 + Math.random() * 0.1;
                    particles.push(new Particle(
                        this.x, this.y,
                        heartX * speed,
                        heartY * speed,
                        this.colors[0],
                        'heart'
                    ));
                }
            }
            
            createSpiralExplosion() {
                for (let i = 0; i < this.particleCount; i++) {
                    const angle = (i / this.particleCount) * Math.PI * 8;
                    const radius = i / this.particleCount * 5;
                    
                    particles.push(new Particle(
                        this.x, this.y,
                        Math.cos(angle) * radius,
                        Math.sin(angle) * radius,
                        this.colors[i % this.colors.length],
                        'spiral'
                    ));
                }
            }
            
            createDoubleExplosion() {
                // 内层
                for (let i = 0; i < this.particleCount / 2; i++) {
                    const angle = (Math.PI * 2 / (this.particleCount / 2)) * i;
                    const speed = 2 + Math.random() * 2;
                    particles.push(new Particle(
                        this.x, this.y,
                        Math.cos(angle) * speed,
                        Math.sin(angle) * speed,
                        this.colors[0],
                        'double'
                    ));
                }
                
                // 外层（延迟）
                setTimeout(() => {
                    for (let i = 0; i < this.particleCount / 2; i++) {
                        const angle = (Math.PI * 2 / (this.particleCount / 2)) * i;
                        const speed = 4 + Math.random() * 2;
                        particles.push(new Particle(
                            this.x, this.y,
                            Math.cos(angle) * speed,
                            Math.sin(angle) * speed,
                            this.colors[1],
                            'double'
                        ));
                    }
                }, 150);
            }
            
            createWillowExplosion() {
                for (let i = 0; i < this.particleCount; i++) {
                    const angle = (Math.PI * 2 / this.particleCount) * i;
                    const speed = 1 + Math.random() * 2;
                    
                    particles.push(new Particle(
                        this.x, this.y,
                        Math.cos(angle) * speed,
                        Math.sin(angle) * speed - 1,
                        this.colors[Math.floor(Math.random() * this.colors.length)],
                        'willow'
                    ));
                }
            }
            
            draw() {
                // 绘制轨迹
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = i / this.trail.length * 0.6;
                    const size = 2 + (i / this.trail.length) * 2;
                    
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x, this.trail[i].y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 200, 100, ${alpha})`;
                    ctx.fill();
                }
                
                // 绘制烟花头部
                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff9f43';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        // 粒子类
        class Particle {
            constructor(x, y, vx, vy, color, type) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.type = type;
                this.alpha = 1;
                this.life = 1;
                this.decay = 0.015 + Math.random() * 0.01;
                this.gravity = type === 'willow' ? 0.08 : 0.03;
                this.size = 2 + Math.random() * 2;
                this.trail = [];
                this.trailLength = type === 'willow' ? 15 : 5;
            }
            
            update() {
                // 保存轨迹
                this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
                if (this.trail.length > this.trailLength) {
                    this.trail.shift();
                }
                
                // 移动
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.vx *= 0.98;
                this.vy *= 0.98;
                
                // 衰减
                this.life -= this.decay;
                this.alpha = this.life;
                
                return this.life > 0;
            }
            
            draw() {
                // 绘制轨迹
                for (let i = 0; i < this.trail.length; i++) {
                    const point = this.trail[i];
                    const trailAlpha = (i / this.trail.length) * this.alpha * 0.5;
                    const trailSize = this.size * (i / this.trail.length);
                    
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, trailSize, 0, Math.PI * 2);
                    ctx.fillStyle = this.hexToRgba(this.color, trailAlpha);
                    ctx.fill();
                }
                
                // 绘制粒子
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.hexToRgba(this.color, this.alpha);
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
        }
        
        // 鼠标轨迹粒子
        class TrailParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.alpha = 0.8;
                this.size = 2 + Math.random() * 2;
                this.color = `hsl(${Math.random() * 60 + 20}, 100%, 60%)`;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.02;
                this.size *= 0.98;
                
                return this.alpha > 0;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace(')', `, ${this.alpha})`).replace('hsl', 'hsla');
                ctx.fill();
            }
        }
        
        // 绘制星星背景
        function drawStars() {
            const starCount = 150;
            ctx.fillStyle = '#fff';
            
            for (let i = 0; i < starCount; i++) {
                const x = (i * 7919) % width; // 使用质数产生伪随机
                const y = (i * 6271) % (height * 0.6);
                const size = ((i * 3571) % 3) * 0.5 + 0.5;
                const twinkle = Math.sin(Date.now() * 0.001 + i) * 0.3 + 0.7;
                
                ctx.globalAlpha = twinkle * 0.6;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }
        
        // 绘制城市轮廓
        function drawCityline() {
            const buildings = [];
            let x = 0;
            
            while (x < width) {
                const w = 30 + Math.random() * 60;
                const h = 50 + Math.random() * 150;
                buildings.push({ x, w, h });
                x += w + Math.random() * 20;
            }
            
            ctx.fillStyle = '#0a0a1a';
            ctx.beginPath();
            ctx.moveTo(0, height);
            
            buildings.forEach(b => {
                ctx.lineTo(b.x, height - b.h);
                ctx.lineTo(b.x + b.w, height - b.h);
                ctx.lineTo(b.x + b.w, height - b.h + 10);
            });
            
            ctx.lineTo(width, height);
            ctx.closePath();
            ctx.fill();
            
            // 窗户灯光
            ctx.fillStyle = 'rgba(255, 200, 100, 0.8)';
            buildings.forEach(b => {
                for (let wy = height - b.h + 15; wy < height - 20; wy += 20) {
                    for (let wx = b.x + 8; wx < b.x + b.w - 8; wx += 15) {
                        if (Math.random() > 0.3) {
                            ctx.fillRect(wx, wy, 6, 8);
                        }
                    }
                }
            });
        }
        
        // 主渲染循环
        function render() {
            // 绘制背景
            ctx.fillStyle = 'rgba(10, 10, 26, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制星星
            drawStars();
            
            // 更新和绘制烟花
            fireworks = fireworks.filter(firework => {
                const alive = firework.update();
                if (alive) firework.draw();
                return alive;
            });
            
            // 更新和绘制粒子
            particles = particles.filter(particle => {
                const alive = particle.update();
                if (alive) particle.draw();
                return alive;
            });
            
            // 更新和绘制轨迹粒子
            trails = trails.filter(trail => {
                const alive = trail.update();
                if (alive) trail.draw();
                return alive;
            });
            
            // FPS 计算
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                fpsDisplay.textContent = `FPS: ${fps}`;
            }
            
            requestAnimationFrame(render);
        }
        
        // 调整画布大小
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            // 清空并绘制背景
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, width, height);
            drawCityline();
        }
        
        // 发射烟花
        function launchFirework(targetX, targetY) {
            const startX = Math.random() * width;
            const startY = height;
            
            fireworks.push(new Firework(startX, startY, targetX, targetY));
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // 产生轨迹粒子
            if (Math.random() > 0.7) {
                trails.push(new TrailParticle(mouseX, mouseY));
            }
        });
        
        window.addEventListener('click', (e) => {
            launchFirework(e.clientX, e.clientY);
        });
        
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                launchFirework(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
        
        // 自动发射烟花
        setInterval(() => {
            if (fireworks.length < 3 && Math.random() > 0.5) {
                const x = Math.random() * width;
                const y = Math.random() * height * 0.5 + 50;
                launchFirework(x, y);
            }
        }, 2000);
        
        // 初始化
        resize();
        render();
    </script>
</body>
</html>
