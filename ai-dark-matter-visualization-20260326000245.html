<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗物质可视化 - Dark Matter Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            cursor: crosshair;
        }
        
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(100, 150, 255, 0.9);
            font-size: 13px;
            line-height: 1.8;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        
        #info h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #6496ff;
            text-shadow: 0 0 10px rgba(100, 150, 255, 0.5);
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(100, 150, 255, 0.9);
            font-size: 13px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .control-item {
            margin: 8px 0;
        }
        
        label {
            display: inline-block;
            width: 100px;
        }
        
        input[type="range"] {
            width: 140px;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        span.value {
            display: inline-block;
            width: 40px;
            text-align: right;
            margin-left: 10px;
            color: #6496ff;
        }
        
        button {
            margin-top: 10px;
            margin-right: 10px;
            padding: 8px 20px;
            background: linear-gradient(135deg, #6496ff 0%, #3264c8 100%);
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(100, 150, 255, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="info">
        <h3>🌑 暗物质可视化</h3>
        <div>暗物质晕数量: <span id="haloCount">0</span></div>
        <div>可见物质: <span id="visibleMatter">0</span>%</div>
        <div>暗物质: <span id="darkMatter">0</span>%</div>
        <div>引力透镜强度: <span id="lensingStrength">0</span></div>
        <div>FPS: <span id="fps">0</span></div>
    </div>
    
    <div id="controls">
        <div class="control-item">
            <label>暗物质密度:</label>
            <input type="range" id="darkMatterDensity" min="100" max="1000" value="500">
            <span class="value" id="darkMatterDensityValue">500</span>
        </div>
        <div class="control-item">
            <label>引力强度:</label>
            <input type="range" id="gravityStrength" min="10" max="200" value="100">
            <span class="value" id="gravityStrengthValue">100</span>
        </div>
        <div class="control-item">
            <label>透镜效果:</label>
            <input type="range" id="lensingEffect" min="0" max="100" value="50">
            <span class="value" id="lensingEffectValue">50</span>
        </div>
        <div class="control-item">
            <label>可见星系:</label>
            <input type="range" id="visibleGalaxies" min="10" max="100" value="30">
            <span class="value" id="visibleGalaxiesValue">30</span>
        </div>
        <button id="addHaloBtn">添加暗物质晕</button>
        <button id="toggleLensingBtn">切换透镜</button>
        <button id="resetBtn">重置</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        // 配置
        let config = {
            darkMatterDensity: 500,
            gravityStrength: 100,
            lensingEffect: 50,
            visibleGalaxies: 30
        };
        
        // 暗物质粒子
        let darkMatterParticles = [];
        
        // 可见星系
        let galaxies = [];
        
        // 引力透镜开关
        let lensingEnabled = true;
        
        // FPS 计算
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 0;
        
        // 时间
        let time = 0;
        
        // 暗物质粒子类
        class DarkMatterParticle {
            constructor() {
                this.reset();
            }
            
            reset() {
                // 随机位置
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.mass = Math.random() * 10 + 5;
                this.size = Math.sqrt(this.mass);
                this.alpha = Math.random() * 0.3 + 0.1;
            }
            
            update() {
                // 引力相互作用（简化的N体模拟）
                darkMatterParticles.forEach(other => {
                    if (other === this) return;
                    
                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance > 10 && distance < 200) {
                        const force = (config.gravityStrength * 0.01 * other.mass) / (distance * distance);
                        this.vx += (dx / distance) * force;
                        this.vy += (dy / distance) * force;
                    }
                });
                
                // 星系引力
                galaxies.forEach(galaxy => {
                    const dx = galaxy.x - this.x;
                    const dy = galaxy.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance > 20) {
                        const force = (config.gravityStrength * 0.02 * galaxy.mass) / (distance * distance);
                        this.vx += (dx / distance) * force;
                        this.vy += (dy / distance) * force;
                    }
                });
                
                // 速度衰减
                this.vx *= 0.99;
                this.vy *= 0.99;
                
                // 更新位置
                this.x += this.vx;
                this.y += this.vy;
                
                // 边界循环
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            
            draw() {
                // 暗物质是不可见的，但我们可以用微弱的蓝色光晕表示
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 3
                );
                
                gradient.addColorStop(0, `rgba(100, 150, 255, ${this.alpha * 0.5})`);
                gradient.addColorStop(0.5, `rgba(100, 150, 255, ${this.alpha * 0.2})`);
                gradient.addColorStop(1, 'rgba(100, 150, 255, 0)');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        // 星系类
        class Galaxy {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.mass = Math.random() * 50 + 50;
                this.radius = this.mass * 0.5;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.arms = Math.floor(Math.random() * 3) + 2;
                this.color = this.generateColor();
            }
            
            generateColor() {
                const types = [
                    { r: 255, g: 200, b: 150 },  // 椭圆星系（黄）
                    { r: 150, g: 200, b: 255 },  // 螺旋星系（蓝）
                    { r: 255, g: 150, b: 200 }   // 不规则星系（粉）
                ];
                return types[Math.floor(Math.random() * types.length)];
            }
            
            update() {
                this.rotation += this.rotationSpeed;
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // 绘制星系核心
                const coreGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius * 0.5);
                coreGradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.9)`);
                coreGradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.4)`);
                coreGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = coreGradient;
                ctx.fill();
                
                // 绘制旋臂
                for (let arm = 0; arm < this.arms; arm++) {
                    const armAngle = (Math.PI * 2 / this.arms) * arm;
                    
                    ctx.beginPath();
                    
                    for (let i = 0; i < 50; i++) {
                        const t = i / 50;
                        const r = this.radius * t;
                        const angle = armAngle + t * Math.PI * 2;
                        
                        const x = Math.cos(angle) * r;
                        const y = Math.sin(angle) * r * 0.3;
                        
                        if (i === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    
                    ctx.strokeStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.5)`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
                
                ctx.restore();
                
                // 绘制引力透镜效果
                if (lensingEnabled && config.lensingEffect > 0) {
                    this.drawGravitationalLensing();
                }
            }
            
            drawGravitationalLensing() {
                // 爱因斯坦环（简化的引力透镜效果）
                const lensRadius = this.radius * (1 + config.lensingEffect * 0.02);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, lensRadius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${config.lensingEffect * 0.005})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
        
        // 绘制宇宙背景
        function drawCosmicBackground() {
            // 微弱的背景星场
            for (let i = 0; i < 200; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                const size = Math.random() * 1.5;
                const alpha = Math.random() * 0.3 + 0.1;
                
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            }
        }
        
        // 绘制暗物质分布图（热力图）
        function drawDarkMatterDistribution() {
            // 计算暗物质密度场
            const gridSize = 50;
            const grid = [];
            
            for (let x = 0; x < width; x += gridSize) {
                for (let y = 0; y < height; y += gridSize) {
                    let density = 0;
                    
                    darkMatterParticles.forEach(particle => {
                        const dx = particle.x - x;
                        const dy = particle.y - y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < gridSize * 3) {
                            density += particle.mass / (distance + 10);
                        }
                    });
                    
                    if (density > 0) {
                        const alpha = Math.min(0.2, density * 0.01);
                        ctx.fillStyle = `rgba(100, 150, 255, ${alpha})`;
                        ctx.fillRect(x, y, gridSize, gridSize);
                    }
                }
            }
        }
        
        // 初始化暗物质粒子
        function initDarkMatter() {
            darkMatterParticles = [];
            
            for (let i = 0; i < config.darkMatterDensity; i++) {
                darkMatterParticles.push(new DarkMatterParticle());
            }
        }
        
        // 初始化星系
        function initGalaxies() {
            galaxies = [];
            
            for (let i = 0; i < config.visibleGalaxies; i++) {
                galaxies.push(new Galaxy());
            }
        }
        
        // 动画循环
        function animate(currentTime) {
            // FPS 计算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                document.getElementById('fps').textContent = fps;
            }
            
            // 更新时间
            time += 0.016;
            
            // 清除画布
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制宇宙背景
            drawCosmicBackground();
            
            // 绘制暗物质分布
            drawDarkMatterDistribution();
            
            // 更新和绘制暗物质粒子
            darkMatterParticles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            // 更新和绘制星系
            galaxies.forEach(galaxy => {
                galaxy.update();
                galaxy.draw();
            });
            
            // 更新信息
            document.getElementById('haloCount').textContent = darkMatterParticles.length;
            document.getElementById('visibleMatter').textContent = 
                Math.round((galaxies.length / (galaxies.length + darkMatterParticles.length)) * 100);
            document.getElementById('darkMatter').textContent = 
                Math.round((darkMatterParticles.length / (galaxies.length + darkMatterParticles.length)) * 100);
            document.getElementById('lensingStrength').textContent = config.lensingEffect;
            
            requestAnimationFrame(animate);
        }
        
        // 鼠标交互1：点击添加星系
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            galaxies.push(new Galaxy(x, y));
        });
        
        // 鼠标交互2：右键添加暗物质晕
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // 添加一团暗物质
            for (let i = 0; i < 50; i++) {
                const particle = new DarkMatterParticle();
                particle.x = x + (Math.random() - 0.5) * 100;
                particle.y = y + (Math.random() - 0.5) * 100;
                darkMatterParticles.push(particle);
            }
        });
        
        // 控制面板事件
        document.getElementById('darkMatterDensity').addEventListener('input', (e) => {
            const newCount = parseInt(e.target.value);
            document.getElementById('darkMatterDensityValue').textContent = newCount;
            
            if (newCount > darkMatterParticles.length) {
                for (let i = darkMatterParticles.length; i < newCount; i++) {
                    darkMatterParticles.push(new DarkMatterParticle());
                }
            } else {
                darkMatterParticles.length = newCount;
            }
            config.darkMatterDensity = newCount;
        });
        
        document.getElementById('gravityStrength').addEventListener('input', (e) => {
            config.gravityStrength = parseInt(e.target.value);
            document.getElementById('gravityStrengthValue').textContent = e.target.value;
        });
        
        document.getElementById('lensingEffect').addEventListener('input', (e) => {
            config.lensingEffect = parseInt(e.target.value);
            document.getElementById('lensingEffectValue').textContent = e.target.value;
        });
        
        document.getElementById('visibleGalaxies').addEventListener('input', (e) => {
            const newCount = parseInt(e.target.value);
            document.getElementById('visibleGalaxiesValue').textContent = newCount;
            
            if (newCount > galaxies.length) {
                for (let i = galaxies.length; i < newCount; i++) {
                    galaxies.push(new Galaxy());
                }
            } else {
                galaxies.length = newCount;
            }
            config.visibleGalaxies = newCount;
        });
        
        document.getElementById('addHaloBtn').addEventListener('click', () => {
            // 添加暗物质晕（大量粒子聚集）
            const x = Math.random() * width;
            const y = Math.random() * height;
            
            for (let i = 0; i < 100; i++) {
                const particle = new DarkMatterParticle();
                particle.x = x + (Math.random() - 0.5) * 150;
                particle.y = y + (Math.random() - 0.5) * 150;
                darkMatterParticles.push(particle);
            }
        });
        
        document.getElementById('toggleLensingBtn').addEventListener('click', () => {
            lensingEnabled = !lensingEnabled;
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            initDarkMatter();
            initGalaxies();
        });
        
        // 窗口调整
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        
        // 性能优化：移动设备减少粒子
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            config.darkMatterDensity = 300;
            config.visibleGalaxies = 15;
            document.getElementById('darkMatterDensity').value = 300;
            document.getElementById('darkMatterDensityValue').textContent = 300;
            document.getElementById('visibleGalaxies').value = 15;
            document.getElementById('visibleGalaxiesValue').textContent = 15;
        }
        
        // 初始化并启动
        initDarkMatter();
        initGalaxies();
        animate(performance.now());
    </script>
</body>
</html>
