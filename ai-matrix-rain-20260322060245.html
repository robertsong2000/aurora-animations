<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>矩阵雨 | Matrix Rain</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .title {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 700;
            color: #0f0;
            text-shadow: 
                0 0 10px #0f0,
                0 0 20px #0f0,
                0 0 30px #0f0,
                0 0 40px #0f0;
            animation: glitch 3s infinite;
            letter-spacing: 0.3em;
        }

        @keyframes glitch {
            0%, 90%, 100% {
                transform: translate(0);
                opacity: 1;
            }
            92% {
                transform: translate(-2px, 2px);
                opacity: 0.8;
            }
            94% {
                transform: translate(2px, -2px);
                opacity: 0.9;
            }
            96% {
                transform: translate(-2px, -2px);
                opacity: 0.8;
            }
            98% {
                transform: translate(2px, 2px);
                opacity: 1;
            }
        }

        .subtitle {
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            color: rgba(0, 255, 0, 0.6);
            margin-top: 20px;
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 255, 0, 0.5);
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #0f0;
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            z-index: 10;
            background: rgba(0, 255, 0, 0.1);
            padding: 15px 20px;
            border: 1px solid rgba(0, 255, 0, 0.3);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            text-shadow: 0 0 5px #0f0;
        }

        .stats div {
            margin: 5px 0;
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="scanline"></div>
    
    <div class="overlay">
        <div class="title">矩阵雨</div>
        <div class="subtitle">欢迎来到数字世界</div>
    </div>
    
    <div class="instructions">
        点击屏幕创建数字爆炸 · 移动鼠标影响矩阵流向 · 滚轮调整速度
    </div>
    
    <div class="stats">
        <div>FPS: <span id="fps">60</span></div>
        <div>速度: <span id="speed">1.0</span>x</div>
        <div>列数: <span id="columns">0</span></div>
    </div>

    <script>
        // 性能监控
        const fpsCounter = document.getElementById('fps');
        const speedDisplay = document.getElementById('speed');
        const columnsDisplay = document.getElementById('columns');
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        let speedMultiplier = 1.0;

        // Canvas 设置
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        // 矩阵参数
        const fontSize = 16;
        let columns = [];
        let mouseX = 0;
        let mouseY = 0;
        let ripples = [];

        // 字符集（日文片假名 + 数字 + 符号）
        const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%^&*()+=<>?';
        
        // 响应式调整
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initColumns();
        }

        // 初始化列
        function initColumns() {
            const columnCount = Math.floor(width / fontSize);
            columns = [];
            
            for (let i = 0; i < columnCount; i++) {
                columns.push({
                    x: i * fontSize,
                    y: Math.random() * height,
                    speed: 0.5 + Math.random() * 1.5,
                    chars: [],
                    length: 5 + Math.floor(Math.random() * 20)
                });
            }
            
            columnsDisplay.textContent = columnCount;
        }

        // 涟漪效果类
        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 300;
                this.speed = 10;
                this.alpha = 1;
            }

            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                return this.alpha > 0;
            }

            draw() {
                ctx.save();
                ctx.strokeStyle = `rgba(0, 255, 0, ${this.alpha})`;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#0f0';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            affect(column) {
                const dx = column.x - this.x;
                const dy = column.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (Math.abs(dist - this.radius) < 50) {
                    column.speed *= 1.5;
                    return true;
                }
                return false;
            }
        }

        // 绘制单个字符
        function drawChar(char, x, y, alpha, isHead) {
            ctx.save();
            
            if (isHead) {
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#fff';
            } else {
                ctx.fillStyle = `rgba(0, 255, 0, ${alpha})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#0f0';
            }
            
            ctx.font = `${fontSize}px Courier New`;
            ctx.textAlign = 'center';
            ctx.fillText(char, x, y);
            ctx.restore();
        }

        // 更新和绘制列
        function updateColumn(column, index) {
            // 鼠标影响
            const dx = column.x - mouseX;
            const dy = column.y - mouseY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const influence = Math.max(0, 1 - dist / 200);
            
            // 涟漪影响
            let rippleBoost = 0;
            ripples.forEach(ripple => {
                if (ripple.affect(column)) {
                    rippleBoost += 2;
                }
            });

            // 更新位置
            const baseSpeed = column.speed * speedMultiplier;
            const mouseBoost = influence * 3;
            column.y += (baseSpeed + mouseBoost + rippleBoost) * fontSize * 0.1;

            // 重置位置
            if (column.y > height + column.length * fontSize) {
                column.y = -column.length * fontSize;
                column.speed = 0.5 + Math.random() * 1.5;
                column.length = 5 + Math.floor(Math.random() * 20);
            }

            // 绘制字符
            for (let i = 0; i < column.length; i++) {
                const charY = column.y - i * fontSize;
                
                if (charY > 0 && charY < height) {
                    const char = chars[Math.floor(Math.random() * chars.length)];
                    const alpha = 1 - (i / column.length);
                    const isHead = i === 0;
                    
                    drawChar(char, column.x, charY, alpha, isHead);
                }
            }
        }

        // 创建爆炸效果
        function createExplosion(x, y) {
            ripples.push(new Ripple(x, y));
            
            // 在点击位置创建额外的快速列
            const nearbyColumns = columns.filter(col => 
                Math.abs(col.x - x) < 100
            );
            
            nearbyColumns.forEach(col => {
                col.y = y;
                col.speed = 3;
            });
        }

        // 动画循环
        function animate(currentTime) {
            // FPS 计算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                fpsCounter.textContent = fps;
            }

            // 半透明黑色覆盖（创建拖尾效果）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // 更新和绘制涟漪
            for (let i = ripples.length - 1; i >= 0; i--) {
                const alive = ripples[i].update();
                if (!alive) {
                    ripples.splice(i, 1);
                } else {
                    ripples[i].draw();
                }
            }

            // 更新和绘制所有列
            columns.forEach((column, index) => {
                updateColumn(column, index);
            });

            requestAnimationFrame(animate);
        }

        // 事件监听
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('click', (e) => {
            createExplosion(e.clientX, e.clientY);
        });

        // 滚轮调整速度
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            speedMultiplier = Math.max(0.2, Math.min(3.0, speedMultiplier - e.deltaY * 0.001));
            speedDisplay.textContent = speedMultiplier.toFixed(1);
        });

        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            createExplosion(mouseX, mouseY);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                // 空格键创建全屏爆炸
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        createExplosion(
                            Math.random() * width,
                            Math.random() * height
                        );
                    }, i * 100);
                }
            }
        });

        // 初始化
        resize();
        
        // 设置初始鼠标位置
        mouseX = width / 2;
        mouseY = height / 2;

        // 开始动画
        requestAnimationFrame(animate);
    </script>
</body>
</html>
