<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空效果 | Starry Sky</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            font-family: 'Georgia', serif;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            animation: twinkle 3s ease-in-out infinite;
        }

        .title h1 {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 
                0 0 20px rgba(255, 255, 255, 0.8),
                0 0 40px rgba(200, 220, 255, 0.6),
                0 0 60px rgba(150, 180, 255, 0.4);
            letter-spacing: 0.3em;
            margin-bottom: 20px;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }

        .subtitle {
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            color: rgba(200, 220, 255, 0.6);
            letter-spacing: 0.2em;
        }

        .instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(200, 220, 255, 0.8);
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            z-index: 10;
            background: rgba(10, 15, 30, 0.6);
            padding: 15px 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 150, 255, 0.3);
        }

        .stats div {
            margin: 5px 0;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-btn {
            background: rgba(10, 15, 30, 0.6);
            border: 1px solid rgba(100, 150, 255, 0.3);
            color: rgba(200, 220, 255, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(100, 150, 255, 0.2);
            border-color: rgba(100, 150, 255, 0.6);
        }

        .control-btn.active {
            background: rgba(100, 150, 255, 0.3);
            border-color: rgba(100, 150, 255, 0.8);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="controls">
        <button class="control-btn" id="shootingStarBtn">流星雨</button>
        <button class="control-btn" id="constellationBtn">显示星座</button>
    </div>
    
    <div class="title">
        <h1>星空</h1>
        <div class="subtitle">仰望星空，敬畏宇宙</div>
    </div>
    
    <div class="instructions">
        移动鼠标创建星光轨迹 · 点击触发流星 · 滚轮调整星星密度
    </div>
    
    <div class="stats">
        <div>FPS: <span id="fps">60</span></div>
        <div>星星数: <span id="stars">0</span></div>
        <div>密度: <span id="density">100</span>%</div>
    </div>

    <script>
        // 性能监控
        const fpsCounter = document.getElementById('fps');
        const starsCounter = document.getElementById('stars');
        const densityDisplay = document.getElementById('density');
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        let densityMultiplier = 1.0;
        let isShootingStarMode = false;
        let showConstellations = false;

        // Canvas 设置
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        // 星空系统
        const stars = [];
        const shootingStars = [];
        const trails = [];
        const constellations = [];
        let mouseX = 0;
        let mouseY = 0;
        let time = 0;

        // 响应式调整
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initStars();
            initConstellations();
        }

        // 星星类
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2.5 + 0.5;
                this.twinkleSpeed = Math.random() * 0.05 + 0.01;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.baseAlpha = Math.random() * 0.5 + 0.5;
                
                // 星星颜色
                const colorRand = Math.random();
                if (colorRand > 0.9) {
                    this.color = '#ff9999'; // 红色
                } else if (colorRand > 0.8) {
                    this.color = '#99ff99'; // 绿色
                } else if (colorRand > 0.7) {
                    this.color = '#9999ff'; // 蓝色
                } else if (colorRand > 0.6) {
                    this.color = '#ffff99'; // 黄色
                } else {
                    this.color = '#ffffff'; // 白色
                }
            }

            update() {
                this.twinklePhase += this.twinkleSpeed;
            }

            draw() {
                const twinkle = (Math.sin(this.twinklePhase) + 1) / 2;
                const alpha = this.baseAlpha * (0.5 + twinkle * 0.5);
                
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = this.size * 4;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 流星类
        class ShootingStar {
            constructor() {
                this.x = Math.random() * width;
                this.y = 0;
                this.length = 80 + Math.random() * 120;
                this.speed = 15 + Math.random() * 10;
                this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.3;
                this.alpha = 1;
                this.trail = [];
            }

            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                
                // 保存轨迹
                this.trail.push({ x: this.x, y: this.y, alpha: 1 });
                if (this.trail.length > 20) {
                    this.trail.shift();
                }
                
                // 轨迹衰减
                this.trail.forEach(point => point.alpha *= 0.9);
                
                return this.y < height + 50 && this.x < width + 50;
            }

            draw() {
                // 绘制轨迹
                for (let i = 0; i < this.trail.length - 1; i++) {
                    const point = this.trail[i];
                    const nextPoint = this.trail[i + 1];
                    
                    ctx.save();
                    ctx.strokeStyle = `rgba(255, 255, 255, ${point.alpha})`;
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
                    ctx.beginPath();
                    ctx.moveTo(point.x, point.y);
                    ctx.lineTo(nextPoint.x, nextPoint.y);
                    ctx.stroke();
                    ctx.restore();
                }
                
                // 绘制流星头部
                ctx.save();
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 星光轨迹类
        class StarTrail {
            constructor(x, y) {
                this.points = [{ x, y, alpha: 1 }];
                this.maxPoints = 15;
            }

            addPoint(x, y) {
                this.points.push({ x, y, alpha: 1 });
                if (this.points.length > this.maxPoints) {
                    this.points.shift();
                }
            }

            update() {
                this.points.forEach(point => point.alpha *= 0.9);
                return this.points[this.points.length - 1].alpha > 0.01;
            }

            draw() {
                if (this.points.length < 2) return;
                
                ctx.save();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 1;
                ctx.shadowBlur = 5;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
                
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                
                for (let i = 1; i < this.points.length; i++) {
                    const point = this.points[i];
                    ctx.globalAlpha = point.alpha;
                    ctx.lineTo(point.x, point.y);
                }
                
                ctx.stroke();
                ctx.restore();
            }
        }

        // 星座连线
        class Constellation {
            constructor(stars) {
                this.stars = stars;
                this.alpha = 0;
                this.targetAlpha = 0.3;
            }

            draw() {
                if (!showConstellations) {
                    this.alpha = 0;
                    return;
                }
                
                this.alpha += (this.targetAlpha - this.alpha) * 0.05;
                
                if (this.alpha < 0.01) return;
                
                ctx.save();
                ctx.strokeStyle = `rgba(100, 150, 255, ${this.alpha})`;
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                
                ctx.beginPath();
                ctx.moveTo(this.stars[0].x, this.stars[0].y);
                
                for (let i = 1; i < this.stars.length; i++) {
                    ctx.lineTo(this.stars[i].x, this.stars[i].y);
                }
                
                ctx.stroke();
                ctx.restore();
            }
        }

        // 初始化星星
        function initStars() {
            stars.length = 0;
            const numStars = Math.floor((width * height) / 3000 * densityMultiplier);
            
            for (let i = 0; i < numStars; i++) {
                stars.push(new Star());
            }
            
            starsCounter.textContent = stars.length;
        }

        // 初始化星座
        function initConstellations() {
            constellations.length = 0;
            
            // 创建几个随机星座
            for (let i = 0; i < 5; i++) {
                const constellationStars = [];
                const numPoints = 3 + Math.floor(Math.random() * 5);
                const centerX = Math.random() * width;
                const centerY = Math.random() * height * 0.7;
                
                for (let j = 0; j < numPoints; j++) {
                    constellationStars.push({
                        x: centerX + (Math.random() - 0.5) * 200,
                        y: centerY + (Math.random() - 0.5) * 200
                    });
                }
                
                constellations.push(new Constellation(constellationStars));
            }
        }

        // 创建流星
        function createShootingStar() {
            shootingStars.push(new ShootingStar());
        }

        // 自动流星
        function autoShootingStar() {
            if (isShootingStarMode && Math.random() < 0.05) {
                createShootingStar();
            } else if (!isShootingStarMode && Math.random() < 0.002) {
                createShootingStar();
            }
        }

        // 动画循环
        function animate(currentTime) {
            // FPS 计算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                fpsCounter.textContent = fps;
            }

            time++;

            // 半透明覆盖（创建拖尾效果）
            ctx.fillStyle = 'rgba(9, 10, 15, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // 更新和绘制星星
            stars.forEach(star => {
                star.update();
                star.draw();
            });

            // 绘制星座
            constellations.forEach(constellation => constellation.draw());

            // 自动流星
            autoShootingStar();

            // 更新和绘制流星
            for (let i = shootingStars.length - 1; i >= 0; i--) {
                const alive = shootingStars[i].update();
                if (!alive) {
                    shootingStars.splice(i, 1);
                } else {
                    shootingStars[i].draw();
                }
            }

            // 更新和绘制轨迹
            for (let i = trails.length - 1; i >= 0; i--) {
                const alive = trails[i].update();
                if (!alive) {
                    trails.splice(i, 1);
                } else {
                    trails[i].draw();
                }
            }

            requestAnimationFrame(animate);
        }

        // 事件监听
        window.addEventListener('resize', resize);

        let lastTrailTime = 0;
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // 创建星光轨迹
            const now = Date.now();
            if (now - lastTrailTime > 50) {
                if (trails.length === 0 || 
                    Math.hypot(mouseX - trails[trails.length - 1].points[trails[trails.length - 1].points.length - 1].x,
                              mouseY - trails[trails.length - 1].points[trails[trails.length - 1].points.length - 1].y) > 10) {
                    trails.push(new StarTrail(mouseX, mouseY));
                } else if (trails.length > 0) {
                    trails[trails.length - 1].addPoint(mouseX, mouseY);
                }
                lastTrailTime = now;
            }
        });

        canvas.addEventListener('click', (e) => {
            createShootingStar();
        });

        // 滚轮调整星星密度
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            densityMultiplier = Math.max(0.3, Math.min(2.0, densityMultiplier - e.deltaY * 0.001));
            densityDisplay.textContent = Math.round(densityMultiplier * 100);
            initStars();
        });

        // 按钮控制
        document.getElementById('shootingStarBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            isShootingStarMode = !isShootingStarMode;
            e.target.textContent = isShootingStarMode ? '停止流星雨' : '流星雨';
            e.target.classList.toggle('active', isShootingStarMode);
        });

        document.getElementById('constellationBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            showConstellations = !showConstellations;
            e.target.textContent = showConstellations ? '隐藏星座' : '显示星座';
            e.target.classList.toggle('active', showConstellations);
        });

        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            createShootingStar();
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            
            const now = Date.now();
            if (now - lastTrailTime > 50) {
                trails.push(new StarTrail(mouseX, mouseY));
                lastTrailTime = now;
            }
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                // 空格键：创建多个流星
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        createShootingStar();
                    }, i * 200);
                }
            } else if (e.code === 'KeyS') {
                // S键：切换流星雨
                isShootingStarMode = !isShootingStarMode;
                document.getElementById('shootingStarBtn').textContent = 
                    isShootingStarMode ? '停止流星雨' : '流星雨';
                document.getElementById('shootingStarBtn').classList.toggle('active', isShootingStarMode);
            }
        });

        // 初始化
        resize();
        
        // 开始动画
        requestAnimationFrame(animate);

        // 初始流星
        setTimeout(() => {
            createShootingStar();
        }, 1000);
    </script>
</body>
</html>
