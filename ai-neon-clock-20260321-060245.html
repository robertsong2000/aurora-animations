<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹时钟 - Neon Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        
        .info span {
            display: block;
            margin: 5px 0;
        }
        
        .fps-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="clock"></canvas>
    <div class="info">
        <span>⏰ 霓虹时钟</span>
        <span>🖱️ 移动鼠标 - 粒子跟随</span>
        <span>👆 点击 - 霓虹脉冲波</span>
    </div>
    <div class="fps-counter" id="fps">FPS: 60</div>

    <script>
        // ============ 配置 ============
        const CONFIG = {
            neonColors: [
                '#FF0080', // 粉红
                '#00FFFF', // 青色
                '#FF00FF', // 品红
                '#00FF00', // 绿色
                '#FFFF00', // 黄色
                '#FF6600', // 橙色
                '#8B00FF'  // 紫色
            ],
            particleCount: 80,
            glowIntensity: 20
        };

        // ============ Canvas 设置 ============
        const canvas = document.getElementById('clock');
        const ctx = canvas.getContext('2d');
        let width, height, centerX, centerY;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }
        
        resize();
        window.addEventListener('resize', resize);

        // ============ 工具函数 ============
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        function randomColor() {
            return CONFIG.neonColors[Math.floor(Math.random() * CONFIG.neonColors.length)];
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        // ============ 时钟参数 ============
        const clock = {
            radius: Math.min(width, height) * 0.35,
            color: '#00FFFF',
            secondColor: '#FF0080',
            minuteColor: '#00FF00',
            hourColor: '#FFFF00'
        };

        function updateClockSize() {
            clock.radius = Math.min(width, height) * 0.35;
        }
        window.addEventListener('resize', updateClockSize);

        // ============ 霓虹粒子类 ============
        class NeonParticle {
            constructor(x, y, color) {
                this.x = x || random(0, width);
                this.y = y || random(0, height);
                this.targetX = this.x;
                this.targetY = this.y;
                this.color = color || randomColor();
                this.size = random(1, 3);
                this.speedX = random(-1, 1);
                this.speedY = random(-1, 1);
                this.life = 1;
                this.mode = 'float'; // float, follow, explode
            }

            setTarget(x, y) {
                this.targetX = x;
                this.targetY = y;
                this.mode = 'follow';
            }

            explode(x, y) {
                this.x = x;
                this.y = y;
                const angle = random(0, Math.PI * 2);
                const speed = random(3, 10);
                this.speedX = Math.cos(angle) * speed;
                this.speedY = Math.sin(angle) * speed;
                this.mode = 'explode';
                this.life = 1;
            }

            update() {
                if (this.mode === 'float') {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    
                    if (this.x < 0 || this.x > width) this.speedX *= -1;
                    if (this.y < 0 || this.y > height) this.speedY *= -1;
                } else if (this.mode === 'follow') {
                    this.x = lerp(this.x, this.targetX, 0.05);
                    this.y = lerp(this.y, this.targetY, 0.05);
                    this.x += random(-2, 2);
                    this.y += random(-2, 2);
                } else if (this.mode === 'explode') {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.speedX *= 0.96;
                    this.speedY *= 0.96;
                    this.life -= 0.015;
                }
            }

            draw() {
                if (this.life <= 0) return;
                
                // 发光效果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * CONFIG.glowIntensity
                );
                gradient.addColorStop(0, hexToRgba(this.color, this.life * 0.8));
                gradient.addColorStop(0.3, hexToRgba(this.color, this.life * 0.3));
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * CONFIG.glowIntensity, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // 核心
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = hexToRgba(this.color, this.life);
                ctx.fill();
            }

            isDead() {
                return this.mode === 'explode' && this.life <= 0;
            }
        }

        // ============ 脉冲波类 ============
        class PulseWave {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.max(width, height);
                this.color = color;
                this.life = 1;
                this.speed = 8;
            }

            update() {
                this.radius += this.speed;
                this.life = 1 - (this.radius / this.maxRadius);
            }

            draw() {
                if (this.life <= 0) return;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = hexToRgba(this.color, this.life * 0.6);
                ctx.lineWidth = 3 * this.life;
                ctx.stroke();
                
                // 内部发光
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = hexToRgba(this.color, this.life * 0.3);
                ctx.lineWidth = 10 * this.life;
                ctx.stroke();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        // ============ 初始化粒子 ============
        const particles = [];
        const pulseWaves = [];

        for (let i = 0; i < CONFIG.particleCount; i++) {
            particles.push(new NeonParticle());
        }

        // ============ 鼠标交互 ============
        let mouseX = centerX;
        let mouseY = centerY;
        let isMouseMoving = false;

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            isMouseMoving = true;
            
            // 让部分粒子跟随鼠标
            particles.forEach((p, i) => {
                if (i < 20) {
                    p.setTarget(mouseX + random(-50, 50), mouseY + random(-50, 50));
                }
            });
        });

        canvas.addEventListener('mouseleave', () => {
            isMouseMoving = false;
            particles.forEach(p => {
                p.mode = 'float';
                p.speedX = random(-1, 1);
                p.speedY = random(-1, 1);
            });
        });

        canvas.addEventListener('click', (e) => {
            // 添加脉冲波
            pulseWaves.push(new PulseWave(e.clientX, e.clientY, randomColor()));
            pulseWaves.push(new PulseWave(e.clientX, e.clientY, randomColor()));
            
            // 产生爆炸粒子
            for (let i = 0; i < 30; i++) {
                const p = new NeonParticle();
                p.explode(e.clientX, e.clientY);
                particles.push(p);
            }
        });

        // ============ FPS 计算 ============
        let frameCount = 0;
        let lastFpsTime = performance.now();
        let fps = 60;

        function updateFPS() {
            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFpsTime = now;
                document.getElementById('fps').textContent = `FPS: ${fps}`;
            }
        }

        // ============ 绘制霓虹时钟 ============
        function drawNeonClock(time) {
            const now = new Date();
            const hours = now.getHours() % 12;
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const milliseconds = now.getMilliseconds();
            
            // 精确的角度计算
            const secondAngle = ((seconds + milliseconds / 1000) / 60) * Math.PI * 2 - Math.PI / 2;
            const minuteAngle = ((minutes + seconds / 60) / 60) * Math.PI * 2 - Math.PI / 2;
            const hourAngle = ((hours + minutes / 60) / 12) * Math.PI * 2 - Math.PI / 2;

            // 脉冲效果
            const pulse = Math.sin(time * 0.003) * 0.1 + 1;

            // 绘制外圈
            drawNeonCircle(centerX, centerY, clock.radius, clock.color, 3 * pulse);
            drawNeonCircle(centerX, centerY, clock.radius - 15, hexToRgba(clock.color, 0.3), 1);

            // 绘制刻度
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
                const innerR = clock.radius - 30;
                const outerR = clock.radius - 10;
                const x1 = centerX + Math.cos(angle) * innerR;
                const y1 = centerY + Math.sin(angle) * innerR;
                const x2 = centerX + Math.cos(angle) * outerR;
                const y2 = centerY + Math.sin(angle) * outerR;
                
                const color = i % 3 === 0 ? clock.hourColor : clock.color;
                drawNeonLine(x1, y1, x2, y2, color, 2);
            }

            // 小刻度
            for (let i = 0; i < 60; i++) {
                if (i % 5 !== 0) {
                    const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
                    const innerR = clock.radius - 20;
                    const outerR = clock.radius - 10;
                    const x1 = centerX + Math.cos(angle) * innerR;
                    const y1 = centerY + Math.sin(angle) * innerR;
                    const x2 = centerX + Math.cos(angle) * outerR;
                    const y2 = centerY + Math.sin(angle) * outerR;
                    
                    drawNeonLine(x1, y1, x2, y2, hexToRgba(clock.color, 0.5), 1);
                }
            }

            // 绘制指针
            drawNeonHand(hourAngle, clock.radius * 0.5, clock.hourColor, 6, 'hour');
            drawNeonHand(minuteAngle, clock.radius * 0.7, clock.minuteColor, 4, 'minute');
            drawNeonHand(secondAngle, clock.radius * 0.85, clock.secondColor, 2, 'second');

            // 中心点
            drawNeonCircle(centerX, centerY, 8, clock.secondColor, 1);
            drawNeonCircle(centerX, centerY, 4, '#FFFFFF', 1);

            // 数字时间显示
            drawDigitalTime(hours, minutes, seconds);
        }

        function drawNeonCircle(x, y, radius, color, lineWidth) {
            // 外发光
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.shadowColor = color;
            ctx.shadowBlur = 20;
            ctx.stroke();
            ctx.shadowBlur = 0;

            // 内发光
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.strokeStyle = hexToRgba(color.replace(/[^\d,]/g, '') || color, 0.5);
            ctx.lineWidth = lineWidth * 2;
            ctx.stroke();
        }

        function drawNeonLine(x1, y1, x2, y2, color, lineWidth) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.shadowColor = color;
            ctx.shadowBlur = 10;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function drawNeonHand(angle, length, color, width, type) {
            const endX = centerX + Math.cos(angle) * length;
            const endY = centerY + Math.sin(angle) * length;
            
            // 指针尾部
            const tailLength = length * 0.2;
            const tailX = centerX - Math.cos(angle) * tailLength;
            const tailY = centerY - Math.sin(angle) * tailLength;

            // 发光效果
            ctx.beginPath();
            ctx.moveTo(tailX, tailY);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.shadowColor = color;
            ctx.shadowBlur = 15;
            ctx.stroke();
            ctx.shadowBlur = 0;

            // 秒针尾部圆点
            if (type === 'second') {
                drawNeonCircle(endX, endY, 4, color, 1);
            }
        }

        function drawDigitalTime(hours, minutes, seconds) {
            const timeStr = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            ctx.font = 'bold 24px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            const y = centerY + clock.radius + 60;
            
            // 发光文字
            ctx.shadowColor = clock.color;
            ctx.shadowBlur = 20;
            ctx.fillStyle = clock.color;
            ctx.fillText(timeStr, centerX, y);
            ctx.shadowBlur = 0;
            
            // 日期
            const now = new Date();
            const dateStr = now.toLocaleDateString('zh-CN', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                weekday: 'long'
            });
            
            ctx.font = '14px "Courier New", monospace';
            ctx.fillStyle = hexToRgba(clock.color, 0.6);
            ctx.fillText(dateStr, centerX, y + 30);
        }

        // ============ 主动画循环 ============
        function animate(time) {
            // 清除画布
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 更新和绘制脉冲波
            for (let i = pulseWaves.length - 1; i >= 0; i--) {
                pulseWaves[i].update();
                pulseWaves[i].draw();
                if (pulseWaves[i].isDead()) {
                    pulseWaves.splice(i, 1);
                }
            }

            // 绘制霓虹时钟
            drawNeonClock(time);

            // 更新和绘制粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].isDead()) {
                    particles.splice(i, 1);
                }
            }

            // 限制粒子数量
            while (particles.length > 200) {
                particles.shift();
            }

            updateFPS();
            requestAnimationFrame(animate);
        }

        // 启动动画
        animate(0);

        // ============ 性能优化 ============
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // 页面隐藏时可以降低更新频率
            }
        });
    </script>
</body>
</html>
