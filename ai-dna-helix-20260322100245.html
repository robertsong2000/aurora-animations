<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA螺旋 | DNA Helix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a20 0%, #1a0a30 50%, #0a1a30 100%);
            font-family: 'Arial', sans-serif;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .title {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .title h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 
                0 0 20px rgba(0, 255, 200, 0.8),
                0 0 40px rgba(0, 200, 255, 0.6);
            letter-spacing: 0.3em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: rgba(0, 255, 200, 0.6);
            letter-spacing: 0.2em;
        }

        .instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(0, 255, 200, 0.8);
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            z-index: 10;
            background: rgba(0, 0, 20, 0.6);
            padding: 15px 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 200, 0.3);
        }

        .stats div {
            margin: 5px 0;
        }

        .legend {
            position: fixed;
            bottom: 80px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 20, 0.6);
            padding: 15px 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 200, 0.3);
        }

        .legend-title {
            color: rgba(0, 255, 200, 0.8);
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 8px 0;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px currentColor;
        }

        .legend-color.adenine { background: #ff6b6b; color: #ff6b6b; }
        .legend-color.thymine { background: #4ecdc4; color: #4ecdc4; }
        .legend-color.guanine { background: #ffe66d; color: #ffe66d; }
        .legend-color.cytosine { background: #a8e6cf; color: #a8e6cf; }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-btn {
            background: rgba(0, 0, 20, 0.6);
            border: 1px solid rgba(0, 255, 200, 0.3);
            color: rgba(0, 255, 200, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(0, 255, 200, 0.2);
            border-color: rgba(0, 255, 200, 0.6);
        }

        .control-btn.active {
            background: rgba(0, 255, 200, 0.3);
            border-color: rgba(0, 255, 200, 0.8);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="controls">
        <button class="control-btn" id="pauseBtn">暂停旋转</button>
        <button class="control-btn" id="speedBtn">快速模式</button>
    </div>
    
    <div class="title">
        <h1>DNA 螺旋</h1>
        <div class="subtitle">生命的密码</div>
    </div>
    
    <div class="legend">
        <div class="legend-title">碱基对</div>
        <div class="legend-item">
            <div class="legend-color adenine"></div>
            <span>A - 腺嘌呤</span>
        </div>
        <div class="legend-item">
            <div class="legend-color thymine"></div>
            <span>T - 胸腺嘧啶</span>
        </div>
        <div class="legend-item">
            <div class="legend-color guanine"></div>
            <span>G - 鸟嘌呤</span>
        </div>
        <div class="legend-item">
            <div class="legend-color cytosine"></div>
            <span>C - 胞嘧啶</span>
        </div>
    </div>
    
    <div class="instructions">
        移动鼠标旋转螺旋 · 点击高亮碱基对 · 滚轮调整螺旋紧密度
    </div>
    
    <div class="stats">
        <div>FPS: <span id="fps">60</span></div>
        <div>碱基对: <span id="basePairs">0</span></div>
        <div>紧密度: <span id="density">100</span>%</div>
    </div>

    <script>
        // 性能监控
        const fpsCounter = document.getElementById('fps');
        const basePairsCounter = document.getElementById('basePairs');
        const densityDisplay = document.getElementById('density');
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        let densityMultiplier = 1.0;
        let isPaused = false;
        let isFastMode = false;

        // Canvas 设置
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let centerX, centerY;

        // DNA参数
        const basePairs = [];
        const numBasePairs = 40;
        let mouseX = 0;
        let mouseY = 0;
        let rotationY = 0;
        let targetRotationX = 0;
        let targetRotationY = 0;
        let rotationX = 0;
        let time = 0;
        let highlightedPair = -1;

        // 碱基对类型和颜色
        const basePairTypes = [
            { name: 'AT', color1: '#ff6b6b', color2: '#4ecdc4', name1: 'A', name2: 'T' },
            { name: 'TA', color1: '#4ecdc4', color2: '#ff6b6b', name1: 'T', name2: 'A' },
            { name: 'GC', color1: '#ffe66d', color2: '#a8e6cf', name1: 'G', name2: 'C' },
            { name: 'CG', color1: '#a8e6cf', color2: '#ffe66d', name1: 'C', name2: 'G' }
        ];

        // 响应式调整
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        // 碱基对类
        class BasePair {
            constructor(index) {
                this.index = index;
                this.type = basePairTypes[Math.floor(Math.random() * basePairTypes.length)];
                this.yOffset = (index - numBasePairs / 2) * 25 * densityMultiplier;
                this.angle = (index / numBasePairs) * Math.PI * 4;
                this.radius = 100;
                this.size = 15;
                this.bondLength = 60;
                this.highlighted = false;
                this.pulsePhase = Math.random() * Math.PI * 2;
            }

            update() {
                this.pulsePhase += 0.05;
                this.yOffset = (this.index - numBasePairs / 2) * 25 * densityMultiplier;
            }

            project(x, y, z) {
                // 应用旋转
                const cosX = Math.cos(rotationX);
                const sinX = Math.sin(rotationX);
                const cosY = Math.cos(rotationY);
                const sinY = Math.sin(rotationY);
                
                // 绕Y轴旋转
                let x1 = x * cosY - z * sinY;
                let z1 = x * sinY + z * cosY;
                
                // 绕X轴旋转
                let y1 = y * cosX - z1 * sinX;
                let z2 = y * sinX + z1 * cosX;
                
                // 透视投影
                const perspective = 800;
                const scale = perspective / (perspective + z2);
                
                return {
                    x: centerX + x1 * scale,
                    y: centerY + y1 * scale,
                    scale: scale,
                    z: z2
                };
            }

            draw() {
                const angle = this.angle + rotationY;
                
                // 计算两个碱基的位置
                const x1 = Math.cos(angle) * this.radius;
                const z1 = Math.sin(angle) * this.radius;
                const x2 = Math.cos(angle + Math.PI) * this.radius;
                const z2 = Math.sin(angle + Math.PI) * this.radius;
                
                const base1 = this.project(x1, this.yOffset, z1);
                const base2 = this.project(x2, this.yOffset, z2);
                
                // 绘制氢键（连接线）
                const bondAlpha = Math.min(base1.scale, base2.scale) * 0.5;
                ctx.save();
                ctx.strokeStyle = `rgba(200, 200, 255, ${bondAlpha})`;
                ctx.lineWidth = 2 * Math.min(base1.scale, base2.scale);
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(base1.x, base1.y);
                ctx.lineTo(base2.x, base2.y);
                ctx.stroke();
                ctx.restore();
                
                // 绘制碱基1
                this.drawBase(base1, this.type.color1, this.type.name1, 1);
                
                // 绘制碱基2
                this.drawBase(base2, this.type.color2, this.type.name2, -1);
                
                // 绘制骨架（糖-磷酸骨架）
                if (this.index < numBasePairs - 1) {
                    this.drawBackbone(angle, 1);
                    this.drawBackbone(angle, -1);
                }
            }

            drawBase(pos, color, label, side) {
                const pulse = this.highlighted ? (Math.sin(this.pulsePhase) + 1) / 2 * 0.5 + 0.5 : 0.3;
                const size = this.size * pos.scale * (this.highlighted ? 1.3 : 1);
                
                ctx.save();
                
                // 发光效果
                ctx.shadowBlur = this.highlighted ? 30 : 15;
                ctx.shadowColor = color;
                
                // 绘制碱基球
                const gradient = ctx.createRadialGradient(
                    pos.x - size * 0.3, pos.y - size * 0.3, 0,
                    pos.x, pos.y, size
                );
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                gradient.addColorStop(0.5, color);
                gradient.addColorStop(1, color);
                
                ctx.fillStyle = gradient;
                ctx.globalAlpha = pos.scale * (this.highlighted ? 1 : 0.8);
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
                ctx.fill();
                
                // 绘制标签
                if (pos.scale > 0.6) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                    ctx.font = `bold ${size}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(label, pos.x, pos.y);
                }
                
                ctx.restore();
            }

            drawBackbone(angle, side) {
                const nextIndex = this.index + 1;
                const nextAngle = (nextIndex / numBasePairs) * Math.PI * 4 + rotationY;
                
                const x1 = Math.cos(angle + side * Math.PI / 2) * this.radius;
                const z1 = Math.sin(angle + side * Math.PI / 2) * this.radius;
                const y1 = this.yOffset;
                
                const x2 = Math.cos(nextAngle + side * Math.PI / 2) * this.radius;
                const z2 = Math.sin(nextAngle + side * Math.PI / 2) * this.radius;
                const y2 = (nextIndex - numBasePairs / 2) * 25 * densityMultiplier;
                
                const pos1 = this.project(x1, y1, z1);
                const pos2 = this.project(x2, y2, z2);
                
                const alpha = Math.min(pos1.scale, pos2.scale) * 0.6;
                
                ctx.save();
                ctx.strokeStyle = `rgba(150, 150, 200, ${alpha})`;
                ctx.lineWidth = 3 * Math.min(pos1.scale, pos2.scale);
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(pos1.x, pos1.y);
                ctx.lineTo(pos2.x, pos2.y);
                ctx.stroke();
                ctx.restore();
            }

            containsPoint(x, y) {
                const angle = this.angle + rotationY;
                const x1 = Math.cos(angle) * this.radius;
                const z1 = Math.sin(angle) * this.radius;
                const x2 = Math.cos(angle + Math.PI) * this.radius;
                const z2 = Math.sin(angle + Math.PI) * this.radius;
                
                const base1 = this.project(x1, this.yOffset, z1);
                const base2 = this.project(x2, this.yOffset, z2);
                
                const dist1 = Math.sqrt((x - base1.x) ** 2 + (y - base1.y) ** 2);
                const dist2 = Math.sqrt((x - base2.x) ** 2 + (y - base2.y) ** 2);
                
                return dist1 < this.size * 2 || dist2 < this.size * 2;
            }
        }

        // 初始化DNA
        function initDNA() {
            basePairs.length = 0;
            
            for (let i = 0; i < numBasePairs; i++) {
                basePairs.push(new BasePair(i));
            }
            
            basePairsCounter.textContent = basePairs.length;
        }

        // 动画循环
        function animate(currentTime) {
            // FPS 计算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                fpsCounter.textContent = fps;
            }

            if (!isPaused) {
                time += 0.01;
                const speed = isFastMode ? 0.03 : 0.01;
                rotationY += speed;
            }

            // 平滑旋转
            rotationX += (targetRotationX - rotationX) * 0.05;

            // 清空画布
            ctx.fillStyle = 'rgba(10, 10, 30, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 按Z轴排序（从后到前绘制）
            const sortedPairs = [...basePairs].sort((a, b) => {
                const angleA = a.angle + rotationY;
                const angleB = b.angle + rotationY;
                const zA = Math.sin(angleA) * a.radius;
                const zB = Math.sin(angleB) * b.radius;
                return zA - zB;
            });

            // 更新和绘制碱基对
            sortedPairs.forEach(pair => {
                pair.update();
                pair.draw();
            });

            requestAnimationFrame(animate);
        }

        // 事件监听
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // 鼠标位置影响X轴旋转
            targetRotationX = ((mouseY - centerY) / height) * 0.5;
        });

        canvas.addEventListener('click', (e) => {
            const clickX = e.clientX;
            const clickY = e.clientY;
            
            // 检查点击了哪个碱基对
            let found = false;
            basePairs.forEach((pair, index) => {
                if (pair.containsPoint(clickX, clickY)) {
                    pair.highlighted = !pair.highlighted;
                    found = true;
                }
            });
            
            // 如果没有点击任何碱基对，取消所有高亮
            if (!found) {
                basePairs.forEach(pair => pair.highlighted = false);
            }
        });

        // 滚轮调整紧密度
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            densityMultiplier = Math.max(0.5, Math.min(2.0, densityMultiplier - e.deltaY * 0.001));
            densityDisplay.textContent = Math.round(densityMultiplier * 100);
        });

        // 按钮控制
        document.getElementById('pauseBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            isPaused = !isPaused;
            e.target.textContent = isPaused ? '继续旋转' : '暂停旋转';
            e.target.classList.toggle('active', isPaused);
        });

        document.getElementById('speedBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            isFastMode = !isFastMode;
            e.target.textContent = isFastMode ? '正常速度' : '快速模式';
            e.target.classList.toggle('active', isFastMode);
        });

        // 触摸支持
        let lastTouchX = 0;
        let lastTouchY = 0;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const deltaX = touch.clientX - lastTouchX;
            const deltaY = touch.clientY - lastTouchY;
            
            if (!isPaused) {
                rotationY += deltaX * 0.01;
            }
            targetRotationX += deltaY * 0.005;
            
            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (e.changedTouches.length === 1) {
                const touch = e.changedTouches[0];
                const deltaX = Math.abs(touch.clientX - lastTouchX);
                const deltaY = Math.abs(touch.clientY - lastTouchY);
                
                if (deltaX < 10 && deltaY < 10) {
                    // 触摸点击
                    const touchX = touch.clientX;
                    const touchY = touch.clientY;
                    
                    let found = false;
                    basePairs.forEach(pair => {
                        if (pair.containsPoint(touchX, touchY)) {
                            pair.highlighted = !pair.highlighted;
                            found = true;
                        }
                    });
                    
                    if (!found) {
                        basePairs.forEach(pair => pair.highlighted = false);
                    }
                }
            }
        });

        // 初始化
        resize();
        initDNA();
        
        // 开始动画
        requestAnimationFrame(animate);
    </script>
</body>
</html>
