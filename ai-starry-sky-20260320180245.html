<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空效果 | Starry Sky</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(100, 150, 255, 0.5);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.15);
            font-size: 48px;
            font-weight: 100;
            letter-spacing: 20px;
            pointer-events: none;
            z-index: 10;
            text-transform: uppercase;
        }
        
        .fps {
            position: fixed;
            top: 10px;
            right: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-family: monospace;
            z-index: 10;
        }
        
        .stats {
            position: fixed;
            top: 10px;
            left: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-family: monospace;
            z-index: 10;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <canvas id="starry"></canvas>
    <div class="title">Starry Sky</div>
    <div class="stats" id="stats">星星: 0<br>流星: 0</div>
    <div class="info">移动鼠标产生流星 | 点击创建星座连线</div>
    <div class="fps" id="fps"></div>
    
    <script>
        const canvas = document.getElementById('starry');
        const ctx = canvas.getContext('2d');
        const fpsDisplay = document.getElementById('fps');
        const statsDisplay = document.getElementById('stats');
        
        let width, height;
        let stars = [];
        let shootingStars = [];
        let constellations = [];
        let constellationPoints = [];
        let nebulae = [];
        let mouseX = 0, mouseY = 0;
        let lastMouseX = 0, lastMouseY = 0;
        let time = 0;
        
        // FPS 计算
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        // 星星类
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.brightness = Math.random();
                this.twinkleSpeed = Math.random() * 0.05 + 0.02;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.color = this.getStarColor();
            }
            
            getStarColor() {
                const types = [
                    { r: 255, g: 255, b: 255 },   // 白色
                    { r: 255, g: 240, b: 220 },   // 暖白
                    { r: 200, g: 220, b: 255 },   // 蓝白
                    { r: 255, g: 220, b: 180 },   // 黄色
                    { r: 255, g: 200, b: 200 }    // 红色
                ];
                return types[Math.floor(Math.random() * types.length)];
            }
            
            update() {
                this.twinklePhase += this.twinkleSpeed;
            }
            
            draw() {
                const twinkle = Math.sin(this.twinklePhase) * 0.3 + 0.7;
                const alpha = this.brightness * twinkle;
                
                // 发光效果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 4
                );
                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`);
                gradient.addColorStop(0.3, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 核心亮点
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * twinkle, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                ctx.fill();
            }
        }
        
        // 流星类
        class ShootingStar {
            constructor(x, y, angle) {
                this.x = x;
                this.y = y;
                this.angle = angle;
                this.speed = 15 + Math.random() * 10;
                this.length = 80 + Math.random() * 60;
                this.life = 1;
                this.decay = 0.02;
                this.trail = [];
            }
            
            update() {
                // 保存轨迹
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 20) {
                    this.trail.shift();
                }
                
                // 移动
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                
                this.life -= this.decay;
                
                return this.life > 0 && this.x < width + 100 && this.y < height + 100;
            }
            
            draw() {
                // 绘制轨迹
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = (i / this.trail.length) * this.life * 0.5;
                    const size = (i / this.trail.length) * 3;
                    
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x, this.trail[i].y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.fill();
                }
                
                // 绘制流星头部
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, 10
                );
                gradient.addColorStop(0, `rgba(255, 255, 255, ${this.life})`);
                gradient.addColorStop(0.5, `rgba(200, 220, 255, ${this.life * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, 10, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 尾巴
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(
                    this.x - Math.cos(this.angle) * this.length,
                    this.y - Math.sin(this.angle) * this.length
                );
                
                const tailGradient = ctx.createLinearGradient(
                    this.x, this.y,
                    this.x - Math.cos(this.angle) * this.length,
                    this.y - Math.sin(this.angle) * this.length
                );
                tailGradient.addColorStop(0, `rgba(255, 255, 255, ${this.life * 0.8})`);
                tailGradient.addColorStop(1, 'transparent');
                
                ctx.strokeStyle = tailGradient;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
        
        // 星云类
        class Nebula {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.6;
                this.radius = 100 + Math.random() * 150;
                this.color = this.getNebulaColor();
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.001;
            }
            
            getNebulaColor() {
                const colors = [
                    { r: 100, g: 150, b: 255 },   // 蓝色
                    { r: 255, g: 150, b: 200 },   // 粉色
                    { r: 150, g: 100, b: 255 },   // 紫色
                    { r: 255, g: 200, b: 150 }    // 橙色
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            draw() {
                this.rotation += this.rotationSpeed;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // 绘制多层星云
                for (let i = 0; i < 3; i++) {
                    const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius * (1 - i * 0.2));
                    gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.05)`);
                    gradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.02)`);
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.radius * (1 - i * 0.2), this.radius * 0.6 * (1 - i * 0.2), 0, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }
        
        // 初始化星星
        function initStars() {
            stars = [];
            const starCount = 300;
            
            for (let i = 0; i < starCount; i++) {
                stars.push(new Star());
            }
        }
        
        // 初始化星云
        function initNebulae() {
            nebulae = [];
            for (let i = 0; i < 5; i++) {
                nebulae.push(new Nebula());
            }
        }
        
        // 绘制银河
        function drawMilkyWay() {
            const gradient = ctx.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, 'transparent');
            gradient.addColorStop(0.3, 'rgba(150, 180, 255, 0.03)');
            gradient.addColorStop(0.5, 'rgba(200, 220, 255, 0.05)');
            gradient.addColorStop(0.7, 'rgba(150, 180, 255, 0.03)');
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        // 绘制星座连线
        function drawConstellations() {
            if (constellationPoints.length < 2) return;
            
            ctx.strokeStyle = 'rgba(100, 150, 255, 0.4)';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            
            ctx.beginPath();
            ctx.moveTo(constellationPoints[0].x, constellationPoints[0].y);
            
            for (let i = 1; i < constellationPoints.length; i++) {
                ctx.lineTo(constellationPoints[i].x, constellationPoints[i].y);
            }
            
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 绘制星座点
            constellationPoints.forEach(point => {
                ctx.beginPath();
                ctx.arc(point.x, point.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(100, 200, 255, 0.8)';
                ctx.fill();
                
                // 发光
                const gradient = ctx.createRadialGradient(point.x, point.y, 0, point.x, point.y, 15);
                gradient.addColorStop(0, 'rgba(100, 200, 255, 0.5)');
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(point.x, point.y, 15, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            });
        }
        
        // 创建流星
        function createShootingStar() {
            const angle = Math.PI / 4 + (Math.random() - 0.5) * 0.5;
            const startX = Math.random() * width * 0.5;
            const startY = Math.random() * height * 0.3;
            
            shootingStars.push(new ShootingStar(startX, startY, angle));
        }
        
        // 主渲染循环
        function render() {
            // 绘制背景
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(0.5, '#0d0d20');
            gradient.addColorStop(1, '#050510');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // 绘制银河
            drawMilkyWay();
            
            // 绘制星云
            nebulae.forEach(nebula => nebula.draw());
            
            // 更新和绘制星星
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            
            // 绘制星座
            drawConstellations();
            
            // 更新和绘制流星
            shootingStars = shootingStars.filter(star => {
                const alive = star.update();
                if (alive) star.draw();
                return alive;
            });
            
            // 鼠标移动产生流星
            const mouseSpeed = Math.sqrt(
                Math.pow(mouseX - lastMouseX, 2) + 
                Math.pow(mouseY - lastMouseY, 2)
            );
            
            if (mouseSpeed > 50 && Math.random() > 0.8) {
                createShootingStar();
            }
            
            lastMouseX = mouseX;
            lastMouseY = mouseY;
            
            // 随机流星
            if (Math.random() > 0.995) {
                createShootingStar();
            }
            
            // 更新统计
            statsDisplay.innerHTML = `星星: ${stars.length}<br>流星: ${shootingStars.length}`;
            
            time++;
            
            // FPS 计算
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                fpsDisplay.textContent = `FPS: ${fps}`;
            }
            
            requestAnimationFrame(render);
        }
        
        // 调整画布大小
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        // 事件监听
        window.addEventListener('resize', () => {
            resize();
            initStars();
            initNebulae();
        });
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        });
        
        // 点击创建星座点
        canvas.addEventListener('click', (e) => {
            constellationPoints.push({ x: e.clientX, y: e.clientY });
            
            // 限制星座点数量
            if (constellationPoints.length > 10) {
                constellationPoints.shift();
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                constellationPoints.push({ 
                    x: e.touches[0].clientX, 
                    y: e.touches[0].clientY 
                });
                
                if (constellationPoints.length > 10) {
                    constellationPoints.shift();
                }
            }
        });
        
        // 双击清除星座
        canvas.addEventListener('dblclick', () => {
            constellationPoints = [];
        });
        
        // 初始化
        resize();
        initStars();
        initNebulae();
        mouseX = width / 2;
        mouseY = height / 2;
        lastMouseX = mouseX;
        lastMouseY = mouseY;
        render();
    </script>
</body>
</html>
