<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空效果 | Starry Sky</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 8px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            animation: twinkle 3s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
        
        .controls {
            position: fixed;
            top: 100px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        
        .control-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
        }
        
        .control-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transform: translateX(-5px);
        }
        
        .control-btn.active {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }
        
        .stats {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
            line-height: 1.6;
            backdrop-filter: blur(5px);
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="title">STARRY SKY</div>
    
    <div class="controls">
        <button class="control-btn active" id="normalBtn">普通</button>
        <button class="control-btn" id="shootingBtn">流星雨</button>
        <button class="control-btn" id="nebulaBtn">星云</button>
        <button class="control-btn" id="auroraBtn">极光</button>
    </div>
    
    <div class="stats" id="stats"></div>
    <canvas id="sky"></canvas>
    <div class="info">点击创建流星 · 移动鼠标旋转星空 · 滚轮调整星星密度</div>
    
    <script>
        const canvas = document.getElementById('sky');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        // Performance constants
        const TWO_PI = Math.PI * 2;
        
        // Sky parameters
        let stars = [];
        let shootingStars = [];
        let nebulae = [];
        let auroras = [];
        let mouseX = width / 2;
        let mouseY = height / 2;
        let rotationX = 0;
        let rotationY = 0;
        let mode = 'normal';
        let starCount = 500;
        
        // Star class
        class Star {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.z = Math.random() * 1000;
                this.size = Math.random() * 2;
                this.brightness = Math.random();
                this.twinkleSpeed = Math.random() * 0.05 + 0.02;
                this.twinklePhase = Math.random() * TWO_PI;
                this.color = this.getRandomColor();
            }
            
            getRandomColor() {
                const colors = [
                    '#FFFFFF', // White
                    '#FFE4B5', // Light yellow
                    '#ADD8E6', // Light blue
                    '#FFB6C1', // Light pink
                    '#98FB98'  // Pale green
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update(time, rotationX, rotationY) {
                // Twinkle
                this.brightness = 0.5 + Math.sin(time * this.twinkleSpeed + this.twinklePhase) * 0.5;
                
                // Parallax effect based on rotation
                const parallaxX = rotationX * this.z * 0.0001;
                const parallaxY = rotationY * this.z * 0.0001;
                
                this.screenX = this.x + parallaxX;
                this.screenY = this.y + parallaxY;
                
                // Wrap around
                if (this.screenX < 0) this.screenX += width;
                if (this.screenX > width) this.screenX -= width;
                if (this.screenY < 0) this.screenY += height;
                if (this.screenY > height) this.screenY -= height;
            }
            
            draw(ctx) {
                const size = this.size * (1 - this.z / 1000) * 2;
                
                ctx.save();
                ctx.globalAlpha = this.brightness;
                
                // Glow
                ctx.beginPath();
                ctx.arc(this.screenX, this.screenY, size * 2, 0, TWO_PI);
                const gradient = ctx.createRadialGradient(
                    this.screenX, this.screenY, 0,
                    this.screenX, this.screenY, size * 2
                );
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // Star point
                ctx.beginPath();
                ctx.arc(this.screenX, this.screenY, size, 0, TWO_PI);
                ctx.fillStyle = this.color;
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // Shooting star class
        class ShootingStar {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height * 0.3;
                this.length = Math.random() * 80 + 40;
                this.speed = Math.random() * 15 + 10;
                this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.5;
                this.opacity = 1;
                this.trail = [];
            }
            
            update() {
                this.trail.push({ x: this.x, y: this.y, opacity: this.opacity });
                if (this.trail.length > 20) {
                    this.trail.shift();
                }
                
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.opacity -= 0.02;
                
                return this.opacity > 0 && this.x < width && this.y < height;
            }
            
            draw(ctx) {
                // Draw trail
                this.trail.forEach((point, i) => {
                    const trailOpacity = (i / this.trail.length) * point.opacity * 0.5;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, 2, 0, TWO_PI);
                    ctx.fillStyle = `rgba(255, 255, 255, ${trailOpacity})`;
                    ctx.fill();
                });
                
                // Draw head
                const gradient = ctx.createLinearGradient(
                    this.x, this.y,
                    this.x - Math.cos(this.angle) * this.length,
                    this.y - Math.sin(this.angle) * this.length
                );
                gradient.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(
                    this.x - Math.cos(this.angle) * this.length,
                    this.y - Math.sin(this.angle) * this.length
                );
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
        
        // Nebula class
        class Nebula {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 200 + 100;
                this.rotation = Math.random() * TWO_PI;
                this.rotationSpeed = (Math.random() - 0.5) * 0.001;
                this.color = this.getRandomNebulaColor();
                this.opacity = Math.random() * 0.2 + 0.1;
            }
            
            getRandomNebulaColor() {
                const colors = [
                    'rgba(138, 43, 226, ',  // Blue Violet
                    'rgba(75, 0, 130, ',    // Indigo
                    'rgba(255, 20, 147, ',  // Deep Pink
                    'rgba(0, 191, 255, ',   // Deep Sky Blue
                    'rgba(255, 69, 0, '     // Orange Red
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                this.rotation += this.rotationSpeed;
            }
            
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                gradient.addColorStop(0, this.color + (this.opacity * 0.8) + ')');
                gradient.addColorStop(0.5, this.color + (this.opacity * 0.4) + ')');
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, TWO_PI);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // Aurora class
        class Aurora {
            constructor() {
                this.points = [];
                for (let i = 0; i < 100; i++) {
                    this.points.push({
                        x: (i / 100) * width,
                        y: Math.random() * height * 0.3,
                        baseY: Math.random() * height * 0.3,
                        speed: Math.random() * 0.01 + 0.005
                    });
                }
                this.color = 'rgba(0, 255, 127, ';
            }
            
            update(time) {
                this.points.forEach((point, i) => {
                    point.y = point.baseY + Math.sin(time * point.speed + i * 0.1) * 50;
                });
            }
            
            draw(ctx, opacity) {
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                
                for (let i = 1; i < this.points.length; i++) {
                    const xc = (this.points[i].x + this.points[i - 1].x) / 2;
                    const yc = (this.points[i].y + this.points[i - 1].y) / 2;
                    ctx.quadraticCurveTo(this.points[i - 1].x, this.points[i - 1].y, xc, yc);
                }
                
                ctx.lineTo(width, height);
                ctx.lineTo(0, height);
                ctx.closePath();
                
                const gradient = ctx.createLinearGradient(0, 0, 0, height * 0.5);
                gradient.addColorStop(0, this.color + (opacity * 0.5) + ')');
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        // Initialize sky
        function initSky() {
            stars = [];
            for (let i = 0; i < starCount; i++) {
                stars.push(new Star());
            }
            
            nebulae = [];
            for (let i = 0; i < 5; i++) {
                nebulae.push(new Nebula());
            }
            
            auroras = [];
            for (let i = 0; i < 3; i++) {
                auroras.push(new Aurora());
            }
        }
        
        initSky();
        
        // Event listeners
        canvas.addEventListener('click', (e) => {
            // Create shooting star
            shootingStars.push(new ShootingStar(e.clientX, e.clientY));
        });
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // Calculate rotation based on mouse position
            rotationX = (mouseX - width / 2) / width * 100;
            rotationY = (mouseY - height / 2) / height * 100;
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            starCount = Math.max(100, Math.min(2000, starCount + Math.sign(e.deltaY) * -50));
            initSky();
        }, { passive: false });
        
        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            shootingStars.push(new ShootingStar(touch.clientX, touch.clientY));
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            rotationX = (mouseX - width / 2) / width * 100;
            rotationY = (mouseY - height / 2) / height * 100;
        }, { passive: false });
        
        // Mode buttons
        const normalBtn = document.getElementById('normalBtn');
        const shootingBtn = document.getElementById('shootingBtn');
        const nebulaBtn = document.getElementById('nebulaBtn');
        const auroraBtn = document.getElementById('auroraBtn');
        
        function setMode(newMode) {
            mode = newMode;
            normalBtn.classList.toggle('active', newMode === 'normal');
            shootingBtn.classList.toggle('active', newMode === 'shooting');
            nebulaBtn.classList.toggle('active', newMode === 'nebula');
            auroraBtn.classList.toggle('active', newMode === 'aurora');
        }
        
        normalBtn.addEventListener('click', () => setMode('normal'));
        shootingBtn.addEventListener('click', () => setMode('shooting'));
        nebulaBtn.addEventListener('click', () => setMode('nebula'));
        auroraBtn.addEventListener('click', () => setMode('aurora'));
        
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initSky();
        });
        
        // Main animation loop
        let time = 0;
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        function animate(currentTime) {
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            
            frameCount++;
            if (frameCount % 30 === 0) {
                fps = Math.round(1000 / deltaTime);
            }
            
            // Clear
            ctx.fillStyle = 'rgba(9, 10, 15, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            // Draw nebulae
            if (mode === 'nebula') {
                nebulae.forEach(nebula => {
                    nebula.update();
                    nebula.draw(ctx);
                });
            }
            
            // Draw auroras
            if (mode === 'aurora') {
                auroras.forEach(aurora => {
                    aurora.update(time);
                    aurora.draw(ctx, 0.3);
                });
            }
            
            // Update and draw stars
            stars.forEach(star => {
                star.update(time, rotationX, rotationY);
                star.draw(ctx);
            });
            
            // Auto shooting stars in shooting mode
            if (mode === 'shooting' && Math.random() > 0.98) {
                shootingStars.push(new ShootingStar());
            }
            
            // Update and draw shooting stars
            shootingStars = shootingStars.filter(star => {
                star.draw(ctx);
                return star.update();
            });
            
            // Update stats
            statsEl.innerHTML = `
                FPS: ${fps}<br>
                Stars: ${stars.length}<br>
                Shooting Stars: ${shootingStars.length}<br>
                Mode: ${mode.toUpperCase()}
            `;
            
            time += deltaTime;
            requestAnimationFrame(animate);
        }
        
        // Start animation
        requestAnimationFrame(animate);
    </script>
</body>
</html>
