<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极光效果 - Aurora Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(180deg, #0a0015 0%, #1a0a2e 50%, #0d0d1a 100%);
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(150, 255, 200, 0.8);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 15px rgba(100, 255, 150, 0.6);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 255, 220, 0.9);
            font-size: 36px;
            font-weight: bold;
            z-index: 100;
            text-shadow: 0 0 30px rgba(100, 255, 150, 0.8), 0 0 60px rgba(150, 100, 255, 0.6);
            letter-spacing: 8px;
            animation: glow 3s infinite alternate;
        }
        
        @keyframes glow {
            0% { 
                opacity: 0.8;
                text-shadow: 0 0 30px rgba(100, 255, 150, 0.8), 0 0 60px rgba(150, 100, 255, 0.6);
            }
            100% { 
                opacity: 1;
                text-shadow: 0 0 40px rgba(100, 255, 150, 1), 0 0 80px rgba(150, 100, 255, 0.8);
            }
        }
        
        .fps {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(150, 255, 200, 0.6);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
        
        @media (max-width: 768px) {
            .info {
                font-size: 11px;
                bottom: 10px;
                left: 10px;
            }
            .title {
                font-size: 24px;
                top: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="title">✨ AURORA</div>
    <canvas id="aurora"></canvas>
    <div class="info">
        <div>🖱️ 移动鼠标 - 扭曲极光</div>
        <div>👆 点击 - 添加光点</div>
    </div>
    <div class="fps" id="fps">FPS: 60</div>
    
    <script>
        // 性能监控
        const fpsElement = document.getElementById('fps');
        let lastTime = performance.now();
        let frameCount = 0;
        
        // Canvas 设置
        const canvas = document.getElementById('aurora');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        
        // 极光层配置
        const AURORA_LAYERS = 5;
        let auroras = [];
        
        // 光点系统
        let lightPoints = [];
        const MAX_LIGHT_POINTS = 100;
        
        // 星星背景
        let stars = [];
        const STAR_COUNT = 200;
        
        // 极光颜色配置
        const AURORA_COLORS = [
            { r: 100, g: 255, b: 150 },   // 绿色
            { r: 150, g: 100, b: 255 },   // 紫色
            { r: 100, g: 200, b: 255 },   // 蓝色
            { r: 255, g: 150, b: 200 },   // 粉色
            { r: 200, g: 255, b: 100 },   // 黄绿
        ];
        
        // 响应式调整
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initAuroras();
            initStars();
        }
        
        // 简化的噪声函数（Perlin-like）
        function noise(x, y, time) {
            const sin1 = Math.sin(x * 0.01 + time);
            const sin2 = Math.sin(y * 0.01 + time * 0.7);
            const sin3 = Math.sin((x + y) * 0.005 + time * 1.3);
            return (sin1 + sin2 + sin3) / 3;
        }
        
        // 初始化极光层
        function initAuroras() {
            auroras = [];
            for (let i = 0; i < AURORA_LAYERS; i++) {
                auroras.push({
                    y: height * (0.2 + i * 0.1), // 垂直位置
                    amplitude: 50 + i * 20,       // 波动幅度
                    frequency: 0.005 - i * 0.001, // 频率
                    speed: 0.5 + i * 0.2,         // 速度
                    phase: Math.random() * Math.PI * 2,
                    color: AURORA_COLORS[i % AURORA_COLORS.length],
                    alpha: 0.3 - i * 0.05,        // 透明度
                    width: width,
                });
            }
        }
        
        // 初始化星星
        function initStars() {
            stars = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height * 0.6, // 只在上半部分
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.5 + 0.5,
                    twinkleSpeed: Math.random() * 0.02 + 0.01,
                    twinklePhase: Math.random() * Math.PI * 2,
                });
            }
        }
        
        // 创建光点
        function createLightPoint(x, y) {
            if (lightPoints.length >= MAX_LIGHT_POINTS) {
                lightPoints.shift();
            }
            
            lightPoints.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 2,
                vy: -Math.random() * 3 - 1,
                size: Math.random() * 10 + 5,
                alpha: 1,
                decay: Math.random() * 0.01 + 0.005,
                color: AURORA_COLORS[Math.floor(Math.random() * AURORA_COLORS.length)],
            });
        }
        
        // 绘制星星
        function drawStars(time) {
            stars.forEach(star => {
                const twinkle = Math.sin(time * star.twinkleSpeed * 60 + star.twinklePhase);
                const alpha = star.alpha * (0.7 + twinkle * 0.3);
                
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        // 绘制极光层
        function drawAurora(aurora, time) {
            const points = [];
            const segments = 100;
            
            // 生成极光曲线点
            for (let i = 0; i <= segments; i++) {
                const x = (i / segments) * width;
                const baseY = aurora.y;
                
                // 多重波动叠加
                let wave = 0;
                wave += Math.sin(x * aurora.frequency + time * aurora.speed + aurora.phase) * aurora.amplitude;
                wave += Math.sin(x * aurora.frequency * 2 + time * aurora.speed * 1.5) * aurora.amplitude * 0.5;
                wave += noise(x, baseY, time) * aurora.amplitude * 0.3;
                
                // 鼠标影响
                const dx = x - mouseX;
                const dy = baseY - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 200) {
                    const influence = (200 - dist) / 200;
                    wave += Math.sin(time * 3) * influence * 80;
                }
                
                points.push({ x, y: baseY + wave });
            }
            
            // 绘制极光
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            
            // 创建渐变
            const gradient = ctx.createLinearGradient(0, aurora.y - aurora.amplitude * 2, 0, aurora.y + aurora.amplitude * 2);
            gradient.addColorStop(0, `rgba(${aurora.color.r}, ${aurora.color.g}, ${aurora.color.b}, 0)`);
            gradient.addColorStop(0.5, `rgba(${aurora.color.r}, ${aurora.color.g}, ${aurora.color.b}, ${aurora.alpha})`);
            gradient.addColorStop(1, `rgba(${aurora.color.r}, ${aurora.color.g}, ${aurora.color.b}, 0)`);
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            
            // 绘制平滑曲线
            for (let i = 1; i < points.length - 1; i++) {
                const xc = (points[i].x + points[i + 1].x) / 2;
                const yc = (points[i].y + points[i + 1].y) / 2;
                ctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
            }
            
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.closePath();
            ctx.fill();
            
            // 添加光晕效果
            ctx.shadowBlur = 30;
            ctx.shadowColor = `rgba(${aurora.color.r}, ${aurora.color.g}, ${aurora.color.b}, 0.5)`;
            ctx.fill();
            
            ctx.restore();
        }
        
        // 绘制光点
        function drawLightPoints() {
            lightPoints = lightPoints.filter(point => {
                if (point.alpha <= 0) return false;
                
                // 更新位置
                point.x += point.vx;
                point.y += point.vy;
                point.alpha -= point.decay;
                point.size *= 0.98;
                
                // 绘制光点
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                
                const gradient = ctx.createRadialGradient(
                    point.x, point.y, 0,
                    point.x, point.y, point.size
                );
                gradient.addColorStop(0, `rgba(${point.color.r}, ${point.color.g}, ${point.color.b}, ${point.alpha})`);
                gradient.addColorStop(1, `rgba(${point.color.r}, ${point.color.g}, ${point.color.b}, 0)`);
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(point.x, point.y, point.size, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
                return true;
            });
        }
        
        // 主动画循环
        function animate(currentTime) {
            const time = currentTime * 0.001;
            
            // 清除画布（半透明，产生拖尾）
            ctx.fillStyle = 'rgba(10, 0, 21, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制星星
            drawStars(time);
            
            // 绘制极光层（从后到前）
            for (let i = auroras.length - 1; i >= 0; i--) {
                drawAurora(auroras[i], time);
            }
            
            // 绘制光点
            drawLightPoints();
            
            // FPS 计算
            frameCount++;
            if (frameCount >= 30) {
                const fps = Math.round(30 / ((currentTime - lastTime) / 1000 * 30));
                fpsElement.textContent = `FPS: ${Math.min(fps, 60)}`;
                frameCount = 0;
            }
            
            lastTime = currentTime;
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            const count = 10;
            for (let i = 0; i < count; i++) {
                createLightPoint(
                    e.clientX + (Math.random() - 0.5) * 50,
                    e.clientY + (Math.random() - 0.5) * 50
                );
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const count = 10;
            for (let i = 0; i < count; i++) {
                createLightPoint(
                    e.touches[0].clientX + (Math.random() - 0.5) * 50,
                    e.touches[0].clientY + (Math.random() - 0.5) * 50
                );
            }
        });
        
        // 初始化
        resize();
        mouseX = width / 2;
        mouseY = height / 2;
        requestAnimationFrame(animate);
    </script>
</body>
</html>
