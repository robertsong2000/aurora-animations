<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火焰效果 - Fire Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0a00 100%);
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 150, 50, 0.9);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 15px rgba(255, 100, 0, 0.8);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 100, 0.9);
            font-size: 36px;
            font-weight: bold;
            z-index: 100;
            text-shadow: 0 0 30px rgba(255, 100, 0, 1), 0 0 60px rgba(255, 50, 0, 0.8);
            letter-spacing: 5px;
            animation: flicker 0.5s infinite alternate;
        }
        
        @keyframes flicker {
            0% { opacity: 0.9; }
            100% { opacity: 1; }
        }
        
        .fps {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 200, 150, 0.6);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
        
        @media (max-width: 768px) {
            .info {
                font-size: 11px;
                bottom: 10px;
                left: 10px;
            }
            .title {
                font-size: 24px;
                top: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="title">🔥 火焰</div>
    <canvas id="fire"></canvas>
    <div class="info">
        <div>🖱️ 移动鼠标 - 控制火焰方向</div>
        <div>👆 点击 - 火焰爆发</div>
        <div>按住拖动 - 绘制火焰轨迹</div>
    </div>
    <div class="fps" id="fps">FPS: 60</div>
    
    <script>
        // 性能监控
        const fpsElement = document.getElementById('fps');
        let lastTime = performance.now();
        let frameCount = 0;
        
        // Canvas 设置
        const canvas = document.getElementById('fire');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let isMouseDown = false;
        let lastMouseX = 0, lastMouseY = 0;
        
        // 粒子系统
        let particles = [];
        const MAX_PARTICLES = 2000;
        
        // 火焰颜色渐变（从热到冷）
        const FIRE_COLORS = [
            { pos: 0.0, color: [255, 255, 200] },   // 白黄色（核心）
            { pos: 0.2, color: [255, 200, 50] },    // 黄色
            { pos: 0.4, color: [255, 120, 0] },     // 橙色
            { pos: 0.6, color: [255, 50, 0] },      // 红橙色
            { pos: 0.8, color: [150, 20, 0] },      // 暗红色
            { pos: 1.0, color: [50, 10, 0] },       // 深红色（烟雾）
        ];
        
        // 根据温度获取颜色
        function getFireColor(temperature) {
            // temperature: 0-1, 1最热
            for (let i = 0; i < FIRE_COLORS.length - 1; i++) {
                if (temperature >= FIRE_COLORS[i].pos && temperature <= FIRE_COLORS[i + 1].pos) {
                    const t = (temperature - FIRE_COLORS[i].pos) / (FIRE_COLORS[i + 1].pos - FIRE_COLORS[i].pos);
                    const c1 = FIRE_COLORS[i].color;
                    const c2 = FIRE_COLORS[i + 1].color;
                    return [
                        Math.floor(c1[0] + (c2[0] - c1[0]) * t),
                        Math.floor(c1[1] + (c2[1] - c1[1]) * t),
                        Math.floor(c1[2] + (c2[2] - c1[2]) * t),
                    ];
                }
            }
            return FIRE_COLORS[FIRE_COLORS.length - 1].color;
        }
        
        // 响应式调整
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        // 创建火焰粒子
        function createParticle(x, y, isExplosion = false) {
            if (particles.length >= MAX_PARTICLES) return;
            
            const angle = Math.random() * Math.PI * 2;
            const speed = isExplosion ? Math.random() * 8 + 4 : Math.random() * 3 + 1;
            
            particles.push({
                x: x,
                y: y,
                vx: Math.cos(angle) * speed * (isExplosion ? 1 : 0.5),
                vy: -Math.random() * 3 - 2, // 向上
                size: Math.random() * 20 + 10,
                temperature: 1.0, // 初始温度最高
                life: 1.0,
                decay: Math.random() * 0.01 + 0.005,
                turbulence: Math.random() * 0.5 + 0.5,
                isExplosion: isExplosion,
            });
        }
        
        // 创建火焰源（底部持续生成）
        function createFireSource() {
            const sources = 5; // 5个火焰源
            for (let i = 0; i < sources; i++) {
                const x = width / 2 + (i - 2) * 80;
                const y = height - 50;
                createParticle(x, y);
            }
        }
        
        // 火焰爆发
        function fireExplosion(x, y) {
            const count = 50;
            for (let i = 0; i < count; i++) {
                createParticle(x, y, true);
            }
        }
        
        // 更新粒子
        function updateParticle(particle, deltaTime) {
            // 热气流上升
            particle.vy -= 0.1;
            
            // 湍流效果
            particle.vx += (Math.random() - 0.5) * particle.turbulence;
            
            // 鼠标影响（风向）
            const dx = mouseX - particle.x;
            const dy = mouseY - particle.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < 300 && dist > 0) {
                const force = (300 - dist) / 300 * 0.3;
                particle.vx += (dx / dist) * force;
                particle.vy += (dy / dist) * force * 0.5;
            }
            
            // 应用速度
            particle.x += particle.vx;
            particle.y += particle.vy;
            
            // 温度降低
            particle.temperature -= particle.decay * (particle.isExplosion ? 2 : 1);
            
            // 生命值降低
            particle.life = particle.temperature;
            
            // 尺寸缩小
            particle.size *= 0.99;
            
            // 空气阻力
            particle.vx *= 0.99;
            particle.vy *= 0.99;
        }
        
        // 绘制粒子
        function drawParticle(particle) {
            if (particle.life <= 0) return;
            
            const color = getFireColor(particle.temperature);
            const alpha = particle.life * 0.8;
            const size = particle.size * particle.life;
            
            ctx.save();
            ctx.globalCompositeOperation = 'lighter'; // 发光混合模式
            
            // 创建径向渐变
            const gradient = ctx.createRadialGradient(
                particle.x, particle.y, 0,
                particle.x, particle.y, size
            );
            
            gradient.addColorStop(0, `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${alpha})`);
            gradient.addColorStop(0.5, `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${alpha * 0.5})`);
            gradient.addColorStop(1, `rgba(${color[0]}, ${color[1]}, ${color[2]}, 0)`);
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(particle.x, particle.y, size, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        // 绘制火焰光晕
        function drawGlow() {
            // 底部光晕
            const gradient = ctx.createRadialGradient(
                width / 2, height, 0,
                width / 2, height, 300
            );
            gradient.addColorStop(0, 'rgba(255, 100, 0, 0.3)');
            gradient.addColorStop(0.5, 'rgba(255, 50, 0, 0.1)');
            gradient.addColorStop(1, 'rgba(255, 0, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, height - 400, width, 400);
        }
        
        // 绘制木炭底座
        function drawEmberBase() {
            const emberCount = 20;
            const time = performance.now() * 0.001;
            
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            
            for (let i = 0; i < emberCount; i++) {
                const x = width / 2 + (i - emberCount / 2) * 30;
                const y = height - 30;
                const brightness = 0.5 + Math.sin(time * 3 + i) * 0.3;
                
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, 15);
                gradient.addColorStop(0, `rgba(255, 100, 50, ${brightness})`);
                gradient.addColorStop(1, 'rgba(255, 50, 0, 0)');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(x, y, 15, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        // 主动画循环
        function animate(currentTime) {
            const deltaTime = (currentTime - lastTime) / 1000;
            
            // 清除画布（带拖尾）
            ctx.fillStyle = 'rgba(10, 5, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制背景光晕
            drawGlow();
            
            // 绘制木炭底座
            drawEmberBase();
            
            // 持续生成火焰
            createFireSource();
            
            // 如果鼠标按下，在鼠标位置生成火焰
            if (isMouseDown) {
                const dx = mouseX - lastMouseX;
                const dy = mouseY - lastMouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist > 10) {
                    const steps = Math.floor(dist / 10);
                    for (let i = 0; i < steps; i++) {
                        const t = i / steps;
                        const x = lastMouseX + dx * t;
                        const y = lastMouseY + dy * t;
                        createParticle(x, y, true);
                    }
                }
                
                lastMouseX = mouseX;
                lastMouseY = mouseY;
            }
            
            // 更新和绘制所有粒子
            particles = particles.filter(particle => {
                if (particle.life <= 0 || particle.temperature <= 0) {
                    return false;
                }
                
                updateParticle(particle, deltaTime);
                drawParticle(particle);
                return true;
            });
            
            // FPS 计算
            frameCount++;
            if (frameCount >= 30) {
                const fps = Math.round(30 / ((currentTime - lastTime) / 1000 * 30));
                fpsElement.textContent = `FPS: ${Math.min(fps, 60)}`;
                frameCount = 0;
            }
            
            lastTime = currentTime;
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            fireExplosion(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
            lastMouseX = e.touches[0].clientX;
            lastMouseY = e.touches[0].clientY;
            fireExplosion(e.touches[0].clientX, e.touches[0].clientY);
        });
        
        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
        });
        
        // 初始化
        resize();
        mouseX = width / 2;
        mouseY = height / 2;
        requestAnimationFrame(animate);
    </script>
</body>
</html>
