<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>螺旋星系 - Spiral Galaxy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 200, 100, 0.8);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 15px rgba(255, 150, 50, 0.6);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 100, 0.9);
            font-size: 32px;
            font-weight: bold;
            z-index: 100;
            text-shadow: 0 0 30px rgba(255, 150, 50, 0.8);
            letter-spacing: 5px;
        }
        
        .fps {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 200, 100, 0.6);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
        
        @media (max-width: 768px) {
            .info {
                font-size: 11px;
                bottom: 10px;
                left: 10px;
            }
            .title {
                font-size: 20px;
                top: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="title">🌌 螺旋星系</div>
    <canvas id="spiralgalaxy"></canvas>
    <div class="info">
        <div>🖱️ 移动鼠标 - 旋转视角</div>
        <div>👆 点击 - 改变螺旋臂数量</div>
    </div>
    <div class="fps" id="fps">FPS: 60</div>
    
    <script>
        // 性能监控
        const fpsElement = document.getElementById('fps');
        let lastTime = performance.now();
        let frameCount = 0;
        
        // Canvas 设置
        const canvas = document.getElementById('spiralgalaxy');
        const ctx = canvas.getContext('2d');
        
        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        
        // 星系配置
        const STAR_COUNT = 2000;
        let stars = [];
        let spiralArms = 4;
        let rotation = 0;
        
        // 颜色配置
        const ARM_COLORS = [
            'rgba(255, 200, 100,',
            'rgba(100, 200, 255,',
            'rgba(255, 100, 150,',
            'rgba(150, 255, 150,',
            'rgba(200, 150, 255,',
            'rgba(255, 255, 100,',
        ];
        
        // 响应式调整
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            initStars();
        }
        
        // 初始化星星
        function initStars() {
            stars = [];
            const maxRadius = Math.min(width, height) * 0.45;
            
            for (let i = 0; i < STAR_COUNT; i++) {
                const arm = Math.floor(Math.random() * spiralArms);
                const armAngle = (Math.PI * 2 / spiralArms) * arm;
                
                // 螺旋分布
                const distance = Math.random() * maxRadius;
                const spiralAngle = armAngle + (distance / maxRadius) * Math.PI * 2;
                const spread = (Math.random() - 0.5) * 30;
                
                const angle = spiralAngle + spread * 0.01;
                
                stars.push({
                    distance: distance,
                    angle: angle,
                    baseAngle: angle,
                    size: Math.random() * 2 + 0.5,
                    brightness: Math.random() * 0.5 + 0.5,
                    armColor: ARM_COLORS[arm % ARM_COLORS.length],
                    orbitSpeed: 0.0002 + Math.random() * 0.0003,
                });
            }
        }
        
        // 更新星星
        function updateStars() {
            const mouseInfluence = ((mouseX - centerX) / width) * 0.001;
            
            stars.forEach(star => {
                // 轨道运动（内快外慢）
                star.angle += star.orbitSpeed * (1 - star.distance / (Math.min(width, height) * 0.45));
                
                // 鼠标影响
                star.angle += mouseInfluence;
            });
        }
        
        // 绘制星星
        function drawStars() {
            stars.forEach(star => {
                const x = centerX + Math.cos(star.angle) * star.distance;
                const y = centerY + Math.sin(star.angle) * star.distance;
                
                ctx.save();
                ctx.fillStyle = star.armColor + star.brightness + ')';
                ctx.shadowBlur = 5;
                ctx.shadowColor = star.armColor + star.brightness + ')';
                ctx.beginPath();
                ctx.arc(x, y, star.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }
        
        // 绘制星系核心
        function drawCore() {
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, 80
            );
            gradient.addColorStop(0, 'rgba(255, 220, 180, 0.8)');
            gradient.addColorStop(0.3, 'rgba(255, 200, 150, 0.5)');
            gradient.addColorStop(0.6, 'rgba(255, 150, 100, 0.2)');
            gradient.addColorStop(1, 'rgba(255, 100, 50, 0)');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 80, 0, Math.PI * 2);
            ctx.fill();
            
            // 核心亮点
            ctx.save();
            ctx.fillStyle = 'rgba(255, 255, 240, 0.9)';
            ctx.shadowBlur = 30;
            ctx.shadowColor = 'rgba(255, 255, 240, 0.8)';
            ctx.beginPath();
            ctx.arc(centerX, centerY, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
        
        // 绘制背景光晕
        function drawBackgroundGlow() {
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, Math.min(width, height) * 0.6
            );
            gradient.addColorStop(0, 'rgba(50, 30, 20, 0.3)');
            gradient.addColorStop(0.5, 'rgba(30, 20, 40, 0.1)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        // 主动画循环
        function animate(currentTime) {
            // 清除画布
            ctx.fillStyle = 'rgba(0, 0, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制背景光晕
            drawBackgroundGlow();
            
            // 更新和绘制
            updateStars();
            drawStars();
            drawCore();
            
            // FPS 计算
            frameCount++;
            if (frameCount >= 30) {
                const fps = Math.round(30 / ((currentTime - lastTime) / 1000 * 30));
                fpsElement.textContent = `FPS: ${Math.min(fps, 60)}`;
                frameCount = 0;
            }
            
            lastTime = currentTime;
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('click', () => {
            spiralArms = spiralArms % 6 + 1; // 1-6循环
            initStars();
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            spiralArms = spiralArms % 6 + 1;
            initStars();
        });
        
        // 初始化
        resize();
        mouseX = centerX;
        mouseY = centerY;
        requestAnimationFrame(animate);
    </script>
</body>
</html>
