<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>闪电风暴 | Lightning Storm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a2a 50%, #0a0a1a 100%);
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            color: rgba(200, 220, 255, 0.9);
            font-size: 12px;
            background: rgba(10, 10, 30, 0.85);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            backdrop-filter: blur(5px);
            max-width: 220px;
        }

        .control-group {
            margin: 10px 0;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: #88aadd;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: #6699ff;
        }

        .btn {
            padding: 8px 16px;
            margin-top: 8px;
            background: linear-gradient(135deg, #4488ff, #88aaff);
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 11px;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(100, 150, 255, 0.5);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 220, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .stats {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(200, 220, 255, 0.7);
            font-size: 12px;
            background: rgba(10, 10, 30, 0.8);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            z-index: 10;
        }

        @media (max-width: 600px) {
            .controls {
                font-size: 10px;
                padding: 10px;
                max-width: 180px;
            }
            .info {
                font-size: 12px;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="lightning"></canvas>
    
    <div class="controls">
        <div class="control-group">
            <label>闪电频率: <span id="frequencyValue">中</span></label>
            <input type="range" id="frequencySlider" min="1" max="5" step="1" value="3">
        </div>
        <div class="control-group">
            <label>闪电强度: <span id="intensityValue">1.0x</span></label>
            <input type="range" id="intensitySlider" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label>分支数量: <span id="branchesValue">3</span></label>
            <input type="range" id="branchesSlider" min="1" max="8" step="1" value="3">
        </div>
        <button class="btn" id="triggerBtn">⚡ 手动触发闪电</button>
    </div>

    <div class="stats">
        <div id="fpsCounter">FPS: 60</div>
        <div id="lightningCount">闪电数: 0</div>
    </div>

    <div class="info">
        <span>⚡ 闪电风暴 | Lightning Storm ⚡</span>
        <span>移动鼠标引导闪电 · 点击触发闪电 · 双击触发雷暴</span>
    </div>

    <script>
        (function() {
            'use strict';

            // ========== 配置 ==========
            const CONFIG = {
                maxLightnings: 10,
                maxRaindrops: 300
            };

            // ========== Canvas 初始化 ==========
            const canvas = document.getElementById('lightning');
            const ctx = canvas.getContext('2d');
            let width, height;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }

            resize();
            window.addEventListener('resize', resize);

            // ========== 状态管理 ==========
            let frequency = 3;
            let intensity = 1;
            let branches = 3;
            let mouseX = width / 2;
            let mouseY = height / 2;
            let lightnings = [];
            let raindrops = [];
            let clouds = [];
            let flashAlpha = 0;
            let lightningTimer = 0;

            // ========== 闪电类 ==========
            class Lightning {
                constructor(startX, startY, endX, endY) {
                    this.startX = startX || Math.random() * width;
                    this.startY = startY || 0;
                    this.endX = endX || this.startX + (Math.random() - 0.5) * 200;
                    this.endY = endY || height * 0.7;
                    
                    this.segments = [];
                    this.branches = [];
                    this.alpha = 1;
                    this.decay = 0.05;
                    
                    this.generatePath();
                    this.generateBranches();
                    
                    // 闪光效果
                    flashAlpha = 0.3 * intensity;
                }

                generatePath() {
                    const points = [{ x: this.startX, y: this.startY }];
                    const segments = 10 + Math.floor(Math.random() * 10);
                    
                    for (let i = 1; i <= segments; i++) {
                        const t = i / segments;
                        const x = this.startX + (this.endX - this.startX) * t;
                        const y = this.startY + (this.endY - this.startY) * t;
                        
                        // 添加随机偏移
                        const offsetX = (Math.random() - 0.5) * 50 * intensity;
                        const offsetY = (Math.random() - 0.5) * 20;
                        
                        points.push({
                            x: x + offsetX,
                            y: y + offsetY
                        });
                    }
                    
                    this.segments = points;
                }

                generateBranches() {
                    for (let i = 0; i < branches; i++) {
                        const branchIndex = Math.floor(Math.random() * (this.segments.length - 2)) + 1;
                        const startPoint = this.segments[branchIndex];
                        
                        // 分支方向
                        const angle = (Math.random() - 0.5) * Math.PI * 0.8;
                        const length = 30 + Math.random() * 80;
                        
                        const branchPoints = [startPoint];
                        const branchSegments = 3 + Math.floor(Math.random() * 4);
                        
                        for (let j = 1; j <= branchSegments; j++) {
                            const t = j / branchSegments;
                            const x = startPoint.x + Math.cos(angle + Math.PI / 2) * length * t;
                            const y = startPoint.y + Math.abs(Math.sin(angle)) * length * t;
                            
                            branchPoints.push({
                                x: x + (Math.random() - 0.5) * 20,
                                y: y + (Math.random() - 0.5) * 10
                            });
                        }
                        
                        this.branches.push(branchPoints);
                    }
                }

                update() {
                    this.alpha -= this.decay;
                    flashAlpha *= 0.9;
                }

                draw() {
                    if (this.alpha <= 0) return;
                    
                    // 绘制主闪电
                    ctx.beginPath();
                    ctx.moveTo(this.segments[0].x, this.segments[0].y);
                    
                    for (let i = 1; i < this.segments.length; i++) {
                        ctx.lineTo(this.segments[i].x, this.segments[i].y);
                    }
                    
                    // 外发光
                    ctx.strokeStyle = `rgba(150, 180, 255, ${this.alpha * 0.3})`;
                    ctx.lineWidth = 10 * intensity;
                    ctx.stroke();
                    
                    // 中层发光
                    ctx.strokeStyle = `rgba(180, 200, 255, ${this.alpha * 0.5})`;
                    ctx.lineWidth = 5 * intensity;
                    ctx.stroke();
                    
                    // 核心白光
                    ctx.strokeStyle = `rgba(255, 255, 255, ${this.alpha})`;
                    ctx.lineWidth = 2 * intensity;
                    ctx.stroke();
                    
                    // 绘制分支
                    this.branches.forEach(branch => {
                        ctx.beginPath();
                        ctx.moveTo(branch[0].x, branch[0].y);
                        
                        for (let i = 1; i < branch.length; i++) {
                            ctx.lineTo(branch[i].x, branch[i].y);
                        }
                        
                        ctx.strokeStyle = `rgba(200, 220, 255, ${this.alpha * 0.7})`;
                        ctx.lineWidth = 1.5 * intensity;
                        ctx.stroke();
                    });
                }

                isDead() {
                    return this.alpha <= 0;
                }
            }

            // ========== 雨滴类 ==========
            class Raindrop {
                constructor() {
                    this.reset();
                }

                reset() {
                    this.x = Math.random() * width;
                    this.y = -10;
                    this.speedY = 8 + Math.random() * 6;
                    this.speedX = -1;
                    this.length = 10 + Math.random() * 15;
                }

                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    
                    if (this.y > height) {
                        this.reset();
                    }
                }

                draw() {
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x - this.speedX * 2, this.y + this.length);
                    ctx.strokeStyle = 'rgba(150, 180, 200, 0.4)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }

            // ========== 云层类 ==========
            class Cloud {
                constructor() {
                    this.reset();
                }

                reset() {
                    this.x = -200;
                    this.y = Math.random() * height * 0.3;
                    this.width = 150 + Math.random() * 200;
                    this.height = 50 + Math.random() * 80;
                    this.speed = 0.3 + Math.random() * 0.3;
                    this.alpha = 0.4 + Math.random() * 0.3;
                }

                update() {
                    this.x += this.speed;
                    
                    if (this.x > width + 200) {
                        this.reset();
                    }
                }

                draw() {
                    const gradient = ctx.createRadialGradient(
                        this.x + this.width / 2, this.y + this.height / 2, 0,
                        this.x + this.width / 2, this.y + this.height / 2, this.width / 2
                    );
                    gradient.addColorStop(0, `rgba(60, 70, 90, ${this.alpha})`);
                    gradient.addColorStop(0.5, `rgba(50, 60, 80, ${this.alpha * 0.7})`);
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.ellipse(this.x + this.width * 0.3, this.y + this.height * 0.6, 
                                this.width * 0.3, this.height * 0.4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.ellipse(this.x + this.width * 0.5, this.y + this.height * 0.4, 
                                this.width * 0.35, this.height * 0.5, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.ellipse(this.x + this.width * 0.7, this.y + this.height * 0.6, 
                                this.width * 0.3, this.height * 0.4, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // ========== 初始化 ==========
            function initRain() {
                raindrops = [];
                for (let i = 0; i < CONFIG.maxRaindrops; i++) {
                    const drop = new Raindrop();
                    drop.y = Math.random() * height;
                    raindrops.push(drop);
                }
            }

            function initClouds() {
                clouds = [];
                for (let i = 0; i < 5; i++) {
                    const cloud = new Cloud();
                    cloud.x = Math.random() * width;
                    clouds.push(cloud);
                }
            }

            initRain();
            initClouds();

            // ========== 触发闪电 ==========
            function triggerLightning(x, y) {
                if (lightnings.length < CONFIG.maxLightnings) {
                    const startX = x || Math.random() * width;
                    lightnings.push(new Lightning(startX, 0, startX + (Math.random() - 0.5) * 200, y || height * 0.7));
                }
            }

            // ========== 鼠标交互 ==========
            canvas.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            canvas.addEventListener('click', (e) => {
                triggerLightning(e.clientX, e.clientY);
            });

            canvas.addEventListener('dblclick', (e) => {
                e.preventDefault();
                // 雷暴：连续触发多个闪电
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        triggerLightning(mouseX + (Math.random() - 0.5) * 200);
                    }, i * 100);
                }
            });

            // 触摸支持
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                mouseX = touch.clientX;
                mouseY = touch.clientY;
            });

            canvas.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                triggerLightning(touch.clientX, touch.clientY);
            });

            // ========== 控制器 ==========
            document.getElementById('frequencySlider').addEventListener('input', (e) => {
                frequency = parseInt(e.target.value);
                const labels = ['极少', '少', '中', '多', '极多'];
                document.getElementById('frequencyValue').textContent = labels[frequency - 1];
            });

            document.getElementById('intensitySlider').addEventListener('input', (e) => {
                intensity = parseFloat(e.target.value);
                document.getElementById('intensityValue').textContent = intensity.toFixed(1) + 'x';
            });

            document.getElementById('branchesSlider').addEventListener('input', (e) => {
                branches = parseInt(e.target.value);
                document.getElementById('branchesValue').textContent = branches;
            });

            document.getElementById('triggerBtn').addEventListener('click', () => {
                triggerLightning(width / 2 + (Math.random() - 0.5) * 200);
            });

            // ========== 性能监控 ==========
            let fps = 0;
            let frameCount = 0;
            let lastFpsUpdate = 0;

            function updateStats(currentTime) {
                frameCount++;
                if (currentTime - lastFpsUpdate >= 1000) {
                    fps = frameCount;
                    frameCount = 0;
                    lastFpsUpdate = currentTime;
                    document.getElementById('fpsCounter').textContent = `FPS: ${fps}`;
                }
                document.getElementById('lightningCount').textContent = `闪电数: ${lightnings.length}`;
            }

            // ========== 动画循环 ==========
            let lastTime = 0;

            function animate(currentTime) {
                const deltaTime = lastTime ? currentTime - lastTime : 16;
                lastTime = currentTime;

                // 自动触发闪电
                lightningTimer += deltaTime;
                const interval = [5000, 3000, 2000, 1000, 500][frequency - 1];
                
                if (lightningTimer >= interval && Math.random() < 0.3) {
                    lightningTimer = 0;
                    triggerLightning();
                }

                // 清除画布
                ctx.fillStyle = `rgba(10, 10, 26, ${0.2 + flashAlpha * 0.3})`;
                ctx.fillRect(0, 0, width, height);

                // 绘制云层
                clouds.forEach(cloud => {
                    cloud.update();
                    cloud.draw();
                });

                // 绘制雨滴
                raindrops.forEach(drop => {
                    drop.update();
                    drop.draw();
                });

                // 更新和绘制闪电
                for (let i = lightnings.length - 1; i >= 0; i--) {
                    lightnings[i].update();
                    lightnings[i].draw();
                    
                    if (lightnings[i].isDead()) {
                        lightnings.splice(i, 1);
                    }
                }

                // 全屏闪光效果
                if (flashAlpha > 0) {
                    ctx.fillStyle = `rgba(200, 220, 255, ${flashAlpha})`;
                    ctx.fillRect(0, 0, width, height);
                }

                updateStats(currentTime);
                requestAnimationFrame(animate);
            }

            // 启动动画
            requestAnimationFrame(animate);

        })();
    </script>
</body>
</html>
