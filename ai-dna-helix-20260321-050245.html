<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA螺旋 - DNA Helix Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0, 255, 200, 0.5);
        }
        
        .info span {
            display: block;
            margin: 5px 0;
        }
        
        .fps-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }

        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.1);
            font-size: 120px;
            font-weight: bold;
            letter-spacing: 20px;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="title">DNA</div>
    <canvas id="helix"></canvas>
    <div class="info">
        <span>🧬 DNA双螺旋动画</span>
        <span>🖱️ 移动鼠标 - 扭曲螺旋</span>
        <span>👆 点击 - 产生碱基对粒子爆发</span>
    </div>
    <div class="fps-counter" id="fps">FPS: 60</div>

    <script>
        // ============ 配置 ============
        const CONFIG = {
            basePairs: 60,        // 碱基对数量
            rotationSpeed: 0.015, // 旋转速度
            verticalSpacing: 25,  // 垂直间距
            amplitude: 120,       // 振幅
            colors: {
                strand1: ['#00FFFF', '#00CED1', '#20B2AA'],  // 胸腺嘧啶-腺嘌呤
                strand2: ['#FF69B4', '#FF1493', '#FF00FF'],  // 胞嘧啶-鸟嘌呤
                bonds: ['#FFD700', '#FFA500', '#FF8C00'],     // 氢键
                glow: ['#00FFFF', '#FF69B4']
            }
        };

        // ============ Canvas 设置 ============
        const canvas = document.getElementById('helix');
        const ctx = canvas.getContext('2d');
        let width, height, centerX, centerY;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }
        
        resize();
        window.addEventListener('resize', resize);

        // ============ 工具函数 ============
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        function randomColor(colors) {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // ============ 碱基对类 ============
        class BasePair {
            constructor(index, total) {
                this.index = index;
                this.total = total;
                this.phase = (index / total) * Math.PI * 4;
                this.y = 0;
                this.x1 = 0;
                this.x2 = 0;
                this.size = random(6, 10);
                this.color1 = randomColor(CONFIG.colors.strand1);
                this.color2 = randomColor(CONFIG.colors.strand2);
                this.bondColor = randomColor(CONFIG.colors.bonds);
                this.pulsePhase = random(0, Math.PI * 2);
                this.pulseSpeed = random(0.02, 0.05);
            }

            update(time, mouseInfluence, mouseY) {
                // 基础旋转
                const rotation = time * CONFIG.rotationSpeed + this.phase;
                
                // 计算位置
                this.y = (this.index / this.total - 0.5) * height * 1.2 + centerY;
                
                // 鼠标影响 - 扭曲效果
                const distToMouse = Math.abs(this.y - mouseY);
                const influence = Math.max(0, 1 - distToMouse / 200) * mouseInfluence;
                const distortion = influence * 50;
                
                this.x1 = centerX + Math.cos(rotation) * (CONFIG.amplitude + distortion);
                this.x2 = centerX + Math.cos(rotation + Math.PI) * (CONFIG.amplitude + distortion);
                
                // 深度排序（用于3D效果）
                this.depth1 = Math.sin(rotation);
                this.depth2 = Math.sin(rotation + Math.PI);
                
                // 脉冲效果
                this.pulsePhase += this.pulseSpeed;
                this.pulse = 0.7 + 0.3 * Math.sin(this.pulsePhase);
            }

            draw() {
                const size1 = this.size * (0.7 + 0.3 * (this.depth1 + 1) / 2);
                const size2 = this.size * (0.7 + 0.3 * (this.depth2 + 1) / 2);
                const alpha1 = 0.5 + 0.5 * (this.depth1 + 1) / 2;
                const alpha2 = 0.5 + 0.5 * (this.depth2 + 1) / 2;

                // 绘制氢键连接线
                ctx.beginPath();
                ctx.moveTo(this.x1, this.y);
                ctx.lineTo(this.x2, this.y);
                const gradient = ctx.createLinearGradient(this.x1, this.y, this.x2, this.y);
                gradient.addColorStop(0, hexToRgba(this.color1, alpha1 * this.pulse));
                gradient.addColorStop(0.5, hexToRgba(this.bondColor, 0.3 * this.pulse));
                gradient.addColorStop(1, hexToRgba(this.color2, alpha2 * this.pulse));
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2 * this.pulse;
                ctx.stroke();

                // 绘制碱基节点 - 链1
                this.drawNode(this.x1, this.y, size1 * this.pulse, this.color1, alpha1 * this.pulse);
                
                // 绘制碱基节点 - 链2
                this.drawNode(this.x2, this.y, size2 * this.pulse, this.color2, alpha2 * this.pulse);
            }

            drawNode(x, y, size, color, alpha) {
                // 发光效果
                const glowSize = size * 3;
                const glow = ctx.createRadialGradient(x, y, 0, x, y, glowSize);
                glow.addColorStop(0, hexToRgba(color, alpha * 0.8));
                glow.addColorStop(0.3, hexToRgba(color, alpha * 0.3));
                glow.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(x, y, glowSize, 0, Math.PI * 2);
                ctx.fillStyle = glow;
                ctx.fill();

                // 核心
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = hexToRgba(color, alpha);
                ctx.fill();

                // 高光
                ctx.beginPath();
                ctx.arc(x - size * 0.3, y - size * 0.3, size * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.5})`;
                ctx.fill();
            }
        }

        // ============ 粒子类（点击效果） ============
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                const angle = random(0, Math.PI * 2);
                const speed = random(2, 10);
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.size = random(2, 6);
                this.color = color;
                this.life = 1;
                this.decay = random(0.008, 0.02);
                this.rotation = random(0, Math.PI * 2);
                this.rotationSpeed = random(-0.1, 0.1);
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.vy += 0.1; // 重力
                this.life -= this.decay;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                if (this.life <= 0) return;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // 绘制菱形
                ctx.beginPath();
                const s = this.size * this.life;
                ctx.moveTo(0, -s);
                ctx.lineTo(s, 0);
                ctx.lineTo(0, s);
                ctx.lineTo(-s, 0);
                ctx.closePath();
                
                ctx.fillStyle = hexToRgba(this.color, this.life);
                ctx.fill();
                
                ctx.restore();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        // ============ 背景粒子 ============
        class BackgroundParticle {
            constructor() {
                this.x = random(0, width);
                this.y = random(0, height);
                this.size = random(1, 2);
                this.speedX = random(-0.2, 0.2);
                this.speedY = random(-0.1, 0.1);
                this.opacity = random(0.1, 0.4);
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        // ============ 粒子系统初始化 ============
        const basePairs = [];
        const particles = [];
        const bgParticles = [];

        for (let i = 0; i < CONFIG.basePairs; i++) {
            basePairs.push(new BasePair(i, CONFIG.basePairs));
        }

        for (let i = 0; i < 100; i++) {
            bgParticles.push(new BackgroundParticle());
        }

        // ============ 鼠标交互 ============
        let mouseX = centerX;
        let mouseY = centerY;
        let mouseInfluence = 0;
        let targetMouseInfluence = 0;

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            targetMouseInfluence = 1;
        });

        canvas.addEventListener('mouseleave', () => {
            targetMouseInfluence = 0;
        });

        canvas.addEventListener('click', (e) => {
            // 产生粒子爆发
            const colors = [...CONFIG.colors.strand1, ...CONFIG.colors.strand2, ...CONFIG.colors.bonds];
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(
                    e.clientX + random(-20, 20),
                    e.clientY + random(-20, 20),
                    randomColor(colors)
                ));
            }
        });

        // ============ FPS 计算 ============
        let frameCount = 0;
        let lastTime = performance.now();
        let fps = 60;

        function updateFPS() {
            frameCount++;
            const now = performance.now();
            if (now - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = now;
                document.getElementById('fps').textContent = `FPS: ${fps}`;
            }
        }

        // ============ 绘制DNA链连接线 ============
        function drawBackbone(pairs, time) {
            // 链1
            ctx.beginPath();
            pairs.forEach((pair, i) => {
                if (i === 0) {
                    ctx.moveTo(pair.x1, pair.y);
                } else {
                    ctx.lineTo(pair.x1, pair.y);
                }
            });
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 链2
            ctx.beginPath();
            pairs.forEach((pair, i) => {
                if (i === 0) {
                    ctx.moveTo(pair.x2, pair.y);
                } else {
                    ctx.lineTo(pair.x2, pair.y);
                }
            });
            ctx.strokeStyle = 'rgba(255, 105, 180, 0.2)';
            ctx.stroke();
        }

        // ============ 主动画循环 ============
        function animate(time) {
            // 清除画布
            ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
            ctx.fillRect(0, 0, width, height);

            // 更新背景粒子
            bgParticles.forEach(p => {
                p.update();
                p.draw();
            });

            // 平滑鼠标影响
            mouseInfluence = mouseInfluence + (targetMouseInfluence - mouseInfluence) * 0.05;

            // 更新碱基对
            basePairs.forEach(pair => {
                pair.update(time, mouseInfluence, mouseY);
            });

            // 按深度排序绘制
            const sortedPairs = [...basePairs].sort((a, b) => a.depth1 - b.depth1);
            
            // 绘制骨架
            drawBackbone(sortedPairs, time);
            
            // 绘制碱基对
            sortedPairs.forEach(pair => {
                pair.draw();
            });

            // 更新和绘制粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].isDead()) {
                    particles.splice(i, 1);
                }
            }

            // 限制粒子数量
            if (particles.length > 200) {
                particles.splice(0, particles.length - 200);
            }

            updateFPS();
            requestAnimationFrame(animate);
        }

        // 启动动画
        animate(0);

        // ============ 性能优化：页面隐藏时降低帧率 ============
        let animationId;
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                cancelAnimationFrame(animationId);
            } else {
                animationId = requestAnimationFrame(animate);
            }
        });
    </script>
</body>
</html>
