<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元胞自动机 - Cellular Automata</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            cursor: crosshair;
        }
        
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(50, 255, 200, 0.9);
            font-size: 13px;
            line-height: 1.8;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(50, 255, 200, 0.3);
            backdrop-filter: blur(10px);
        }
        
        #info h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #32ffc8;
            text-shadow: 0 0 10px rgba(50, 255, 200, 0.5);
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(50, 255, 200, 0.9);
            font-size: 13px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(50, 255, 200, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .control-item {
            margin: 8px 0;
        }
        
        label {
            display: inline-block;
            width: 100px;
        }
        
        input[type="range"] {
            width: 140px;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        span.value {
            display: inline-block;
            width: 40px;
            text-align: right;
            margin-left: 10px;
            color: #32ffc8;
        }
        
        button {
            margin-top: 10px;
            margin-right: 10px;
            padding: 8px 20px;
            background: linear-gradient(135deg, #32ffc8 0%, #00d4aa 100%);
            border: none;
            border-radius: 5px;
            color: #000;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(50, 255, 200, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="info">
        <h3>🧩 元胞自动机</h3>
        <div>代数: <span id="generation">0</span></div>
        <div>活细胞: <span id="aliveCells">0</span></div>
        <div>规则: <span id="ruleNumber">30</span></div>
        <div>模式: <span id="mode">生命游戏</span></div>
        <div>FPS: <span id="fps">0</span></div>
    </div>
    
    <div id="controls">
        <div class="control-item">
            <label>规则编号:</label>
            <input type="range" id="ruleNumber" min="0" max="255" value="30">
            <span class="value" id="ruleNumberValue">30</span>
        </div>
        <div class="control-item">
            <label>细胞大小:</label>
            <input type="range" id="cellSize" min="2" max="20" value="5">
            <span class="value" id="cellSizeValue">5</span>
        </div>
        <div class="control-item">
            <label>速度:</label>
            <input type="range" id="speed" min="1" max="60" value="10">
            <span class="value" id="speedValue">10</span>
        </div>
        <div class="control-item">
            <label>密度:</label>
            <input type="range" id="density" min="1" max="100" value="30">
            <span class="value" id="densityValue">30</span>
        </div>
        <button id="switchModeBtn">切换模式</button>
        <button id="stepBtn">单步</button>
        <button id="resetBtn">重置</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        // 配置
        let config = {
            ruleNumber: 30,
            cellSize: 5,
            speed: 10,
            density: 30
        };
        
        // 模式：'gameOfLife' 或 'elementary'
        let mode = 'gameOfLife';
        
        // 网格
        let grid = [];
        let cols, rows;
        
        // 代数
        let generation = 0;
        
        // FPS 计算
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 0;
        
        // 上次更新时间
        let lastUpdate = 0;
        
        // 初始化网格
        function initGrid() {
            cols = Math.floor(width / config.cellSize);
            rows = Math.floor(height / config.cellSize);
            
            grid = [];
            
            for (let i = 0; i < cols; i++) {
                grid[i] = [];
                for (let j = 0; j < rows; j++) {
                    if (mode === 'gameOfLife') {
                        // 生命游戏：随机初始化
                        grid[i][j] = Math.random() < (config.density / 100) ? 1 : 0;
                    } else {
                        // 一维元胞自动机：只有第一行有值
                        if (j === 0) {
                            grid[i][j] = Math.floor(cols / 2) === i ? 1 : 0;
                        } else {
                            grid[i][j] = 0;
                        }
                    }
                }
            }
            
            generation = 0;
        }
        
        // 生命游戏规则
        function gameOfLife() {
            let newGrid = [];
            
            for (let i = 0; i < cols; i++) {
                newGrid[i] = [];
                for (let j = 0; j < rows; j++) {
                    let neighbors = countNeighbors(i, j);
                    
                    if (grid[i][j] === 1) {
                        // 活细胞
                        if (neighbors < 2 || neighbors > 3) {
                            newGrid[i][j] = 0; // 死亡
                        } else {
                            newGrid[i][j] = 1; // 存活
                        }
                    } else {
                        // 死细胞
                        if (neighbors === 3) {
                            newGrid[i][j] = 1; // 繁殖
                        } else {
                            newGrid[i][j] = 0;
                        }
                    }
                }
            }
            
            grid = newGrid;
            generation++;
        }
        
        // 计算邻居数量
        function countNeighbors(x, y) {
            let count = 0;
            
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    if (i === 0 && j === 0) continue;
                    
                    let col = (x + i + cols) % cols;
                    let row = (y + j + rows) % rows;
                    
                    count += grid[col][row];
                }
            }
            
            return count;
        }
        
        // 一维元胞自动机规则
        function elementaryCA() {
            // 找到当前行
            let currentRow = generation;
            
            if (currentRow >= rows - 1) {
                // 滚动网格
                for (let j = 0; j < rows - 1; j++) {
                    for (let i = 0; i < cols; i++) {
                        grid[i][j] = grid[i][j + 1];
                    }
                }
                currentRow = rows - 1;
            }
            
            // 计算下一行
            for (let i = 0; i < cols; i++) {
                let left = grid[(i - 1 + cols) % cols][currentRow];
                let center = grid[i][currentRow];
                let right = grid[(i + 1) % cols][currentRow];
                
                // 根据规则计算新状态
                let index = (left << 2) | (center << 1) | right;
                grid[i][currentRow + 1] = (config.ruleNumber >> index) & 1;
            }
            
            generation++;
        }
        
        // 绘制网格
        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 10, 1)';
            ctx.fillRect(0, 0, width, height);
            
            let aliveCells = 0;
            
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    if (grid[i][j] === 1) {
                        aliveCells++;
                        
                        const x = i * config.cellSize;
                        const y = j * config.cellSize;
                        
                        // 发光效果
                        const gradient = ctx.createRadialGradient(
                            x + config.cellSize / 2,
                            y + config.cellSize / 2,
                            0,
                            x + config.cellSize / 2,
                            y + config.cellSize / 2,
                            config.cellSize
                        );
                        
                        gradient.addColorStop(0, 'rgba(50, 255, 200, 0.8)');
                        gradient.addColorStop(0.5, 'rgba(50, 255, 200, 0.3)');
                        gradient.addColorStop(1, 'rgba(50, 255, 200, 0)');
                        
                        ctx.fillStyle = gradient;
                        ctx.fillRect(x, y, config.cellSize, config.cellSize);
                        
                        // 核心细胞
                        ctx.fillStyle = 'rgba(50, 255, 200, 0.9)';
                        ctx.fillRect(
                            x + 1,
                            y + 1,
                            config.cellSize - 2,
                            config.cellSize - 2
                        );
                    }
                }
            }
            
            // 更新统计
            document.getElementById('generation').textContent = generation;
            document.getElementById('aliveCells').textContent = aliveCells;
            document.getElementById('ruleNumber').textContent = config.ruleNumber;
            document.getElementById('mode').textContent = mode === 'gameOfLife' ? '生命游戏' : '一维CA';
        }
        
        // 动画循环
        function animate(currentTime) {
            // FPS 计算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                document.getElementById('fps').textContent = fps;
            }
            
            // 根据速度更新
            const interval = 1000 / config.speed;
            
            if (currentTime - lastUpdate >= interval) {
                if (mode === 'gameOfLife') {
                    gameOfLife();
                } else {
                    elementaryCA();
                }
                lastUpdate = currentTime;
            }
            
            draw();
            
            requestAnimationFrame(animate);
        }
        
        // 鼠标交互1：点击添加/删除细胞
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            const i = Math.floor(mouseX / config.cellSize);
            const j = Math.floor(mouseY / config.cellSize);
            
            if (i >= 0 && i < cols && j >= 0 && j < rows) {
                grid[i][j] = grid[i][j] === 1 ? 0 : 1;
            }
        });
        
        // 鼠标交互2：拖动绘制
        let isDrawing = false;
        
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (isDrawing) {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                const i = Math.floor(mouseX / config.cellSize);
                const j = Math.floor(mouseY / config.cellSize);
                
                if (i >= 0 && i < cols && j >= 0 && j < rows) {
                    grid[i][j] = 1;
                }
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
        });
        
        // 控制面板事件
        document.getElementById('ruleNumber').addEventListener('input', (e) => {
            config.ruleNumber = parseInt(e.target.value);
            document.getElementById('ruleNumberValue').textContent = e.target.value;
        });
        
        document.getElementById('cellSize').addEventListener('input', (e) => {
            config.cellSize = parseInt(e.target.value);
            document.getElementById('cellSizeValue').textContent = e.target.value;
            initGrid();
        });
        
        document.getElementById('speed').addEventListener('input', (e) => {
            config.speed = parseInt(e.target.value);
            document.getElementById('speedValue').textContent = e.target.value;
        });
        
        document.getElementById('density').addEventListener('input', (e) => {
            config.density = parseInt(e.target.value);
            document.getElementById('densityValue').textContent = e.target.value;
        });
        
        document.getElementById('switchModeBtn').addEventListener('click', () => {
            mode = mode === 'gameOfLife' ? 'elementary' : 'gameOfLife';
            initGrid();
        });
        
        document.getElementById('stepBtn').addEventListener('click', () => {
            if (mode === 'gameOfLife') {
                gameOfLife();
            } else {
                elementaryCA();
            }
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            initGrid();
        });
        
        // 窗口调整
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initGrid();
        });
        
        // 性能优化：移动设备调整
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            config.cellSize = 8;
            config.speed = 5;
            document.getElementById('cellSize').value = 8;
            document.getElementById('cellSizeValue').textContent = 8;
            document.getElementById('speed').value = 5;
            document.getElementById('speedValue').textContent = 5;
        }
        
        // 初始化并启动
        initGrid();
        animate(performance.now());
    </script>
</body>
</html>
