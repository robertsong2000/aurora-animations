<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粒子动画 | Particle Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 8px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            animation: pulse 3s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        
        .controls {
            position: fixed;
            top: 100px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        
        .control-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
        }
        
        .control-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transform: translateX(-5px);
        }
        
        .control-btn.active {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }
        
        .stats {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
            line-height: 1.6;
            backdrop-filter: blur(5px);
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="title">PARTICLES</div>
    
    <div class="controls">
        <button class="control-btn active" id="attractBtn">吸引</button>
        <button class="control-btn" id="repelBtn">排斥</button>
        <button class="control-btn" id="vortexBtn">漩涡</button>
        <button class="control-btn" id="gravityBtn">重力</button>
    </div>
    
    <div class="stats" id="stats"></div>
    <canvas id="particles"></canvas>
    <div class="info">点击创建粒子 · 移动鼠标影响运动 · 滚轮调整粒子数量</div>
    
    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        // Performance constants
        const TWO_PI = Math.PI * 2;
        
        // Particle system
        let particles = [];
        let mouseX = width / 2;
        let mouseY = height / 2;
        let mode = 'attract';
        let particleCount = 300;
        let isMouseDown = false;
        
        // Color palettes
        const palettes = {
            attract: ['#FF6B6B', '#FF8E72', '#FFD93D', '#6BCF7F', '#4D96FF'],
            repel: ['#FF006E', '#FB5607', '#FFBE0B', '#8338EC', '#3A86FF'],
            vortex: ['#00F5FF', '#00D4FF', '#0096FF', '#6C63FF', '#BC13FE'],
            gravity: ['#F72585', '#B5179E', '#7209B7', '#560BAD', '#480CA8']
        };
        
        // Particle class
        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = Math.random() * 3 + 1;
                this.mass = this.radius * 2;
                this.life = 1;
                this.colorIndex = Math.floor(Math.random() * 5);
                this.trail = [];
                this.maxTrailLength = 10;
            }
            
            update() {
                // Store trail
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrailLength) {
                    this.trail.shift();
                }
                
                // Calculate force based on mode
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const force = Math.min(100 / (distance + 1), 5);
                
                switch (mode) {
                    case 'attract':
                        this.vx += (dx / distance) * force * 0.1;
                        this.vy += (dy / distance) * force * 0.1;
                        break;
                        
                    case 'repel':
                        this.vx -= (dx / distance) * force * 0.2;
                        this.vy -= (dy / distance) * force * 0.2;
                        break;
                        
                    case 'vortex':
                        const angle = Math.atan2(dy, dx);
                        const perpendicularAngle = angle + Math.PI / 2;
                        this.vx += Math.cos(perpendicularAngle) * force * 0.15;
                        this.vy += Math.sin(perpendicularAngle) * force * 0.15;
                        // Also attract slightly
                        this.vx += (dx / distance) * force * 0.02;
                        this.vy += (dy / distance) * force * 0.02;
                        break;
                        
                    case 'gravity':
                        // Gravity toward bottom
                        this.vy += 0.1;
                        // Also slight attraction to mouse
                        if (distance < 200) {
                            this.vx += (dx / distance) * force * 0.05;
                            this.vy += (dy / distance) * force * 0.05;
                        }
                        break;
                }
                
                // Apply velocity with damping
                this.vx *= 0.99;
                this.vy *= 0.99;
                
                this.x += this.vx;
                this.y += this.vy;
                
                // Bounce off walls
                if (this.x < 0 || this.x > width) {
                    this.vx *= -0.8;
                    this.x = Math.max(0, Math.min(width, this.x));
                }
                
                if (this.y < 0 || this.y > height) {
                    this.vy *= -0.8;
                    this.y = Math.max(0, Math.min(height, this.y));
                }
            }
            
            draw(ctx, palette) {
                const color = palette[this.colorIndex];
                
                // Draw trail
                ctx.beginPath();
                this.trail.forEach((point, i) => {
                    const opacity = (i / this.trail.length) * 0.3;
                    ctx.fillStyle = color.replace(')', `, ${opacity})`).replace('rgb', 'rgba').replace('#', '');
                    
                    // Convert hex to rgba if needed
                    if (color.startsWith('#')) {
                        const r = parseInt(color.slice(1, 3), 16);
                        const g = parseInt(color.slice(3, 5), 16);
                        const b = parseInt(color.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${opacity})`;
                    }
                    
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, this.radius * 0.5, 0, TWO_PI);
                    ctx.fill();
                });
                
                // Draw particle
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, TWO_PI);
                
                // Convert hex to rgba
                const r = parseInt(color.slice(1, 3), 16);
                const g = parseInt(color.slice(3, 5), 16);
                const b = parseInt(color.slice(5, 7), 16);
                
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 2
                );
                gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0.9)`);
                gradient.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
                
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // Glow effect
                ctx.shadowBlur = 10;
                ctx.shadowColor = color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, TWO_PI);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        // Initialize particles
        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }
        
        initParticles();
        
        // Draw connections
        function drawConnections() {
            const connectionDistance = 100;
            
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < connectionDistance) {
                        const opacity = (1 - distance / connectionDistance) * 0.2;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }
        
        // Event listeners
        canvas.addEventListener('click', (e) => {
            // Add burst of particles
            for (let i = 0; i < 10; i++) {
                const particle = new Particle(e.clientX, e.clientY);
                particle.vx = (Math.random() - 0.5) * 10;
                particle.vy = (Math.random() - 0.5) * 10;
                particles.push(particle);
            }
            
            // Limit particle count
            while (particles.length > particleCount * 1.5) {
                particles.shift();
            }
        });
        
        canvas.addEventListener('mousedown', () => {
            isMouseDown = true;
        });
        
        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // Add particles while dragging
            if (isMouseDown && particles.length < particleCount * 2) {
                particles.push(new Particle(mouseX, mouseY));
            }
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            particleCount = Math.max(50, Math.min(1000, particleCount + Math.sign(e.deltaY) * -50));
            
            // Adjust particle count
            while (particles.length > particleCount) {
                particles.pop();
            }
            while (particles.length < particleCount) {
                particles.push(new Particle());
            }
        }, { passive: false });
        
        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            
            for (let i = 0; i < 10; i++) {
                const particle = new Particle(mouseX, mouseY);
                particle.vx = (Math.random() - 0.5) * 10;
                particle.vy = (Math.random() - 0.5) * 10;
                particles.push(particle);
            }
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        }, { passive: false });
        
        // Mode buttons
        const attractBtn = document.getElementById('attractBtn');
        const repelBtn = document.getElementById('repelBtn');
        const vortexBtn = document.getElementById('vortexBtn');
        const gravityBtn = document.getElementById('gravityBtn');
        
        function setMode(newMode) {
            mode = newMode;
            attractBtn.classList.toggle('active', newMode === 'attract');
            repelBtn.classList.toggle('active', newMode === 'repel');
            vortexBtn.classList.toggle('active', newMode === 'vortex');
            gravityBtn.classList.toggle('active', newMode === 'gravity');
        }
        
        attractBtn.addEventListener('click', () => setMode('attract'));
        repelBtn.addEventListener('click', () => setMode('repel'));
        vortexBtn.addEventListener('click', () => setMode('vortex'));
        gravityBtn.addEventListener('click', () => setMode('gravity'));
        
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        
        // Main animation loop
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        function animate(currentTime) {
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            
            frameCount++;
            if (frameCount % 30 === 0) {
                fps = Math.round(1000 / deltaTime);
            }
            
            // Clear with fade
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // Draw connections
            drawConnections();
            
            // Update and draw particles
            const palette = palettes[mode];
            particles.forEach(particle => {
                particle.update();
                particle.draw(ctx, palette);
            });
            
            // Draw mouse influence area
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 150, 0, TWO_PI);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            ctx.stroke();
            
            // Update stats
            statsEl.innerHTML = `
                FPS: ${fps}<br>
                Particles: ${particles.length}<br>
                Mode: ${mode.toUpperCase()}
            `;
            
            requestAnimationFrame(animate);
        }
        
        // Start animation
        requestAnimationFrame(animate);
    </script>
</body>
</html>
