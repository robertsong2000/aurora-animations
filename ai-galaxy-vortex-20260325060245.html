<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空漩涡 - Galaxy Vortex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            cursor: none;
        }
        
        #cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transition: transform 0.1s ease;
        }
        
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            line-height: 1.6;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }
        
        #info h3 {
            margin-bottom: 10px;
            font-size: 18px;
            color: #ff6b9d;
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }
        
        .control-item {
            margin: 8px 0;
        }
        
        label {
            display: inline-block;
            width: 100px;
        }
        
        input[type="range"] {
            width: 150px;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        span.value {
            display: inline-block;
            width: 40px;
            text-align: right;
            margin-left: 10px;
            color: #ff6b9d;
        }
        
        button {
            margin-top: 10px;
            margin-right: 10px;
            padding: 8px 20px;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 157, 0.4);
        }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <canvas id="canvas"></canvas>
    
    <div id="info">
        <h3>🌌 星空漩涡</h3>
        <div>星星数量: <span id="starCount">0</span></div>
        <div>星云数量: <span id="nebulaCount">0</span></div>
        <div>漩涡强度: <span id="vortexStrength">0</span></div>
        <div>FPS: <span id="fps">0</span></div>
    </div>
    
    <div id="controls">
        <div class="control-item">
            <label>星星密度:</label>
            <input type="range" id="starDensity" min="100" max="1000" value="400">
            <span class="value" id="starDensityValue">400</span>
        </div>
        <div class="control-item">
            <label>漩涡速度:</label>
            <input type="range" id="vortexSpeed" min="0" max="100" value="50">
            <span class="value" id="vortexSpeedValue">50</span>
        </div>
        <div class="control-item">
            <label>星云浓度:</label>
            <input type="range" id="nebulaDensity" min="1" max="10" value="5">
            <span class="value" id="nebulaDensityValue">5</span>
        </div>
        <div class="control-item">
            <label>流星频率:</label>
            <input type="range" id="meteorFreq" min="0" max="20" value="5">
            <span class="value" id="meteorFreqValue">5</span>
        </div>
        <button id="vortexBtn">触发漩涡</button>
        <button id="resetBtn">重置</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        // 配置
        let config = {
            starCount: 400,
            vortexSpeed: 50,
            nebulaCount: 5,
            meteorFrequency: 5,
            vortexActive: false,
            vortexIntensity: 0
        };
        
        // 鼠标位置
        let mouse = { x: width / 2, y: height / 2 };
        
        // 星星
        let stars = [];
        
        // 星云
        let nebulae = [];
        
        // 流星
        let meteors = [];
        
        // 漩涡中心
        let vortexCenter = { x: width / 2, y: height / 2 };
        let vortexAngle = 0;
        
        // FPS 计算
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 0;
        
        // 颜色主题
        const nebulaColors = [
            { r: 255, g: 107, b: 157, a: 0.03 },  // 粉红
            { r: 107, g: 185, b: 240, a: 0.03 },  // 蓝色
            { r: 255, g: 159, b: 67, a: 0.03 },   // 橙色
            { r: 162, g: 155, b: 254, a: 0.03 },  // 紫色
            { r: 0, g: 210, b: 211, a: 0.03 }     // 青色
        ];
        
        // 星星类
        class Star {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.baseSize = this.size;
                this.brightness = Math.random();
                this.twinkleSpeed = Math.random() * 0.02 + 0.01;
                this.twinklePhase = Math.random() * Math.PI * 2;
                
                // 速度（用于漩涡效果）
                this.vx = 0;
                this.vy = 0;
                
                // 颜色（白色到淡蓝色）
                const colorShift = Math.random();
                this.color = {
                    r: 200 + Math.floor(colorShift * 55),
                    g: 200 + Math.floor(colorShift * 55),
                    b: 255
                };
            }
            
            update() {
                // 闪烁效果
                this.twinklePhase += this.twinkleSpeed;
                this.brightness = (Math.sin(this.twinklePhase) + 1) / 2;
                this.size = this.baseSize * (0.5 + this.brightness * 0.5);
                
                // 漩涡效果
                if (config.vortexActive || config.vortexIntensity > 0) {
                    const dx = this.x - vortexCenter.x;
                    const dy = this.y - vortexCenter.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance > 0 && distance < Math.max(width, height)) {
                        // 归一化
                        const nx = dx / distance;
                        const ny = dy / distance;
                        
                        // 漩涡力（切向）
                        const vortexForce = config.vortexIntensity * 0.5 / (distance * 0.01 + 1);
                        this.vx += -ny * vortexForce;
                        this.vy += nx * vortexForce;
                        
                        // 向心力
                        const pullForce = config.vortexIntensity * 0.02 / (distance * 0.01 + 1);
                        this.vx -= nx * pullForce;
                        this.vy -= ny * pullForce;
                    }
                }
                
                // 应用速度
                this.x += this.vx;
                this.y += this.vy;
                
                // 速度衰减
                this.vx *= 0.98;
                this.vy *= 0.98;
                
                // 边界检查
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            
            draw() {
                const alpha = 0.3 + this.brightness * 0.7;
                
                // 发光效果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 3
                );
                
                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`);
                gradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.3})`);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 核心点
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                ctx.fill();
            }
        }
        
        // 星云类
        class Nebula {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * 300 + 150;
                this.color = nebulaColors[Math.floor(Math.random() * nebulaColors.length)];
                this.rotationSpeed = (Math.random() - 0.5) * 0.001;
                this.rotation = Math.random() * Math.PI * 2;
                this.driftX = (Math.random() - 0.5) * 0.2;
                this.driftY = (Math.random() - 0.5) * 0.2;
            }
            
            update() {
                this.rotation += this.rotationSpeed;
                this.x += this.driftX;
                this.y += this.driftY;
                
                // 边界循环
                if (this.x < -this.radius) this.x = width + this.radius;
                if (this.x > width + this.radius) this.x = -this.radius;
                if (this.y < -this.radius) this.y = height + this.radius;
                if (this.y > height + this.radius) this.y = -this.radius;
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // 创建星云形状
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.color.a * 2})`);
                gradient.addColorStop(0.3, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.color.a})`);
                gradient.addColorStop(0.7, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.color.a * 0.3})`);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                // 椭圆星云
                ctx.beginPath();
                ctx.ellipse(0, 0, this.radius, this.radius * 0.6, 0, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // 流星类
        class Meteor {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = -10;
                this.length = Math.random() * 80 + 40;
                this.speed = Math.random() * 15 + 10;
                this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.3;
                this.alpha = 1;
                this.active = true;
                
                // 颜色
                const colorType = Math.floor(Math.random() * 3);
                if (colorType === 0) {
                    this.color = { r: 255, g: 255, b: 255 }; // 白色
                } else if (colorType === 1) {
                    this.color = { r: 255, g: 200, b: 100 }; // 金色
                } else {
                    this.color = { r: 100, g: 200, b: 255 }; // 蓝色
                }
            }
            
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                
                // 淡出
                if (this.y > height * 0.7) {
                    this.alpha -= 0.02;
                }
                
                if (this.x > width + 100 || this.y > height + 100 || this.alpha <= 0) {
                    this.active = false;
                }
            }
            
            draw() {
                const tailX = this.x - Math.cos(this.angle) * this.length;
                const tailY = this.y - Math.sin(this.angle) * this.length;
                
                // 流星尾迹
                const gradient = ctx.createLinearGradient(tailX, tailY, this.x, this.y);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0)');
                gradient.addColorStop(0.7, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha * 0.5})`);
                gradient.addColorStop(1, `rgba(255, 255, 255, ${this.alpha})`);
                
                ctx.beginPath();
                ctx.moveTo(tailX, tailY);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 流星头部发光
                const headGradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 10);
                headGradient.addColorStop(0, `rgba(255, 255, 255, ${this.alpha})`);
                headGradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha * 0.5})`);
                headGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, 10, 0, Math.PI * 2);
                ctx.fillStyle = headGradient;
                ctx.fill();
            }
        }
        
        // 初始化
        function init() {
            stars = [];
            nebulae = [];
            meteors = [];
            
            // 创建星星
            for (let i = 0; i < config.starCount; i++) {
                stars.push(new Star());
            }
            
            // 创建星云
            for (let i = 0; i < config.nebulaCount; i++) {
                nebulae.push(new Nebula());
            }
        }
        
        // 绘制漩涡中心
        function drawVortexCenter() {
            if (config.vortexIntensity > 0) {
                const gradient = ctx.createRadialGradient(
                    vortexCenter.x, vortexCenter.y, 0,
                    vortexCenter.x, vortexCenter.y, 100
                );
                
                gradient.addColorStop(0, `rgba(255, 107, 157, ${config.vortexIntensity * 0.5})`);
                gradient.addColorStop(0.5, `rgba(107, 185, 240, ${config.vortexIntensity * 0.2})`);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                ctx.beginPath();
                ctx.arc(vortexCenter.x, vortexCenter.y, 100, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 漩涡旋转线
                vortexAngle += config.vortexIntensity * 0.05;
                for (let i = 0; i < 3; i++) {
                    const angle = vortexAngle + (i * Math.PI * 2 / 3);
                    const length = 80 + Math.sin(vortexAngle * 2 + i) * 20;
                    
                    ctx.beginPath();
                    ctx.moveTo(vortexCenter.x, vortexCenter.y);
                    ctx.lineTo(
                        vortexCenter.x + Math.cos(angle) * length,
                        vortexCenter.y + Math.sin(angle) * length
                    );
                    ctx.strokeStyle = `rgba(255, 107, 157, ${config.vortexIntensity * 0.5})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
        }
        
        // 动画循环
        function animate(currentTime) {
            // FPS 计算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                document.getElementById('fps').textContent = fps;
            }
            
            // 清除画布
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 更新漩涡强度
            if (config.vortexActive) {
                config.vortexIntensity = Math.min(1, config.vortexIntensity + 0.02);
            } else {
                config.vortexIntensity = Math.max(0, config.vortexIntensity - 0.01);
            }
            
            // 生成流星
            if (Math.random() < config.meteorFrequency * 0.001) {
                meteors.push(new Meteor());
            }
            
            // 更新和绘制星云
            nebulae.forEach(nebula => {
                nebula.update();
                nebula.draw();
            });
            
            // 绘制漩涡中心
            drawVortexCenter();
            
            // 更新和绘制星星
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            
            // 更新和绘制流星
            meteors = meteors.filter(meteor => meteor.active);
            meteors.forEach(meteor => {
                meteor.update();
                meteor.draw();
            });
            
            // 更新信息
            document.getElementById('starCount').textContent = stars.length;
            document.getElementById('nebulaCount').textContent = nebulae.length;
            document.getElementById('vortexStrength').textContent = Math.round(config.vortexIntensity * 100);
            
            requestAnimationFrame(animate);
        }
        
        // 鼠标交互1：移动漩涡中心
        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            cursor.style.left = mouse.x - 10 + 'px';
            cursor.style.top = mouse.y - 10 + 'px';
            
            if (config.vortexIntensity > 0) {
                vortexCenter.x = mouse.x;
                vortexCenter.y = mouse.y;
            }
        });
        
        // 鼠标交互2：点击触发漩涡
        canvas.addEventListener('click', (e) => {
            vortexCenter.x = e.clientX;
            vortexCenter.y = e.clientY;
            config.vortexActive = true;
            
            // 添加额外星星
            for (let i = 0; i < 50; i++) {
                const star = new Star();
                star.x = vortexCenter.x + (Math.random() - 0.5) * 200;
                star.y = vortexCenter.y + (Math.random() - 0.5) * 200;
                stars.push(star);
            }
            
            setTimeout(() => {
                config.vortexActive = false;
            }, 3000);
        });
        
        // 右键发射流星雨
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const meteor = new Meteor();
                    meteor.x = e.clientX + (Math.random() - 0.5) * 200;
                    meteors.push(meteor);
                }, i * 100);
            }
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            vortexCenter.x = touch.clientX;
            vortexCenter.y = touch.clientY;
            config.vortexActive = true;
            
            setTimeout(() => {
                config.vortexActive = false;
            }, 3000);
        });
        
        // 控制面板事件
        document.getElementById('starDensity').addEventListener('input', (e) => {
            const newCount = parseInt(e.target.value);
            document.getElementById('starDensityValue').textContent = newCount;
            
            if (newCount > stars.length) {
                for (let i = stars.length; i < newCount; i++) {
                    stars.push(new Star());
                }
            } else {
                stars.length = newCount;
            }
            config.starCount = newCount;
        });
        
        document.getElementById('vortexSpeed').addEventListener('input', (e) => {
            config.vortexSpeed = parseInt(e.target.value);
            document.getElementById('vortexSpeedValue').textContent = e.target.value;
        });
        
        document.getElementById('nebulaDensity').addEventListener('input', (e) => {
            const newCount = parseInt(e.target.value);
            document.getElementById('nebulaDensityValue').textContent = newCount;
            
            if (newCount > nebulae.length) {
                for (let i = nebulae.length; i < newCount; i++) {
                    nebulae.push(new Nebula());
                }
            } else {
                nebulae.length = newCount;
            }
            config.nebulaCount = newCount;
        });
        
        document.getElementById('meteorFreq').addEventListener('input', (e) => {
            config.meteorFrequency = parseInt(e.target.value);
            document.getElementById('meteorFreqValue').textContent = e.target.value;
        });
        
        document.getElementById('vortexBtn').addEventListener('click', () => {
            vortexCenter.x = width / 2;
            vortexCenter.y = height / 2;
            config.vortexActive = true;
            
            setTimeout(() => {
                config.vortexActive = false;
            }, 3000);
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            config.vortexActive = false;
            config.vortexIntensity = 0;
            init();
        });
        
        // 窗口调整
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            init();
        });
        
        // 性能优化：移动设备减少粒子
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            config.starCount = 200;
            config.nebulaCount = 3;
            document.getElementById('starDensity').value = 200;
            document.getElementById('starDensityValue').textContent = 200;
            document.getElementById('nebulaDensity').value = 3;
            document.getElementById('nebulaDensityValue').textContent = 3;
        }
        
        // 隐藏自定义光标在控制面板上
        document.getElementById('controls').addEventListener('mouseenter', () => {
            cursor.style.display = 'none';
        });
        
        document.getElementById('controls').addEventListener('mouseleave', () => {
            cursor.style.display = 'block';
        });
        
        document.getElementById('info').addEventListener('mouseenter', () => {
            cursor.style.display = 'none';
        });
        
        document.getElementById('info').addEventListener('mouseleave', () => {
            cursor.style.display = 'block';
        });
        
        // 初始化并启动
        init();
        animate(performance.now());
    </script>
</body>
</html>
