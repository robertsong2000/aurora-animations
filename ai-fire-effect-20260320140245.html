<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火焰效果 | Fire Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 100, 0.8);
            font-size: 13px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 100, 0, 0.5);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 100, 0, 0.3);
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 20px;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 20px rgba(255, 50, 0, 0.5);
        }
        
        .fps {
            position: fixed;
            top: 10px;
            right: 10px;
            color: rgba(255, 150, 50, 0.7);
            font-size: 12px;
            font-family: monospace;
            z-index: 10;
        }
        
        .particle-count {
            position: fixed;
            top: 10px;
            left: 10px;
            color: rgba(255, 150, 50, 0.7);
            font-size: 12px;
            font-family: monospace;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="fire"></canvas>
    <div class="title">FIRE</div>
    <div class="info">移动鼠标控制风向 | 点击产生火焰爆发</div>
    <div class="fps" id="fps"></div>
    <div class="particle-count" id="count">粒子: 0</div>
    
    <script>
        const canvas = document.getElementById('fire');
        const ctx = canvas.getContext('2d');
        const fpsDisplay = document.getElementById('fps');
        const countDisplay = document.getElementById('count');
        
        let width, height;
        let particles = [];
        let sparks = [];
        let smokeParticles = [];
        let embers = [];
        let mouseX = 0, mouseY = 0;
        let windX = 0;
        let time = 0;
        
        // FPS 计算
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        // 火焰粒子类
        class FireParticle {
            constructor(x, y, vx = 0, vy = 0) {
                this.x = x;
                this.y = y;
                this.vx = vx + (Math.random() - 0.5) * 2;
                this.vy = vy - Math.random() * 3 - 2;
                this.life = 1;
                this.decay = 0.01 + Math.random() * 0.02;
                this.size = Math.random() * 20 + 10;
                this.originalSize = this.size;
                
                // 颜色：从底部橙色到顶部黄色再到白色
                this.colorPhase = 0;
            }
            
            update() {
                // 应用风力
                this.vx += windX * 0.1;
                
                // 向上运动（热空气上升）
                this.vy -= 0.05;
                
                // 减速
                this.vx *= 0.99;
                this.vy *= 0.99;
                
                // 移动
                this.x += this.vx;
                this.y += this.vy;
                
                // 衰减
                this.life -= this.decay;
                this.size = this.originalSize * this.life;
                
                // 颜色相位（从黄到橙到红）
                this.colorPhase += 0.05;
                
                return this.life > 0;
            }
            
            draw() {
                const alpha = this.life * 0.8;
                
                // 根据生命周期计算颜色
                let r, g, b;
                if (this.life > 0.7) {
                    // 顶部：白色/黄色
                    r = 255;
                    g = 200 + (1 - this.life) * 300;
                    b = 100 + (1 - this.life) * 500;
                } else if (this.life > 0.4) {
                    // 中间：橙色
                    r = 255;
                    g = 100 + this.life * 150;
                    b = 0;
                } else {
                    // 底部：红色
                    r = 200 + this.life * 55;
                    g = this.life * 100;
                    b = 0;
                }
                
                // 绘制发光粒子
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${alpha})`);
                gradient.addColorStop(0.5, `rgba(${r * 0.8}, ${g * 0.5}, 0, ${alpha * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        // 火星类
        class Spark {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
                const speed = 3 + Math.random() * 5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.03;
                this.size = 1 + Math.random() * 2;
                this.trail = [];
                this.trailLength = 5;
            }
            
            update() {
                // 保存轨迹
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.trailLength) {
                    this.trail.shift();
                }
                
                // 应用重力和风力
                this.vy += 0.1;
                this.vx += windX * 0.05;
                
                this.x += this.vx;
                this.y += this.vy;
                
                this.life -= this.decay;
                
                return this.life > 0;
            }
            
            draw() {
                // 绘制轨迹
                this.trail.forEach((point, i) => {
                    const alpha = (i / this.trailLength) * this.life * 0.5;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, this.size * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 200, 100, ${alpha})`;
                    ctx.fill();
                });
                
                // 绘制火星
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 200, ${this.life})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ff9900';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        // 烟雾粒子类
        class Smoke {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = -Math.random() * 1 - 0.5;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
                this.size = Math.random() * 30 + 20;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
            }
            
            update() {
                this.vx += windX * 0.05;
                this.vy -= 0.02;
                
                this.x += this.vx;
                this.y += this.vy;
                
                this.life -= this.decay;
                this.size += 0.5;
                this.rotation += this.rotationSpeed;
                
                return this.life > 0;
            }
            
            draw() {
                const alpha = this.life * 0.15;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                gradient.addColorStop(0, `rgba(80, 80, 80, ${alpha})`);
                gradient.addColorStop(0.5, `rgba(60, 60, 60, ${alpha * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // 灰烬类
        class Ember {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = -Math.random() * 2 - 1;
                this.life = 1;
                this.decay = 0.003 + Math.random() * 0.005;
                this.size = 1 + Math.random() * 2;
                this.wobblePhase = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.1 + 0.05;
            }
            
            update() {
                this.wobblePhase += this.wobbleSpeed;
                this.vx += Math.sin(this.wobblePhase) * 0.05;
                this.vy -= 0.01;
                this.vx += windX * 0.02;
                
                this.x += this.vx;
                this.y += this.vy;
                
                this.life -= this.decay;
                
                return this.life > 0 && this.y > 0;
            }
            
            draw() {
                const pulse = Math.sin(this.wobblePhase * 2) * 0.3 + 0.7;
                const alpha = this.life * pulse;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 150, 50, ${alpha})`;
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#ff6600';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        // 绘制火焰源
        function drawFireSource() {
            const x = width / 2;
            const y = height * 0.85;
            const radius = 80;
            
            // 发光底座
            const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
            gradient.addColorStop(0, 'rgba(255, 100, 0, 0.3)');
            gradient.addColorStop(0.5, 'rgba(255, 50, 0, 0.1)');
            gradient.addColorStop(1, 'transparent');
            
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // 木材底座
            ctx.fillStyle = '#2a1a0a';
            ctx.fillRect(x - 60, y - 10, 120, 20);
            ctx.fillRect(x - 50, y - 5, 100, 15);
        }
        
        // 生成火焰粒子
        function generateFireParticles() {
            const x = width / 2 + (Math.random() - 0.5) * 60;
            const y = height * 0.85;
            
            particles.push(new FireParticle(x, y));
            
            // 随机生成火星
            if (Math.random() > 0.95) {
                sparks.push(new Spark(x, y));
            }
            
            // 随机生成烟雾
            if (Math.random() > 0.92) {
                smokeParticles.push(new Smoke(x, y));
            }
            
            // 随机生成灰烬
            if (Math.random() > 0.97) {
                embers.push(new Ember(x, y));
            }
        }
        
        // 火焰爆发
        function createBurst(x, y) {
            // 大量火焰粒子
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 3;
                particles.push(new FireParticle(
                    x, y,
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed - 3
                ));
            }
            
            // 大量火星
            for (let i = 0; i < 15; i++) {
                sparks.push(new Spark(x, y));
            }
            
            // 灰烬
            for (let i = 0; i < 10; i++) {
                embers.push(new Ember(x, y));
            }
        }
        
        // 绘制背景
        function drawBackground() {
            // 黑色背景带渐变
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#000000');
            gradient.addColorStop(0.7, '#0a0500');
            gradient.addColorStop(1, '#1a0a00');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // 环境光
            const ambientGradient = ctx.createRadialGradient(
                width / 2, height * 0.85, 0,
                width / 2, height * 0.85, height * 0.8
            );
            ambientGradient.addColorStop(0, 'rgba(255, 50, 0, 0.1)');
            ambientGradient.addColorStop(0.5, 'rgba(255, 30, 0, 0.05)');
            ambientGradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = ambientGradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        // 主渲染循环
        function render() {
            // 绘制背景
            drawBackground();
            
            // 计算风力（基于鼠标位置）
            const targetWind = (mouseX - width / 2) / width * 2;
            windX += (targetWind - windX) * 0.05;
            
            // 绘制火焰源
            drawFireSource();
            
            // 生成新粒子
            for (let i = 0; i < 3; i++) {
                generateFireParticles();
            }
            
            // 更新和绘制烟雾（最底层）
            smokeParticles = smokeParticles.filter(smoke => {
                const alive = smoke.update();
                if (alive) smoke.draw();
                return alive;
            });
            
            // 更新和绘制火焰粒子
            particles = particles.filter(particle => {
                const alive = particle.update();
                if (alive) particle.draw();
                return alive;
            });
            
            // 更新和绘制火星
            sparks = sparks.filter(spark => {
                const alive = spark.update();
                if (alive) spark.draw();
                return alive;
            });
            
            // 更新和绘制灰烬
            embers = embers.filter(ember => {
                const alive = ember.update();
                if (alive) ember.draw();
                return alive;
            });
            
            // 更新粒子计数
            const totalParticles = particles.length + sparks.length + smokeParticles.length + embers.length;
            countDisplay.textContent = `粒子: ${totalParticles}`;
            
            time++;
            
            // FPS 计算
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                fpsDisplay.textContent = `FPS: ${fps}`;
            }
            
            requestAnimationFrame(render);
        }
        
        // 调整画布大小
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        });
        
        canvas.addEventListener('click', (e) => {
            createBurst(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                createBurst(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
        
        // 初始化
        resize();
        mouseX = width / 2;
        mouseY = height / 2;
        render();
    </script>
</body>
</html>
