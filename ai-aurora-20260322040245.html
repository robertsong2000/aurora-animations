<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极光幻境 | Aurora Dreams</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 300;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            pointer-events: none;
            text-shadow: 
                0 0 20px rgba(100, 255, 218, 0.5),
                0 0 40px rgba(100, 255, 218, 0.3),
                0 0 60px rgba(100, 255, 218, 0.2);
            animation: titleGlow 3s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes titleGlow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: clamp(0.8rem, 2vw, 1rem);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            animation: fadeIn 2s ease-in 1s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(100, 255, 218, 0.7);
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="title">极光</div>
    <div class="instructions">
        移动鼠标 · 点击创造极光脉冲 · 滚轮调整强度
    </div>
    <div class="stats">
        <div>FPS: <span id="fps">60</span></div>
        <div>强度: <span id="intensity">50</span>%</div>
    </div>

    <script>
        // 性能监控
        const fpsCounter = document.getElementById('fps');
        const intensityDisplay = document.getElementById('intensity');
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        let intensity = 50;

        // Canvas 设置
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        // 极光参数
        const auroras = [];
        const maxAuroras = 8;
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;
        let isMouseDown = false;
        let pulseTime = 0;

        // 响应式调整
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        // 极光类
        class Aurora {
            constructor(x, y, isPulse = false) {
                this.x = x;
                this.y = y;
                this.baseX = x;
                this.baseY = y;
                this.isPulse = isPulse;
                this.points = [];
                this.numPoints = Math.floor(width / 20) + 10;
                this.time = Math.random() * 1000;
                this.hue = Math.random() * 60 + 120; // 120-180 (绿色到青色)
                this.alpha = isPulse ? 0.8 : 0.3;
                this.decay = isPulse ? 0.015 : 0;
                this.amplitude = isPulse ? 150 : 50 + Math.random() * 50;
                this.frequency = 0.002 + Math.random() * 0.002;
                this.speed = 0.5 + Math.random() * 0.5;
                
                // 初始化点
                for (let i = 0; i < this.numPoints; i++) {
                    this.points.push({
                        x: (i / this.numPoints) * width,
                        y: 0,
                        offset: Math.random() * Math.PI * 2
                    });
                }
            }

            update() {
                this.time += this.speed;
                
                // 脉冲衰减
                if (this.isPulse) {
                    this.alpha -= this.decay;
                    this.amplitude *= 0.98;
                }

                // 跟随鼠标
                const dx = (targetX - this.baseX) * 0.01;
                const dy = (targetY - this.baseY) * 0.01;
                this.baseX += dx;
                this.baseY += dy;

                // 更新点
                for (let i = 0; i < this.points.length; i++) {
                    const point = this.points[i];
                    const wave1 = Math.sin(this.time * this.frequency * 100 + point.offset + i * 0.1);
                    const wave2 = Math.sin(this.time * this.frequency * 50 + i * 0.05);
                    const wave3 = Math.cos(this.time * this.frequency * 30 + i * 0.08);
                    
                    point.y = this.baseY + 
                              wave1 * this.amplitude * (intensity / 50) +
                              wave2 * this.amplitude * 0.5 +
                              wave3 * this.amplitude * 0.3;
                }

                return this.alpha > 0;
            }

            draw() {
                ctx.save();
                
                // 创建渐变
                const gradient = ctx.createLinearGradient(0, this.baseY - 200, 0, this.baseY + 200);
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 60%, 0)`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 80%, 60%, ${this.alpha})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 80%, 60%, 0)`);

                // 绘制极光曲线
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                
                for (let i = 1; i < this.points.length - 2; i++) {
                    const xc = (this.points[i].x + this.points[i + 1].x) / 2;
                    const yc = (this.points[i].y + this.points[i + 1].y) / 2;
                    ctx.quadraticCurveTo(this.points[i].x, this.points[i].y, xc, yc);
                }
                
                ctx.lineTo(width, this.points[this.points.length - 1].y);
                ctx.lineTo(width, height);
                ctx.lineTo(0, height);
                ctx.lineTo(0, this.points[0].y);
                ctx.closePath();
                
                ctx.fillStyle = gradient;
                ctx.fill();

                // 发光效果
                ctx.shadowBlur = 50;
                ctx.shadowColor = `hsla(${this.hue}, 80%, 60%, ${this.alpha})`;
                ctx.fill();
                
                ctx.restore();
            }
        }

        // 星星类
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2;
                this.twinkle = Math.random() * Math.PI * 2;
                this.speed = 0.02 + Math.random() * 0.03;
            }

            update() {
                this.twinkle += this.speed;
            }

            draw() {
                const alpha = (Math.sin(this.twinkle) + 1) / 2 * 0.8 + 0.2;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 初始化星星
        const stars = [];
        function initStars() {
            const numStars = Math.floor((width * height) / 10000);
            for (let i = 0; i < numStars; i++) {
                stars.push(new Star());
            }
        }

        // 初始化极光
        function initAuroras() {
            for (let i = 0; i < maxAuroras; i++) {
                auroras.push(new Aurora(
                    width / 2,
                    height * 0.3 + i * 50
                ));
            }
        }

        // 创建脉冲效果
        function createPulse(x, y) {
            const pulse = new Aurora(x, y, true);
            pulse.hue = Math.random() * 60 + 120;
            pulse.amplitude = 200;
            auroras.push(pulse);
        }

        // 动画循环
        function animate(currentTime) {
            // FPS 计算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                fpsCounter.textContent = fps;
            }

            // 清空画布（带淡出效果）
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 更新和绘制星星
            stars.forEach(star => {
                star.update();
                star.draw();
            });

            // 平滑鼠标跟随
            targetX += (mouseX - targetX) * 0.05;
            targetY += (mouseY - targetY) * 0.05;

            // 更新和绘制极光
            for (let i = auroras.length - 1; i >= 0; i--) {
                const alive = auroras[i].update();
                if (!alive) {
                    auroras.splice(i, 1);
                } else {
                    auroras[i].draw();
                }
            }

            // 鼠标按下时创建脉冲
            if (isMouseDown) {
                pulseTime++;
                if (pulseTime % 5 === 0) {
                    createPulse(mouseX, mouseY);
                }
            }

            requestAnimationFrame(animate);
        }

        // 事件监听
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            createPulse(e.clientX, e.clientY);
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
            pulseTime = 0;
        });

        canvas.addEventListener('mouseleave', () => {
            isMouseDown = false;
            pulseTime = 0;
        });

        // 滚轮调整强度
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            intensity = Math.max(10, Math.min(100, intensity - e.deltaY * 0.1));
            intensityDisplay.textContent = Math.round(intensity);
        });

        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            isMouseDown = true;
            createPulse(mouseX, mouseY);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });

        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
            pulseTime = 0;
        });

        // 初始化
        resize();
        initStars();
        initAuroras();
        
        // 设置初始鼠标位置
        mouseX = targetX = width / 2;
        mouseY = targetY = height / 2;

        // 开始动画
        requestAnimationFrame(animate);
    </script>
</body>
</html>
