<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万花筒镜像 | Kaleidoscope Mirror</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Georgia', serif;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .title {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .title h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 
                0 0 20px rgba(255, 100, 255, 0.8),
                0 0 40px rgba(100, 255, 255, 0.6);
            letter-spacing: 0.3em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: rgba(255, 200, 255, 0.7);
            letter-spacing: 0.2em;
        }

        .instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 200, 255, 0.8);
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 100, 255, 0.3);
        }

        .stats div {
            margin: 5px 0;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 100, 255, 0.3);
            color: rgba(255, 200, 255, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 100, 255, 0.2);
            border-color: rgba(255, 100, 255, 0.6);
        }

        .control-btn.active {
            background: rgba(255, 100, 255, 0.3);
            border-color: rgba(255, 100, 255, 0.8);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="controls">
        <button class="control-btn" id="segmentsBtn">6段</button>
        <button class="control-btn" id="colorBtn">彩虹色</button>
        <button class="control-btn" id="speedBtn">正常速度</button>
    </div>
    
    <div class="title">
        <h1>万花筒</h1>
        <div class="subtitle">镜像的魔法</div>
    </div>
    
    <div class="instructions">
        移动鼠标绘制图案 · 点击创建对称爆发 · 滚轮调整镜像段数
    </div>
    
    <div class="stats">
        <div>FPS: <span id="fps">60</span></div>
        <div>段数: <span id="segments">6</span></div>
        <div>图案数: <span id="patterns">0</span></div>
    </div>

    <script>
        // 性能监控
        const fpsCounter = document.getElementById('fps');
        const segmentsDisplay = document.getElementById('segments');
        const patternsCounter = document.getElementById('patterns');
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        let numSegments = 6;
        let colorMode = 0;
        let speedMultiplier = 1.0;

        // Canvas 设置
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let centerX, centerY, radius;

        // 图案系统
        const patterns = [];
        const particles = [];
        let mouseX = 0;
        let mouseY = 0;
        let lastMouseX = 0;
        let lastMouseY = 0;
        let time = 0;

        // 颜色模式
        const colorModes = [
            { name: '彩虹色', getColor: (i, total) => `hsl(${(i / total) * 360}, 80%, 60%)` },
            { name: '火焰色', getColor: (i, total) => `hsl(${20 + (i / total) * 40}, 100%, 50%)` },
            { name: '海洋色', getColor: (i, total) => `hsl(${180 + (i / total) * 60}, 70%, 50%)` },
            { name: '极光色', getColor: (i, total) => `hsl(${120 + (i / total) * 120}, 80%, 60%)` }
        ];

        // 响应式调整
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            radius = Math.min(width, height) * 0.45;
        }

        // 图案类
        class Pattern {
            constructor(x, y, isBurst = false) {
                // 转换为极坐标
                const dx = x - centerX;
                const dy = y - centerY;
                this.angle = Math.atan2(dy, dx);
                this.distance = Math.sqrt(dx * dx + dy * dy);
                this.size = isBurst ? 8 + Math.random() * 6 : 3 + Math.random() * 4;
                this.hue = Math.random() * 360;
                this.life = isBurst ? 0.8 : 1;
                this.decay = isBurst ? 0.015 : 0.005;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.shape = Math.floor(Math.random() * 3); // 0=圆, 1=三角, 2=方形
            }

            update() {
                this.life -= this.decay;
                this.rotation += this.rotationSpeed * speedMultiplier;
                return this.life > 0;
            }

            drawInSegment(baseAngle) {
                const angle = baseAngle + this.angle;
                const x = centerX + Math.cos(angle) * this.distance;
                const y = centerY + Math.sin(angle) * this.distance;
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(this.rotation);
                
                const color = colorModes[colorMode].getColor(this.hue, 360);
                ctx.fillStyle = color;
                ctx.globalAlpha = this.life;
                ctx.shadowBlur = 15;
                ctx.shadowColor = color;
                
                ctx.beginPath();
                
                switch (this.shape) {
                    case 0: // 圆形
                        ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                        break;
                    case 1: // 三角形
                        ctx.moveTo(0, -this.size);
                        ctx.lineTo(this.size * 0.866, this.size * 0.5);
                        ctx.lineTo(-this.size * 0.866, this.size * 0.5);
                        ctx.closePath();
                        break;
                    case 2: // 方形
                        ctx.rect(-this.size / 2, -this.size / 2, this.size, this.size);
                        break;
                }
                
                ctx.fill();
                ctx.restore();
            }
        }

        // 粒子类
        class Particle {
            constructor(x, y) {
                const dx = x - centerX;
                const dy = y - centerY;
                this.angle = Math.atan2(dy, dx);
                this.distance = Math.sqrt(dx * dx + dy * dy);
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
                this.size = 2 + Math.random() * 2;
                this.life = 1;
                this.decay = 0.02;
                this.hue = Math.random() * 360;
            }

            update() {
                this.distance += Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                this.life -= this.decay;
                return this.life > 0 && this.distance < radius;
            }

            drawInSegment(baseAngle) {
                const angle = baseAngle + this.angle;
                const x = centerX + Math.cos(angle) * this.distance;
                const y = centerY + Math.sin(angle) * this.distance;
                
                ctx.save();
                const color = colorModes[colorMode].getColor(this.hue, 360);
                ctx.fillStyle = color;
                ctx.globalAlpha = this.life;
                ctx.shadowBlur = 10;
                ctx.shadowColor = color;
                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 绘制万花筒
        function drawKaleidoscope() {
            const segmentAngle = (Math.PI * 2) / numSegments;
            
            // 为每个段绘制镜像
            for (let i = 0; i < numSegments; i++) {
                const baseAngle = i * segmentAngle;
                const mirror = i % 2 === 1;
                
                ctx.save();
                
                if (mirror) {
                    ctx.translate(centerX, centerY);
                    ctx.scale(-1, 1);
                    ctx.translate(-centerX, -centerY);
                }
                
                // 绘制图案
                patterns.forEach(pattern => {
                    pattern.drawInSegment(baseAngle);
                });
                
                // 绘制粒子
                particles.forEach(particle => {
                    particle.drawInSegment(baseAngle);
                });
                
                ctx.restore();
            }
        }

        // 创建爆发
        function createBurst(x, y, count = 20) {
            for (let i = 0; i < count; i++) {
                patterns.push(new Pattern(x, y, true));
            }
            for (let i = 0; i < count / 2; i++) {
                particles.push(new Particle(x, y));
            }
        }

        // 自动生成图案
        function autoGeneratePattern() {
            if (Math.random() < 0.05 * speedMultiplier) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * radius * 0.8;
                const x = centerX + Math.cos(angle) * dist;
                const y = centerY + Math.sin(angle) * dist;
                patterns.push(new Pattern(x, y));
            }
        }

        // 动画循环
        function animate(currentTime) {
            // FPS 计算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                fpsCounter.textContent = fps;
            }

            time += 0.01 * speedMultiplier;

            // 清空画布
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 绘制中心圆
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 100, 255, 0.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            // 自动生成图案
            autoGeneratePattern();

            // 绘制万花筒
            drawKaleidoscope();

            // 更新图案
            for (let i = patterns.length - 1; i >= 0; i--) {
                const alive = patterns[i].update();
                if (!alive) {
                    patterns.splice(i, 1);
                }
            }

            // 更新粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                const alive = particles[i].update();
                if (!alive) {
                    particles.splice(i, 1);
                }
            }

            patternsCounter.textContent = patterns.length + particles.length;

            // 绘制鼠标轨迹
            if (Math.hypot(mouseX - lastMouseX, mouseY - lastMouseY) > 10) {
                const dist = Math.hypot(mouseX - centerX, mouseY - centerY);
                if (dist < radius) {
                    patterns.push(new Pattern(mouseX, mouseY));
                }
                lastMouseX = mouseX;
                lastMouseY = mouseY;
            }

            requestAnimationFrame(animate);
        }

        // 事件监听
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('click', (e) => {
            createBurst(e.clientX, e.clientY, 30);
        });

        // 滚轮调整段数
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            numSegments = Math.max(3, Math.min(16, numSegments - Math.sign(e.deltaY)));
            segmentsDisplay.textContent = numSegments;
        });

        // 按钮控制
        document.getElementById('segmentsBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            numSegments = numSegments >= 12 ? 3 : numSegments + 1;
            e.target.textContent = numSegments + '段';
            segmentsDisplay.textContent = numSegments;
        });

        document.getElementById('colorBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            colorMode = (colorMode + 1) % colorModes.length;
            e.target.textContent = colorModes[colorMode].name;
        });

        document.getElementById('speedBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            speedMultiplier = speedMultiplier === 1.0 ? 2.0 : (speedMultiplier === 2.0 ? 0.5 : 1.0);
            const labels = { 0.5: '慢速', 1.0: '正常速度', 2.0: '快速' };
            e.target.textContent = labels[speedMultiplier];
        });

        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            lastMouseX = mouseX;
            lastMouseY = mouseY;
            createBurst(mouseX, mouseY, 30);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                // 创建多个爆发
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        const angle = Math.random() * Math.PI * 2;
                        const dist = Math.random() * radius * 0.6;
                        createBurst(
                            centerX + Math.cos(angle) * dist,
                            centerY + Math.sin(angle) * dist,
                            20
                        );
                    }, i * 100);
                }
            } else if (e.code === 'KeyC') {
                // 切换颜色
                colorMode = (colorMode + 1) % colorModes.length;
                document.getElementById('colorBtn').textContent = colorModes[colorMode].name;
            }
        });

        // 初始化
        resize();
        
        // 开始动画
        requestAnimationFrame(animate);

        // 初始爆发
        setTimeout(() => {
            createBurst(centerX, centerY, 40);
        }, 500);
    </script>
</body>
</html>
