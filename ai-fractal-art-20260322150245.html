<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分形艺术 | Fractal Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            animation: pulse 3s ease-in-out infinite;
        }

        .title h1 {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 
                0 0 20px rgba(255, 100, 255, 0.8),
                0 0 40px rgba(100, 200, 255, 0.6),
                0 0 60px rgba(255, 200, 100, 0.4);
            letter-spacing: 0.3em;
            margin-bottom: 20px;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        .subtitle {
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            color: rgba(200, 200, 255, 0.6);
            letter-spacing: 0.2em;
        }

        .instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            animation: fadeInOut 2s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(200, 200, 255, 0.8);
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 150, 255, 0.3);
        }

        .stats div {
            margin: 5px 0;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(100, 150, 255, 0.3);
            color: rgba(200, 200, 255, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(100, 150, 255, 0.2);
            border-color: rgba(100, 150, 255, 0.6);
        }

        .control-btn.active {
            background: rgba(100, 150, 255, 0.3);
            border-color: rgba(100, 150, 255, 0.8);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="controls">
        <button class="control-btn" id="fractalBtn">曼德博集</button>
        <button class="control-btn" id="animateBtn">动画模式</button>
        <button class="control-btn" id="colorBtn">切换配色</button>
    </div>
    
    <div class="title">
        <h1>分形艺术</h1>
        <div class="subtitle">无限自相似的数学之美</div>
    </div>
    
    <div class="instructions">
        拖动鼠标缩放探索 · 点击重新定位中心 · 滚轮调整迭代深度
    </div>
    
    <div class="stats">
        <div>FPS: <span id="fps">60</span></div>
        <div>迭代: <span id="iterations">100</span></div>
        <div>缩放: <span id="zoom">1.00</span>x</div>
    </div>

    <script>
        // 性能监控
        const fpsCounter = document.getElementById('fps');
        const iterationsDisplay = document.getElementById('iterations');
        const zoomDisplay = document.getElementById('zoom');
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        let maxIterations = 100;
        let zoom = 1.0;
        let isAnimating = false;
        let currentFractal = 0;
        let currentColorScheme = 0;

        // Canvas 设置
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let imageData, pixels;

        // 分形参数
        let centerX = -0.5;
        let centerY = 0;
        let isDragging = false;
        let dragStartX, dragStartY;
        let dragCenterX, dragCenterY;
        let animationPhase = 0;

        // 颜色方案
        const colorSchemes = [
            // 彩虹
            (i, max) => {
                if (i === max) return [0, 0, 0];
                const hue = (i / max) * 360;
                return hslToRgb(hue, 100, 50);
            },
            // 火焰
            (i, max) => {
                if (i === max) return [0, 0, 0];
                const t = i / max;
                return [
                    Math.floor(255 * Math.min(1, t * 3)),
                    Math.floor(255 * Math.max(0, Math.min(1, t * 3 - 1))),
                    Math.floor(255 * Math.max(0, t * 3 - 2))
                ];
            },
            // 海洋
            (i, max) => {
                if (i === max) return [0, 0, 20];
                const t = i / max;
                return [
                    Math.floor(20 * t),
                    Math.floor(100 + 155 * t),
                    Math.floor(150 + 105 * t)
                ];
            },
            // 紫金
            (i, max) => {
                if (i === max) return [0, 0, 0];
                const t = i / max;
                return [
                    Math.floor(100 + 155 * Math.sin(t * Math.PI)),
                    Math.floor(50 * t),
                    Math.floor(150 + 105 * t)
                ];
            }
        ];

        // HSL to RGB
        function hslToRgb(h, s, l) {
            s /= 100;
            l /= 100;
            const c = (1 - Math.abs(2 * l - 1)) * s;
            const x = c * (1 - Math.abs((h / 60) % 2 - 1));
            const m = l - c / 2;
            let r, g, b;
            
            if (h < 60) { r = c; g = x; b = 0; }
            else if (h < 120) { r = x; g = c; b = 0; }
            else if (h < 180) { r = 0; g = c; b = x; }
            else if (h < 240) { r = 0; g = x; b = c; }
            else if (h < 300) { r = x; g = 0; b = c; }
            else { r = c; g = 0; b = x; }
            
            return [
                Math.floor((r + m) * 255),
                Math.floor((g + m) * 255),
                Math.floor((b + m) * 255)
            ];
        }

        // 响应式调整
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            imageData = ctx.createImageData(width, height);
            pixels = imageData.data;
            render();
        }

        // 曼德博集
        function mandelbrot(x, y, maxIter) {
            let real = x;
            let imag = y;
            
            for (let i = 0; i < maxIter; i++) {
                const real2 = real * real;
                const imag2 = imag * imag;
                
                if (real2 + imag2 > 4) {
                    return i;
                }
                
                imag = 2 * real * imag + y;
                real = real2 - imag2 + x;
            }
            
            return maxIter;
        }

        // 朱利亚集
        function julia(x, y, maxIter, cx, cy) {
            let real = x;
            let imag = y;
            
            for (let i = 0; i < maxIter; i++) {
                const real2 = real * real;
                const imag2 = imag * imag;
                
                if (real2 + imag2 > 4) {
                    return i;
                }
                
                const newReal = real2 - imag2 + cx;
                imag = 2 * real * imag + cy;
                real = newReal;
            }
            
            return maxIter;
        }

        // 燃烧船分形
        function burningShip(x, y, maxIter) {
            let real = x;
            let imag = y;
            
            for (let i = 0; i < maxIter; i++) {
                const real2 = real * real;
                const imag2 = imag * imag;
                
                if (real2 + imag2 > 4) {
                    return i;
                }
                
                const newReal = real2 - imag2 + x;
                imag = Math.abs(2 * real * imag) + y;
                real = Math.abs(newReal);
            }
            
            return maxIter;
        }

        // 渲染分形
        function render() {
            const scale = 4 / (zoom * Math.min(width, height));
            const offsetX = centerX - width / 2 * scale;
            const offsetY = centerY - height / 2 * scale;
            
            const colorFunc = colorSchemes[currentColorScheme];
            
            for (let py = 0; py < height; py++) {
                for (let px = 0; px < width; px++) {
                    const x = px * scale + offsetX;
                    const y = py * scale + offsetY;
                    
                    let iterations;
                    
                    if (currentFractal === 0) {
                        iterations = mandelbrot(x, y, maxIterations);
                    } else if (currentFractal === 1) {
                        // 朱利亚集 - 使用动态参数
                        const cx = -0.7 + 0.3 * Math.sin(animationPhase * 0.02);
                        const cy = 0.27015 + 0.1 * Math.cos(animationPhase * 0.02);
                        iterations = julia(x, y, maxIterations, cx, cy);
                    } else {
                        iterations = burningShip(x, y, maxIterations);
                    }
                    
                    const [r, g, b] = colorFunc(iterations, maxIterations);
                    
                    const idx = (py * width + px) * 4;
                    pixels[idx] = r;
                    pixels[idx + 1] = g;
                    pixels[idx + 2] = b;
                    pixels[idx + 3] = 255;
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
        }

        // 动画循环
        function animate() {
            if (!isAnimating) return;
            
            animationPhase++;
            
            if (currentFractal === 1) {
                render();
            } else {
                // 曼德博集和燃烧船：缓慢缩放
                zoom *= 1.002;
                zoomDisplay.textContent = zoom.toFixed(2);
                
                if (zoom > 1000) {
                    zoom = 1;
                    centerX = -0.5 + (Math.random() - 0.5) * 0.5;
                    centerY = (Math.random() - 0.5) * 0.5;
                }
                
                render();
            }
            
            requestAnimationFrame(animate);
        }

        // FPS 计算
        function updateFPS(currentTime) {
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                fpsCounter.textContent = fps;
            }
            requestAnimationFrame(updateFPS);
        }

        // 事件监听
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            dragCenterX = centerX;
            dragCenterY = centerY;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const scale = 4 / (zoom * Math.min(width, height));
            const dx = (e.clientX - dragStartX) * scale;
            const dy = (e.clientY - dragStartY) * scale;
            
            centerX = dragCenterX - dx;
            centerY = dragCenterY - dy;
            
            render();
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
        });

        canvas.addEventListener('click', (e) => {
            if (Math.abs(e.clientX - dragStartX) < 5 && Math.abs(e.clientY - dragStartY) < 5) {
                const scale = 4 / (zoom * Math.min(width, height));
                centerX = (e.clientX - width / 2) * scale + centerX;
                centerY = (e.clientY - height / 2) * scale + centerY;
                zoom *= 2;
                zoomDisplay.textContent = zoom.toFixed(2);
                render();
            }
        });

        // 滚轮调整迭代深度
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            maxIterations = Math.max(10, Math.min(500, maxIterations - Math.sign(e.deltaY) * 10));
            iterationsDisplay.textContent = maxIterations;
            render();
        });

        // 按钮控制
        document.getElementById('fractalBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            currentFractal = (currentFractal + 1) % 3;
            const names = ['曼德博集', '朱利亚集', '燃烧船'];
            e.target.textContent = names[currentFractal];
            render();
        });

        document.getElementById('animateBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            isAnimating = !isAnimating;
            e.target.textContent = isAnimating ? '停止动画' : '动画模式';
            e.target.classList.toggle('active', isAnimating);
            
            if (isAnimating) {
                animate();
            }
        });

        document.getElementById('colorBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            currentColorScheme = (currentColorScheme + 1) % colorSchemes.length;
            const names = ['彩虹', '火焰', '海洋', '紫金'];
            e.target.textContent = names[currentColorScheme];
            render();
        });

        // 触摸支持
        let lastTouchDist = 0;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length === 1) {
                isDragging = true;
                dragStartX = e.touches[0].clientX;
                dragStartY = e.touches[0].clientY;
                dragCenterX = centerX;
                dragCenterY = centerY;
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastTouchDist = Math.sqrt(dx * dx + dy * dy);
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && isDragging) {
                const scale = 4 / (zoom * Math.min(width, height));
                const dx = (e.touches[0].clientX - dragStartX) * scale;
                const dy = (e.touches[0].clientY - dragStartY) * scale;
                
                centerX = dragCenterX - dx;
                centerY = dragCenterY - dy;
                
                render();
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (lastTouchDist > 0) {
                    zoom *= dist / lastTouchDist;
                    zoomDisplay.textContent = zoom.toFixed(2);
                    render();
                }
                
                lastTouchDist = dist;
            }
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isDragging = false;
            lastTouchDist = 0;
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                // 重置视图
                zoom = 1;
                centerX = -0.5;
                centerY = 0;
                zoomDisplay.textContent = zoom.toFixed(2);
                render();
            } else if (e.code === 'KeyR') {
                // 随机位置
                zoom = Math.random() * 10 + 1;
                centerX = -0.5 + (Math.random() - 0.5) * 2;
                centerY = (Math.random() - 0.5) * 2;
                zoomDisplay.textContent = zoom.toFixed(2);
                render();
            }
        });

        // 初始化
        resize();
        requestAnimationFrame(updateFPS);

        // 初始渲染
        render();
    </script>
</body>
</html>
