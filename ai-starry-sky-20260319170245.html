<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空效果 | Starry Sky</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #000011 0%, #000022 50%, #000011 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            background: rgba(10, 10, 30, 0.85);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            backdrop-filter: blur(5px);
            max-width: 220px;
        }

        .control-group {
            margin: 10px 0;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: #88aadd;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: #6699ff;
        }

        .btn {
            padding: 8px 16px;
            margin-top: 8px;
            background: linear-gradient(135deg, #4466aa, #6688cc);
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 11px;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(100, 150, 255, 0.5);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            background: rgba(10, 10, 30, 0.8);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            z-index: 10;
        }

        @media (max-width: 600px) {
            .controls {
                font-size: 10px;
                padding: 10px;
                max-width: 180px;
            }
            .info {
                font-size: 12px;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="starrySky"></canvas>
    
    <div class="controls">
        <div class="control-group">
            <label>星星数量: <span id="starCountValue">300</span></label>
            <input type="range" id="starCountSlider" min="100" max="800" step="50" value="300">
        </div>
        <div class="control-group">
            <label>流星频率: <span id="meteorValue">中</span></label>
            <input type="range" id="meteorSlider" min="0" max="5" step="1" value="2">
        </div>
        <div class="control-group">
            <label>闪烁速度: <span id="twinkleValue">1.0x</span></label>
            <input type="range" id="twinkleSlider" min="0.2" max="3" step="0.1" value="1">
        </div>
        <button class="btn" id="shootingStarBtn">☄️ 发射流星</button>
    </div>

    <div class="stats">
        <div id="starCount">星星: 0</div>
        <div id="meteorCount">流星: 0</div>
        <div id="fpsCounter">FPS: 60</div>
    </div>

    <div class="info">
        <span>⭐ 星空效果 | Starry Sky ⭐</span>
        <span>移动鼠标产生星光 · 点击创造星座 · 双击发射流星雨</span>
    </div>

    <script>
        (function() {
            'use strict';

            // ========== 配置 ==========
            const CONFIG = {
                maxStars: 800,
                maxMeteors: 10,
                maxClickStars: 50
            };

            // ========== Canvas 初始化 ==========
            const canvas = document.getElementById('starrySky');
            const ctx = canvas.getContext('2d');
            let width, height;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }

            resize();
            window.addEventListener('resize', resize);

            // ========== 状态管理 ==========
            let starCount = 300;
            let meteorFrequency = 2;
            let twinkleSpeed = 1;
            let mouseX = width / 2;
            let mouseY = height / 2;
            let stars = [];
            let meteors = [];
            let clickStars = [];
            let meteorTimer = 0;

            // ========== 星星类 ==========
            class Star {
                constructor() {
                    this.reset();
                }

                reset() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.size = Math.random() * 2 + 0.5;
                    this.brightness = Math.random() * 0.5 + 0.5;
                    this.twinkleSpeed = (0.02 + Math.random() * 0.03) * twinkleSpeed;
                    this.twinklePhase = Math.random() * Math.PI * 2;
                    
                    // 星星颜色（根据温度）
                    const temp = Math.random();
                    if (temp < 0.1) {
                        // 蓝色星
                        this.color = { r: 150, g: 180, b: 255 };
                    } else if (temp < 0.3) {
                        // 白色星
                        this.color = { r: 255, g: 255, b: 255 };
                    } else if (temp < 0.7) {
                        // 黄色星
                        this.color = { r: 255, g: 250, b: 220 };
                    } else if (temp < 0.9) {
                        // 橙色星
                        this.color = { r: 255, g: 220, b: 180 };
                    } else {
                        // 红色星
                        this.color = { r: 255, g: 200, b: 180 };
                    }
                }

                update(deltaTime) {
                    this.twinklePhase += this.twinkleSpeed * deltaTime * 0.1;
                }

                draw() {
                    const twinkle = 0.5 + 0.5 * Math.sin(this.twinklePhase);
                    const alpha = this.brightness * twinkle;
                    const size = this.size * (0.8 + twinkle * 0.4);
                    
                    // 发光效果
                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, size * 4
                    );
                    gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`);
                    gradient.addColorStop(0.3, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.3})`);
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, size * 4, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 核心
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                    ctx.fill();
                }
            }

            // ========== 流星类 ==========
            class Meteor {
                constructor(startX, startY) {
                    this.x = startX !== undefined ? startX : Math.random() * width;
                    this.y = startY !== undefined ? startY : -10;
                    
                    const angle = Math.PI / 4 + (Math.random() - 0.5) * 0.3;
                    const speed = 8 + Math.random() * 8;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    
                    this.length = 50 + Math.random() * 100;
                    this.width = 2 + Math.random() * 2;
                    this.life = 1;
                    this.decay = 0.01 + Math.random() * 0.01;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.life -= this.decay;
                }

                draw() {
                    if (this.life <= 0) return;
                    
                    const alpha = this.life;
                    const tailX = this.x - this.vx * this.length / 10;
                    const tailY = this.y - this.vy * this.length / 10;
                    
                    // 流星尾迹
                    const gradient = ctx.createLinearGradient(tailX, tailY, this.x, this.y);
                    gradient.addColorStop(0, 'transparent');
                    gradient.addColorStop(0.5, `rgba(255, 255, 255, ${alpha * 0.5})`);
                    gradient.addColorStop(1, `rgba(255, 255, 255, ${alpha})`);
                    
                    ctx.beginPath();
                    ctx.moveTo(tailX, tailY);
                    ctx.lineTo(this.x, this.y);
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = this.width;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                    
                    // 流星头部发光
                    const headGradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 10);
                    headGradient.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
                    headGradient.addColorStop(0.5, `rgba(200, 220, 255, ${alpha * 0.5})`);
                    headGradient.addColorStop(1, 'transparent');
                    
                    ctx.fillStyle = headGradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 10, 0, Math.PI * 2);
                    ctx.fill();
                }

                isDead() {
                    return this.life <= 0 || this.x > width + 100 || this.y > height + 100;
                }
            }

            // ========== 点击星星类 ==========
            class ClickStar {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.points = 5 + Math.floor(Math.random() * 3);
                    this.outerRadius = 15 + Math.random() * 10;
                    this.innerRadius = this.outerRadius * 0.5;
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                    this.life = 1;
                    this.decay = 0.005;
                    this.color = `hsl(${Math.random() * 60 + 180}, 80%, 70%)`;
                }

                update() {
                    this.rotation += this.rotationSpeed;
                    this.life -= this.decay;
                }

                draw() {
                    if (this.life <= 0) return;
                    
                    const alpha = this.life;
                    
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    
                    ctx.beginPath();
                    for (let i = 0; i < this.points * 2; i++) {
                        const radius = i % 2 === 0 ? this.outerRadius : this.innerRadius;
                        const angle = (i * Math.PI) / this.points;
                        const x = Math.cos(angle) * radius;
                        const y = Math.sin(angle) * radius;
                        
                        if (i === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    ctx.closePath();
                    
                    ctx.fillStyle = this.color.replace(')', `, ${alpha * 0.5})`).replace('hsl', 'hsla');
                    ctx.fill();
                    
                    ctx.strokeStyle = this.color.replace(')', `, ${alpha})`).replace('hsl', 'hsla');
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // 发光
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = this.color;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    
                    ctx.restore();
                }

                isDead() {
                    return this.life <= 0;
                }
            }

            // ========== 初始化星星 ==========
            function initStars() {
                stars = [];
                for (let i = 0; i < starCount; i++) {
                    stars.push(new Star());
                }
            }

            initStars();

            // ========== 创建流星 ==========
            function createMeteor(x, y) {
                if (meteors.length < CONFIG.maxMeteors) {
                    meteors.push(new Meteor(x, y));
                }
            }

            // ========== 创建流星雨 ==========
            function createMeteorShower() {
                for (let i = 0; i < 10; i++) {
                    setTimeout(() => {
                        createMeteor();
                    }, i * 200);
                }
            }

            // ========== 鼠标交互 ==========
            canvas.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                
                // 鼠标移动时产生星光粒子
                if (Math.random() < 0.1 && clickStars.length < CONFIG.maxClickStars) {
                    const star = new ClickStar(mouseX, mouseY);
                    star.outerRadius = 5 + Math.random() * 5;
                    star.decay = 0.02;
                    clickStars.push(star);
                }
            });

            canvas.addEventListener('click', (e) => {
                // 点击创造星座
                for (let i = 0; i < 5; i++) {
                    if (clickStars.length < CONFIG.maxClickStars) {
                        const angle = (i / 5) * Math.PI * 2;
                        const distance = 20 + Math.random() * 20;
                        const x = e.clientX + Math.cos(angle) * distance;
                        const y = e.clientY + Math.sin(angle) * distance;
                        clickStars.push(new ClickStar(x, y));
                    }
                }
            });

            canvas.addEventListener('dblclick', (e) => {
                e.preventDefault();
                createMeteorShower();
            });

            // 触摸支持
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                mouseX = touch.clientX;
                mouseY = touch.clientY;
            });

            canvas.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                for (let i = 0; i < 3; i++) {
                    if (clickStars.length < CONFIG.maxClickStars) {
                        const x = touch.clientX + (Math.random() - 0.5) * 30;
                        const y = touch.clientY + (Math.random() - 0.5) * 30;
                        clickStars.push(new ClickStar(x, y));
                    }
                }
            });

            // ========== 控制器 ==========
            document.getElementById('starCountSlider').addEventListener('input', (e) => {
                starCount = parseInt(e.target.value);
                document.getElementById('starCountValue').textContent = starCount;
                initStars();
            });

            document.getElementById('meteorSlider').addEventListener('input', (e) => {
                meteorFrequency = parseInt(e.target.value);
                const labels = ['无', '极少', '少', '中', '多', '极多'];
                document.getElementById('meteorValue').textContent = labels[meteorFrequency];
            });

            document.getElementById('twinkleSlider').addEventListener('input', (e) => {
                twinkleSpeed = parseFloat(e.target.value);
                document.getElementById('twinkleValue').textContent = twinkleSpeed.toFixed(1) + 'x';
                
                // 更新所有星星的闪烁速度
                stars.forEach(star => {
                    star.twinkleSpeed = (0.02 + Math.random() * 0.03) * twinkleSpeed;
                });
            });

            document.getElementById('shootingStarBtn').addEventListener('click', () => {
                createMeteor(width * 0.3 + Math.random() * width * 0.4, 0);
            });

            // ========== 性能监控 ==========
            let fps = 0;
            let frameCount = 0;
            let lastFpsUpdate = 0;

            function updateStats(currentTime) {
                frameCount++;
                if (currentTime - lastFpsUpdate >= 1000) {
                    fps = frameCount;
                    frameCount = 0;
                    lastFpsUpdate = currentTime;
                    document.getElementById('fpsCounter').textContent = `FPS: ${fps}`;
                }
                
                document.getElementById('starCount').textContent = `星星: ${stars.length}`;
                document.getElementById('meteorCount').textContent = `流星: ${meteors.length}`;
            }

            // ========== 动画循环 ==========
            let lastTime = 0;

            function animate(currentTime) {
                const deltaTime = lastTime ? currentTime - lastTime : 16;
                lastTime = currentTime;

                // 清除画布
                ctx.fillStyle = 'rgba(0, 0, 17, 0.15)';
                ctx.fillRect(0, 0, width, height);

                // 更新和绘制星星
                stars.forEach(star => {
                    star.update(deltaTime);
                    star.draw();
                });

                // 自动生成流星
                if (meteorFrequency > 0) {
                    meteorTimer += deltaTime;
                    const interval = [0, 5000, 3000, 2000, 1000, 500][meteorFrequency];
                    
                    if (meteorTimer >= interval) {
                        meteorTimer = 0;
                        createMeteor();
                    }
                }

                // 更新和绘制流星
                for (let i = meteors.length - 1; i >= 0; i--) {
                    meteors[i].update();
                    meteors[i].draw();
                    
                    if (meteors[i].isDead()) {
                        meteors.splice(i, 1);
                    }
                }

                // 更新和绘制点击星星
                for (let i = clickStars.length - 1; i >= 0; i--) {
                    clickStars[i].update();
                    clickStars[i].draw();
                    
                    if (clickStars[i].isDead()) {
                        clickStars.splice(i, 1);
                    }
                }

                // 鼠标光晕
                const gradient = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 100);
                gradient.addColorStop(0, 'rgba(100, 150, 255, 0.1)');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fillRect(mouseX - 100, mouseY - 100, 200, 200);

                updateStats(currentTime);
                requestAnimationFrame(animate);
            }

            // 启动动画
            requestAnimationFrame(animate);

        })();
    </script>
</body>
</html>
