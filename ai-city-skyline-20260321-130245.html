<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市天际线 - City Skyline</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a15;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
        }
        
        .info span {
            display: block;
            margin: 5px 0;
        }
        
        .fps-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="skyline"></canvas>
    <div class="info">
        <span>🏙️ 城市天际线</span>
        <span>🖱️ 移动鼠标 - 控制日夜变化</span>
        <span>👆 点击 - 烟花绽放</span>
    </div>
    <div class="fps-counter" id="fps">FPS: 60</div>

    <script>
        // ============ 配置 ============
        const CONFIG = {
            buildings: 25,
            windowDensity: 0.7,
            dayDuration: 60000, // 60秒一个日夜循环
            colors: {
                day: {
                    sky: ['#87CEEB', '#FFD700', '#FF6B6B'],
                    buildings: ['#2C3E50', '#34495E', '#5D6D7E', '#7F8C8D'],
                    windows: '#FFFACD'
                },
                night: {
                    sky: ['#0a0a15', '#1a1a3e', '#2d1b4e'],
                    buildings: ['#1a1a2e', '#16213e', '#0f3460'],
                    windows: ['#FFE4B5', '#FFD700', '#87CEEB', '#FF6B6B']
                }
            }
        };

        // ============ Canvas 设置 ============
        const canvas = document.getElementById('skyline');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            generateBuildings();
        }
        
        resize();
        window.addEventListener('resize', resize);

        // ============ 工具函数 ============
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        function lerp(a, b, t) {
            return a + (b - a) * Math.max(0, Math.min(1, t));
        }

        function lerpColor(c1, c2, t) {
            const r1 = parseInt(c1.slice(1, 3), 16);
            const g1 = parseInt(c1.slice(3, 5), 16);
            const b1 = parseInt(c1.slice(5, 7), 16);
            const r2 = parseInt(c2.slice(1, 3), 16);
            const g2 = parseInt(c2.slice(3, 5), 16);
            const b2 = parseInt(c2.slice(5, 7), 16);
            
            const r = Math.floor(lerp(r1, r2, t));
            const g = Math.floor(lerp(g1, g2, t));
            const b = Math.floor(lerp(b1, b2, t));
            
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        // ============ 建筑类 ============
        class Building {
            constructor(x, index, total) {
                this.x = x;
                this.width = random(40, 100);
                this.height = random(100, 350) * (0.5 + (index / total) * 0.5);
                this.colorIndex = Math.floor(random(0, 4));
                this.windows = [];
                this.antennaHeight = Math.random() > 0.5 ? random(20, 50) : 0;
                this.antennaLight = Math.random() > 0.7;
                this.antennaBlink = random(0.5, 2);
                
                this.generateWindows();
            }

            generateWindows() {
                const windowWidth = 8;
                const windowHeight = 12;
                const gapX = 15;
                const gapY = 20;
                
                const cols = Math.floor((this.width - 20) / gapX);
                const rows = Math.floor((this.height - 30) / gapY);
                
                for (let row = 0; row < rows; row++) {
                    for (let col = 0; col < cols; col++) {
                        if (Math.random() < CONFIG.windowDensity) {
                            this.windows.push({
                                x: 10 + col * gapX,
                                y: 15 + row * gapY,
                                lit: Math.random() > 0.3,
                                flickerSpeed: random(0.01, 0.05),
                                flickerPhase: random(0, Math.PI * 2),
                                colorIndex: Math.floor(random(0, 4))
                            });
                        }
                    }
                }
            }

            draw(baseY, timeOfDay, time) {
                const nightColors = CONFIG.colors.night.buildings;
                const dayColors = CONFIG.colors.day.buildings;
                
                const color = lerpColor(dayColors[this.colorIndex], nightColors[this.colorIndex], timeOfDay);
                
                // 建筑主体
                ctx.fillStyle = color;
                ctx.fillRect(this.x, baseY - this.height, this.width, this.height);
                
                // 建筑顶部
                ctx.fillStyle = lerpColor(color, '#000000', 0.2);
                ctx.beginPath();
                ctx.moveTo(this.x, baseY - this.height);
                ctx.lineTo(this.x + this.width / 2, baseY - this.height - 10);
                ctx.lineTo(this.x + this.width, baseY - this.height);
                ctx.fill();

                // 天线
                if (this.antennaHeight > 0) {
                    ctx.strokeStyle = lerpColor(color, '#000000', 0.3);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(this.x + this.width / 2, baseY - this.height - 10);
                    ctx.lineTo(this.x + this.width / 2, baseY - this.height - 10 - this.antennaHeight);
                    ctx.stroke();
                    
                    // 天线灯
                    if (this.antennaLight) {
                        const blink = Math.sin(time * this.antennaBlink * 0.001) > 0;
                        if (blink) {
                            ctx.beginPath();
                            ctx.arc(this.x + this.width / 2, baseY - this.height - 10 - this.antennaHeight, 3, 0, Math.PI * 2);
                            ctx.fillStyle = '#FF0000';
                            ctx.fill();
                            
                            // 发光
                            ctx.beginPath();
                            ctx.arc(this.x + this.width / 2, baseY - this.height - 10 - this.antennaHeight, 8, 0, Math.PI * 2);
                            ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
                            ctx.fill();
                        }
                    }
                }

                // 窗户
                this.windows.forEach(win => {
                    if (win.lit && timeOfDay > 0.3) {
                        const flicker = 0.7 + 0.3 * Math.sin(time * win.flickerSpeed + win.flickerPhase);
                        const windowColor = CONFIG.colors.night.windows[win.colorIndex % CONFIG.colors.night.windows.length];
                        
                        ctx.fillStyle = windowColor;
                        ctx.globalAlpha = (timeOfDay - 0.3) * flicker;
                        ctx.fillRect(this.x + win.x, baseY - this.height + win.y, 8, 12);
                        ctx.globalAlpha = 1;
                    }
                });
            }
        }

        // ============ 星星类 ============
        class Star {
            constructor() {
                this.x = random(0, width);
                this.y = random(0, height * 0.5);
                this.size = random(1, 3);
                this.twinkleSpeed = random(0.02, 0.05);
                this.phase = random(0, Math.PI * 2);
            }

            draw(timeOfDay, time) {
                if (timeOfDay < 0.3) return;
                
                const alpha = (timeOfDay - 0.3) * (0.5 + 0.5 * Math.sin(time * this.twinkleSpeed + this.phase));
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            }
        }

        // ============ 烟花类 ============
        class Firework {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.particles = [];
                
                const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#F38181', '#A8E6CF'];
                const color = colors[Math.floor(random(0, colors.length))];
                
                for (let i = 0; i < 50; i++) {
                    const angle = random(0, Math.PI * 2);
                    const speed = random(2, 6);
                    this.particles.push({
                        x: this.x,
                        y: this.y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        color: color,
                        life: 1,
                        decay: random(0.01, 0.02)
                    });
                }
            }

            update() {
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.05;
                    p.life -= p.decay;
                });
                
                this.particles = this.particles.filter(p => p.life > 0);
            }

            draw() {
                this.particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                });
            }

            isDead() {
                return this.particles.length === 0;
            }
        }

        // ============ 初始化 ============
        let buildings = [];
        const stars = [];
        const fireworks = [];

        function generateBuildings() {
            buildings = [];
            const spacing = width / CONFIG.buildings;
            
            for (let i = 0; i < CONFIG.buildings; i++) {
                const x = i * spacing + random(-10, 10);
                buildings.push(new Building(x, i, CONFIG.buildings));
            }
            
            // 按高度排序（远的先画）
            buildings.sort((a, b) => a.height - b.height);
        }

        // 生成星星
        for (let i = 0; i < 100; i++) {
            stars.push(new Star());
        }

        // ============ 鼠标交互 ============
        let mouseY = height / 2;
        let manualTimeOfDay = null;

        canvas.addEventListener('mousemove', (e) => {
            mouseY = e.clientY;
            // 根据鼠标Y位置控制日夜
            manualTimeOfDay = 1 - (mouseY / height);
        });

        canvas.addEventListener('mouseleave', () => {
            manualTimeOfDay = null;
        });

        canvas.addEventListener('click', (e) => {
            fireworks.push(new Firework(e.clientX, height * 0.3 + random(-50, 50)));
        });

        // ============ FPS 计算 ============
        let frameCount = 0;
        let lastFpsTime = performance.now();
        let fps = 60;

        function updateFPS() {
            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFpsTime = now;
                document.getElementById('fps').textContent = `FPS: ${fps}`;
            }
        }

        // ============ 绘制天空 ============
        function drawSky(timeOfDay) {
            const nightColors = CONFIG.colors.night.sky;
            const dayColors = CONFIG.colors.day.sky;
            
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            
            for (let i = 0; i < 3; i++) {
                const color = lerpColor(dayColors[i], nightColors[i], timeOfDay);
                gradient.addColorStop(i * 0.4, color);
            }
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        // ============ 绘制月亮/太阳 ============
        function drawCelestialBody(timeOfDay, time) {
            const x = width * 0.8;
            const y = height * 0.15 + Math.sin(time * 0.0001) * 20;
            
            if (timeOfDay > 0.5) {
                // 月亮
                ctx.beginPath();
                ctx.arc(x, y, 40, 0, Math.PI * 2);
                ctx.fillStyle = '#F5F5DC';
                ctx.fill();
                
                // 月亮光晕
                const glow = ctx.createRadialGradient(x, y, 30, x, y, 80);
                glow.addColorStop(0, 'rgba(245, 245, 220, 0.3)');
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(x, y, 80, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // 太阳
                const sunY = height * 0.2 + timeOfDay * height * 0.3;
                ctx.beginPath();
                ctx.arc(x, sunY, 50, 0, Math.PI * 2);
                ctx.fillStyle = '#FFD700';
                ctx.fill();
                
                // 太阳光晕
                const glow = ctx.createRadialGradient(x, sunY, 40, x, sunY, 100);
                glow.addColorStop(0, 'rgba(255, 215, 0, 0.4)');
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(x, sunY, 100, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ============ 绘制地面反射 ============
        function drawReflection(baseY, timeOfDay) {
            const gradient = ctx.createLinearGradient(0, baseY, 0, height);
            const skyColor = lerpColor(CONFIG.colors.day.sky[0], CONFIG.colors.night.sky[0], timeOfDay);
            gradient.addColorStop(0, 'rgba(0, 0, 0, 0.8)');
            gradient.addColorStop(0.3, lerpColor(skyColor, '#000000', 0.7));
            gradient.addColorStop(1, lerpColor(skyColor, '#000000', 0.9));
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, baseY, width, height - baseY);
            
            // 水波纹效果
            ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 * timeOfDay})`;
            ctx.lineWidth = 1;
            for (let i = 0; i < 5; i++) {
                const y = baseY + 20 + i * 15;
                ctx.beginPath();
                ctx.moveTo(0, y);
                for (let x = 0; x < width; x += 20) {
                    ctx.lineTo(x, y + Math.sin(x * 0.02 + i) * 2);
                }
                ctx.stroke();
            }
        }

        // ============ 主动画循环 ============
        function animate(time) {
            // 计算日夜循环
            let timeOfDay;
            if (manualTimeOfDay !== null) {
                timeOfDay = manualTimeOfDay;
            } else {
                timeOfDay = (Math.sin(time * 0.0001) + 1) / 2;
            }

            // 绘制天空
            drawSky(timeOfDay);

            // 绘制星星
            stars.forEach(star => star.draw(timeOfDay, time));

            // 绘制月亮/太阳
            drawCelestialBody(timeOfDay, time);

            // 绘制建筑
            const baseY = height * 0.7;
            buildings.forEach(building => building.draw(baseY, timeOfDay, time));

            // 绘制地面反射
            drawReflection(baseY, timeOfDay);

            // 更新和绘制烟花
            for (let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                fireworks[i].draw();
                if (fireworks[i].isDead()) {
                    fireworks.splice(i, 1);
                }
            }

            updateFPS();
            requestAnimationFrame(animate);
        }

        // 启动动画
        animate(0);

        // ============ 性能优化 ============
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // 页面隐藏时可以暂停
            }
        });
    </script>
</body>
</html>
