<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分形艺术 - Fractal Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
        }

        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 32px;
            font-weight: bold;
            z-index: 100;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
            letter-spacing: 5px;
        }

        .fps {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 11px;
                bottom: 10px;
                left: 10px;
            }
            .title {
                font-size: 20px;
                top: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="title">🔷 分形艺术</div>
    <canvas id="fractal"></canvas>
    <div class="info">
        <div>🖱️ 移动鼠标 - 缩放分形</div>
        <div>👆 点击 - 改变分形类型</div>
    </div>
    <div class="fps" id="fps">FPS: 60</div>

    <script>
        // 性能监控
        const fpsElement = document.getElementById('fps');
        let lastTime = performance.now();
        let frameCount = 0;

        // Canvas 设置
        const canvas = document.getElementById('fractal');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;

        // 分形配置
        let fractalType = 0;
        const FRACTAL_TYPES = ['sierpinski', 'koch', 'tree', 'mandelbrot'];
        let zoom = 1;
        let targetZoom = 1;
        let rotation = 0;

        // 颜色配置
        const COLORS = [
            '#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#f0932b',
            '#eb4d4b', '#6c5ce7', '#a29bfe', '#fd79a8', '#00cec9'
        ];

        // 响应式调整
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        // 绘制谢尔宾斯基三角形
        function drawSierpinskiTriangle(x, y, size, depth, colorIndex) {
            if (depth === 0 || size < 2) {
                ctx.fillStyle = COLORS[colorIndex % COLORS.length];
                ctx.beginPath();
                ctx.moveTo(x, y - size);
                ctx.lineTo(x - size * 0.866, y + size * 0.5);
                ctx.lineTo(x + size * 0.866, y + size * 0.5);
                ctx.closePath();
                ctx.fill();
                return;
            }

            const newSize = size / 2;
            drawSierpinskiTriangle(x, y - newSize, newSize, depth - 1, colorIndex);
            drawSierpinskiTriangle(x - newSize * 0.866, y + newSize * 0.5, newSize, depth - 1, colorIndex + 1);
            drawSierpinskiTriangle(x + newSize * 0.866, y + newSize * 0.5, newSize, depth - 1, colorIndex + 2);
        }

        // 绘制科赫雪花
        function drawKochLine(x1, y1, x2, y2, depth, colorIndex) {
            if (depth === 0) {
                ctx.strokeStyle = COLORS[colorIndex % COLORS.length];
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
                return;
            }

            const dx = x2 - x1;
            const dy = y2 - y1;

            const x3 = x1 + dx / 3;
            const y3 = y1 + dy / 3;

            const x5 = x1 + dx * 2 / 3;
            const y5 = y1 + dy * 2 / 3;

            const x4 = (x1 + x2) / 2 - dy * Math.sqrt(3) / 6;
            const y4 = (y1 + y2) / 2 + dx * Math.sqrt(3) / 6;

            drawKochLine(x1, y1, x3, y3, depth - 1, colorIndex);
            drawKochLine(x3, y3, x4, y4, depth - 1, colorIndex + 1);
            drawKochLine(x4, y4, x5, y5, depth - 1, colorIndex + 2);
            drawKochLine(x5, y5, x2, y2, depth - 1, colorIndex + 3);
        }

        function drawKochSnowflake(x, y, size, depth) {
            const height = size * Math.sqrt(3) / 2;
            const x1 = x;
            const y1 = y - size * 0.577;
            const x2 = x - size / 2;
            const y2 = y + height / 2 - size * 0.577 + size * 0.577;
            const x3 = x + size / 2;
            const y3 = y2;

            drawKochLine(x1, y1, x3, y3, depth, 0);
            drawKochLine(x3, y3, x2, y2, depth, 2);
            drawKochLine(x2, y2, x1, y1, depth, 4);
        }

        // 绘制分形树
        function drawFractalTree(x, y, length, angle, depth, colorIndex) {
            if (depth === 0 || length < 2) {
                return;
            }

            const x2 = x + Math.cos(angle) * length;
            const y2 = y + Math.sin(angle) * length;

            ctx.strokeStyle = COLORS[colorIndex % COLORS.length];
            ctx.lineWidth = depth * 0.5;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            const newLength = length * 0.7;
            const angleOffset = Math.PI / 6 + Math.random() * 0.2;

            drawFractalTree(x2, y2, newLength, angle - angleOffset, depth - 1, colorIndex + 1);
            drawFractalTree(x2, y2, newLength, angle + angleOffset, depth - 1, colorIndex + 2);
        }

        // 绘制曼德勃罗集（简化版）
        function drawMandelbrot() {
            const maxIterations = 50;
            const imageData = ctx.createImageData(width, height);

            for (let px = 0; px < width; px += 2) {
                for (let py = 0; py < height; py += 2) {
                    const x0 = (px - centerX) / (width / 4) / zoom;
                    const y0 = (py - centerY) / (height / 4) / zoom;

                    let x = 0;
                    let y = 0;
                    let iteration = 0;

                    while (x * x + y * y <= 4 && iteration < maxIterations) {
                        const xtemp = x * x - y * y + x0;
                        y = 2 * x * y + y0;
                        x = xtemp;
                        iteration++;
                    }

                    const colorIndex = iteration % COLORS.length;
                    const color = COLORS[colorIndex];
                    const rgb = hexToRgb(color);

                    if (iteration === maxIterations) {
                        imageData.data[px * 4 + py * width * 4] = 0;
                        imageData.data[px * 4 + py * width * 4 + 1] = 0;
                        imageData.data[px * 4 + py * width * 4 + 2] = 0;
                    } else {
                        imageData.data[px * 4 + py * width * 4] = rgb.r;
                        imageData.data[px * 4 + py * width * 4 + 1] = rgb.g;
                        imageData.data[px * 4 + py * width * 4 + 2] = rgb.b;
                    }
                    imageData.data[px * 4 + py * width * 4 + 3] = 255;
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        // 十六进制转RGB
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        // 绘制当前分形
        function drawFractal(time) {
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(rotation);
            ctx.translate(-centerX, -centerY);
            ctx.scale(zoom, zoom);
            ctx.translate(-centerX * (1 - 1/zoom), -centerY * (1 - 1/zoom));

            switch (FRACTAL_TYPES[fractalType]) {
                case 'sierpinski':
                    drawSierpinskiTriangle(centerX, centerY, 300, 7, 0);
                    break;

                case 'koch':
                    drawKochSnowflake(centerX, centerY, 300, 5);
                    break;

                case 'tree':
                    drawFractalTree(centerX, centerY + 200, 120, -Math.PI / 2, 10, 0);
                    break;

                case 'mandelbrot':
                    ctx.setTransform(1, 0, 0, 1, 0, 0);
                    drawMandelbrot();
                    break;
            }

            ctx.restore();
        }

        // 绘制背景
        function drawBackground() {
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, Math.max(width, height) * 0.7
            );
            gradient.addColorStop(0, 'rgba(20, 20, 40, 0.3)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.8)');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        // 主动画循环
        function animate(currentTime) {
            const time = currentTime * 0.001;

            // 清除画布
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // 绘制背景
            drawBackground();

            // 根据鼠标位置调整缩放
            targetZoom = 1 + (mouseY - centerY) / height * 0.5;
            zoom += (targetZoom - zoom) * 0.05;

            // 旋转
            rotation += 0.002;

            // 绘制分形
            drawFractal(time);

            // FPS 计算
            frameCount++;
            if (frameCount >= 30) {
                const fps = Math.round(30 / ((currentTime - lastTime) / 1000 * 30));
                fpsElement.textContent = `FPS: ${Math.min(fps, 60)}`;
                frameCount = 0;
            }

            lastTime = currentTime;
            requestAnimationFrame(animate);
        }

        // 事件监听
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('click', () => {
            fractalType = (fractalType + 1) % FRACTAL_TYPES.length;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            fractalType = (fractalType + 1) % FRACTAL_TYPES.length;
        });

        // 初始化
        resize();
        mouseX = centerX;
        mouseY = centerY;
        requestAnimationFrame(animate);
    </script>
</body>
</html>
