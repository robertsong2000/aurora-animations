<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑洞效果 | Black Hole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 100, 0.7);
            font-size: 13px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.1);
            font-size: 48px;
            font-weight: 100;
            letter-spacing: 15px;
            pointer-events: none;
            z-index: 10;
            text-transform: uppercase;
        }
        
        .fps {
            position: fixed;
            top: 10px;
            right: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-family: monospace;
            z-index: 10;
        }
        
        .stats {
            position: fixed;
            top: 10px;
            left: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-family: monospace;
            z-index: 10;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <canvas id="blackhole"></canvas>
    <div class="title">Black Hole</div>
    <div class="stats" id="stats">粒子: 0 | 被吸入: 0</div>
    <div class="info">移动鼠标控制引力 | 点击产生物质喷发</div>
    <div class="fps" id="fps"></div>
    
    <script>
        const canvas = document.getElementById('blackhole');
        const ctx = canvas.getContext('2d');
        const fpsDisplay = document.getElementById('fps');
        const statsDisplay = document.getElementById('stats');
        
        let width, height, centerX, centerY;
        let particles = [];
        let accretionDisk = [];
        let mouseX = 0, mouseY = 0;
        let time = 0;
        let absorbedCount = 0;
        
        // FPS 计算
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        // 黑洞参数
        const blackHole = {
            x: 0,
            y: 0,
            radius: 50,
            eventHorizon: 80,
            accretionRadius: 250
        };
        
        // 粒子类
        class Particle {
            constructor(x, y, vx, vy) {
                this.x = x !== undefined ? x : Math.random() * width;
                this.y = y !== undefined ? y : Math.random() * height;
                this.vx = vx !== undefined ? vx : (Math.random() - 0.5) * 2;
                this.vy = vy !== undefined ? vy : (Math.random() - 0.5) * 2;
                this.size = Math.random() * 2 + 1;
                this.life = 1;
                this.color = this.getInitialColor();
            }
            
            getInitialColor() {
                const colors = [
                    { r: 255, g: 150, b: 50 },   // 橙色
                    { r: 255, g: 200, b: 100 },  // 黄色
                    { r: 200, g: 100, b: 255 },  // 紫色
                    { r: 100, g: 150, b: 255 }   // 蓝色
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                // 计算到黑洞中心的距离
                const dx = centerX - this.x;
                const dy = centerY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                // 鼠标引力影响
                const mouseDx = mouseX - centerX;
                const mouseDy = mouseY - centerY;
                const mouseDist = Math.sqrt(mouseDx * mouseDx + mouseDy * mouseDy);
                const gravityMultiplier = 1 + mouseDist / 500;
                
                // 黑洞引力
                if (distance > blackHole.radius) {
                    const gravity = 500 / (distance * distance) * gravityMultiplier;
                    const angle = Math.atan2(dy, dx);
                    
                    // 向黑洞的引力
                    this.vx += Math.cos(angle) * gravity;
                    this.vy += Math.sin(angle) * gravity;
                    
                    // 切向速度（轨道运动）
                    const tangentAngle = angle + Math.PI / 2;
                    const orbitSpeed = gravity * 0.5;
                    this.vx += Math.cos(tangentAngle) * orbitSpeed;
                    this.vy += Math.sin(tangentAngle) * orbitSpeed;
                }
                
                // 吸积盘效果（接近黑洞时）
                if (distance < blackHole.accretionRadius && distance > blackHole.eventHorizon) {
                    // 加速旋转
                    const angle = Math.atan2(dy, dx);
                    const rotationSpeed = 0.5 / distance * 50;
                    this.vx += Math.cos(angle + Math.PI / 2) * rotationSpeed;
                    this.vy += Math.sin(angle + Math.PI / 2) * rotationSpeed;
                    
                    // 颜色变化（加热）
                    const heat = 1 - (distance - blackHole.eventHorizon) / (blackHole.accretionRadius - blackHole.eventHorizon);
                    this.color = {
                        r: Math.min(255, 200 + heat * 55),
                        g: Math.max(50, 150 - heat * 100),
                        b: Math.max(50, 100 - heat * 50)
                    };
                }
                
                // 速度限制
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > 15) {
                    this.vx = (this.vx / speed) * 15;
                    this.vy = (this.vy / speed) * 15;
                }
                
                // 移动
                this.x += this.vx;
                this.y += this.vy;
                
                // 被黑洞吸收
                if (distance < blackHole.eventHorizon) {
                    absorbedCount++;
                    return false;
                }
                
                // 边界处理
                if (this.x < -50 || this.x > width + 50 || this.y < -50 || this.y > height + 50) {
                    return false;
                }
                
                return true;
            }
            
            draw() {
                const dx = centerX - this.x;
                const dy = centerY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                // 根据距离调整透明度
                let alpha = 1;
                if (distance < blackHole.accretionRadius) {
                    alpha = 0.3 + (distance / blackHole.accretionRadius) * 0.7;
                }
                
                // 发光效果
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.3})`;
                ctx.fill();
                
                // 核心
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                ctx.fill();
            }
        }
        
        // 吸积盘环
        class AccretionRing {
            constructor(radius) {
                this.radius = radius;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = 0.02 + Math.random() * 0.02;
                this.opacity = 0.1 + Math.random() * 0.1;
            }
            
            update() {
                this.rotation += this.rotationSpeed;
            }
            
            draw() {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(this.rotation);
                
                // 椭圆形吸积盘
                ctx.beginPath();
                ctx.ellipse(0, 0, this.radius, this.radius * 0.3, 0, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 150, 50, ${this.opacity})`;
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.restore();
            }
        }
        
        // 绘制黑洞
        function drawBlackHole() {
            // 事件视界（黑色球体）
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, blackHole.eventHorizon
            );
            gradient.addColorStop(0, '#000');
            gradient.addColorStop(0.8, '#000');
            gradient.addColorStop(1, 'transparent');
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, blackHole.eventHorizon, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // 光子球（发光边缘）
            ctx.beginPath();
            ctx.arc(centerX, centerY, blackHole.eventHorizon + 5, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 200, 100, 0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 引力透镜效果（扭曲的背景）
            for (let i = 0; i < 5; i++) {
                const radius = blackHole.eventHorizon + 10 + i * 15;
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(100, 150, 200, ${0.1 - i * 0.015})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
        
        // 绘制吸积盘
        function drawAccretionDisk() {
            // 多层吸积盘
            for (let i = 0; i < 10; i++) {
                const radius = blackHole.eventHorizon + 20 + i * 25;
                const alpha = 0.15 - i * 0.012;
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(time * 0.01 * (1 - i * 0.05));
                
                ctx.beginPath();
                ctx.ellipse(0, 0, radius, radius * 0.3, 0, 0, Math.PI * 2);
                
                const gradient = ctx.createLinearGradient(-radius, 0, radius, 0);
                gradient.addColorStop(0, `rgba(255, 100, 50, ${alpha})`);
                gradient.addColorStop(0.5, `rgba(255, 200, 100, ${alpha * 1.5})`);
                gradient.addColorStop(1, `rgba(255, 100, 50, ${alpha})`);
                
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 8 - i * 0.5;
                ctx.stroke();
                
                ctx.restore();
            }
        }
        
        // 绘制背景星空
        function drawStars() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            
            for (let i = 0; i < 100; i++) {
                const x = (i * 7919 + time * 0.1) % width;
                const y = (i * 6271) % height;
                const size = ((i * 3571) % 3) * 0.5 + 0.5;
                
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // 产生物质喷发
        function createEruption(x, y) {
            const count = 50;
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 5 + Math.random() * 10;
                const particle = new Particle(
                    centerX + Math.cos(angle) * blackHole.eventHorizon,
                    centerY + Math.sin(angle) * blackHole.eventHorizon,
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed
                );
                particle.life = 2;
                particles.push(particle);
            }
        }
        
        // 主渲染循环
        function render() {
            // 清空画布
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制星空背景
            drawStars();
            
            // 绘制吸积盘
            drawAccretionDisk();
            
            // 更新和绘制粒子
            particles = particles.filter(particle => {
                const alive = particle.update();
                if (alive) particle.draw();
                return alive;
            });
            
            // 补充粒子
            while (particles.length < 300) {
                // 从边缘生成粒子
                const side = Math.floor(Math.random() * 4);
                let x, y;
                
                switch (side) {
                    case 0: x = Math.random() * width; y = -10; break;
                    case 1: x = width + 10; y = Math.random() * height; break;
                    case 2: x = Math.random() * width; y = height + 10; break;
                    case 3: x = -10; y = Math.random() * height; break;
                }
                
                particles.push(new Particle(x, y));
            }
            
            // 绘制黑洞
            drawBlackHole();
            
            // 更新统计
            statsDisplay.textContent = `粒子: ${particles.length} | 被吸入: ${absorbedCount}`;
            
            time++;
            
            // FPS 计算
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                fpsDisplay.textContent = `FPS: ${fps}`;
            }
            
            requestAnimationFrame(render);
        }
        
        // 调整画布大小
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            canvas.width = width;
            canvas.height = height;
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        });
        
        canvas.addEventListener('click', (e) => {
            createEruption(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                createEruption(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
        
        // 初始化
        resize();
        mouseX = centerX;
        mouseY = centerY;
        render();
    </script>
</body>
</html>
