<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分形树 - Fractal Tree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            max-width: 300px;
        }

        .info h1 {
            font-size: 24px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info p {
            margin: 5px 0;
            line-height: 1.5;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .controls button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .controls button.active {
            background: rgba(39, 174, 96, 0.3);
            border-color: #27ae60;
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 5px;
            backdrop-filter: blur(10px);
        }

        .legend {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 3px;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="info">
        <h1>🌳 分形树</h1>
        <p><strong>Fractal Tree</strong></p>
        <p><strong>交互方式：</strong></p>
        <p>• 鼠标X轴：调整分支角度</p>
        <p>• 鼠标Y轴：调整递归深度</p>
        <p>• 滚轮：调整缩放比例</p>
        <p>• 点击：切换颜色模式</p>
    </div>

    <div class="controls">
        <button onclick="setStyle('natural')" id="btn-natural" class="active">自然</button>
        <button onclick="setStyle('binary')" id="btn-binary">二叉</button>
        <button onclick="setStyle('random')" id="btn-random">随机</button>
        <button onclick="toggleWind()">风吹效果</button>
        <button onclick="toggleAnimation()">生长动画</button>
    </div>

    <div class="stats">
        <div>分支角度: <span id="angle">25</span>°</div>
        <div>递归深度: <span id="depth">10</span></div>
        <div>缩放比例: <span id="scale">0.7</span>x</div>
        <div>分支数量: <span id="branches">0</span></div>
        <div>FPS: <span id="fps">0</span></div>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-color" style="background: #8B4513;"></div>
            <span>树干（深色）</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #27ae60;"></div>
            <span>树叶（浅色）</span>
        </div>
    </div>

    <script>
        // Canvas 设置
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 参数
        let branchAngle = 25;
        let maxDepth = 10;
        let scaleFactor = 0.7;
        let currentStyle = 'natural';
        let windEnabled = false;
        let growthAnimation = true;
        let growthProgress = 0;
        let windPhase = 0;
        
        // 统计
        let branchCount = 0;
        
        // 性能监控
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 0;

        // 初始化
        function init() {
            resize();
            
            // 事件监听
            window.addEventListener('resize', resize);
            canvas.addEventListener('mousemove', mouseMove);
            canvas.addEventListener('click', toggleColorMode);
            canvas.addEventListener('wheel', wheel);
            canvas.addEventListener('touchstart', touchStart);
            canvas.addEventListener('touchmove', touchMove);
            
            // 开始动画
            animate();
        }

        // 调整大小
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // 鼠标移动
        function mouseMove(e) {
            const x = e.clientX;
            const y = e.clientY;
            
            // 分支角度: 10-45°
            branchAngle = 10 + (x / canvas.width) * 35;
            
            // 递归深度: 5-12
            maxDepth = 5 + Math.floor((1 - y / canvas.height) * 7);
            
            // 更新显示
            document.getElementById('angle').textContent = Math.round(branchAngle);
            document.getElementById('depth').textContent = maxDepth;
        }

        // 切换颜色模式
        function toggleColorMode() {
            const styles = ['natural', 'binary', 'random'];
            const currentIndex = styles.indexOf(currentStyle);
            currentStyle = styles[(currentIndex + 1) % styles.length];
            
            // 更新按钮状态
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById('btn-' + currentStyle).classList.add('active');
        }

        // 设置样式
        function setStyle(style) {
            currentStyle = style;
            
            // 更新按钮状态
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById('btn-' + style).classList.add('active');
        }

        // 滚轮
        function wheel(e) {
            e.preventDefault();
            scaleFactor += e.deltaY > 0 ? -0.05 : 0.05;
            scaleFactor = Math.max(0.5, Math.min(0.85, scaleFactor));
            document.getElementById('scale').textContent = scaleFactor.toFixed(2);
        }

        // 触摸事件
        function touchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            mouseMove({ clientX: touch.clientX, clientY: touch.clientY });
        }

        function touchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            mouseMove({ clientX: touch.clientX, clientY: touch.clientY });
        }

        // 切换风吹效果
        function toggleWind() {
            windEnabled = !windEnabled;
        }

        // 切换生长动画
        function toggleAnimation() {
            growthAnimation = !growthAnimation;
            if (growthAnimation) {
                growthProgress = 0;
            }
        }

        // 绘制分形树
        function drawBranch(x, y, length, angle, depth) {
            if (depth === 0 || length < 2) return;
            
            branchCount++;
            
            // 风吹效果
            let windOffset = 0;
            if (windEnabled) {
                windOffset = Math.sin(windPhase + depth * 0.5) * 5 * (1 - depth / maxDepth);
            }
            
            // 生长动画
            let currentLength = length;
            if (growthAnimation && depth > growthProgress * maxDepth) {
                currentLength = 0;
            }
            
            // 计算终点
            const endX = x + Math.cos(angle + windOffset * Math.PI / 180) * currentLength;
            const endY = y + Math.sin(angle + windOffset * Math.PI / 180) * currentLength;
            
            // 颜色设置
            let strokeColor;
            if (currentStyle === 'natural') {
                const ratio = depth / maxDepth;
                const r = Math.round(139 + (39 - 139) * ratio);
                const g = Math.round(69 + (174 - 69) * ratio);
                const b = Math.round(19 + (96 - 19) * ratio);
                strokeColor = `rgb(${r}, ${g}, ${b})`;
            } else if (currentStyle === 'binary') {
                strokeColor = depth % 2 === 0 ? '#e74c3c' : '#3498db';
            } else {
                const hue = (depth / maxDepth) * 120;
                strokeColor = `hsl(${hue}, 70%, 50%)`;
            }
            
            // 绘制分支
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = depth * 1.5;
            ctx.lineCap = 'round';
            
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.stroke();
            
            // 递归绘制子分支
            if (currentLength > 0) {
                const newLength = length * scaleFactor;
                const angleRad = branchAngle * Math.PI / 180;
                
                if (currentStyle === 'natural') {
                    // 自然树：左右分支 + 随机变化
                    drawBranch(endX, endY, newLength, angle - angleRad + (Math.random() - 0.5) * 0.2, depth - 1);
                    drawBranch(endX, endY, newLength, angle + angleRad + (Math.random() - 0.5) * 0.2, depth - 1);
                    
                    if (depth > 3 && Math.random() > 0.5) {
                        drawBranch(endX, endY, newLength * 0.8, angle + (Math.random() - 0.5) * angleRad, depth - 2);
                    }
                } else if (currentStyle === 'binary') {
                    // 二叉树：严格对称
                    drawBranch(endX, endY, newLength, angle - angleRad, depth - 1);
                    drawBranch(endX, endY, newLength, angle + angleRad, depth - 1);
                } else {
                    // 随机树：随机分支数
                    const numBranches = 2 + Math.floor(Math.random() * 2);
                    for (let i = 0; i < numBranches; i++) {
                        const branchAngleOffset = (i - (numBranches - 1) / 2) * angleRad * (1 + Math.random() * 0.5);
                        drawBranch(endX, endY, newLength * (0.8 + Math.random() * 0.4), angle + branchAngleOffset, depth - 1);
                    }
                }
            }
        }

        // 绘制
        function draw() {
            // 清除背景
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制地面
            const groundGradient = ctx.createLinearGradient(0, canvas.height - 50, 0, canvas.height);
            groundGradient.addColorStop(0, '#2c3e50');
            groundGradient.addColorStop(1, '#1a252f');
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            
            // 重置分支计数
            branchCount = 0;
            
            // 绘制树
            const startX = canvas.width / 2;
            const startY = canvas.height - 50;
            const startLength = Math.min(canvas.width, canvas.height) * 0.25;
            
            drawBranch(startX, startY, startLength, -90 * Math.PI / 180, maxDepth);
            
            // 更新统计
            document.getElementById('branches').textContent = branchCount;
        }

        // 动画循环
        function animate() {
            // 性能监控
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                document.getElementById('fps').textContent = fps;
            }
            
            // 更新动画
            if (windEnabled) {
                windPhase += 0.05;
            }
            
            if (growthAnimation && growthProgress < 1) {
                growthProgress += 0.01;
            }
            
            // 绘制
            draw();
            
            requestAnimationFrame(animate);
        }

        // 启动
        init();
    </script>
</body>
</html>
