<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市天际线 | City Skyline</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }
        
        .time-display {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 32px;
            font-family: 'Courier New', monospace;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }
        
        .fps {
            position: fixed;
            top: 10px;
            left: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-family: monospace;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="cityscape"></canvas>
    <div class="time-display" id="time">20:00</div>
    <div class="info">移动鼠标控制日夜 | 点击建筑物切换灯光</div>
    <div class="fps" id="fps"></div>
    
    <script>
        const canvas = document.getElementById('cityscape');
        const ctx = canvas.getContext('2d');
        const fpsDisplay = document.getElementById('fps');
        const timeDisplay = document.getElementById('time');
        
        let width, height;
        let time = 0;
        let mouseX = 0, mouseY = 0;
        let buildings = [];
        let stars = [];
        let cars = [];
        let clouds = [];
        let dayNightCycle = 0.7; // 0=正午, 1=午夜
        
        // FPS 计算
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        // 建筑物类
        class Building {
            constructor(x, minWidth, maxWidth, minFloors, maxFloors) {
                this.x = x;
                this.width = minWidth + Math.random() * (maxWidth - minWidth);
                this.floors = minFloors + Math.floor(Math.random() * (maxFloors - minFloors));
                this.floorHeight = 20 + Math.random() * 10;
                this.height = this.floors * this.floorHeight;
                this.baseY = height;
                this.windows = [];
                this.roofStyle = Math.floor(Math.random() * 4); // 0-3种屋顶样式
                this.hasAntenna = Math.random() > 0.7;
                this.antennaHeight = 20 + Math.random() * 30;
                this.color = this.getBuildingColor();
                
                // 生成窗户
                this.initWindows();
            }
            
            getBuildingColor() {
                const colors = [
                    { r: 40, g: 45, b: 55 },
                    { r: 50, g: 50, b: 60 },
                    { r: 45, g: 40, b: 50 },
                    { r: 35, g: 45, b: 50 }
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            initWindows() {
                const windowWidth = 8;
                const windowHeight = 12;
                const windowMarginX = 8;
                const windowMarginY = 6;
                
                const windowsPerFloor = Math.floor((this.width - windowMarginX * 2) / (windowWidth + windowMarginX));
                
                for (let floor = 0; floor < this.floors; floor++) {
                    for (let col = 0; col < windowsPerFloor; col++) {
                        const wx = windowMarginX + col * (windowWidth + windowMarginX);
                        const wy = height - this.height + floor * this.floorHeight + windowMarginY;
                        
                        this.windows.push({
                            x: wx,
                            y: wy,
                            width: windowWidth,
                            height: windowHeight,
                            lit: Math.random() > 0.4,
                            flickerPhase: Math.random() * Math.PI * 2,
                            flickerSpeed: Math.random() * 0.05 + 0.02,
                            color: this.getWindowColor()
                        });
                    }
                }
            }
            
            getWindowColor() {
                const colors = [
                    { r: 255, g: 220, b: 150 }, // 暖黄
                    { r: 255, g: 240, b: 200 }, // 浅黄
                    { r: 200, g: 220, b: 255 }, // 冷蓝
                    { r: 255, g: 200, b: 180 }  // 橙色
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            toggleWindow(index) {
                if (index >= 0 && index < this.windows.length) {
                    this.windows[index].lit = !this.windows[index].lit;
                }
            }
            
            getWindowAt(px, py) {
                const buildingLeft = this.x;
                const buildingRight = this.x + this.width;
                
                if (px < buildingLeft || px > buildingRight) return -1;
                if (py < height - this.height || py > height) return -1;
                
                for (let i = 0; i < this.windows.length; i++) {
                    const w = this.windows[i];
                    const wx = this.x + w.x;
                    const wy = w.y;
                    
                    if (px >= wx && px <= wx + w.width && py >= wy && py <= wy + w.height) {
                        return i;
                    }
                }
                
                return -1;
            }
            
            update(dayNight) {
                // 窗户闪烁
                this.windows.forEach(w => {
                    w.flickerPhase += w.flickerSpeed;
                    
                    // 随机开关灯
                    if (Math.random() > 0.998) {
                        w.lit = !w.lit;
                    }
                });
            }
            
            draw(dayNight) {
                const nightFactor = dayNight;
                
                // 建筑主体
                const buildingColor = `rgb(${this.color.r}, ${this.color.g}, ${this.color.b})`;
                ctx.fillStyle = buildingColor;
                ctx.fillRect(this.x, height - this.height, this.width, this.height);
                
                // 屋顶
                this.drawRoof();
                
                // 天线
                if (this.hasAntenna) {
                    this.drawAntenna(dayNight);
                }
                
                // 窗户
                this.windows.forEach(w => {
                    const flicker = Math.sin(w.flickerPhase) * 0.1 + 0.9;
                    const alpha = w.lit ? (nightFactor * 0.9 + 0.1) * flicker : 0.1;
                    
                    ctx.fillStyle = w.lit ? 
                        `rgba(${w.color.r}, ${w.color.g}, ${w.color.b}, ${alpha})` :
                        `rgba(30, 40, 50, ${alpha})`;
                    
                    ctx.fillRect(this.x + w.x, w.y, w.width, w.height);
                    
                    // 发光效果
                    if (w.lit && nightFactor > 0.3) {
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = `rgba(${w.color.r}, ${w.color.g}, ${w.color.b}, ${nightFactor * 0.5})`;
                        ctx.fillRect(this.x + w.x, w.y, w.width, w.height);
                        ctx.shadowBlur = 0;
                    }
                });
            }
            
            drawRoof() {
                ctx.fillStyle = `rgb(${this.color.r - 10}, ${this.color.g - 10}, ${this.color.b - 10})`;
                
                switch (this.roofStyle) {
                    case 0: // 平顶
                        break;
                    case 1: // 三角顶
                        ctx.beginPath();
                        ctx.moveTo(this.x, height - this.height);
                        ctx.lineTo(this.x + this.width / 2, height - this.height - 20);
                        ctx.lineTo(this.x + this.width, height - this.height);
                        ctx.closePath();
                        ctx.fill();
                        break;
                    case 2: // 阶梯顶
                        ctx.fillRect(this.x + this.width * 0.2, height - this.height - 15, this.width * 0.6, 15);
                        ctx.fillRect(this.x + this.width * 0.35, height - this.height - 25, this.width * 0.3, 10);
                        break;
                    case 3: // 圆顶
                        ctx.beginPath();
                        ctx.arc(this.x + this.width / 2, height - this.height, this.width / 3, Math.PI, 0);
                        ctx.fill();
                        break;
                }
            }
            
            drawAntenna(dayNight) {
                const antennaX = this.x + this.width / 2;
                const antennaY = height - this.height - (this.roofStyle === 1 ? 20 : 0);
                
                // 天线杆
                ctx.strokeStyle = 'rgba(80, 80, 90, 0.9)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(antennaX, antennaY);
                ctx.lineTo(antennaX, antennaY - this.antennaHeight);
                ctx.stroke();
                
                // 闪烁的红灯
                const blinkPhase = Math.sin(time * 0.1) > 0;
                if (blinkPhase && dayNight > 0.3) {
                    const gradient = ctx.createRadialGradient(
                        antennaX, antennaY - this.antennaHeight, 0,
                        antennaX, antennaY - this.antennaHeight, 10
                    );
                    gradient.addColorStop(0, 'rgba(255, 0, 0, 0.9)');
                    gradient.addColorStop(0.5, 'rgba(255, 0, 0, 0.4)');
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(antennaX, antennaY - this.antennaHeight, 10, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
        
        // 汽车类
        class Car {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.direction = Math.random() > 0.5 ? 1 : -1;
                this.x = this.direction === 1 ? -50 : width + 50;
                this.y = height - 30;
                this.speed = (1 + Math.random() * 2) * this.direction;
                this.color = this.getCarColor();
                this.headlightColor = { r: 255, g: 255, b: 200 };
            }
            
            getCarColor() {
                const colors = ['#cc3333', '#3366cc', '#33cc33', '#cccc33', '#9933cc', '#333333'];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                this.x += this.speed;
                
                if ((this.direction === 1 && this.x > width + 50) || 
                    (this.direction === -1 && this.x < -50)) {
                    this.reset();
                }
            }
            
            draw(dayNight) {
                // 车身
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 30, 12);
                ctx.fillRect(this.x + 5, this.y - 8, 20, 8);
                
                // 车窗
                ctx.fillStyle = 'rgba(100, 150, 200, 0.6)';
                ctx.fillRect(this.x + 7, this.y - 6, 16, 6);
                
                // 车轮
                ctx.fillStyle = '#222';
                ctx.beginPath();
                ctx.arc(this.x + 8, this.y + 12, 4, 0, Math.PI * 2);
                ctx.arc(this.x + 22, this.y + 12, 4, 0, Math.PI * 2);
                ctx.fill();
                
                // 车灯（夜间）
                if (dayNight > 0.5) {
                    const lightX = this.direction === 1 ? this.x + 30 : this.x;
                    const gradient = ctx.createRadialGradient(
                        lightX, this.y + 6, 0,
                        lightX, this.y + 6, 50 * this.direction
                    );
                    gradient.addColorStop(0, `rgba(${this.headlightColor.r}, ${this.headlightColor.g}, ${this.headlightColor.b}, ${dayNight * 0.3})`);
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.ellipse(lightX + 25 * this.direction, this.y + 6, 50, 8, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
        
        // 星星类
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.5;
                this.size = Math.random() * 2 + 0.5;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.twinkleSpeed = Math.random() * 0.05 + 0.02;
            }
            
            draw(dayNight) {
                if (dayNight < 0.4) return;
                
                const twinkle = Math.sin(this.twinklePhase) * 0.3 + 0.7;
                const alpha = dayNight * twinkle;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                this.twinklePhase += this.twinkleSpeed;
            }
        }
        
        // 云类
        class Cloud {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = -200;
                this.y = 50 + Math.random() * 100;
                this.speed = 0.3 + Math.random() * 0.5;
                this.width = 100 + Math.random() * 100;
                this.height = 30 + Math.random() * 20;
            }
            
            update() {
                this.x += this.speed;
                if (this.x > width + 200) {
                    this.reset();
                }
            }
            
            draw(dayNight) {
                const alpha = 0.8 - dayNight * 0.5;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                
                // 多个椭圆组成云朵
                for (let i = 0; i < 4; i++) {
                    const cx = this.x + i * this.width / 4;
                    const cy = this.y + Math.sin(i * 1.2) * 10;
                    
                    ctx.beginPath();
                    ctx.ellipse(cx, cy, this.width / 4, this.height / 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
        
        // 绘制天空渐变
        function drawSky(dayNight) {
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            
            if (dayNight < 0.3) {
                // 白天
                gradient.addColorStop(0, '#87CEEB');
                gradient.addColorStop(0.5, '#B0E0E6');
                gradient.addColorStop(1, '#F0F8FF');
            } else if (dayNight < 0.6) {
                // 黄昏
                const t = (dayNight - 0.3) / 0.3;
                gradient.addColorStop(0, lerpColor('#87CEEB', '#1a1a3a', t));
                gradient.addColorStop(0.3, lerpColor('#B0E0E6', '#FF6B6B', t));
                gradient.addColorStop(0.6, lerpColor('#F0F8FF', '#FFD93D', t));
                gradient.addColorStop(1, lerpColor('#F0F8FF', '#FF8C42', t));
            } else {
                // 夜晚
                gradient.addColorStop(0, '#0a0a1a');
                gradient.addColorStop(0.5, '#1a1a3a');
                gradient.addColorStop(1, '#2a2a4a');
            }
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        // 颜色插值
        function lerpColor(color1, color2, t) {
            const c1 = hexToRgb(color1);
            const c2 = hexToRgb(color2);
            
            const r = Math.round(c1.r + (c2.r - c1.r) * t);
            const g = Math.round(c1.g + (c2.g - c1.g) * t);
            const b = Math.round(c1.b + (c2.b - c1.b) * t);
            
            return `rgb(${r}, ${g}, ${b})`;
        }
        
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }
        
        // 绘制月亮/太阳
        function drawCelestialBody(dayNight) {
            const x = width * 0.8;
            const y = 80;
            
            if (dayNight < 0.5) {
                // 太阳
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, 50);
                gradient.addColorStop(0, '#FFFF99');
                gradient.addColorStop(0.5, '#FFD700');
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(x, y, 50, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // 月亮
                const alpha = (dayNight - 0.5) * 2;
                
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, 40);
                gradient.addColorStop(0, `rgba(255, 255, 230, ${alpha})`);
                gradient.addColorStop(0.8, `rgba(200, 200, 180, ${alpha * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(x, y, 40, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // 绘制地面
        function drawGround(dayNight) {
            const groundColor = dayNight > 0.5 ? 
                `rgb(${30 - dayNight * 10}, ${35 - dayNight * 10}, ${40 - dayNight * 10})` :
                `rgb(60, 65, 70)`;
            
            ctx.fillStyle = groundColor;
            ctx.fillRect(0, height - 25, width, 25);
            
            // 道路标线
            ctx.strokeStyle = dayNight > 0.5 ? 'rgba(255, 255, 0, 0.8)' : 'rgba(255, 255, 0, 0.4)';
            ctx.lineWidth = 2;
            ctx.setLineDash([20, 15]);
            ctx.beginPath();
            ctx.moveTo(0, height - 15);
            ctx.lineTo(width, height - 15);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        // 初始化建筑物
        function initBuildings() {
            buildings = [];
            
            // 后排建筑（远）
            let x = -50;
            while (x < width + 100) {
                const building = new Building(x, 60, 120, 15, 30);
                buildings.push(building);
                x += building.width + Math.random() * 20;
            }
            
            // 前排建筑（近）
            x = 0;
            while (x < width) {
                const building = new Building(x, 80, 150, 8, 20);
                buildings.push(building);
                x += building.width + Math.random() * 30;
            }
        }
        
        // 初始化星星
        function initStars() {
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push(new Star());
            }
        }
        
        // 初始化汽车
        function initCars() {
            cars = [];
            for (let i = 0; i < 5; i++) {
                const car = new Car();
                car.x = Math.random() * width;
                cars.push(car);
            }
        }
        
        // 初始化云朵
        function initClouds() {
            clouds = [];
            for (let i = 0; i < 4; i++) {
                const cloud = new Cloud();
                cloud.x = Math.random() * width;
                clouds.push(cloud);
            }
        }
        
        // 更新时间显示
        function updateTimeDisplay(dayNight) {
            const hours = Math.floor(12 + dayNight * 12) % 24;
            const minutes = Math.floor((time * 0.5) % 60);
            timeDisplay.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
        }
        
        // 主渲染循环
        function render() {
            // 计算日夜循环
            dayNightCycle += (mouseY / height - dayNightCycle) * 0.02;
            dayNightCycle = Math.max(0, Math.min(1, dayNightCycle));
            
            // 绘制天空
            drawSky(dayNightCycle);
            
            // 绘制星星
            stars.forEach(star => star.draw(dayNightCycle));
            
            // 绘制天体
            drawCelestialBody(dayNightCycle);
            
            // 绘制云朵
            clouds.forEach(cloud => {
                cloud.update();
                cloud.draw(dayNightCycle);
            });
            
            // 绘制建筑物（先远后近）
            buildings.sort((a, b) => a.height - b.height);
            buildings.forEach(building => {
                building.update(dayNightCycle);
                building.draw(dayNightCycle);
            });
            
            // 绘制地面
            drawGround(dayNightCycle);
            
            // 绘制汽车
            cars.forEach(car => {
                car.update();
                car.draw(dayNightCycle);
            });
            
            // 更新时间显示
            updateTimeDisplay(dayNightCycle);
            
            time++;
            
            // FPS 计算
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                fpsDisplay.textContent = `FPS: ${fps}`;
            }
            
            requestAnimationFrame(render);
        }
        
        // 调整画布大小
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            initBuildings();
            initStars();
        }
        
        // 点击处理
        function handleClick(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // 检查是否点击了窗户
            for (let building of buildings) {
                const windowIndex = building.getWindowAt(x, y);
                if (windowIndex >= 0) {
                    building.toggleWindow(windowIndex);
                    break;
                }
            }
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        });
        
        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                handleClick(e.touches[0]);
            }
        });
        
        // 初始化
        resize();
        initCars();
        initClouds();
        mouseX = width / 2;
        mouseY = height * 0.7;
        render();
    </script>
</body>
</html>
