<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相对论时空 - Relativistic Spacetime</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            cursor: crosshair;
        }
        
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(200, 150, 255, 0.9);
            font-size: 13px;
            line-height: 1.8;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(200, 150, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        
        #info h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #c896ff;
            text-shadow: 0 0 10px rgba(200, 150, 255, 0.5);
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(200, 150, 255, 0.9);
            font-size: 13px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(200, 150, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .control-item {
            margin: 8px 0;
        }
        
        label {
            display: inline-block;
            width: 110px;
        }
        
        input[type="range"] {
            width: 130px;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        span.value {
            display: inline-block;
            width: 50px;
            text-align: right;
            margin-left: 10px;
            color: #c896ff;
        }
        
        button {
            margin-top: 10px;
            margin-right: 10px;
            padding: 8px 20px;
            background: linear-gradient(135deg, #c896ff 0%, #9632ff 100%);
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(200, 150, 255, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="info">
        <h3>⏱️ 相对论时空</h3>
        <div>速度: <span id="velocity">0.00</span>c</div>
        <div>洛伦兹因子: <span id="gamma">1.00</span></div>
        <div>时间膨胀: <span id="timeDilation">1.00</span>x</div>
        <div>长度收缩: <span id="lengthContraction">1.00</span>x</div>
        <div>FPS: <span id="fps">0</span></div>
    </div>
    
    <div id="controls">
        <div class="control-item">
            <label>相对速度 (%c):</label>
            <input type="range" id="velocity" min="0" max="99" value="0">
            <span class="value" id="velocityValue">0</span>
        </div>
        <div class="control-item">
            <label>飞船数量:</label>
            <input type="range" id="shipCount" min="1" max="10" value="3">
            <span class="value" id="shipCountValue">3</span>
        </div>
        <div class="control-item">
            <label>粒子轨迹:</label>
            <input type="range" id="trailLength" min="0" max="100" value="50">
            <span class="value" id="trailLengthValue">50</span>
        </div>
        <button id="addShipBtn">添加飞船</button>
        <button id="resetBtn">重置</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        // 配置
        let config = {
            velocity: 0,
            shipCount: 3,
            trailLength: 50
        };
        
        // 飞船
        let ships = [];
        
        // 静止参考系的粒子
        let staticParticles = [];
        
        // FPS 计算
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 0;
        
        // 时间
        let time = 0;
        
        // 计算洛伦兹因子 γ = 1/√(1-v²/c²)
        function calculateGamma(v) {
            const beta = v / 100; // v 是光速的百分比
            if (beta >= 1) return Infinity;
            return 1 / Math.sqrt(1 - beta * beta);
        }
        
        // 飞船类
        class Spaceship {
            constructor(x, y, velocity) {
                this.x = x;
                this.y = y;
                this.velocity = velocity; // 0-100 (光速百分比)
                this.baseLength = 80;
                this.properTime = 0; // 固有时
                this.trail = [];
                this.color = this.generateColor();
            }
            
            generateColor() {
                const hue = Math.random() * 60 + 260; // 紫色-蓝色范围
                return { h: hue, s: 70, l: 60 };
            }
            
            update() {
                const gamma = calculateGamma(this.velocity);
                
                // 长度收缩
                this.length = this.baseLength / gamma;
                
                // 时间膨胀（移动时钟变慢）
                const dt = 0.016; // 坐标系时间间隔
                this.properTime += dt / gamma; // 固有时流逝更慢
                
                // 移动
                this.x += this.velocity * 3;
                
                // 边界循环
                if (this.x > width + 100) {
                    this.x = -100;
                }
                
                // 轨迹
                if (config.trailLength > 0) {
                    this.trail.push({ x: this.x, y: this.y, time: this.properTime });
                    if (this.trail.length > config.trailLength) {
                        this.trail.shift();
                    }
                }
            }
            
            draw() {
                const gamma = calculateGamma(this.velocity);
                
                // 绘制轨迹
                if (this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    
                    ctx.strokeStyle = `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l}%, 0.3)`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                
                // 绘制飞船（长度收缩效果）
                const shipLength = this.length;
                const shipHeight = 20;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // 发光效果
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, shipLength);
                gradient.addColorStop(0, `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l}%, 0.8)`);
                gradient.addColorStop(0.5, `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l}%, 0.3)`);
                gradient.addColorStop(1, `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l}%, 0)`);
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.ellipse(0, 0, shipLength, shipHeight, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 飞船本体
                ctx.fillStyle = `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l}%, 0.9)`;
                ctx.beginPath();
                ctx.ellipse(0, 0, shipLength * 0.8, shipHeight * 0.5, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 时钟显示（时间膨胀）
                const clockRadius = 15;
                ctx.beginPath();
                ctx.arc(0, 0, clockRadius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 时钟指针（固有时）
                const angle = (this.properTime * 2) % (Math.PI * 2);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(Math.cos(angle) * clockRadius * 0.8, Math.sin(angle) * clockRadius * 0.8);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 速度标签
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.font = '12px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText(`${this.velocity.toFixed(0)}%c`, 0, shipHeight + 20);
                ctx.fillText(`γ=${gamma.toFixed(2)}`, 0, shipHeight + 35);
                
                ctx.restore();
            }
        }
        
        // 静止粒子类
        class StaticParticle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 1;
                this.alpha = Math.random() * 0.5 + 0.3;
                this.clock = 0;
            }
            
            update() {
                // 静止参考系的时间（正常流逝）
                this.clock += 0.016;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 150, 255, ${this.alpha})`;
                ctx.fill();
                
                // 小时钟
                const angle = (this.clock * 2) % (Math.PI * 2);
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(
                    this.x + Math.cos(angle) * 8,
                    this.y + Math.sin(angle) * 8
                );
                ctx.strokeStyle = `rgba(200, 150, 255, ${this.alpha * 0.5})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
        
        // 初始化飞船
        function initShips() {
            ships = [];
            
            for (let i = 0; i < config.shipCount; i++) {
                const velocity = (i + 1) * 30; // 不同速度
                const y = 150 + i * 120;
                ships.push(new Spaceship(-100, y, velocity));
            }
        }
        
        // 初始化静止粒子
        function initParticles() {
            staticParticles = [];
            
            for (let i = 0; i < 100; i++) {
                staticParticles.push(new StaticParticle());
            }
        }
        
        // 绘制光锥
        function drawLightCone() {
            const centerX = width / 2;
            const centerY = height / 2;
            
            // 光锥（45度线）
            ctx.strokeStyle = 'rgba(255, 255, 100, 0.2)';
            ctx.lineWidth = 1;
            
            // 未来光锥
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX + 300, centerY - 300);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX - 300, centerY - 300);
            ctx.stroke();
            
            // 过去光锥
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX + 300, centerY + 300);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX - 300, centerY + 300);
            ctx.stroke();
            
            // 中心点
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 100, 0.8)';
            ctx.fill();
            
            // 标签
            ctx.fillStyle = 'rgba(255, 255, 100, 0.6)';
            ctx.font = '12px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('光锥', centerX, centerY - 20);
        }
        
        // 绘制时空图
        function drawSpacetimeDiagram() {
            const startX = width - 250;
            const startY = 100;
            const diagramWidth = 200;
            const diagramHeight = 200;
            
            // 坐标轴
            ctx.strokeStyle = 'rgba(200, 150, 255, 0.5)';
            ctx.lineWidth = 1;
            
            // x轴（空间）
            ctx.beginPath();
            ctx.moveTo(startX, startY + diagramHeight / 2);
            ctx.lineTo(startX + diagramWidth, startY + diagramHeight / 2);
            ctx.stroke();
            
            // t轴（时间）
            ctx.beginPath();
            ctx.moveTo(startX + diagramWidth / 2, startY);
            ctx.lineTo(startX + diagramWidth / 2, startY + diagramHeight);
            ctx.stroke();
            
            // 标签
            ctx.fillStyle = 'rgba(200, 150, 255, 0.7)';
            ctx.font = '12px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('x（空间）', startX + diagramWidth / 2, startY + diagramHeight + 20);
            ctx.save();
            ctx.translate(startX - 20, startY + diagramHeight / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText('t（时间）', 0, 0);
            ctx.restore();
            ctx.fillText('时空图', startX + diagramWidth / 2, startY - 10);
            
            // 绘制世界线（不同速度）
            ships.forEach((ship, index) => {
                const beta = ship.velocity / 100;
                const angle = Math.atan(beta) * 45; // 斜率
                
                ctx.beginPath();
                ctx.moveTo(startX + diagramWidth / 2, startY + diagramHeight / 2);
                ctx.lineTo(
                    startX + diagramWidth / 2 + Math.cos(angle) * 80,
                    startY + diagramHeight / 2 - Math.sin(angle) * 80
                );
                
                ctx.strokeStyle = `hsla(${ship.color.h}, ${ship.color.s}%, ${ship.color.l}%, 0.6)`;
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }
        
        // 动画循环
        function animate(currentTime) {
            // FPS 计算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                document.getElementById('fps').textContent = fps;
            }
            
            // 更新时间
            time += 0.016;
            
            // 清除画布
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制光锥
            drawLightCone();
            
            // 绘制时空图
            drawSpacetimeDiagram();
            
            // 更新和绘制静止粒子
            staticParticles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            // 更新和绘制飞船
            ships.forEach(ship => {
                ship.update();
                ship.draw();
            });
            
            // 更新信息
            const gamma = calculateGamma(config.velocity);
            document.getElementById('velocity').textContent = (config.velocity / 100).toFixed(2);
            document.getElementById('gamma').textContent = gamma.toFixed(2);
            document.getElementById('timeDilation').textContent = gamma.toFixed(2);
            document.getElementById('lengthContraction').textContent = (1 / gamma).toFixed(2);
            
            requestAnimationFrame(animate);
        }
        
        // 鼠标交互1：点击添加飞船
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (ships.length < 10) {
                const velocity = config.velocity + Math.random() * 20 - 10;
                ships.push(new Spaceship(x, y, Math.max(0, Math.min(99, velocity))));
            }
        });
        
        // 鼠标交互2：右键移除飞船
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (ships.length > 1) {
                ships.pop();
            }
        });
        
        // 控制面板事件
        document.getElementById('velocity').addEventListener('input', (e) => {
            config.velocity = parseInt(e.target.value);
            document.getElementById('velocityValue').textContent = e.target.value;
            
            // 更新所有飞船速度
            ships.forEach((ship, index) => {
                ship.velocity = config.velocity;
            });
        });
        
        document.getElementById('shipCount').addEventListener('input', (e) => {
            config.shipCount = parseInt(e.target.value);
            document.getElementById('shipCountValue').textContent = e.target.value;
            initShips();
        });
        
        document.getElementById('trailLength').addEventListener('input', (e) => {
            config.trailLength = parseInt(e.target.value);
            document.getElementById('trailLengthValue').textContent = e.target.value;
        });
        
        document.getElementById('addShipBtn').addEventListener('click', () => {
            if (ships.length < 10) {
                const velocity = Math.random() * 90 + 10;
                const y = 150 + ships.length * 80;
                ships.push(new Spaceship(-100, y, velocity));
            }
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            initShips();
            initParticles();
            config.velocity = 0;
            document.getElementById('velocity').value = 0;
            document.getElementById('velocityValue').textContent = 0;
        });
        
        // 窗口调整
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        
        // 性能优化：移动设备减少飞船
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            config.shipCount = 2;
            document.getElementById('shipCount').value = 2;
            document.getElementById('shipCountValue').textContent = 2;
        }
        
        // 初始化并启动
        initShips();
        initParticles();
        animate(performance.now());
    </script>
</body>
</html>
