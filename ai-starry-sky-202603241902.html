<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空效果 - Starry Sky</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 36px;
            font-weight: bold;
            z-index: 100;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
            letter-spacing: 8px;
        }
        
        .fps {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
        
        @media (max-width: 768px) {
            .info {
                font-size: 11px;
                bottom: 10px;
                left: 10px;
            }
            .title {
                font-size: 24px;
                top: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="title">✨ 星空</div>
    <canvas id="starrysky"></canvas>
    <div class="info">
        <div>🖱️ 移动鼠标 - 星星闪烁加速</div>
        <div>👆 点击 - 流星划过</div>
    </div>
    <div class="fps" id="fps">FPS: 60</div>
    
    <script>
        // 性能监控
        const fpsElement = document.getElementById('fps');
        let lastTime = performance.now();
        let frameCount = 0;
        
        // Canvas 设置
        const canvas = document.getElementById('starrysky');
        const ctx = canvas.getContext('2d');
        
        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        
        // 星星系统
        let stars = [];
        const STAR_COUNT = 300;
        
        // 流星系统
        let meteors = [];
        const MAX_METEORS = 5;
        
        // 星云系统
        let nebulae = [];
        const NEBULA_COUNT = 3;
        
        // 响应式调整
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            initStars();
            initNebulae();
        }
        
        // 初始化星星
        function initStars() {
            stars = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.5 + 0.5,
                    twinkleSpeed: Math.random() * 0.02 + 0.01,
                    twinklePhase: Math.random() * Math.PI * 2,
                    color: getStarColor(),
                });
            }
        }
        
        // 获取星星颜色
        function getStarColor() {
            const colors = [
                'rgba(255, 255, 255,',
                'rgba(255, 220, 180,',
                'rgba(200, 220, 255,',
                'rgba(255, 200, 200,',
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        // 初始化星云
        function initNebulae() {
            nebulae = [];
            for (let i = 0; i < NEBULA_COUNT; i++) {
                nebulae.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: 100 + Math.random() * 200,
                    color: getNebulaColor(),
                    alpha: 0.1 + Math.random() * 0.1,
                    drift: {
                        x: (Math.random() - 0.5) * 0.2,
                        y: (Math.random() - 0.5) * 0.2,
                    },
                });
            }
        }
        
        // 获取星云颜色
        function getNebulaColor() {
            const colors = [
                'rgba(100, 50, 150,',
                'rgba(50, 100, 150,',
                'rgba(150, 50, 100,',
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        // 创建流星
        function createMeteor(x, y) {
            if (meteors.length >= MAX_METEORS) {
                meteors.shift();
            }
            
            const angle = Math.PI / 4 + (Math.random() - 0.5) * 0.5;
            
            meteors.push({
                x: x || Math.random() * width,
                y: y || 0,
                vx: Math.cos(angle) * (10 + Math.random() * 5),
                vy: Math.sin(angle) * (10 + Math.random() * 5),
                length: 50 + Math.random() * 100,
                alpha: 1,
                decay: 0.02,
            });
        }
        
        // 更新星星
        function updateStars(time, speedMultiplier) {
            stars.forEach(star => {
                const twinkle = Math.sin(time * star.twinkleSpeed * 60 * speedMultiplier + star.twinklePhase);
                star.currentAlpha = star.alpha * (0.7 + twinkle * 0.3);
            });
        }
        
        // 更新星云
        function updateNebulae() {
            nebulae.forEach(nebula => {
                nebula.x += nebula.drift.x;
                nebula.y += nebula.drift.y;
                
                // 边界循环
                if (nebula.x < -nebula.radius) nebula.x = width + nebula.radius;
                if (nebula.x > width + nebula.radius) nebula.x = -nebula.radius;
                if (nebula.y < -nebula.radius) nebula.y = height + nebula.radius;
                if (nebula.y > height + nebula.radius) nebula.y = -nebula.radius;
            });
        }
        
        // 更新流星
        function updateMeteors() {
            meteors = meteors.filter(meteor => {
                meteor.x += meteor.vx;
                meteor.y += meteor.vy;
                meteor.alpha -= meteor.decay;
                
                return meteor.alpha > 0 && meteor.x < width && meteor.y < height;
            });
        }
        
        // 绘制星云
        function drawNebulae() {
            nebulae.forEach(nebula => {
                const gradient = ctx.createRadialGradient(
                    nebula.x, nebula.y, 0,
                    nebula.x, nebula.y, nebula.radius
                );
                gradient.addColorStop(0, nebula.color + nebula.alpha + ')');
                gradient.addColorStop(1, nebula.color + '0)');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(nebula.x, nebula.y, nebula.radius, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        // 绘制星星
        function drawStars() {
            stars.forEach(star => {
                ctx.save();
                ctx.fillStyle = star.color + star.currentAlpha + ')';
                ctx.shadowBlur = 5;
                ctx.shadowColor = star.color + star.currentAlpha + ')';
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }
        
        // 绘制流星
        function drawMeteors() {
            meteors.forEach(meteor => {
                const angle = Math.atan2(meteor.vy, meteor.vx);
                const endX = meteor.x - Math.cos(angle) * meteor.length;
                const endY = meteor.y - Math.sin(angle) * meteor.length;
                
                const gradient = ctx.createLinearGradient(meteor.x, meteor.y, endX, endY);
                gradient.addColorStop(0, `rgba(255, 255, 255, ${meteor.alpha})`);
                gradient.addColorStop(1, `rgba(255, 255, 255, 0)`);
                
                ctx.save();
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(meteor.x, meteor.y);
                ctx.lineTo(endX, endY);
                ctx.stroke();
                ctx.restore();
                
                // 流星头部光晕
                ctx.save();
                ctx.fillStyle = `rgba(255, 255, 255, ${meteor.alpha})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `rgba(255, 255, 255, ${meteor.alpha})`;
                ctx.beginPath();
                ctx.arc(meteor.x, meteor.y, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }
        
        // 绘制背景渐变
        function drawBackground() {
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, Math.max(width, height)
            );
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(0.5, '#050510');
            gradient.addColorStop(1, '#000005');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        // 主动画循环
        function animate(currentTime) {
            const time = currentTime * 0.001;
            
            // 清除画布
            ctx.fillStyle = 'rgba(0, 0, 5, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制背景
            drawBackground();
            
            // 根据鼠标位置调整闪烁速度
            const dx = mouseX - centerX;
            const dy = mouseY - centerY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const speedMultiplier = 1 + (dist / Math.max(width, height)) * 2;
            
            // 自动生成流星（低概率）
            if (Math.random() < 0.002) {
                createMeteor();
            }
            
            // 更新和绘制
            updateNebulae();
            updateStars(time, speedMultiplier);
            updateMeteors();
            
            drawNebulae();
            drawStars();
            drawMeteors();
            
            // FPS 计算
            frameCount++;
            if (frameCount >= 30) {
                const fps = Math.round(30 / ((currentTime - lastTime) / 1000 * 30));
                fpsElement.textContent = `FPS: ${Math.min(fps, 60)}`;
                frameCount = 0;
            }
            
            lastTime = currentTime;
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            createMeteor(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            createMeteor(e.touches[0].clientX, e.touches[0].clientY);
        });
        
        // 初始化
        resize();
        mouseX = centerX;
        mouseY = centerY;
        requestAnimationFrame(animate);
    </script>
</body>
</html>
