<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烟花盛宴 - Fireworks Show</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255, 200, 100, 0.5);
        }
        
        .info span {
            display: block;
            margin: 5px 0;
        }
        
        .fps-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="fireworks"></canvas>
    <div class="info">
        <span>🎆 烟花盛宴</span>
        <span>🖱️ 移动鼠标 - 烟花跟随</span>
        <span>👆 点击 - 连续烟花发射</span>
        <span>🎨 双击 - 特大烟花</span>
    </div>
    <div class="fps-counter" id="fps">FPS: 60</div>

    <script>
        // ============ 配置 ============
        const CONFIG = {
            gravity: 0.08,
            friction: 0.99,
            particleCount: { min: 80, max: 150 },
            trailLength: 0.3,
            colors: [
                ['#FF6B6B', '#FF8E8E', '#FFB4B4'],  // 红色系
                ['#4ECDC4', '#7EDDD6', '#A8E6E2'],  // 青色系
                ['#FFE66D', '#FFF09E', '#FFFACD'],  // 金色系
                ['#95E1D3', '#B8EBE0', '#D8F5F0'],  // 绿色系
                ['#F38181', '#F5A3A3', '#F8C5C5'],  // 粉色系
                ['#AA96DA', '#C4B6E8', '#DED6F5'],  // 紫色系
                ['#FCBAD3', '#FDCEE2', '#FEE2F0'],  // 浅粉系
                ['#A8D8EA', '#C5E5F1', '#E2F2F8'],  // 蓝色系
                ['#FF9F43', '#FFB976', '#FFD4A8'],  // 橙色系
                ['#00CEC9', '#4DD8D5', '#99E8E6'],  // 青绿系
            ]
        };

        // ============ Canvas 设置 ============
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        resize();
        window.addEventListener('resize', resize);

        // ============ 工具函数 ============
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        function randomInt(min, max) {
            return Math.floor(random(min, max + 1));
        }

        function randomColor() {
            return CONFIG.colors[randomInt(0, CONFIG.colors.length - 1)];
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // ============ 烟花火箭类 ============
        class Rocket {
            constructor(x, targetY, isSpecial = false) {
                this.x = x;
                this.y = height;
                this.targetY = targetY;
                this.vx = random(-1, 1);
                this.vy = random(-15, -12);
                this.isSpecial = isSpecial;
                this.colors = randomColor();
                this.trail = [];
                this.exploded = false;
                this.size = isSpecial ? 4 : 2;
            }

            update() {
                // 记录轨迹
                this.trail.push({ x: this.x, y: this.y, alpha: 1 });
                if (this.trail.length > 20) {
                    this.trail.shift();
                }

                // 更新位置
                this.x += this.vx;
                this.y += this.vy;
                this.vy += CONFIG.gravity * 0.5;

                // 检查是否到达目标高度
                if (this.vy >= 0 || this.y <= this.targetY) {
                    this.exploded = true;
                }
            }

            draw() {
                // 绘制轨迹
                this.trail.forEach((point, index) => {
                    const alpha = (index / this.trail.length) * 0.8;
                    const size = (index / this.trail.length) * this.size;
                    
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, size, 0, Math.PI * 2);
                    ctx.fillStyle = hexToRgba(this.colors[0], alpha);
                    ctx.fill();
                });

                // 绘制火箭头部
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 3
                );
                gradient.addColorStop(0, hexToRgba(this.colors[0], 1));
                gradient.addColorStop(0.5, hexToRgba(this.colors[1], 0.5));
                gradient.addColorStop(1, 'transparent');

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        // ============ 烟花粒子类 ============
        class Particle {
            constructor(x, y, colors, isSpecial = false) {
                this.x = x;
                this.y = y;
                const angle = random(0, Math.PI * 2);
                const speed = isSpecial ? random(2, 12) : random(1, 8);
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.colors = colors;
                this.color = colors[randomInt(0, colors.length - 1)];
                this.size = isSpecial ? random(2, 5) : random(1, 3);
                this.life = 1;
                this.decay = random(0.008, 0.02);
                this.trail = [];
                this.sparkle = random(0, Math.PI * 2);
            }

            update() {
                // 记录轨迹
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 8) {
                    this.trail.shift();
                }

                this.x += this.vx;
                this.y += this.vy;
                this.vx *= CONFIG.friction;
                this.vy *= CONFIG.friction;
                this.vy += CONFIG.gravity;
                this.life -= this.decay;
                this.sparkle += 0.3;
            }

            draw() {
                if (this.life <= 0) return;

                // 绘制轨迹
                ctx.beginPath();
                this.trail.forEach((point, index) => {
                    const alpha = (index / this.trail.length) * this.life * 0.5;
                    ctx.fillStyle = hexToRgba(this.color, alpha);
                    ctx.fillRect(point.x, point.y, 1, 1);
                });

                // 闪烁效果
                const sparkle = 0.7 + 0.3 * Math.sin(this.sparkle);

                // 绘制粒子
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 2
                );
                gradient.addColorStop(0, hexToRgba(this.color, this.life * sparkle));
                gradient.addColorStop(0.5, hexToRgba(this.color, this.life * sparkle * 0.5));
                gradient.addColorStop(1, 'transparent');

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // 核心亮点
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = hexToRgba('#FFFFFF', this.life * sparkle);
                ctx.fill();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        // ============ 闪烁粒子（烟花残留） ============
        class Sparkle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vy = random(0.2, 0.5);
                this.color = color;
                this.size = random(0.5, 1.5);
                this.life = 1;
                this.decay = random(0.003, 0.008);
                this.twinkle = random(0, Math.PI * 2);
            }

            update() {
                this.y += this.vy;
                this.life -= this.decay;
                this.twinkle += 0.2;
            }

            draw() {
                if (this.life <= 0) return;
                
                const alpha = this.life * (0.5 + 0.5 * Math.sin(this.twinkle));
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = hexToRgba(this.color, alpha);
                ctx.fill();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        // ============ 星星背景 ============
        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = random(0, width);
                this.y = random(0, height * 0.7);
                this.size = random(0.5, 1.5);
                this.twinkleSpeed = random(0.02, 0.05);
                this.phase = random(0, Math.PI * 2);
            }

            update(time) {
                this.opacity = 0.3 + 0.7 * Math.abs(Math.sin(time * this.twinkleSpeed + this.phase));
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        // ============ 初始化 ============
        const rockets = [];
        const particles = [];
        const sparkles = [];
        const stars = [];

        for (let i = 0; i < 150; i++) {
            stars.push(new Star());
        }

        // ============ 创建烟花爆炸 ============
        function createExplosion(x, y, colors, isSpecial = false) {
            const count = isSpecial ? 
                randomInt(CONFIG.particleCount.min * 1.5, CONFIG.particleCount.max * 1.5) :
                randomInt(CONFIG.particleCount.min, CONFIG.particleCount.max);
            
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, colors, isSpecial));
            }

            // 添加闪烁残留
            const sparkleCount = isSpecial ? 30 : 15;
            for (let i = 0; i < sparkleCount; i++) {
                sparkles.push(new Sparkle(
                    x + random(-50, 50),
                    y + random(-50, 50),
                    colors[randomInt(0, colors.length - 1)]
                ));
            }
        }

        // ============ 发射烟花 ============
        function launchRocket(x, targetY, isSpecial = false) {
            rockets.push(new Rocket(x, targetY, isSpecial));
        }

        // 自动发射
        let autoLaunchTimer = 0;
        function autoLaunch() {
            if (Math.random() < 0.02) {
                const x = random(width * 0.1, width * 0.9);
                const targetY = random(height * 0.1, height * 0.4);
                launchRocket(x, targetY);
            }
        }

        // ============ 鼠标交互 ============
        let mouseX = width / 2;
        let mouseY = height / 2;
        let isMouseDown = false;
        let launchInterval = null;

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            // 连续发射
            launchRocket(mouseX, mouseY);
            launchInterval = setInterval(() => {
                launchRocket(mouseX + random(-30, 30), mouseY + random(-20, 20));
            }, 200);
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
            if (launchInterval) {
                clearInterval(launchInterval);
                launchInterval = null;
            }
        });

        canvas.addEventListener('dblclick', (e) => {
            // 特大烟花
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    launchRocket(
                        e.clientX + random(-50, 50),
                        e.clientY + random(-30, 30),
                        true
                    );
                }, i * 100);
            }
        });

        // ============ FPS 计算 ============
        let frameCount = 0;
        let lastFpsTime = performance.now();
        let fps = 60;

        function updateFPS() {
            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFpsTime = now;
                document.getElementById('fps').textContent = `FPS: ${fps}`;
            }
        }

        // ============ 绘制城市剪影 ============
        function drawCityline() {
            const buildingColors = ['#1a1a2e', '#16213e', '#0f3460'];
            
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, height - 100, width, 100);

            // 绘制建筑
            let x = 0;
            while (x < width) {
                const buildingWidth = random(30, 80);
                const buildingHeight = random(50, 150);
                const color = buildingColors[randomInt(0, buildingColors.length - 1)];
                
                ctx.fillStyle = color;
                ctx.fillRect(x, height - buildingHeight, buildingWidth, buildingHeight);

                // 窗户
                const windowRows = Math.floor(buildingHeight / 20);
                const windowCols = Math.floor(buildingWidth / 15);
                
                for (let row = 0; row < windowRows; row++) {
                    for (let col = 0; col < windowCols; col++) {
                        if (Math.random() > 0.3) {
                            const wx = x + col * 15 + 5;
                            const wy = height - buildingHeight + row * 20 + 5;
                            const brightness = random(0.3, 0.8);
                            ctx.fillStyle = `rgba(255, 255, 150, ${brightness})`;
                            ctx.fillRect(wx, wy, 8, 12);
                        }
                    }
                }

                x += buildingWidth + random(-10, 10);
            }
        }

        // 预先绘制城市
        let cityCanvas = null;
        function initCityline() {
            cityCanvas = document.createElement('canvas');
            cityCanvas.width = width;
            cityCanvas.height = height;
            const cityCtx = cityCanvas.getContext('2d');
            
            const buildingColors = ['#1a1a2e', '#16213e', '#0f3460'];
            cityCtx.fillStyle = '#0a0a1a';
            cityCtx.fillRect(0, height - 100, width, 100);

            let x = 0;
            while (x < width) {
                const buildingWidth = random(30, 80);
                const buildingHeight = random(50, 150);
                const color = buildingColors[randomInt(0, buildingColors.length - 1)];
                
                cityCtx.fillStyle = color;
                cityCtx.fillRect(x, height - buildingHeight, buildingWidth, buildingHeight);

                const windowRows = Math.floor(buildingHeight / 20);
                const windowCols = Math.floor(buildingWidth / 15);
                
                for (let row = 0; row < windowRows; row++) {
                    for (let col = 0; col < windowCols; col++) {
                        if (Math.random() > 0.3) {
                            const wx = x + col * 15 + 5;
                            const wy = height - buildingHeight + row * 20 + 5;
                            const brightness = random(0.3, 0.8);
                            cityCtx.fillStyle = `rgba(255, 255, 150, ${brightness})`;
                            cityCtx.fillRect(wx, wy, 8, 12);
                        }
                    }
                }

                x += buildingWidth + random(-10, 10);
            }
        }
        initCityline();

        // ============ 主动画循环 ============
        function animate(time) {
            // 清除画布（带拖尾效果）
            ctx.fillStyle = `rgba(10, 10, 26, ${CONFIG.trailLength})`;
            ctx.fillRect(0, 0, width, height);

            // 绘制星星
            stars.forEach(star => {
                star.update(time);
                star.draw();
            });

            // 自动发射
            autoLaunch();

            // 更新和绘制火箭
            for (let i = rockets.length - 1; i >= 0; i--) {
                const rocket = rockets[i];
                rocket.update();
                rocket.draw();

                if (rocket.exploded) {
                    createExplosion(rocket.x, rocket.y, rocket.colors, rocket.isSpecial);
                    rockets.splice(i, 1);
                }
            }

            // 更新和绘制粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].isDead()) {
                    particles.splice(i, 1);
                }
            }

            // 更新和绘制闪烁
            for (let i = sparkles.length - 1; i >= 0; i--) {
                sparkles[i].update();
                sparkles[i].draw();
                if (sparkles[i].isDead()) {
                    sparkles.splice(i, 1);
                }
            }

            // 限制粒子数量
            if (particles.length > 2000) {
                particles.splice(0, particles.length - 2000);
            }

            // 绘制城市剪影
            if (cityCanvas) {
                ctx.drawImage(cityCanvas, 0, 0);
            }

            updateFPS();
            requestAnimationFrame(animate);
        }

        // 启动动画
        animate(0);

        // 初始发射几个烟花
        setTimeout(() => {
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    launchRocket(random(width * 0.2, width * 0.8), random(height * 0.2, height * 0.4));
                }, i * 500);
            }
        }, 500);
    </script>
</body>
</html>
