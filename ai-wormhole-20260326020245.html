<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时空隧道 - Wormhole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            cursor: crosshair;
        }
        
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(0, 255, 200, 0.9);
            font-size: 13px;
            line-height: 1.8;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 200, 0.3);
            backdrop-filter: blur(10px);
        }
        
        #info h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #00ffc8;
            text-shadow: 0 0 10px rgba(0, 255, 200, 0.5);
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(0, 255, 200, 0.9);
            font-size: 13px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 200, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .control-item {
            margin: 8px 0;
        }
        
        label {
            display: inline-block;
            width: 100px;
        }
        
        input[type="range"] {
            width: 140px;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        span.value {
            display: inline-block;
            width: 40px;
            text-align: right;
            margin-left: 10px;
            color: #00ffc8;
        }
        
        button {
            margin-top: 10px;
            margin-right: 10px;
            padding: 8px 20px;
            background: linear-gradient(135deg, #00ffc8 0%, #00a080 100%);
            border: none;
            border-radius: 5px;
            color: #000;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 200, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="info">
        <h3>🌀 时空隧道</h3>
        <div>粒子数量: <span id="particleCount">0</span></div>
        <div>隧道长度: <span id="tunnelLength">0</span></div>
        <div>穿越速度: <span id="travelSpeed">0</span></div>
        <div>时空曲率: <span id="spacetimeCurvature">0</span></div>
        <div>FPS: <span id="fps">0</span></div>
    </div>
    
    <div id="controls">
        <div class="control-item">
            <label>粒子密度:</label>
            <input type="range" id="particleDensity" min="100" max="1000" value="500">
            <span class="value" id="particleDensityValue">500</span>
        </div>
        <div class="control-item">
            <label>隧道长度:</label>
            <input type="range" id="tunnelLength" min="10" max="100" value="50">
            <span class="value" id="tunnelLengthValue">50</span>
        </div>
        <div class="control-item">
            <label>穿越速度:</label>
            <input type="range" id="travelSpeed" min="1" max="20" value="10">
            <span class="value" id="travelSpeedValue">10</span>
        </div>
        <div class="control-item">
            <label>曲率强度:</label>
            <input type="range" id="curvatureStrength" min="0" max="100" value="50">
            <span class="value" id="curvatureStrengthValue">50</span>
        </div>
        <button id="jumpBtn">时空跳跃</button>
        <button id="reverseBtn">反向穿越</button>
        <button id="resetBtn">重置</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        // 配置
        let config = {
            particleDensity: 500,
            tunnelLength: 50,
            travelSpeed: 10,
            curvatureStrength: 50
        };
        
        // 粒子
        let particles = [];
        
        // 隧道环
        let tunnelRings = [];
        
        // 时间
        let time = 0;
        let direction = 1; // 1: 前进, -1: 后退
        
        // FPS 计算
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 0;
        
        // 粒子类
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                // 3D坐标（z表示深度）
                this.z = Math.random() * config.tunnelLength * 20;
                this.angle = Math.random() * Math.PI * 2;
                this.radius = Math.random() * 100 + 50;
                this.speed = (Math.random() * 0.5 + 0.5) * config.travelSpeed * 0.1;
                this.size = Math.random() * 2 + 1;
                this.color = this.generateColor();
            }
            
            generateColor() {
                // 隧道颜色（青色到蓝色渐变）
                const hue = 180 + Math.random() * 40; // 180-220 (青色到蓝色)
                return `hsl(${hue}, 100%, 70%)`;
            }
            
            update() {
                // 沿z轴移动
                this.z -= this.speed * direction * config.travelSpeed * 0.1;
                
                // 循环
                if (this.z < 0) {
                    this.z = config.tunnelLength * 20;
                } else if (this.z > config.tunnelLength * 20) {
                    this.z = 0;
                }
                
                // 旋转
                this.angle += 0.01;
                
                // 时空曲率影响（使粒子轨迹弯曲）
                const curvature = config.curvatureStrength * 0.001;
                this.radius += Math.sin(time * curvature) * 0.5;
                this.radius = Math.max(30, Math.min(200, this.radius));
            }
            
            draw() {
                // 3D到2D投影
                const perspective = 500;
                const scale = perspective / (perspective + this.z);
                
                const x = width / 2 + Math.cos(this.angle) * this.radius * scale;
                const y = height / 2 + Math.sin(this.angle) * this.radius * scale;
                
                // 根据深度调整大小和透明度
                const depth = 1 - (this.z / (config.tunnelLength * 20));
                const size = this.size * scale * (1 + depth);
                const alpha = depth * 0.8;
                
                // 绘制粒子
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace('70%', `${alpha * 70}%`);
                ctx.fill();
                
                // 发光效果
                if (depth > 0.7) {
                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, size * 3);
                    gradient.addColorStop(0, this.color.replace('70%', `${alpha * 30}%`));
                    gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    
                    ctx.beginPath();
                    ctx.arc(x, y, size * 3, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
            }
        }
        
        // 隧道环类
        class TunnelRing {
            constructor(z) {
                this.z = z;
                this.radius = 150;
                this.segments = 32;
            }
            
            update() {
                this.z -= config.travelSpeed * 0.1 * direction;
                
                // 循环
                if (this.z < 0) {
                    this.z = config.tunnelLength * 20;
                } else if (this.z > config.tunnelLength * 20) {
                    this.z = 0;
                }
            }
            
            draw() {
                // 3D到2D投影
                const perspective = 500;
                const scale = perspective / (perspective + this.z);
                
                const x = width / 2;
                const y = height / 2;
                const radius = this.radius * scale;
                
                // 根据深度调整透明度
                const depth = 1 - (this.z / (config.tunnelLength * 20));
                const alpha = depth * 0.3;
                
                // 绘制隧道环
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(0, 255, 200, ${alpha})`;
                ctx.lineWidth = 1;
                ctx.stroke();
                
                // 绘制分段线
                for (let i = 0; i < this.segments; i++) {
                    const angle = (i / this.segments) * Math.PI * 2;
                    const px = x + Math.cos(angle) * radius;
                    const py = y + Math.sin(angle) * radius;
                    
                    ctx.beginPath();
                    ctx.arc(px, py, 2 * scale, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 255, 200, ${alpha * 0.5})`;
                    ctx.fill();
                }
            }
        }
        
        // 绘制时空扭曲效果
        function drawSpacetimeDistortion() {
            const centerX = width / 2;
            const centerY = height / 2;
            const maxRadius = Math.min(width, height) * 0.4;
            
            // 多层扭曲波纹
            for (let i = 0; i < 10; i++) {
                const phase = time * 0.02 + i * 0.3;
                const radius = maxRadius * (0.3 + i * 0.07);
                const alpha = 0.1 * Math.sin(phase);
                
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(0, 255, 200, ${Math.abs(alpha)})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
        
        // 绘制隧道中心光点
        function drawCenterLight() {
            const centerX = width / 2;
            const centerY = height / 2;
            
            // 核心光点
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, 50
            );
            
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(0.3, 'rgba(0, 255, 200, 0.5)');
            gradient.addColorStop(0.6, 'rgba(0, 255, 200, 0.2)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // 脉冲光环
            const pulseRadius = 30 + Math.sin(time * 0.05) * 10;
            ctx.beginPath();
            ctx.arc(centerX, centerY, pulseRadius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(0, 255, 200, 0.5)';
            ctx.lineWidth = 3;
            ctx.stroke();
        }
        
        // 绘制星尘背景
        function drawStardust() {
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                const size = Math.random() * 1.5;
                const alpha = Math.random() * 0.3;
                
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            }
        }
        
        // 初始化粒子
        function initParticles() {
            particles = [];
            
            for (let i = 0; i < config.particleDensity; i++) {
                particles.push(new Particle());
            }
        }
        
        // 初始化隧道环
        function initTunnelRings() {
            tunnelRings = [];
            
            const ringCount = 20;
            for (let i = 0; i < ringCount; i++) {
                const z = (i / ringCount) * config.tunnelLength * 20;
                tunnelRings.push(new TunnelRing(z));
            }
        }
        
        // 动画循环
        function animate(currentTime) {
            // FPS 计算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                document.getElementById('fps').textContent = fps;
            }
            
            // 更新时间
            time += 0.016;
            
            // 清除画布（带拖尾效果）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制星尘背景
            drawStardust();
            
            // 绘制时空扭曲
            drawSpacetimeDistortion();
            
            // 更新和绘制隧道环
            tunnelRings.forEach(ring => {
                ring.update();
                ring.draw();
            });
            
            // 更新和绘制粒子
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            // 绘制中心光点
            drawCenterLight();
            
            // 更新信息
            document.getElementById('particleCount').textContent = particles.length;
            document.getElementById('tunnelLength').textContent = config.tunnelLength;
            document.getElementById('travelSpeed').textContent = config.travelSpeed;
            document.getElementById('spacetimeCurvature').textContent = config.curvatureStrength;
            
            requestAnimationFrame(animate);
        }
        
        // 鼠标交互1：点击加速穿越
        canvas.addEventListener('click', (e) => {
            // 临时加速
            const originalSpeed = config.travelSpeed;
            config.travelSpeed *= 3;
            
            setTimeout(() => {
                config.travelSpeed = originalSpeed;
            }, 500);
        });
        
        // 鼠标交互2：右键改变方向
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            direction *= -1;
        });
        
        // 鼠标移动：影响时空曲率
        canvas.addEventListener('mousemove', (e) => {
            const centerX = width / 2;
            const centerY = height / 2;
            const dx = e.clientX - centerX;
            const dy = e.clientY - centerY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            // 根据鼠标距离调整曲率
            config.curvatureStrength = Math.min(100, distance * 0.1);
            document.getElementById('curvatureStrength').value = config.curvatureStrength;
            document.getElementById('curvatureStrengthValue').textContent = Math.round(config.curvatureStrength);
        });
        
        // 控制面板事件
        document.getElementById('particleDensity').addEventListener('input', (e) => {
            const newCount = parseInt(e.target.value);
            document.getElementById('particleDensityValue').textContent = newCount;
            
            if (newCount > particles.length) {
                for (let i = particles.length; i < newCount; i++) {
                    particles.push(new Particle());
                }
            } else {
                particles.length = newCount;
            }
            config.particleDensity = newCount;
        });
        
        document.getElementById('tunnelLength').addEventListener('input', (e) => {
            config.tunnelLength = parseInt(e.target.value);
            document.getElementById('tunnelLengthValue').textContent = e.target.value;
            initTunnelRings();
        });
        
        document.getElementById('travelSpeed').addEventListener('input', (e) => {
            config.travelSpeed = parseInt(e.target.value);
            document.getElementById('travelSpeedValue').textContent = e.target.value;
        });
        
        document.getElementById('curvatureStrength').addEventListener('input', (e) => {
            config.curvatureStrength = parseInt(e.target.value);
            document.getElementById('curvatureStrengthValue').textContent = e.target.value;
        });
        
        document.getElementById('jumpBtn').addEventListener('click', () => {
            // 时空跳跃效果
            const jumpDuration = 1000;
            const originalSpeed = config.travelSpeed;
            config.travelSpeed = 50;
            
            // 闪烁效果
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.fillRect(0, 0, width, height);
            
            setTimeout(() => {
                config.travelSpeed = originalSpeed;
            }, jumpDuration);
        });
        
        document.getElementById('reverseBtn').addEventListener('click', () => {
            direction *= -1;
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            direction = 1;
            initParticles();
            initTunnelRings();
        });
        
        // 窗口调整
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        
        // 性能优化：移动设备减少粒子
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            config.particleDensity = 300;
            document.getElementById('particleDensity').value = 300;
            document.getElementById('particleDensityValue').textContent = 300;
        }
        
        // 初始化并启动
        initParticles();
        initTunnelRings();
        animate(performance.now());
    </script>
</body>
</html>
