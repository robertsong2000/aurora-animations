<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粒子漩涡 - Particle Vortex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(0, 255, 255, 0.8);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 255, 255, 0.9);
            font-size: 32px;
            font-weight: bold;
            z-index: 100;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
            letter-spacing: 5px;
        }
        
        .fps {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(0, 255, 255, 0.6);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
        
        @media (max-width: 768px) {
            .info {
                font-size: 11px;
                bottom: 10px;
                left: 10px;
            }
            .title {
                font-size: 20px;
                top: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="title">🌀 粒子漩涡</div>
    <canvas id="vortex"></canvas>
    <div class="info">
        <div>🖱️ 移动鼠标 - 控制漩涡中心</div>
        <div>👆 点击 - 改变旋转方向</div>
    </div>
    <div class="fps" id="fps">FPS: 60</div>
    
    <script>
        // 性能监控
        const fpsElement = document.getElementById('fps');
        let lastTime = performance.now();
        let frameCount = 0;
        
        // Canvas 设置
        const canvas = document.getElementById('vortex');
        const ctx = canvas.getContext('2d');
        
        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        
        // 漩涡配置
        let particles = [];
        const PARTICLE_COUNT = 800;
        let rotationDirection = 1; // 1=顺时针，-1=逆时针
        
        // 颜色配置
        const COLORS = [
            '#00ffff', '#00ff88', '#00ff00', '#88ff00', '#ffff00',
            '#ff8800', '#ff0000', '#ff0088', '#ff00ff', '#8800ff'
        ];
        
        // 响应式调整
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            initParticles();
        }
        
        // 初始化粒子
        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * Math.min(width, height) * 0.4;
                
                particles.push({
                    angle: angle,
                    distance: distance,
                    speed: 0.02 + Math.random() * 0.03,
                    size: 1 + Math.random() * 2,
                    colorIndex: Math.floor(Math.random() * COLORS.length),
                    alpha: 0.5 + Math.random() * 0.5,
                });
            }
        }
        
        // 更新粒子
        function updateParticles() {
            const targetX = mouseX;
            const targetY = mouseY;
            
            particles.forEach(particle => {
                // 旋转
                particle.angle += particle.speed * rotationDirection;
                
                // 计算笛卡尔坐标
                const x = targetX + Math.cos(particle.angle) * particle.distance;
                const y = targetY + Math.sin(particle.angle) * particle.distance;
                
                particle.x = x;
                particle.y = y;
                
                // 距离中心的距离影响颜色
                const distFromCenter = Math.sqrt(
                    Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2)
                );
                particle.colorIndex = Math.floor((distFromCenter / (Math.min(width, height) * 0.5)) * COLORS.length) % COLORS.length;
            });
        }
        
        // 绘制粒子
        function drawParticles() {
            particles.forEach(particle => {
                ctx.save();
                ctx.fillStyle = COLORS[particle.colorIndex];
                ctx.globalAlpha = particle.alpha;
                ctx.shadowBlur = 10;
                ctx.shadowColor = COLORS[particle.colorIndex];
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }
        
        // 绘制漩涡中心
        function drawCenter() {
            const gradient = ctx.createRadialGradient(
                mouseX, mouseY, 0,
                mouseX, mouseY, 50
            );
            gradient.addColorStop(0, 'rgba(0, 255, 255, 0.3)');
            gradient.addColorStop(1, 'rgba(0, 255, 255, 0)');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 50, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // 绘制背景光晕
        function drawBackgroundGlow() {
            const gradient = ctx.createRadialGradient(
                mouseX, mouseY, 0,
                mouseX, mouseY, Math.max(width, height) * 0.6
            );
            gradient.addColorStop(0, 'rgba(0, 50, 50, 0.2)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        // 主动画循环
        function animate(currentTime) {
            // 清除画布（半透明）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制背景光晕
            drawBackgroundGlow();
            
            // 绘制漩涡中心
            drawCenter();
            
            // 更新和绘制
            updateParticles();
            drawParticles();
            
            // FPS 计算
            frameCount++;
            if (frameCount >= 30) {
                const fps = Math.round(30 / ((currentTime - lastTime) / 1000 * 30));
                fpsElement.textContent = `FPS: ${Math.min(fps, 60)}`;
                frameCount = 0;
            }
            
            lastTime = currentTime;
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('click', () => {
            rotationDirection *= -1; // 反转旋转方向
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            rotationDirection *= -1;
        });
        
        // 初始化
        resize();
        mouseX = centerX;
        mouseY = centerY;
        requestAnimationFrame(animate);
    </script>
</body>
</html>
