<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多重宇宙 - Multiverse</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0015;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            cursor: crosshair;
        }
        
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(200, 100, 255, 0.9);
            font-size: 13px;
            line-height: 1.8;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(200, 100, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        
        #info h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #c864ff;
            text-shadow: 0 0 10px rgba(200, 100, 255, 0.5);
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(200, 100, 255, 0.9);
            font-size: 13px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(200, 100, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .control-item {
            margin: 8px 0;
        }
        
        label {
            display: inline-block;
            width: 100px;
        }
        
        input[type="range"] {
            width: 140px;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        span.value {
            display: inline-block;
            width: 40px;
            text-align: right;
            margin-left: 10px;
            color: #c864ff;
        }
        
        button {
            margin-top: 10px;
            margin-right: 10px;
            padding: 8px 20px;
            background: linear-gradient(135deg, #c864ff 0%, #9632dc 100%);
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(200, 100, 255, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="info">
        <h3>🌌 多重宇宙</h3>
        <div>宇宙数量: <span id="universeCount">0</span></div>
        <div>分支概率: <span id="branchProbability">0</span>%</div>
        <div>量子叠加态: <span id="superpositionStates">0</span></div>
        <div>维度层级: <span id="dimensionLevel">0</span></div>
        <div>FPS: <span id="fps">0</span></div>
    </div>
    
    <div id="controls">
        <div class="control-item">
            <label>宇宙数量:</label>
            <input type="range" id="universeCount" min="1" max="20" value="5">
            <span class="value" id="universeCountValue">5</span>
        </div>
        <div class="control-item">
            <label>分支概率:</label>
            <input type="range" id="branchProbability" min="0" max="100" value="30">
            <span class="value" id="branchProbabilityValue">30</span>
        </div>
        <div class="control-item">
            <label>粒子密度:</label>
            <input type="range" id="particleDensity" min="50" max="500" value="200">
            <span class="value" id="particleDensityValue">200</span>
        </div>
        <div class="control-item">
            <label>连接强度:</label>
            <input type="range" id="connectionStrength" min="0" max="100" value="50">
            <span class="value" id="connectionStrengthValue">50</span>
        </div>
        <button id="branchBtn">分支宇宙</button>
        <button id="mergeBtn">合并宇宙</button>
        <button id="resetBtn">重置</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        // 配置
        let config = {
            universeCount: 5,
            branchProbability: 30,
            particleDensity: 200,
            connectionStrength: 50
        };
        
        // 宇宙
        let universes = [];
        
        // 量子纠缠连接
        let connections = [];
        
        // 时间
        let time = 0;
        
        // FPS 计算
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 0;
        
        // 颜色主题（每个宇宙不同颜色）
        const universeColors = [
            { r: 255, g: 100, b: 200 },  // 粉红宇宙
            { r: 100, g: 200, b: 255 },  // 蓝色宇宙
            { r: 255, g: 200, b: 100 },  // 金色宇宙
            { r: 100, g: 255, b: 150 },  // 绿色宇宙
            { r: 255, g: 150, b: 100 },  // 橙色宇宙
            { r: 200, g: 100, b: 255 },  // 紫色宇宙
            { r: 255, g: 100, b: 100 },  // 红色宇宙
            { r: 100, g: 255, b: 255 },  // 青色宇宙
            { r: 255, g: 255, b: 100 },  // 黄色宇宙
            { r: 150, g: 255, b: 100 },  // 黄绿宇宙
            { r: 255, g: 100, b: 150 },  // 玫红宇宙
            { r: 100, g: 150, b: 255 },  // 浅蓝宇宙
            { r: 255, g: 180, b: 100 },  // 浅橙宇宙
            { r: 180, g: 255, b: 100 },  // 浅绿宇宙
            { r: 255, g: 100, b: 255 },  // 品红宇宙
            { r: 100, g: 255, b: 200 },  // 青绿宇宙
            { r: 255, g: 200, b: 150 },  // 桃色宇宙
            { r: 150, g: 200, b: 255 },  // 淡蓝宇宙
            { r: 255, g: 150, b: 200 },  // 浅粉宇宙
            { r: 200, g: 255, b: 150 }   // 浅黄宇宙
        ];
        
        // 宇宙类
        class Universe {
            constructor(id, x, y) {
                this.id = id;
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = 100 + Math.random() * 50;
                this.particles = [];
                this.color = universeColors[id % universeColors.length];
                this.phase = Math.random() * Math.PI * 2;
                this.branches = [];
                this.superposition = true; // 量子叠加态
                
                this.initParticles();
            }
            
            initParticles() {
                this.particles = [];
                
                for (let i = 0; i < config.particleDensity; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * this.radius;
                    
                    this.particles.push({
                        x: Math.cos(angle) * distance,
                        y: Math.sin(angle) * distance,
                        size: Math.random() * 2 + 1,
                        speed: Math.random() * 0.02 + 0.01,
                        angle: angle
                    });
                }
            }
            
            update() {
                // 更新相位
                this.phase += 0.01;
                
                // 移动宇宙
                this.x += this.vx;
                this.y += this.vy;
                
                // 边界反弹
                if (this.x < this.radius || this.x > width - this.radius) {
                    this.vx *= -1;
                }
                if (this.y < this.radius || this.y > height - this.radius) {
                    this.vy *= -1;
                }
                
                // 更新粒子
                this.particles.forEach(particle => {
                    particle.angle += particle.speed;
                    particle.x = Math.cos(particle.angle) * (Math.random() * this.radius * 0.8 + this.radius * 0.2);
                    particle.y = Math.sin(particle.angle) * (Math.random() * this.radius * 0.8 + this.radius * 0.2);
                });
                
                // 量子叠加态波动
                if (this.superposition) {
                    this.x += Math.sin(this.phase) * 0.5;
                    this.y += Math.cos(this.phase * 0.7) * 0.5;
                }
            }
            
            draw() {
                // 绘制宇宙边界（量子叠加态的模糊边缘）
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 1.5
                );
                
                gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
                gradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.1)`);
                gradient.addColorStop(0.8, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.2)`);
                gradient.addColorStop(1, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.1)`);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 绘制粒子
                this.particles.forEach(particle => {
                    const x = this.x + particle.x;
                    const y = this.y + particle.y;
                    
                    ctx.beginPath();
                    ctx.arc(x, y, particle.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.8)`;
                    ctx.fill();
                });
                
                // 绘制宇宙核心
                const coreGradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 0.3
                );
                
                coreGradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.8)`);
                coreGradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.3)`);
                coreGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = coreGradient;
                ctx.fill();
                
                // 宇宙标签
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.9)`;
                ctx.font = '12px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText(`宇宙 ${this.id + 1}`, this.x, this.y - this.radius - 10);
                
                if (this.superposition) {
                    ctx.fillText('叠加态', this.x, this.y - this.radius + 5);
                }
            }
        }
        
        // 量子纠缠连接类
        class QuantumConnection {
            constructor(universe1, universe2) {
                this.universe1 = universe1;
                this.universe2 = universe2;
                this.phase = 0;
                this.strength = config.connectionStrength / 100;
            }
            
            update() {
                this.phase += 0.05;
            }
            
            draw() {
                const x1 = this.universe1.x;
                const y1 = this.universe1.y;
                const x2 = this.universe2.x;
                const y2 = this.universe2.y;
                
                // 绘制量子纠缠线（波动）
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                
                const steps = 20;
                for (let i = 1; i <= steps; i++) {
                    const t = i / steps;
                    const x = x1 + (x2 - x1) * t;
                    const y = y1 + (y2 - y1) * t;
                    
                    // 波动偏移
                    const wave = Math.sin(this.phase + t * Math.PI * 4) * 20 * this.strength;
                    const dx = -(y2 - y1) / Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
                    const dy = (x2 - x1) / Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
                    
                    ctx.lineTo(x + dx * wave, y + dy * wave);
                }
                
                // 渐变色（两个宇宙颜色的混合）
                const gradient = ctx.createLinearGradient(x1, y1, x2, y2);
                gradient.addColorStop(0, `rgba(${this.universe1.color.r}, ${this.universe1.color.g}, ${this.universe1.color.b}, 0.5)`);
                gradient.addColorStop(0.5, `rgba(255, 255, 255, 0.3)`);
                gradient.addColorStop(1, `rgba(${this.universe2.color.r}, ${this.universe2.color.g}, ${this.universe2.color.b}, 0.5)`);
                
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
        
        // 绘制背景量子场
        function drawQuantumField() {
            // 量子涨落（随机点）
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                const size = Math.random() * 2;
                const alpha = Math.random() * 0.2;
                
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 100, 255, ${alpha})`;
                ctx.fill();
            }
        }
        
        // 宇宙分支（创建新宇宙）
        function branchUniverse(parentUniverse) {
            if (universes.length >= 20) return;
            
            const newUniverse = new Universe(
                universes.length,
                parentUniverse.x + (Math.random() - 0.5) * 200,
                parentUniverse.y + (Math.random() - 0.5) * 200
            );
            
            // 继承父宇宙的一些特性
            newUniverse.radius = parentUniverse.radius * (0.8 + Math.random() * 0.4);
            newUniverse.superposition = true;
            
            universes.push(newUniverse);
            
            // 创建量子纠缠连接
            if (Math.random() < 0.5) {
                connections.push(new QuantumConnection(parentUniverse, newUniverse));
            }
        }
        
        // 初始化宇宙
        function initUniverses() {
            universes = [];
            connections = [];
            
            for (let i = 0; i < config.universeCount; i++) {
                const angle = (i / config.universeCount) * Math.PI * 2;
                const distance = Math.min(width, height) * 0.25;
                const x = width / 2 + Math.cos(angle) * distance;
                const y = height / 2 + Math.sin(angle) * distance;
                
                universes.push(new Universe(i, x, y));
            }
            
            // 创建初始量子纠缠连接
            for (let i = 0; i < universes.length; i++) {
                for (let j = i + 1; j < universes.length; j++) {
                    if (Math.random() < 0.3) {
                        connections.push(new QuantumConnection(universes[i], universes[j]));
                    }
                }
            }
        }
        
        // 动画循环
        function animate(currentTime) {
            // FPS 计算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                document.getElementById('fps').textContent = fps;
            }
            
            // 更新时间
            time += 0.016;
            
            // 清除画布
            ctx.fillStyle = 'rgba(10, 0, 21, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制量子场
            drawQuantumField();
            
            // 自动分支（根据概率）
            if (Math.random() < config.branchProbability * 0.0001) {
                const randomUniverse = universes[Math.floor(Math.random() * universes.length)];
                branchUniverse(randomUniverse);
            }
            
            // 更新和绘制量子纠缠连接
            connections.forEach(connection => {
                connection.update();
                connection.draw();
            });
            
            // 更新和绘制宇宙
            universes.forEach(universe => {
                universe.update();
                universe.draw();
            });
            
            // 更新信息
            document.getElementById('universeCount').textContent = universes.length;
            document.getElementById('branchProbability').textContent = config.branchProbability;
            document.getElementById('superpositionStates').textContent = 
                universes.filter(u => u.superposition).length;
            document.getElementById('dimensionLevel').textContent = Math.ceil(universes.length / 5);
            
            requestAnimationFrame(animate);
        }
        
        // 鼠标交互1：点击创建新宇宙
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (universes.length < 20) {
                universes.push(new Universe(universes.length, x, y));
            }
        });
        
        // 鼠标交互2：右键触发宇宙分支
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // 找到最近的宇宙并分支
            let closestUniverse = null;
            let minDistance = Infinity;
            
            universes.forEach(universe => {
                const dx = universe.x - x;
                const dy = universe.y - y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < minDistance) {
                    minDistance = distance;
                    closestUniverse = universe;
                }
            });
            
            if (closestUniverse) {
                branchUniverse(closestUniverse);
            }
        });
        
        // 控制面板事件
        document.getElementById('universeCount').addEventListener('input', (e) => {
            config.universeCount = parseInt(e.target.value);
            document.getElementById('universeCountValue').textContent = e.target.value;
            initUniverses();
        });
        
        document.getElementById('branchProbability').addEventListener('input', (e) => {
            config.branchProbability = parseInt(e.target.value);
            document.getElementById('branchProbabilityValue').textContent = e.target.value;
        });
        
        document.getElementById('particleDensity').addEventListener('input', (e) => {
            config.particleDensity = parseInt(e.target.value);
            document.getElementById('particleDensityValue').textContent = e.target.value;
            
            universes.forEach(universe => {
                universe.initParticles();
            });
        });
        
        document.getElementById('connectionStrength').addEventListener('input', (e) => {
            config.connectionStrength = parseInt(e.target.value);
            document.getElementById('connectionStrengthValue').textContent = e.target.value;
            
            connections.forEach(connection => {
                connection.strength = config.connectionStrength / 100;
            });
        });
        
        document.getElementById('branchBtn').addEventListener('click', () => {
            if (universes.length > 0 && universes.length < 20) {
                const randomUniverse = universes[Math.floor(Math.random() * universes.length)];
                branchUniverse(randomUniverse);
            }
        });
        
        document.getElementById('mergeBtn').addEventListener('click', () => {
            if (universes.length > 1) {
                // 合并最后两个宇宙
                const last = universes.pop();
                const secondLast = universes[universes.length - 1];
                
                secondLast.radius = Math.sqrt(secondLast.radius ** 2 + last.radius ** 2);
                secondLast.initParticles();
                
                // 移除相关连接
                connections = connections.filter(c => 
                    c.universe1 !== last && c.universe2 !== last
                );
            }
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            initUniverses();
        });
        
        // 窗口调整
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        
        // 性能优化：移动设备减少宇宙数量
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            config.universeCount = 3;
            config.particleDensity = 100;
            document.getElementById('universeCount').value = 3;
            document.getElementById('universeCountValue').textContent = 3;
            document.getElementById('particleDensity').value = 100;
            document.getElementById('particleDensityValue').textContent = 100;
        }
        
        // 初始化并启动
        initUniverses();
        animate(performance.now());
    </script>
</body>
</html>
