<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>几何万花筒 | Geometric Kaleidoscope</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        
        .mode {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            font-family: monospace;
        }
        
        .fps {
            position: fixed;
            top: 10px;
            right: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-family: monospace;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="kaleidoscope"></canvas>
    <div class="mode" id="mode">对称轴: 6 | 图案: 几何</div>
    <div class="info">移动鼠标改变图案 | 点击切换对称轴</div>
    <div class="fps" id="fps"></div>
    
    <script>
        const canvas = document.getElementById('kaleidoscope');
        const ctx = canvas.getContext('2d');
        const fpsDisplay = document.getElementById('fps');
        const modeDisplay = document.getElementById('mode');
        
        let width, height, centerX, centerY;
        let time = 0;
        let mouseX = 0, mouseY = 0;
        let symmetryCount = 6;
        let shapes = [];
        let particles = [];
        
        // FPS 计算
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        // 颜色调色板
        const palettes = [
            ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7'],
            ['#A29BFE', '#74B9FF', '#00CEC9', '#55EFC4', '#FDCB6E'],
            ['#E17055', '#FDCB6E', '#00B894', '#00CEC9', '#0984E3'],
            ['#FD79A8', '#A29BFE', '#74B9FF', '#81ECEC', '#FFEAA7'],
            ['#FF7675', '#74B9FF', '#55EFC4', '#FFEAA7', '#DFE6E9']
        ];
        let currentPalette = 0;
        
        // 几何形状类
        class Shape {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.radius = Math.random() * 150 + 50;
                this.sides = Math.floor(Math.random() * 4) + 3; // 3-6边
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.distance = Math.random() * 200 + 50;
                this.angle = Math.random() * Math.PI * 2;
                this.orbitSpeed = (Math.random() - 0.5) * 0.01;
                this.color = palettes[currentPalette][Math.floor(Math.random() * 5)];
                this.alpha = Math.random() * 0.5 + 0.3;
                this.lineWidth = Math.random() * 3 + 1;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.pulseSpeed = Math.random() * 0.02 + 0.01;
            }
            
            update() {
                this.rotation += this.rotationSpeed;
                this.angle += this.orbitSpeed;
                this.pulsePhase += this.pulseSpeed;
                
                // 鼠标影响
                const mouseInfluence = (mouseX - centerX) / width;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02 * (1 + mouseInfluence * 2);
            }
            
            draw() {
                const pulse = Math.sin(this.pulsePhase) * 0.3 + 1;
                const currentRadius = this.radius * pulse;
                
                const x = centerX + Math.cos(this.angle) * this.distance * pulse;
                const y = centerY + Math.sin(this.angle) * this.distance * pulse;
                
                // 绘制多边形
                ctx.beginPath();
                for (let i = 0; i <= this.sides; i++) {
                    const angle = (i / this.sides) * Math.PI * 2 + this.rotation;
                    const px = x + Math.cos(angle) * currentRadius;
                    const py = y + Math.sin(angle) * currentRadius;
                    
                    if (i === 0) {
                        ctx.moveTo(px, py);
                    } else {
                        ctx.lineTo(px, py);
                    }
                }
                ctx.closePath();
                
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.lineWidth;
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                ctx.stroke();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }
        }
        
        // 粒子类
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.life = 1;
                this.decay = 0.015;
                this.size = Math.random() * 4 + 2;
                this.color = palettes[currentPalette][Math.floor(Math.random() * 5)];
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                this.vx *= 0.98;
                this.vy *= 0.98;
                
                return this.life > 0;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }
        }
        
        // 绘制万花筒扇形
        function drawKaleidoscope() {
            const angleStep = (Math.PI * 2) / symmetryCount;
            
            for (let i = 0; i < symmetryCount; i++) {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angleStep * i);
                
                // 镜像效果
                if (i % 2 === 1) {
                    ctx.scale(-1, 1);
                }
                
                // 绘制所有形状
                shapes.forEach(shape => shape.draw());
                
                ctx.restore();
            }
        }
        
        // 绘制装饰线条
        function drawDecorations() {
            const angleStep = (Math.PI * 2) / symmetryCount;
            
            ctx.strokeStyle = `rgba(255, 255, 255, 0.1)`;
            ctx.lineWidth = 1;
            
            // 放射线
            for (let i = 0; i < symmetryCount; i++) {
                const angle = angleStep * i;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(
                    centerX + Math.cos(angle) * Math.max(width, height),
                    centerY + Math.sin(angle) * Math.max(width, height)
                );
                ctx.stroke();
            }
            
            // 同心圆
            for (let r = 50; r < Math.max(width, height); r += 80) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
                ctx.stroke();
            }
        }
        
        // 绘制中心图案
        function drawCenter() {
            const pulse = Math.sin(time * 0.02) * 0.3 + 1;
            const radius = 30 * pulse;
            
            // 发光效果
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, radius * 2
            );
            gradient.addColorStop(0, `rgba(255, 255, 255, 0.8)`);
            gradient.addColorStop(0.5, `rgba(255, 255, 255, 0.2)`);
            gradient.addColorStop(1, 'transparent');
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 2, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // 中心多边形
            ctx.beginPath();
            for (let i = 0; i <= symmetryCount; i++) {
                const angle = (i / symmetryCount) * Math.PI * 2 + time * 0.01;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.closePath();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        // 绘制旋转的装饰环
        function drawOrbitingRings() {
            const rings = 3;
            
            for (let r = 0; r < rings; r++) {
                const radius = 100 + r * 80;
                const rotation = time * (0.01 + r * 0.005);
                const segments = 12 + r * 4;
                
                ctx.strokeStyle = palettes[currentPalette][r % 5];
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.4;
                
                ctx.beginPath();
                for (let i = 0; i <= segments; i++) {
                    const angle = (i / segments) * Math.PI * 2 + rotation;
                    const wobble = Math.sin(angle * 3 + time * 0.02) * 20;
                    const x = centerX + Math.cos(angle) * (radius + wobble);
                    const y = centerY + Math.sin(angle) * (radius + wobble);
                    
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }
        
        // 主渲染循环
        function render() {
            // 清空画布（带拖尾效果）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制装饰线条
            drawDecorations();
            
            // 绘制轨道环
            drawOrbitingRings();
            
            // 更新和绘制万花筒
            shapes.forEach(shape => shape.update());
            drawKaleidoscope();
            
            // 绘制中心
            drawCenter();
            
            // 更新和绘制粒子
            particles = particles.filter(p => {
                const alive = p.update();
                if (alive) p.draw();
                return alive;
            });
            
            // 鼠标产生粒子
            if (Math.random() > 0.9) {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 200 + 100;
                particles.push(new Particle(
                    centerX + Math.cos(angle) * distance,
                    centerY + Math.sin(angle) * distance
                ));
            }
            
            time++;
            
            // FPS 计算
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                fpsDisplay.textContent = `FPS: ${fps}`;
            }
            
            requestAnimationFrame(render);
        }
        
        // 调整画布大小
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            centerX = width / 2;
            centerY = height / 2;
        }
        
        // 切换对称轴数量
        function cycleSymmetry() {
            symmetryCount = symmetryCount === 6 ? 8 : symmetryCount === 8 ? 12 : symmetryCount === 12 ? 4 : 6;
            updateModeDisplay();
            
            // 产生爆发粒子
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 100 + 50;
                particles.push(new Particle(
                    centerX + Math.cos(angle) * distance,
                    centerY + Math.sin(angle) * distance
                ));
            }
        }
        
        // 更新显示
        function updateModeDisplay() {
            const paletteNames = ['温暖', '梦幻', '自然', '糖果', '日落'];
            modeDisplay.textContent = `对称轴: ${symmetryCount} | 色板: ${paletteNames[currentPalette]}`;
        }
        
        // 初始化形状
        function initShapes() {
            shapes = [];
            for (let i = 0; i < 8; i++) {
                shapes.push(new Shape());
            }
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        });
        
        window.addEventListener('click', () => {
            cycleSymmetry();
            currentPalette = (currentPalette + 1) % palettes.length;
            updateModeDisplay();
            
            // 重置形状颜色
            shapes.forEach(shape => {
                shape.color = palettes[currentPalette][Math.floor(Math.random() * 5)];
            });
        });
        
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                cycleSymmetry();
                currentPalette = (currentPalette + 1) % palettes.length;
                updateModeDisplay();
                
                shapes.forEach(shape => {
                    shape.color = palettes[currentPalette][Math.floor(Math.random() * 5)];
                });
            }
        });
        
        // 初始化
        resize();
        initShapes();
        mouseX = centerX;
        mouseY = centerY;
        updateModeDisplay();
        render();
    </script>
</body>
</html>
