<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流体模拟 | Fluid Simulation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            animation: flow 5s ease-in-out infinite;
        }

        .title h1 {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 
                0 0 20px rgba(0, 200, 255, 0.8),
                0 0 40px rgba(100, 150, 255, 0.6);
            letter-spacing: 0.2em;
            margin-bottom: 20px;
        }

        @keyframes flow {
            0%, 100% { transform: translate(-50%, -50%) rotate(-2deg); }
            50% { transform: translate(-50%, -50%) rotate(2deg); }
        }

        .subtitle {
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            color: rgba(100, 200, 255, 0.7);
            letter-spacing: 0.15em;
        }

        .instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(100, 200, 255, 0.8);
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 200, 255, 0.3);
        }

        .stats div {
            margin: 5px 0;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(100, 200, 255, 0.3);
            color: rgba(100, 200, 255, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(100, 200, 255, 0.2);
            border-color: rgba(100, 200, 255, 0.6);
        }

        .control-btn.active {
            background: rgba(100, 200, 255, 0.3);
            border-color: rgba(100, 200, 255, 0.8);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="controls">
        <button class="control-btn" id="gravityBtn">切换重力</button>
        <button class="control-btn" id="colorBtn">海洋色</button>
    </div>
    
    <div class="title">
        <h1>流体</h1>
        <div class="subtitle">液态的艺术</div>
    </div>
    
    <div class="instructions">
        拖动鼠标推动流体 · 点击创建漩涡 · 滚轮调整粘度
    </div>
    
    <div class="stats">
        <div>FPS: <span id="fps">60</span></div>
        <div>粒子数: <span id="particles">0</span></div>
        <div>粘度: <span id="viscosity">100</span>%</div>
    </div>

    <script>
        // 性能监控
        const fpsCounter = document.getElementById('fps');
        const particlesCounter = document.getElementById('particles');
        const viscosityDisplay = document.getElementById('viscosity');
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        let viscosity = 0.98;
        let isGravityEnabled = true;
        let currentColorScheme = 0;

        // Canvas 设置
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        // 流体系统
        const particles = [];
        const maxParticles = 600;
        let mouseX = 0;
        let mouseY = 0;
        let prevMouseX = 0;
        let prevMouseY = 0;
        let isMouseDown = false;

        // 颜色方案
        const colorSchemes = [
            { name: '海洋色', base: [0, 150, 255], accent: [100, 200, 255] },
            { name: '火焰色', base: [255, 100, 0], accent: [255, 200, 50] },
            { name: '极光色', base: [100, 255, 150], accent: [150, 100, 255] },
            { name: '熔岩色', base: [255, 50, 0], accent: [255, 150, 0] }
        ];

        // 响应式调整
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        // 粒子类
        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = 4 + Math.random() * 4;
                this.life = 1;
                this.maxLife = 1;
                this.density = Math.random() * 30 + 10;
            }

            update(particles) {
                // 鼠标影响
                if (isMouseDown) {
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 150) {
                        const force = (150 - dist) / 150;
                        const mouseVx = mouseX - prevMouseX;
                        const mouseVy = mouseY - prevMouseY;
                        this.vx += mouseVx * force * 0.5;
                        this.vy += mouseVy * force * 0.5;
                    }
                }
                
                // 粒子间相互作用
                particles.forEach(other => {
                    if (other === this) return;
                    
                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < this.density) {
                        // 斥力
                        const force = (this.density - dist) / this.density * 0.03;
                        this.vx -= dx * force;
                        this.vy -= dy * force;
                    }
                });
                
                // 重力
                if (isGravityEnabled) {
                    this.vy += 0.1;
                }
                
                // 粘度（摩擦力）
                this.vx *= viscosity;
                this.vy *= viscosity;
                
                // 速度限制
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > 10) {
                    this.vx = (this.vx / speed) * 10;
                    this.vy = (this.vy / speed) * 10;
                }
                
                // 更新位置
                this.x += this.vx;
                this.y += this.vy;
                
                // 边界反弹
                if (this.x < this.size) {
                    this.x = this.size;
                    this.vx *= -0.5;
                }
                if (this.x > width - this.size) {
                    this.x = width - this.size;
                    this.vx *= -0.5;
                }
                if (this.y < this.size) {
                    this.y = this.size;
                    this.vy *= -0.5;
                }
                if (this.y > height - this.size) {
                    this.y = height - this.size;
                    this.vy *= -0.5;
                }
            }

            draw() {
                const scheme = colorSchemes[currentColorScheme];
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const colorMix = Math.min(speed / 5, 1);
                
                const r = scheme.base[0] + (scheme.accent[0] - scheme.base[0]) * colorMix;
                const g = scheme.base[1] + (scheme.accent[1] - scheme.base[1]) * colorMix;
                const b = scheme.base[2] + (scheme.accent[2] - scheme.base[2]) * colorMix;
                
                ctx.save();
                
                // 发光效果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 2
                );
                gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0.8)`);
                gradient.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, 0.4)`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.shadowBlur = 15;
                ctx.shadowColor = `rgba(${r}, ${g}, ${b}, 0.8)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fill();
                
                // 核心
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.9)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.8, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        // 创建漩涡
        function createVortex(x, y) {
            particles.forEach(particle => {
                const dx = particle.x - x;
                const dy = particle.y - y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 200 && dist > 10) {
                    const angle = Math.atan2(dy, dx);
                    const force = (200 - dist) / 200 * 8;
                    particle.vx += Math.cos(angle + Math.PI / 2) * force;
                    particle.vy += Math.sin(angle + Math.PI / 2) * force;
                }
            });
        }

        // 初始化粒子
        function initParticles() {
            particles.length = 0;
            for (let i = 0; i < maxParticles; i++) {
                particles.push(new Particle());
            }
            particlesCounter.textContent = particles.length;
        }

        // 动画循环
        function animate(currentTime) {
            // FPS 计算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                fpsCounter.textContent = fps;
            }

            // 清空画布（半透明以产生拖尾效果）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);

            // 更新和绘制粒子
            particles.forEach(particle => {
                particle.update(particles);
            });
            
            particles.forEach(particle => {
                particle.draw();
            });

            // 保存上一帧鼠标位置
            prevMouseX = mouseX;
            prevMouseY = mouseY;

            requestAnimationFrame(animate);
        }

        // 事件监听
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            createVortex(e.clientX, e.clientY);
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('click', (e) => {
            createVortex(e.clientX, e.clientY);
        });

        // 滚轮调整粘度
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            viscosity = Math.max(0.9, Math.min(0.995, viscosity - e.deltaY * 0.0001));
            viscosityDisplay.textContent = Math.round((viscosity - 0.9) / 0.095 * 100);
        });

        // 按钮控制
        document.getElementById('gravityBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            isGravityEnabled = !isGravityEnabled;
            e.target.textContent = isGravityEnabled ? '关闭重力' : '开启重力';
            e.target.classList.toggle('active', !isGravityEnabled);
        });

        document.getElementById('colorBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            currentColorScheme = (currentColorScheme + 1) % colorSchemes.length;
            e.target.textContent = colorSchemes[currentColorScheme].name;
        });

        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            prevMouseX = mouseX;
            prevMouseY = mouseY;
            isMouseDown = true;
            createVortex(mouseX, mouseY);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isMouseDown = false;
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                // 重置粒子
                initParticles();
            } else if (e.code === 'KeyG') {
                // 切换重力
                isGravityEnabled = !isGravityEnabled;
                document.getElementById('gravityBtn').textContent = 
                    isGravityEnabled ? '关闭重力' : '开启重力';
            } else if (e.code === 'KeyC') {
                // 切换颜色
                currentColorScheme = (currentColorScheme + 1) % colorSchemes.length;
                document.getElementById('colorBtn').textContent = colorSchemes[currentColorScheme].name;
            }
        });

        // 初始化
        resize();
        initParticles();
        
        // 开始动画
        requestAnimationFrame(animate);
    </script>
</body>
</html>
