<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>几何万花筒 - Geometric Kaleidoscope</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255, 100, 200, 0.5);
        }
        
        .info span {
            display: block;
            margin: 5px 0;
        }
        
        .fps-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="kaleidoscope"></canvas>
    <div class="info">
        <span>🔮 几何万花筒</span>
        <span>🖱️ 移动鼠标 - 变换图案</span>
        <span>👆 点击 - 色彩爆发</span>
    </div>
    <div class="fps-counter" id="fps">FPS: 60</div>

    <script>
        // ============ 配置 ============
        const CONFIG = {
            segments: 12,
            layers: 5,
            shapesPerLayer: 3,
            rotationSpeed: 0.001,
            colorPalettes: [
                ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#F38181'],
                ['#667EEA', '#764BA2', '#F093FB', '#F5576C', '#4FACFE'],
                ['#FA709A', '#FEE140', '#00C9FF', '#92FE9D', '#FAD961'],
                ['#A8E6CF', '#DCEDC1', '#FFD3B6', '#FFAAA5', '#FF8B94']
            ]
        };

        // ============ Canvas 设置 ============
        const canvas = document.getElementById('kaleidoscope');
        const ctx = canvas.getContext('2d');
        let width, height, centerX, centerY, radius;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            radius = Math.min(width, height) * 0.4;
        }
        
        resize();
        window.addEventListener('resize', resize);

        // ============ 工具函数 ============
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // ============ 形状类 ============
        class Shape {
            constructor(layerIndex, shapeIndex) {
                this.layerIndex = layerIndex;
                this.shapeIndex = shapeIndex;
                this.type = Math.floor(random(0, 4));
                this.baseRadius = random(20, 70);
                this.distance = random(50, radius * 0.9);
                this.angle = random(0, Math.PI * 2);
                this.rotationSpeed = random(-0.015, 0.015);
                this.orbitSpeed = random(-0.003, 0.003);
                this.pulseSpeed = random(0.015, 0.04);
                this.pulsePhase = random(0, Math.PI * 2);
                this.colorIndex = Math.floor(random(0, 5));
                this.sides = Math.floor(random(3, 7));
            }

            update(time, mouseInfluence) {
                this.angle += this.orbitSpeed * (1 + mouseInfluence * 0.3);
                this.rotation = this.angle + time * this.rotationSpeed;
                this.pulsePhase += this.pulseSpeed;
                this.currentRadius = this.baseRadius * (1 + 0.25 * Math.sin(this.pulsePhase));
                this.currentRadius *= (1 + mouseInfluence * 0.4);
            }

            getPosition() {
                return {
                    x: centerX + Math.cos(this.angle) * this.distance,
                    y: centerY + Math.sin(this.angle) * this.distance
                };
            }

            draw(colors, alpha = 1) {
                const pos = this.getPosition();
                const color = colors[this.colorIndex % colors.length];
                
                ctx.save();
                ctx.translate(pos.x, pos.y);
                ctx.rotate(this.rotation);
                
                ctx.fillStyle = hexToRgba(color, alpha * 0.6);
                ctx.strokeStyle = hexToRgba(color, alpha);
                ctx.lineWidth = 2;
                
                switch(this.type) {
                    case 0: this.drawCircle(); break;
                    case 1: this.drawPolygon(3); break;
                    case 2: this.drawPolygon(4); break;
                    case 3: this.drawStar(); break;
                    default: this.drawPolygon(this.sides);
                }
                
                ctx.restore();
            }

            drawCircle() {
                ctx.beginPath();
                ctx.arc(0, 0, this.currentRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }

            drawPolygon(sides) {
                ctx.beginPath();
                for (let i = 0; i < sides; i++) {
                    const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
                    const x = Math.cos(angle) * this.currentRadius;
                    const y = Math.sin(angle) * this.currentRadius;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }

            drawStar() {
                const spikes = 5;
                const outerRadius = this.currentRadius;
                const innerRadius = this.currentRadius * 0.5;
                
                ctx.beginPath();
                for (let i = 0; i < spikes * 2; i++) {
                    const r = i % 2 === 0 ? outerRadius : innerRadius;
                    const angle = (i / (spikes * 2)) * Math.PI * 2 - Math.PI / 2;
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }
        }

        // ============ 粒子类 ============
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                const angle = random(0, Math.PI * 2);
                const speed = random(2, 7);
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.size = random(2, 8);
                this.color = color;
                this.life = 1;
                this.decay = random(0.01, 0.025);
                this.rotation = random(0, Math.PI * 2);
                this.rotationSpeed = random(-0.15, 0.15);
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= this.decay;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                if (this.life <= 0) return;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                ctx.fillStyle = hexToRgba(this.color, this.life);
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                
                ctx.restore();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        // ============ 初始化形状 ============
        const shapes = [];
        const particles = [];
        let currentPalette = 0;

        for (let layer = 0; layer < CONFIG.layers; layer++) {
            for (let i = 0; i < CONFIG.shapesPerLayer; i++) {
                shapes.push(new Shape(layer, i));
            }
        }

        // ============ 鼠标交互 ============
        let mouseX = centerX;
        let mouseY = centerY;
        let mouseDistance = 0;
        let targetMouseDistance = 0;

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            const dx = mouseX - centerX;
            const dy = mouseY - centerY;
            targetMouseDistance = Math.sqrt(dx * dx + dy * dy) / radius;
        });

        canvas.addEventListener('click', (e) => {
            currentPalette = (currentPalette + 1) % CONFIG.colorPalettes.length;
            
            const colors = CONFIG.colorPalettes[currentPalette];
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle(
                    e.clientX,
                    e.clientY,
                    colors[Math.floor(random(0, colors.length))]
                ));
            }
        });

        // ============ FPS 计算 ============
        let frameCount = 0;
        let lastFpsTime = performance.now();
        let fps = 60;

        function updateFPS() {
            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFpsTime = now;
                document.getElementById('fps').textContent = `FPS: ${fps}`;
            }
        }

        // ============ 绘制万花筒分段 ============
        function drawKaleidoscope(time) {
            const colors = CONFIG.colorPalettes[currentPalette];
            const segmentAngle = (Math.PI * 2) / CONFIG.segments;
            
            mouseDistance = lerp(mouseDistance, targetMouseDistance, 0.05);

            for (let seg = 0; seg < CONFIG.segments; seg++) {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(seg * segmentAngle);
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius * 1.3, -segmentAngle/2, segmentAngle/2);
                ctx.closePath();
                ctx.clip();
                
                if (seg % 2 === 1) {
                    ctx.scale(1, -1);
                }

                shapes.forEach(shape => {
                    shape.update(time, mouseDistance);
                    shape.draw(colors, 0.7);
                });

                ctx.restore();
            }

            // 中心
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 40);
            gradient.addColorStop(0, hexToRgba(colors[0], 0.7));
            gradient.addColorStop(0.5, hexToRgba(colors[1], 0.3));
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 40, 0, Math.PI * 2);
            ctx.fill();
        }

        // ============ 绘制背景 ============
        function drawBackground() {
            const colors = CONFIG.colorPalettes[currentPalette];
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius * 1.3);
            gradient.addColorStop(0, hexToRgba(colors[0], 0.08));
            gradient.addColorStop(0.5, hexToRgba(colors[2], 0.04));
            gradient.addColorStop(1, '#000');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        // ============ 主动画循环 ============
        function animate(time) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
            ctx.fillRect(0, 0, width, height);

            drawBackground();
            drawKaleidoscope(time);

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].isDead()) {
                    particles.splice(i, 1);
                }
            }

            if (particles.length > 150) {
                particles.splice(0, particles.length - 150);
            }

            updateFPS();
            requestAnimationFrame(animate);
        }

        animate(0);
    </script>
</body>
</html>
