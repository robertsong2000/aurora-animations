<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超新星爆发 | Supernova Explosion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            color: rgba(255, 200, 100, 0.9);
            font-size: 12px;
            background: rgba(20, 10, 0, 0.85);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 150, 50, 0.3);
            backdrop-filter: blur(5px);
            max-width: 220px;
        }

        .control-group {
            margin: 10px 0;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: #ffaa66;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: #ff8844;
        }

        .btn {
            padding: 8px 16px;
            margin-top: 8px;
            background: linear-gradient(135deg, #ff6622, #ffcc00);
            border: none;
            border-radius: 5px;
            color: #000;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 150, 50, 0.5);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 100, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .stats {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 200, 100, 0.7);
            font-size: 12px;
            background: rgba(20, 10, 0, 0.8);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 150, 50, 0.3);
            z-index: 10;
        }

        @media (max-width: 600px) {
            .controls {
                font-size: 10px;
                padding: 10px;
                max-width: 180px;
            }
            .info {
                font-size: 12px;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="supernova"></canvas>
    
    <div class="controls">
        <div class="control-group">
            <label>爆发强度: <span id="intensityValue">1.0x</span></label>
            <input type="range" id="intensitySlider" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label>粒子数量: <span id="particlesValue">500</span></label>
            <input type="range" id="particlesSlider" min="200" max="1000" step="50" value="500">
        </div>
        <div class="control-group">
            <label>扩散速度: <span id="speedValue">1.0x</span></label>
            <input type="range" id="speedSlider" min="0.5" max="3" step="0.1" value="1">
        </div>
        <button class="btn" id="explodeBtn">💥 触发超新星</button>
    </div>

    <div class="stats">
        <div id="fpsCounter">FPS: 60</div>
        <div id="particleCount">粒子: 0</div>
        <div id="phaseDisplay">阶段: 稳定</div>
    </div>

    <div class="info">
        <span>💥 超新星爆发 | Supernova Explosion 💥</span>
        <span>移动鼠标引导爆发方向 · 点击触发小爆发 · 双击触发超新星</span>
    </div>

    <script>
        (function() {
            'use strict';

            // ========== 配置 ==========
            const CONFIG = {
                maxParticles: 2000,
                shockwaveSpeed: 8,
                coreRadius: 20
            };

            // ========== Canvas 初始化 ==========
            const canvas = document.getElementById('supernova');
            const ctx = canvas.getContext('2d');
            let width, height, centerX, centerY;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                centerX = width / 2;
                centerY = height / 2;
            }

            resize();
            window.addEventListener('resize', resize);

            // ========== 状态管理 ==========
            let intensity = 1;
            let particleCount = 500;
            let expansionSpeed = 1;
            let mouseX = centerX;
            let mouseY = centerY;
            let particles = [];
            let shockwaves = [];
            let stars = [];
            let phase = 'stable'; // stable, expanding, cooling, fading
            let coreBrightness = 0;
            let time = 0;

            // ========== 星星背景 ==========
            class Star {
                constructor() {
                    this.reset();
                }

                reset() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.size = Math.random() * 1.5 + 0.5;
                    this.brightness = Math.random() * 0.5 + 0.5;
                    this.twinkleSpeed = 0.02 + Math.random() * 0.03;
                    this.twinklePhase = Math.random() * Math.PI * 2;
                }

                update(deltaTime, shockwaves) {
                    this.twinklePhase += this.twinkleSpeed * deltaTime * 0.1;
                    
                    // 冲击波影响
                    shockwaves.forEach(wave => {
                        const dx = this.x - wave.x;
                        const dy = this.y - wave.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (Math.abs(dist - wave.radius) < 50) {
                            this.brightness = Math.min(1, this.brightness + 0.3);
                        }
                    });
                }

                draw() {
                    const twinkle = 0.5 + 0.5 * Math.sin(this.twinklePhase);
                    const alpha = this.brightness * twinkle;
                    
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.fill();
                }
            }

            // ========== 超新星粒子 ==========
            class SupernovaParticle {
                constructor(x, y, angle, speed, type) {
                    this.x = x;
                    this.y = y;
                    this.angle = angle;
                    this.speed = speed;
                    this.type = type; // 'heavy', 'light', 'radiation'
                    
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    
                    // 根据类型设置属性
                    switch (type) {
                        case 'heavy':
                            this.size = 3 + Math.random() * 2;
                            this.life = 200 + Math.random() * 100;
                            this.color = { r: 255, g: 200, b: 100 };
                            this.drag = 0.99;
                            break;
                        case 'light':
                            this.size = 2 + Math.random() * 1;
                            this.life = 150 + Math.random() * 50;
                            this.color = { r: 255, g: 255, b: 200 };
                            this.drag = 0.98;
                            break;
                        case 'radiation':
                            this.size = 1 + Math.random() * 1;
                            this.life = 100 + Math.random() * 50;
                            this.color = { r: 200, g: 150, b: 255 };
                            this.drag = 0.97;
                            break;
                    }
                    
                    this.maxLife = this.life;
                    this.temperature = 1;
                }

                update() {
                    this.x += this.vx * expansionSpeed;
                    this.y += this.vy * expansionSpeed;
                    
                    this.vx *= this.drag;
                    this.vy *= this.drag;
                    
                    this.life--;
                    this.temperature = this.life / this.maxLife;
                    
                    // 重力影响（向中心微弱吸引）
                    const dx = centerX - this.x;
                    const dy = centerY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 100) {
                        const gravity = 0.01;
                        this.vx += (dx / dist) * gravity;
                        this.vy += (dy / dist) * gravity;
                    }
                }

                draw() {
                    if (this.life <= 0) return;
                    
                    const alpha = this.temperature;
                    
                    // 发光效果
                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, this.size * 4
                    );
                    gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`);
                    gradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.3})`);
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
                    ctx.fill();
                }

                isDead() {
                    return this.life <= 0;
                }
            }

            // ========== 冲击波 ==========
            class Shockwave {
                constructor(x, y, maxRadius) {
                    this.x = x;
                    this.y = y;
                    this.radius = 0;
                    this.maxRadius = maxRadius || Math.max(width, height);
                    this.speed = CONFIG.shockwaveSpeed;
                    this.alpha = 0.8;
                }

                update() {
                    this.radius += this.speed * expansionSpeed;
                    this.alpha = 0.8 * (1 - this.radius / this.maxRadius);
                }

                draw() {
                    if (this.alpha <= 0) return;
                    
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 200, 100, ${this.alpha * 0.5})`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    
                    // 内层冲击波
                    if (this.radius > 20) {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.radius * 0.9, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(255, 255, 200, ${this.alpha * 0.3})`;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                }

                isDead() {
                    return this.radius >= this.maxRadius;
                }
            }

            // ========== 初始化星星 ==========
            function initStars() {
                stars = [];
                for (let i = 0; i < 300; i++) {
                    stars.push(new Star());
                }
            }

            initStars();

            // ========== 触发超新星爆发 ==========
            function triggerSupernova(x, y, small) {
                const cx = x || centerX;
                const cy = y || centerY;
                const count = small ? particleCount * 0.3 : particleCount;
                const speedMultiplier = small ? 0.5 : 1;
                
                // 粒子爆发
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = (2 + Math.random() * 8) * intensity * speedMultiplier;
                    
                    // 随机类型
                    const types = ['heavy', 'light', 'radiation'];
                    const type = types[Math.floor(Math.random() * types.length)];
                    
                    if (particles.length < CONFIG.maxParticles) {
                        particles.push(new SupernovaParticle(cx, cy, angle, speed, type));
                    }
                }
                
                // 冲击波
                const maxRadius = small ? 300 : Math.max(width, height);
                shockwaves.push(new Shockwave(cx, cy, maxRadius));
                
                // 核心亮度
                if (!small) {
                    coreBrightness = 1;
                    phase = 'expanding';
                    
                    setTimeout(() => {
                        phase = 'cooling';
                    }, 2000);
                    
                    setTimeout(() => {
                        phase = 'fading';
                    }, 4000);
                    
                    setTimeout(() => {
                        phase = 'stable';
                        coreBrightness = 0;
                    }, 6000);
                }
            }

            // ========== 绘制核心 ==========
            function drawCore() {
                if (coreBrightness <= 0) return;
                
                // 核心发光
                const gradient = ctx.createRadialGradient(
                    centerX, centerY, 0,
                    centerX, centerY, CONFIG.coreRadius * 4
                );
                gradient.addColorStop(0, `rgba(255, 255, 255, ${coreBrightness})`);
                gradient.addColorStop(0.3, `rgba(255, 255, 200, ${coreBrightness * 0.7})`);
                gradient.addColorStop(0.6, `rgba(255, 200, 100, ${coreBrightness * 0.4})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(centerX, centerY, CONFIG.coreRadius * 4, 0, Math.PI * 2);
                ctx.fill();
                
                // 核心脉动
                const pulseSize = CONFIG.coreRadius * (1 + Math.sin(time * 5) * 0.2);
                ctx.beginPath();
                ctx.arc(centerX, centerY, pulseSize, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${coreBrightness})`;
                ctx.fill();
            }

            // ========== 鼠标交互 ==========
            canvas.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            canvas.addEventListener('click', (e) => {
                triggerSupernova(e.clientX, e.clientY, true);
            });

            canvas.addEventListener('dblclick', (e) => {
                e.preventDefault();
                triggerSupernova(centerX, centerY, false);
            });

            // 触摸支持
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                mouseX = touch.clientX;
                mouseY = touch.clientY;
            });

            canvas.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                triggerSupernova(touch.clientX, touch.clientY, true);
            });

            // ========== 控制器 ==========
            document.getElementById('intensitySlider').addEventListener('input', (e) => {
                intensity = parseFloat(e.target.value);
                document.getElementById('intensityValue').textContent = intensity.toFixed(1) + 'x';
            });

            document.getElementById('particlesSlider').addEventListener('input', (e) => {
                particleCount = parseInt(e.target.value);
                document.getElementById('particlesValue').textContent = particleCount;
            });

            document.getElementById('speedSlider').addEventListener('input', (e) => {
                expansionSpeed = parseFloat(e.target.value);
                document.getElementById('speedValue').textContent = expansionSpeed.toFixed(1) + 'x';
            });

            document.getElementById('explodeBtn').addEventListener('click', () => {
                triggerSupernova(centerX, centerY, false);
            });

            // ========== 性能监控 ==========
            let fps = 0;
            let frameCount = 0;
            let lastFpsUpdate = 0;

            function updateStats(currentTime) {
                frameCount++;
                if (currentTime - lastFpsUpdate >= 1000) {
                    fps = frameCount;
                    frameCount = 0;
                    lastFpsUpdate = currentTime;
                    document.getElementById('fpsCounter').textContent = `FPS: ${fps}`;
                }
                
                document.getElementById('particleCount').textContent = `粒子: ${particles.length}`;
                
                const phaseNames = {
                    stable: '稳定',
                    expanding: '膨胀中',
                    cooling: '冷却中',
                    fading: '消散中'
                };
                document.getElementById('phaseDisplay').textContent = `阶段: ${phaseNames[phase]}`;
            }

            // ========== 动画循环 ==========
            let lastTime = 0;

            function animate(currentTime) {
                const deltaTime = lastTime ? currentTime - lastTime : 16;
                lastTime = currentTime;

                // 更新时间
                time += deltaTime * 0.001;

                // 核心亮度衰减
                if (coreBrightness > 0) {
                    coreBrightness *= 0.995;
                }

                // 清除画布
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.fillRect(0, 0, width, height);

                // 更新和绘制星星
                stars.forEach(star => {
                    star.update(deltaTime, shockwaves);
                    star.draw();
                });

                // 更新和绘制冲击波
                for (let i = shockwaves.length - 1; i >= 0; i--) {
                    shockwaves[i].update();
                    shockwaves[i].draw();
                    
                    if (shockwaves[i].isDead()) {
                        shockwaves.splice(i, 1);
                    }
                }

                // 更新和绘制粒子
                for (let i = particles.length - 1; i >= 0; i--) {
                    particles[i].update();
                    particles[i].draw();
                    
                    if (particles[i].isDead()) {
                        particles.splice(i, 1);
                    }
                }

                // 绘制核心
                drawCore();

                updateStats(currentTime);
                requestAnimationFrame(animate);
            }

            // 启动动画
            requestAnimationFrame(animate);

        })();
    </script>
</body>
</html>
